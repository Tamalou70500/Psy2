<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examens de spécialisation — Cabinet du Texas</title>
<script>(function(){ var t=localStorage.getItem("psy_theme")||"dark"; document.documentElement.setAttribute("data-theme",t); })();</script>
<link rel="stylesheet" href="css/style.css">
<style>
.spe-exam-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:1px; background:var(--bdr); margin:1.5rem 0; }
.spe-exam-card { background:var(--ink2); padding:1.5rem; cursor:pointer; transition:background .2s; position:relative; }
.spe-exam-card:hover:not(.locked) { background:var(--ink3); }
.spe-exam-card.locked { opacity:.45; cursor:not-allowed; }
.spe-exam-card.passed { border-left:3px solid #4a9a4a; }
.spe-card-icon { font-size:1.75rem; margin-bottom:.75rem; }
.spe-card-title { font-family:'Playfair Display',serif; font-size:1rem; color:var(--parch); font-style:italic; margin-bottom:.3rem; }
.spe-card-meta { font-family:'Cormorant Garamond',serif; font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; color:var(--parch4); margin-bottom:.5rem; }
.spe-card-lieu { font-family:'EB Garamond',serif; font-size:.82rem; color:var(--parch3); font-style:italic; }
.spe-score-badge { position:absolute; top:.75rem; right:.75rem; background:rgba(74,154,74,.12); border:1px solid rgba(74,154,74,.25); color:#6abf6a; font-family:'Courier Prime',monospace; font-size:.65rem; padding:1px 7px; }
.lock-icon { position:absolute; top:.75rem; right:.75rem; opacity:.4; }

/* Reprise des styles examen.html */
.exam-wrap { max-width:780px; margin:0 auto; padding:2rem 1.5rem; }
.exam-header { margin-bottom:2rem; padding-bottom:1.25rem; border-bottom:1px solid var(--bdr); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; }
.progress-exam { display:flex; align-items:center; gap:.75rem; }
.progress-exam-bar { width:160px; height:5px; background:var(--bdr); border-radius:3px; overflow:hidden; }
.progress-exam-fill { height:100%; background:linear-gradient(90deg,#c83090,#9020c0); border-radius:3px; transition:width .4s; }
.progress-exam-text { font-family:'Courier Prime',monospace; font-size:.68rem; color:var(--parch3); white-space:nowrap; }
.partie-label { background:var(--ink2); border:1px solid var(--bdr); border-left:3px solid #9020c0; padding:.65rem 1.1rem; margin-bottom:1.25rem; font-family:'Cormorant Garamond',serif; font-size:.68rem; letter-spacing:.16em; text-transform:uppercase; color:#c050d0; }
.question-card { background:var(--ink2); border:1px solid var(--bdr); padding:1.5rem; margin-bottom:1.25rem; animation:fadeUp .25s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.question-num { font-family:'Cormorant Garamond',serif; font-size:.62rem; letter-spacing:.16em; text-transform:uppercase; color:var(--parch4); margin-bottom:.5rem; }
.question-type-badge { display:inline-block; font-family:'Cormorant Garamond',serif; font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; padding:1px 7px; border:1px solid var(--bdr2); color:var(--parch3); margin-left:.5rem; }
.question-text { font-family:'Playfair Display',serif; font-size:1rem; color:var(--parch); line-height:1.55; margin-bottom:1.1rem; font-style:italic; }
.cas-block { background:var(--ink3); border-left:3px solid #9020c0; padding:.85rem 1.1rem; margin-bottom:1rem; font-family:'EB Garamond',serif; font-size:.92rem; color:var(--parch2); line-height:1.75; }
.cas-label { font-family:'Cormorant Garamond',serif; font-size:.6rem; letter-spacing:.16em; text-transform:uppercase; color:#7010a0; display:block; margin-bottom:.4rem; }
.choices { display:flex; flex-direction:column; gap:7px; }
.choice { display:flex; align-items:flex-start; gap:.8rem; padding:.65rem .9rem; background:var(--ink3); border:1px solid var(--bdr); cursor:pointer; transition:all .15s; font-family:'EB Garamond',serif; font-size:.92rem; color:var(--parch2); line-height:1.45; }
.choice:hover { border-color:var(--bdr2); color:var(--parch); }
.choice.selected { border-color:#9020c0; background:rgba(144,32,192,.08); color:var(--parch); }
.choice.correct { border-color:#4a9a4a; background:rgba(74,154,74,.08); color:#6abf6a; }
.choice.wrong { border-color:#9a2424; background:rgba(154,36,36,.08); color:#c07070; }
.choice.reveal-correct { border-color:#4a9a4a; background:rgba(74,154,74,.05); color:#5aaf5a; }
.choice-letter { width:20px; height:20px; border-radius:50%; flex-shrink:0; border:1px solid var(--bdr2); display:flex; align-items:center; justify-content:center; font-family:'Courier Prime',monospace; font-size:.68rem; color:var(--parch3); }
.feedback { margin-top:.85rem; padding:.75rem 1rem; border:1px solid transparent; font-family:'EB Garamond',serif; font-size:.9rem; line-height:1.6; display:none; }
.feedback.show { display:block; }
.feedback.good { background:rgba(74,154,74,.07); border-color:rgba(74,154,74,.25); color:#6abf6a; }
.feedback.bad  { background:rgba(154,36,36,.07); border-color:rgba(154,36,36,.25); color:#c07070; }
.feedback-title { font-family:'Playfair Display',serif; font-size:.85rem; margin-bottom:.3rem; }
.feedback-expl { color:var(--parch2); }
.btn-next { width:100%; padding:.7rem; margin-top:.85rem; background:rgba(144,32,192,.1); border:1px solid #9020c0; color:#c050d0; font-family:'Playfair Display',serif; font-size:.9rem; font-style:italic; cursor:pointer; transition:all .2s; display:none; }
.btn-next.show { display:block; }
.btn-next:hover { background:rgba(144,32,192,.2); color:var(--parch); }
.result-card { background:var(--ink2); border:1px solid var(--bdr2); padding:2.5rem; text-align:center; position:relative; }
.result-card::before { content:''; position:absolute; inset:5px; border:1px solid var(--bdr); pointer-events:none; }
.result-score { font-family:'Playfair Display',serif; font-size:4rem; font-weight:700; line-height:1; margin-bottom:.5rem; }
.result-score.passed { color:#c050d0; }
.result-score.failed { color:#c07070; }
.result-mention { font-family:'Cormorant Garamond',serif; font-size:1rem; letter-spacing:.12em; text-transform:uppercase; margin-bottom:2rem; }
.result-details { display:flex; justify-content:center; gap:2rem; margin-bottom:2rem; flex-wrap:wrap; }
.result-detail { font-family:'EB Garamond',serif; font-size:.88rem; color:var(--parch3); }
.result-detail strong { display:block; font-size:1.4rem; color:var(--parch); font-family:'Playfair Display',serif; font-weight:400; }
.diplome-spe { background:var(--ink3); border:1px solid var(--bdr2); border-left:3px solid #9020c0; padding:1.25rem; margin:1.25rem 0; text-align:left; font-family:'Courier Prime',monospace; font-size:.76rem; color:var(--parch2); white-space:pre-wrap; line-height:1.8; }
.errors-list { text-align:left; margin-top:1.25rem; }
.error-item { padding:.65rem .9rem; border-left:2px solid #9a2424; background:rgba(154,36,36,.04); margin-bottom:5px; }
.error-q { font-family:'EB Garamond',serif; font-size:.88rem; color:var(--parch); font-style:italic; margin-bottom:.25rem; }
.error-correct { font-family:'Cormorant Garamond',serif; font-size:.68rem; color:#6abf6a; }
</style>
</head>

  <div class="flex-between mt-2 mb-1">

    </div>

    <button class="btn btn-sm" onclick="backToAccueil()" style="margin-bottom:1.5rem">← Spécialisations</button>

<script>
var EXAMENS_SPE = [
{
  id:'s1', icon:'🔪', title:'Certification Chirurgien',
  reqScore:80, totalQ:20,
  meta:['20 questions','80% requis','Titre : Chirurgien certifié'],
  questions:[
    {type:'qcm', partie:'Partie I — Théorie',
     text:'Quelle est la durée maximale recommandée pour un garrot avant risque de nécrose irréversible ?',
     choices:['30 minutes','1 heure','2 heures','4 heures'],
     correct:2, expl:'2 heures maximum. Au-delà, l\'ischémie (manque d\'oxygène) provoque des lésions irréversibles pouvant nécessiter l\'amputation. Toujours noter l\'heure de pose.'},
    {type:'qcm',
     text:'La technique du "lambeau" dans une amputation sert à :',
     choices:['Accélérer l\'opération','Conserver suffisamment de tissu mou pour couvrir le moignon','Réduire le saignement','Éviter l\'anesthésie'],
     correct:1, expl:'Le lambeau (technique de Larrey) conserve un excédent de tissu mou pour recouvrir l\'extrémité osseuse du moignon. Un moignon bien couvert cicatrise ; un moignon à l\'os nu s\'infecte.'},
    {type:'vf',
     text:'Lors d\'une section nerveuse pour amputation, on doit couper le nerf le plus court possible pour éviter la rétraction.',
     correct:false, expl:'FAUX — À l\'inverse : on doit sectionner le nerf EN AMONT et TIRER dessus pour qu\'il se rétracte dans le moignon. Un nerf court qui reste au bord du moignon forme un névrome douloureux (douleur du membre fantôme).'},
    {type:'qcm',
     text:'Quel fil de suture est résorbable et utilisé pour les plans musculaires profonds ?',
     choices:['Soie tressée','Lin','Catgut','Argent'],
     correct:2, expl:'Le catgut (intestin de mouton) est résorbé en 10 à 20 jours. Idéal pour les muscles et tissus profonds. La soie est non-résorbable et réservée à la peau (à retirer en 7-10 jours).'},
    {type:'qcm',
     text:'L\'autoclave stérilise les instruments chirurgicaux à :',
     choices:['80°C pendant 10 minutes','100°C pendant 15 minutes','120°C pendant 20 minutes','150°C pendant 5 minutes'],
     correct:2, expl:'120°C sous pression de vapeur pendant 20 minutes — suffisant pour détruire toutes les formes végétatives ET les spores bactériennes. Introduit par Ernst von Bergmann en 1886.'},
    {type:'qcm',
     text:'La différence fondamentale entre antisepsie et asepsie est :',
     choices:['L\'antisepsie utilise plus de produits','L\'antisepsie tue les germes présents, l\'asepsie empêche les germes d\'entrer','L\'asepsie est plus ancienne','L\'antisepsie est réservée à la chirurgie'],
     correct:1, expl:'Antisepsie (Lister, 1867) = tuer les germes déjà présents. Asepsie (von Bergmann, 1886) = empêcher les germes d\'entrer. L\'asepsie est supérieure — mieux vaut prévenir que guérir.'},
    {type:'qcm',
     text:'Le signe de Blumberg (douleur à la décompression abdominale) indique :',
     choices:['Une hernie simple','Une péritonite — urgence chirurgicale','Une colique rénale','Un spasme musculaire'],
     correct:1, expl:'Blumberg positif = irritation péritonéale = urgence chirurgicale absolue. Chaque heure de retard augmente le risque de sepsis fatal.'},
    {type:'qcm',
     text:'L\'agent anesthésique avec la marge thérapeutique la plus étroite en 1904 est :',
     choices:['L\'éther diéthylique','Le chloroforme','La morphine','La cocaïne'],
     correct:1, expl:'Le chloroforme a une marge thérapeutique dangereusement étroite — quelques gouttes de trop provoquent un arrêt cardiaque. C\'est pourquoi l\'éther (marge plus large, mais inflammable) lui est souvent préféré.'},
    {type:'vf',
     text:'Une fracture ouverte doit être fermée hermétiquement pour protéger la plaie des infections.',
     correct:false, expl:'FAUX — Une fracture ouverte très contaminée doit être PARTIELLEMENT fermée avec drain, ou laissée ouverte pour surveiller. Fermer hermétiquement une plaie contaminée = enfermer l\'infection = gangrène.'},
    {type:'qcm',
     text:'Lors d\'une laparotomie exploratrice pour plaie abdominale pénétrante, même si le patient semble stable :',
     choices:['On peut observer 24h si aucun symptôme','On explore toujours chirurgicalement','On prescrit des antiseptiques et on surveille','On opère uniquement si fièvre'],
     correct:1, expl:'Les perforations intestinales sont asymptomatiques les premières heures puis évoluent vers la péritonite mortelle. Toute plaie pénétrante abdominale DOIT être explorée chirurgicalement.'},
    {type:'cas', partie:'Partie II — Cas cliniques',
     cas:'Un cowboy arrive avec une plaie pénétrante abdominale par couteau. Il est conscient, peu douloureux, TA 120/80. Il demande si c\'est grave.',
     text:'Votre décision ?',
     choices:['Observer 24h — il semble stable','Laparotomie exploratrice immédiate — toujours','Antiseptiques locaux et pansement','Morfine et repos'],
     correct:1, expl:'TOUJOURS explorer chirurgicalement une plaie abdominale pénétrante. La stabilité apparente ne présage pas de l\'absence de lésions viscérales. Une perforation colique mise en évidence 12h plus tard = péritonite = mortalité 30-50%.'},
    {type:'cas',
     cas:'Vous opérez un patient pour appendicite. En ouvrant l\'abdomen, vous trouvez l\'appendice perforé avec du pus libre dans la cavité péritonéale.',
     text:'Que faites-vous après l\'appendicectomie ?',
     choices:['Fermer hermétiquement — l\'appendice retiré suffit','Laver abondamment la cavité avec eau salée bouillie, drain, fermeture partielle','Fermer rapidement — risque d\'infection trop long','Faire une colostomie de protection'],
     correct:1, expl:'Appendicite perforée avec péritonite = lavage abondant de la cavité péritonéale (réduire la charge bactérienne), drain dans le cul-de-sac de Douglas, fermeture partielle avec plan superficiel ouvert. Mortalité sans lavage : élevée. Avec lavage : réduite de 50%.'},
    {type:'cas',
     cas:'Un patient se présente 3 jours après une amputation du bras. Fièvre 40°C, le moignon sent mauvais, la peau est noirâtre et crépite légèrement sous les doigts.',
     text:'Quel diagnostic et quelle action immédiate ?',
     choices:['Infection simple — nettoyer et panser','Gangrène gazeuse (Clostridium) — réamputation en urgence, plus haute','Œdème post-opératoire normal','Hématome — drainer'],
     correct:1, expl:'Crépitation + odeur + noircissement = gangrène gazeuse à Clostridium perfringens. Urgence absolue. La réamputation PLUS HAUTE que la première est la seule chance de survie. L\'infection progresse de plusieurs centimètres par heure. Chaque minute compte.'},
    {type:'cas',
     cas:'Pendant une opération au chloroforme, l\'anesthésiste vous signale que le patient ne respire plus. Il est pâle, sans pouls perceptible.',
     text:'Que faites-vous ?',
     choices:['Continuer l\'opération — l\'anesthésie est normale','Arrêter le chloroforme immédiatement, respiration artificielle, massage cardiaque externe si possible','Augmenter le chloroforme','Attendre 5 minutes avant d\'agir'],
     correct:1, expl:'Arrêt cardiaque sous chloroforme = surdosage. Stopper l\'inhalation immédiatement, aérer, ventilation artificielle (insufflation bouche à bouche), massage cardiaque externe (technique de compression thoracique — peu connue en 1904 mais décrite par Green en 1906). Réanimation primitive mais seule chance.'},
    {type:'cas',
     cas:'Vous réalisez une hernie inguinale étranglée. En réduisant l\'intestin, vous constatez qu\'il est noir, sans péristaltisme, mais reste souple. Vous hésitez.',
     text:'L\'intestin peut-il être remis en place ou faut-il le réséquer ?',
     choices:['Si souple, on peut le remettre — attendre la vascularisation','Réséquer immédiatement toute anse douteuse','La couleur seule suffit pour décider','Mettre dans de l\'eau chaude et attendre 10 min — si récupération de couleur, conserver'],
     correct:3, expl:'Classiquement : réchauffer avec du sérum salé tiède ou de l\'eau chaude pendant 5-10 minutes. Si l\'anse reprend une couleur rosée et des mouvements péristaltiques = vascularisation récupérée, on peut la conserver. Si reste noirâtre et inerte = résecter. Ne pas réintégrer une anse clairement nécrosée.'},
  ]
},
{
  id:'s2', icon:'🧠', title:'Certification Aliéniste',
  reqScore:80, totalQ:20,
  meta:['20 questions','80% requis','Titre : Aliéniste certifié'],
  questions:[
    {type:'qcm', partie:'Partie I — Théorie',
     text:'Freud abandonne l\'hypnose vers 1896 au profit de :',
     choices:['La pharmacologie','L\'association libre','Les bains froids','La théorie de Kraepelin'],
     correct:1, expl:'L\'association libre : le patient dit TOUT ce qui lui passe par l\'esprit sans censure. Les résistances (ce qu\'il évite) sont aussi informatives que le contenu. Cette technique permet d\'accéder à l\'inconscient sans l\'état artificiel de l\'hypnose.'},
    {type:'qcm',
     text:'La distinction fondamentale de Kraepelin (1896) oppose :',
     choices:['Hystérie et neurasthénie','Mélancolie et manie','Démence précoce et psychose maniaco-dépressive','Paranoïa et schizophrénie'],
     correct:2, expl:'Kraepelin distingue la démence précoce (évolution chronique, détérioration) de la psychose maniaco-dépressive (épisodes avec intervalles libres, rémissions possibles). Cette distinction structure encore le DSM actuel.'},
    {type:'vf',
     text:'Un patient en stupeur mélancolique présente le risque suicidaire le plus élevé au plus fort de son immobilité.',
     correct:false, expl:'FAUX — Le risque suicidaire est MAXIMAL à la SORTIE de la stupeur. Le patient retrouve alors l\'énergie d\'agir, mais la souffrance profonde n\'a pas disparu. Phase contre-intuitive mais documentée. Surveillance absolue obligatoire.'},
    {type:'qcm',
     text:'La règle d\'or face à un délire paranoïaque est :',
     choices:['Contredire fermement pour ramener à la réalité','Ne jamais contredire directement le système délirant','Ignorer le délire et parler d\'autre chose','Augmenter les doses de bromure'],
     correct:1, expl:'Contredire frontalement un délire paranoïaque coupe la relation thérapeutique et renforce les convictions («même le médecin est contre moi«). Écouter sans valider ni contredire est la seule porte d\'entrée.'},
    {type:'qcm',
     text:'Charcot pensait que l\'hypnose était accessible :',
     choices:['À tout le monde','Seulement aux hystériques','Seulement aux femmes','Seulement sous bromure'],
     correct:1, expl:'Charcot (Salpêtrière) : l\'hypnose est un état pathologique réservé aux hystériques. Bernheim (Nancy) : tout le monde est hypnotisable par suggestion. Freud, qui a étudié les deux, a donné raison à Bernheim.'},
    {type:'vf',
     text:'Un patient en manie aiguë présente une conscience intacte de sa maladie (insight).',
     correct:false, expl:'FAUX — Le patient maniaque n\'a généralement pas d\'insight (conscience de sa maladie). Il se sent au contraire en parfaite forme, génial, incompris par les autres. L\'absence d\'insight est un critère d\'internement.'},
    {type:'qcm',
     text:'L\'hystérie de conversion — le patient :',
     choices:['Simule consciemment ses symptômes','A des symptômes physiques réels sans lésion organique','A une lésion neurologique non diagnostiquée','Souffre uniquement en présence du médecin'],
     correct:1, expl:'L\'hystérique ne simule PAS — il souffre vraiment. Un trauma psychique refoulé se «convertit« en symptôme physique (paralysie, anesthésie, cécité). Ne jamais invalider les symptômes — aggrave le refoulement.'},
    {type:'qcm',
     text:'Le signe de Romberg positif (perte d\'équilibre yeux fermés) oriente vers :',
     choices:['Une atteinte cérébelleuse','Une atteinte des colonnes postérieures de la moelle','Une atteinte du cortex frontal','Une simulation'],
     correct:1, expl:'Les colonnes postérieures de la moelle transmettent la proprioception. Yeux fermés, ce signal est perdu → perte d\'équilibre. Causes fréquentes en 1904 : syphilis tertiaire (tabès), ataxies héréditaires.'},
    {type:'vf',
     text:'Il est légalement justifié d\'interner un patient qui demande lui-même son internement.',
     correct:true, expl:'VRAI — Le placement volontaire (demandé par le patient ou sa famille) est une des formes légales d\'internement prévues par la loi de 1838. À distinguer du placement d\'office (décidé par l\'autorité publique pour danger immédiat).'},
    {type:'qcm',
     text:'La neurasthénie, terme créé par Beard en 1869, correspond probablement aujourd\'hui à :',
     choices:['La schizophrénie','La dépression, l\'anxiété généralisée et les troubles somatoformes','L\'épilepsie','La paranoïa'],
     correct:1, expl:'La neurasthénie («épuisement nerveux«) était un diagnostic fourre-tout de l\'époque. Elle recouvre probablement plusieurs entités distinctes de la psychiatrie moderne : dépression, anxiété généralisée, trouble somatoforme. Largement diagnostiquée chez les femmes de la bourgeoisie.'},
    {type:'cas', partie:'Partie II — Cas cliniques',
     cas:'Une patiente de 28 ans présente depuis 6 mois une paralysie complète du bras gauche apparue brutalement après une dispute avec son mari. Examen neurologique : aucune lésion organique identifiable. Elle décrit ses symptômes sans affect particulier ("belle indifférence").',
     text:'Votre diagnostic et approche ?',
     choices:['Simulation — elle veut éviter ses responsabilités','Hystérie de conversion — symptômes réels sans lésion organique — cure par la parole','Accident vasculaire cérébral — urgence neurologique','Épilepsie partielle'],
     correct:1, expl:'La «belle indifférence« (calme étrange face à un handicap sévère) est caractéristique de l\'hystérie de conversion. Le bras est vraiment paralysé — elle ne simule pas. Début brutal après un trauma émotionnel confirme. Approche : entretiens progressifs, association libre, hypnose légère pour accéder au trauma refoulé.'},
    {type:'cas',
     cas:'Un homme de 55 ans est amené par le shérif. Il a mis le feu à la grange de son voisin, convaincu que ce dernier empoisonne ses puits depuis 3 ans. Il est calme avec vous, son récit est parfaitement logique en interne, il ne reconnaît aucun problème.',
     text:'Quels éléments justifient l\'internement ?',
     choices:['Ses idées délirantes seules','Passage à l\'acte (incendie criminel) + délire inébranlable + absence d\'insight + danger pour autrui','La demande du shérif suffit','Son âge et son comportement calme'],
     correct:1, expl:'Critères d\'internement réunis : 1) Passage à l\'acte (incendie) prouvant le danger. 2) Délire systématisé inébranlable. 3) Absence totale d\'insight. 4) Danger réel pour autrui (voisin visé). L\'internement est une protection médicale, pas une punition.'},
    {type:'cas',
     cas:'Lors d\'une consultation, un patient maniaque de 35 ans vous dit qu\'il est Napoleon, qu\'il va "sauver le Texas" et qu\'il a distribué toute sa fortune à des inconnus ce matin.',
     text:'Comment conduisez-vous l\'entretien ?',
     choices:['Entrer dans son délire pour établir un lien','Rester calme, ne pas contredire, mais ne pas valider non plus. Évaluer la dangerosité. Internement probable.','Le confronter fermement à la réalité','Prescrire du bromure et laisser rentrer chez lui'],
     correct:1, expl:'Ne pas contredire (coupe la relation) mais ne pas valider (renforce le délire). Rester calme et neutre. La dilapidation de sa fortune + idées de grandeur + absence d\'insight = manie aiguë. Internement probable pour le protéger de lui-même — il peut se mettre en danger financier, physique, juridique.'},
    {type:'cas',
     cas:'Une patiente guérie depuis 3 semaines d\'un épisode de stupeur mélancolique sévère. Elle parle maintenant, mange, sourit. Sa famille est soulagée et veut qu\'elle rentre chez elle.',
     text:'Quelle est votre recommandation ?',
     choices:['Elle peut rentrer — la guérison est apparente','Surveillance renforcée encore 2-4 semaines minimum — sortie de stupeur = risque suicidaire maximal','Augmenter les médicaments pour maintenir l\'amélioration','Référer à un autre aliéniste'],
     correct:1, expl:'La sortie de stupeur est la phase la plus dangereuse de la mélancolie. Le patient retrouve l\'énergie d\'agir mais la souffrance profonde n\'a pas disparu. Nombreux suicides «inattendus« surviennent à ce stade. Surveillance renforcée et contact quotidien pendant au moins 2-4 semaines.'},
    {type:'cas',
     cas:'Sous hypnose légère, une patiente hystérique révèle avoir été agressée par son père à l\'âge de 12 ans. Elle n\'avait jamais mentionné cet épisode. Elle fond en larmes.',
     text:'Quelle est votre attitude thérapeutique ?',
     choices:['Réveiller immédiatement — trop traumatisant','Informer la famille immédiatement','Rester calme, laisser l\'émotion s\'exprimer, travailler progressivement en séances suivantes. Secret médical absolu.','Prescrire du laudanum pour atténuer le souvenir'],
     correct:2, expl:'C\'est la catharsis (Breuer) ou abréaction (Freud) — faire revivre l\'émotion dans un cadre sécurisé permet de la «digérer«. Rester calme absolument. Ne pas interrompre. Travailler progressivement — un trauma ancien ne se résout pas en une séance. Secret médical total — la famille, le mari, personne ne doit savoir.'},
  ]
},
{
  id:'s3', icon:'⚖️', title:'Certification Médecin légiste',
  reqScore:80, totalQ:20,
  meta:['20 questions','80% requis','Titre : Médecin légiste certifié'],
  questions:[
    {type:'qcm', partie:'Partie I — Théorie',
     text:'La rigidité cadavérique est maximale après la mort à :',
     choices:['2-4 heures','12-24 heures','48-72 heures','1 semaine'],
     correct:1, expl:'La rigidité cadavérique apparaît 2-6h après la mort, est maximale à 12-24h, et disparaît à 36-48h (autolyse). Elle permet d\'estimer grossièrement l\'heure de la mort, mais avec une fourchette large.'},
    {type:'qcm',
     text:'Les lividités cadavériques fixées indiquent :',
     choices:['Que la mort est récente','Que le corps n\'a pas été déplacé après 12h post-mortem','Que la mort est violente','Que le patient a souffert'],
     correct:1, expl:'Les lividités se fixent en position en 8-12h. Si elles sont en position incohérente avec la position actuelle du corps, c\'est que le corps a été déplacé après leur fixation — indice médico-légal important.'},
    {type:'vf',
     text:'L\'arsenic peut être détecté dans les cheveux et les os des années après la mort.',
     correct:true, expl:'VRAI — L\'arsenic résiste à la décomposition. Le test de Marsh (James Marsh, 1836) le détecte même dans un corps exhumé des années après la mort. C\'est pourquoi l\'arsenic perd sa réputation de poison indétectable à partir de 1836.'},
    {type:'qcm',
     text:'Un orifice d\'entrée de balle se distingue d\'un orifice de sortie par :',
     choices:['Sa plus grande taille','Son caractère irrégulier','Sa petite taille et sa couronne d\'essuyage','Son absence de saignement'],
     correct:2, expl:'L\'orifice d\'entrée : petit, bords réguliers, couronne d\'essuyage (anneau sombre de graisse et poudre). L\'orifice de sortie : plus grand, bords irréguliers «en étoile«. Ces différences permettent de reconstituer la trajectoire.'},
    {type:'qcm',
     text:'Le tatouage de poudre autour d\'une plaie par balle indique un tir à :',
     choices:['Plus de 5 mètres','1 à 5 mètres','Moins d\'1 mètre','Contact direct'],
     correct:2, expl:'Tatouage de poudre (grains de poudre incrustés dans la peau) = tir à moins d\'1 mètre. Entre 1-5 mètres : zone de suie (dépôt noir). Au-delà de 5 mètres : pas de traces de poudre, orifice propre.'},
    {type:'vf',
     text:'Dans un rapport médico-légal, le médecin peut conclure "il a été tué par X" si c\'est la seule explication logique.',
     correct:false, expl:'FAUX — Le médecin légiste doit séparer rigoureusement les FAITS des CONCLUSIONS. Il peut dire «la blessure est compatible avec une arme à lame étroite« mais pas «il a été tué par son voisin«. Outrepasser les observations médicales mine la crédibilité du témoignage.'},
    {type:'qcm',
     text:'Les signes cliniques de l\'empoisonnement à l\'atropine (belladone) sont résumés par :',
     choices:['Myosis, bradycardie, salivation excessive','Chaud comme une braise, rouge comme une tomate, sec comme un os, aveugle comme une chauve-souris, fou comme un lièvre','Diarrhées aqueuses, crampes, déshydratation','Convulsions tétaniques déclenchées par les stimuli'],
     correct:1, expl:'Mnémotechnique classique de l\'intoxication atropinique : hyperthermie, rougeur cutanée, sécheresse des muqueuses, mydriase (pupilles dilatées), agitation confusionnelle. Antidote : physostigmine (fève de Calabar).'},
    {type:'qcm',
     text:'Une plaie de défense se trouve généralement :',
     choices:['Sur le torse','Sur les mains et avant-bras','Sur le visage','Sur les pieds'],
     correct:1, expl:'Les plaies de défense sont sur les mains et avant-bras — la victime a levé les bras pour se protéger. Leur présence prouve que la victime était consciente pendant l\'attaque et qu\'elle n\'était pas surprise de derrière. Élément médico-légal crucial.'},
    {type:'vf',
     text:'La strychnine provoque des convulsions indifférenciables de l\'épilepsie.',
     correct:false, expl:'FAUX — Différence cruciale : dans l\'épilepsie, la conscience est perdue pendant la crise. Sous strychnine, la conscience est PRÉSERVÉE entre les crises (et souvent pendant). De plus, les convulsions strychniques sont déclenchées par n\'importe quel stimulus (lumière, bruit, toucher).'},
    {type:'qcm',
     text:'Pour la toxicologie post-mortem, les organes prélevés à l\'autopsie doivent être :',
     choices:['Rincés à l\'eau avant analyse','Conservés hermétiquement sans rinçage dans des bocaux séparés','Congelés immédiatement','Analysés uniquement si odeur suspecte'],
     correct:1, expl:'Hermétiquement, sans rinçage, dans des bocaux SÉPARÉS (foie, estomac, reins, etc.) pour éviter toute contamination croisée. Rincer = diluer les traces. Mélanger = contaminer. La chaîne de conservation (chain of custody) est essentielle pour la validité judiciaire.'},
    {type:'cas', partie:'Partie II — Cas cliniques',
     cas:'Vous êtes appelé sur une scène où un homme gît dans sa chambre. Rigidité cadavérique présente et maximale. Lividités fixées sur le dos. Il est couché sur le ventre.',
     text:'Quelle conclusion médico-légale pouvez-vous tirer ?',
     choices:['Il est mort il y a moins de 6h','Il est mort il y a 12-24h et le corps a été retourné après la mort','Il est mort dans la position actuelle','Les lividités ne donnent pas d\'indication'],
     correct:1, expl:'Rigidité maximale = 12-24h après la mort. Lividités fixées sur le DOS alors qu\'il est sur le VENTRE = le corps a été retourné APRÈS la fixation des lividités (> 12h post-mortem). Quelqu\'un a déplacé le corps. Indice médico-légal majeur.'},
    {type:'cas',
     cas:'Une femme de 40 ans est retrouvée morte "dans son sommeil". Son mari dit qu\'elle était malade depuis des semaines — nausées chroniques, perte de poids, "fièvre". Un médecin concurrent dit que c\'était une gastro-entérite.',
     text:'Quels indices orientent vers un empoisonnement à l\'arsenic ?',
     choices:['Les nausées seules suffisent','Symptômes chroniques imitant gastro-entérite + mort progressive + bénéficiaire évident (mari) — demander analyse toxicologique du foie et des cheveux','La perte de poids est un signe spécifique','Rien — c\'est clairement une gastro-entérite'],
     correct:1, expl:'Le profil classique de l\'arsenic chronique : gastro-entérite persistante, amaigrissement, neuropathie progressive — imitant une maladie ordinaire. Association à un bénéficiaire potentiel = indication de toxicologie post-mortem. Analyse du foie (arsenic récent), des cheveux (arsenic chronique — chaque cm = 1 mois).'},
    {type:'cas',
     cas:'Un homme est retrouvé pendu. La famille insiste que c\'est un meurtre. Le juge vous demande de distinguer pendaison volontaire de pendaison provoquée post-mortem.',
     text:'Quels signes différencient la pendaison ante-mortem de la pendaison post-mortem ?',
     choices:['La longueur de la corde','Sillon de pendaison oblique ascendant (ante-mortem) + pétéchies conjonctivales + signes asphyxiques = vivant lors de la pendaison','La couleur du visage seule','La position des pieds'],
     correct:1, expl:'Pendaison ante-mortem : sillon oblique ascendant vers le nœud, pétéchies (hémorragies punctiformes) dans les yeux et le visage, cyanose, mousse aux lèvres. Si pendaison post-mortem : pas ces signes asphyxiques, lividités en position couchée (incompatibles avec pendaison), possibles traces d\'autres traumatismes.'},
    {type:'cas',
     cas:'En témoignant au tribunal pour un cas de meurtre, l\'avocat vous pousse à dire que la mort est "certainement survenue entre 20h et 21h". Vos données permettent seulement de dire "entre 18h et 23h".',
     text:'Que répondez-vous ?',
     choices:['Accepter pour aider la justice','Donner la fourchette exacte que vos données supportent et expliquer pourquoi on ne peut pas être plus précis','Refuser de témoigner','Donner la fourchette demandée pour ne pas compliquer le procès'],
     correct:1, expl:'Le médecin légiste ne doit JAMAIS outrepasser ses données. Sa crédibilité repose sur son honnêteté, pas sur sa complaisance. «Mes données me permettent de dire entre 18h et 23h. Prétendre une précision supérieure serait inexact et potentiellement nuisible à la justice.«'},
    {type:'cas',
     cas:'Un corps est retrouvé avec 14 plaies par couteau dans le dos. La famille dit que c\'est un accident de chasse.',
     text:'Votre conclusion ?',
     choices:['Une plaie peut être accidentelle, 14 moins probablement','14 plaies dans le dos = homicide — multiplicité et localisation excluent l\'accident ou le suicide','Accident possible si le couteau s\'est répété','Demander une deuxième autopsie avant de conclure'],
     correct:1, expl:'Le nombre de plaies (14) et leur localisation (dos exclusivement — la victime ne pouvait pas se blesser seule dans le dos) excluent formellement l\'accident et le suicide. Homicide. Le nombre de plaies indique aussi une intention de tuer et une possible rage ou acharnement — information pertinente pour le profil de l\'agresseur.'},
  ]
},
{
  id:'s4', icon:'💊', title:'Certification Pharmacologue',
  reqScore:80, totalQ:20,
  meta:['20 questions','80% requis','Titre : Pharmacologue certifié'],
  questions:[
    {type:'qcm', partie:'Partie I — Théorie',
     text:'La morphine standard pour un adulte en douleur sévère se prescrit en sous-cutané à :',
     choices:['2-5 mg','10-15 mg','30-50 mg','100 mg'],
     correct:1, expl:'10-15 mg en sous-cutané pour un adulte naïf aux opiacés. À ajuster selon le poids et la tolérance. Au-dessus de 30 mg sans tolérance = risque de surdosage (dépression respiratoire, coma).'},
    {type:'qcm',
     text:'La marge thérapeutique de la digitale est décrite comme :',
     choices:['Large — on peut doubler la dose sans problème','Très étroite — dose efficace proche de la dose toxique','Variable selon les patients','N\'existe pas — la digitale est sûre à toute dose'],
     correct:1, expl:'La digitale a la marge thérapeutique la plus étroite de la pharmacopée 1904. Signe de surdosage : vision jaune-verte, nausées, bradycardie sévère. Stopper immédiatement et surveiller le pouls.'},
    {type:'vf',
     text:'L\'héroïne commercialisée par Bayer en 1898 est moins addictive que la morphine.',
     correct:false, expl:'FAUX — Tragique erreur de l\'histoire pharmacologique. L\'héroïne (diacétylmorphine) est au moins aussi addictive que la morphine, sinon plus. Bayer la commercialisait comme traitement non-addictif de la morphinomanie — l\'inverse de la réalité.'},
    {type:'qcm',
     text:'Le principal signe d\'accumulation toxique du bromure de potassium est :',
     choices:['Somnolence excessive','Bromodermie (acné bromique sévère)','Diarrhée persistante','Hypertension'],
     correct:1, expl:'La bromodermie (acné bromique sévère) est le signe cardinal de l\'accumulation de bromure. Elle peut être très sévère et défigurante. C\'est l\'indication formelle de stopper ou réduire la prescription.'},
    {type:'qcm',
     text:'Le mnémotechnique "Chaud comme une braise, rouge comme une tomate, sec comme un os, aveugle comme une chauve-souris, fou comme un lièvre" décrit l\'intoxication à :',
     choices:['La morphine','La strychnine','L\'atropine / belladone','L\'arsenic'],
     correct:2, expl:'Intoxication atropinique (belladone) : hyperthermie, vasodilatation cutanée, sécheresse des muqueuses, mydriase (pupilles dilatées), agitation confusionnelle. Antidote : physostigmine (fève de Calabar, antagoniste naturel de l\'atropine).'},
    {type:'vf',
     text:'Le sevrage brutal des opiacés après dépendance physique installée est sans danger.',
     correct:false, expl:'FAUX — Le sevrage brutal des opiacés chez un patient dépendant peut provoquer des convulsions, un délire, une déshydratation sévère et potentiellement la mort. Le sevrage doit être progressif : réduction de 10-20% par semaine.'},
    {type:'qcm',
     text:'La strychnine provoque des convulsions déclenchées par :',
     choices:['La douleur uniquement','N\'importe quel stimulus (lumière, bruit, toucher)','Le sommeil','La chaleur'],
     correct:1, expl:'La strychnine bloque les récepteurs glycinergiques inhibiteurs de la moelle épinière. Résultat : hyperréflexie et convulsions tétaniques déclenchées par n\'importe quel stimulus sensoriel. Traitement : obscurité totale, silence, sédatifs légers.'},
    {type:'qcm',
     text:'La "triade des opiacés" en cas de surdosage est :',
     choices:['Fièvre + diarrhée + vomissements','Somnolence + respiration lente + pupilles puntiformes (myosis)','Convulsions + mydriase + tachycardie','Jaunisse + douleur abdominale + ictère'],
     correct:1, expl:'La triade classique du surdosage opiacé : somnolence (jusqu\'au coma), respiration lente et superficielle (< 8/min), pupilles en tête d\'épingle (myosis). Pas d\'antidote en 1904. Maintenir la respiration, stimuler le patient, café très fort.'},
    {type:'vf',
     text:'L\'association alcool + chloral hydraté est dangereuse car potentialise la dépression du système nerveux central.',
     correct:true, expl:'VRAI — C\'est le fameux «Mickey Finn« ou «coup de massue«. Chloral hydraté (hypnotique) + alcool = potentialisation de la sédation pouvant aller jusqu\'au coma respiratoire. Association connue des criminels dès les années 1890.'},
    {type:'qcm',
     text:'L\'arsenic chronique laisse une trace permanente dans :',
     choices:['Le sang uniquement','Les cheveux et les ongles (chaque cm = environ 1 mois de croissance)','Les poumons','L\'estomac uniquement'],
     correct:1, expl:'L\'arsenic s\'incorpore dans la kératine des cheveux et des ongles pendant leur croissance. Chaque centimètre correspond à environ un mois. On peut ainsi dater les expositions chroniques — outil médico-légal précieux (test de Marsh sur cheveux).'},
    {type:'cas', partie:'Partie II — Cas cliniques',
     cas:'Un patient de 55 ans prend du laudanum depuis 8 mois sur prescription d\'un autre médecin. Il consulte : il ne peut plus dormir sans 40 gouttes par soir (normale : 10-20). Il est agité, transpire beaucoup, et dit que s\'il ne prend pas sa dose il "devient fou".',
     text:'Votre diagnostic et plan de traitement ?',
     choices:['C\'est normal — continuer la même prescription','Dépendance physique aux opiacés installée — sevrage progressif 10-20% par semaine, jamais brutal','Augmenter la dose pour mieux contrôler ses symptômes','Remplacer par de la morphine pure'],
     correct:1, expl:'40 gouttes par soir (le double de la dose maximale), impossibilité de dormir sans, agitation = dépendance physique installée. Sevrage progressif (10-20% par semaine), bromure pour l\'anxiété, chloral pour le sommeil. Jamais brutal — risque de convulsions et de délire. Jamais remplacer par une substance encore plus addictive.'},
    {type:'cas',
     cas:'Vous êtes appelé pour un enfant de 6 ans qui a ingéré des baies rouges du jardin. Il est très agité, a la peau rouge et sèche, les pupilles très dilatées, la bouche sèche, le cœur qui bat très vite.',
     text:'Quel poison suspectez-vous et quel est l\'antidote ?',
     choices:['Arsenic — pas d\'antidote','Atropine (belladone, jusquiame) — antidote : physostigmine','Strychnine — sédatifs','Opiacés — caféine'],
     correct:1, expl:'Tableau typique de l\'intoxication atropinique : mydriase, tachycardie, peau rouge et sèche, sécheresse buccale, agitation. Les baies de belladone ou de jusquiame contiennent des alcaloïdes atropiniques. Antidote spécifique : physostigmine (fève de Calabar), antagoniste naturel de l\'atropine.'},
    {type:'cas',
     cas:'Un fermier de 45 ans présente depuis 3 mois des douleurs abdominales chroniques, une perte de poids de 8 kg, une neuropathie des membres inférieurs (fourmillements, faiblesse). Sa femme vous dit qu\'il mange peu mais boit beaucoup d\'eau.',
     text:'Quel poison chronique suspectez-vous en priorité et comment le confirmer ?',
     choices:['Strychnine — analyse du sang','Arsenic — test de Marsh sur les cheveux et les ongles','Alcool — analyse hépatique','Laudanum — dosage de morphine urinaire'],
     correct:1, expl:'Triade classique de l\'arsenicisme chronique : gastro-entérite chronique + amaigrissement + neuropathie périphérique. Les cheveux et les ongles archivient l\'exposition chronique à l\'arsenic sur plusieurs mois. Test de Marsh = référence de détection depuis 1836.'},
    {type:'cas',
     cas:'Un patient prend de la digitale pour son insuffisance cardiaque depuis 6 semaines. Il vous consulte pour des "problèmes de vision" — il voit tout en jaune, et son pouls est à 44 bpm.',
     text:'Votre action immédiate ?',
     choices:['Augmenter la dose de digitale car le cœur bat trop lentement','Stopper immédiatement la digitale — signes de surdosage (vision jaune + bradycardie sévère)','Prescrire des lunettes','Continuer et surveiller 1 semaine'],
     correct:1, expl:'Vision jaune-verte + bradycardie sévère (< 50 bpm) = signes caractéristiques de surdosage digitalique. Stopper immédiatement. La bradycardie peut évoluer vers un arrêt cardiaque. La vision jaune (xanthopsie) disparaît à l\'arrêt du traitement.'},
    {type:'cas',
     cas:'Une femme vous consulte pour sevrage de l\'alcool. Elle boit 1 litre de whisky par jour depuis 5 ans. Elle veut "arrêter du jour au lendemain".',
     text:'Que lui expliquez-vous sur le sevrage brutal ?',
     choices:['C\'est la meilleure méthode — arrêt immédiat et total','Le sevrage brutal d\'alcool après dépendance sévère est potentiellement fatal — convulsions, delirium tremens, hyperthermie. Sevrage progressif ou sous surveillance médicale.','Le sevrage est toujours sans danger chez les femmes','Continuer à boire en réduisant progressivement seule'],
     correct:1, expl:'Sevrage brutal d\'alcool chez un alcoolique chronique : delirium tremens (confusion, hallucinations visuelles effrayantes, tremblements), convulsions, hyperthermie. Mortalité 5-15% sans traitement. Sevrage progressif sous surveillance médicale, chloral hydraté pour les convulsions.'},
  ]
},
,
  {
  id:'s5', icon:'🏥', title:'Certification Accoucheur',
  reqScore:80, totalQ:15,
  meta:['15 questions','80% requis','Titre : Accoucheur certifié'],
  questions:[
    {type:'qcm', partie:'Partie I — Théorie',
     text:'Quelle est la durée normale du travail pour une primipare (premier accouchement) ?',
     choices:['2 à 4 heures','6 à 12 heures','18 à 24 heures','Plus de 30 heures'],
     correct:1, expl:'6 à 12 heures pour une primipare (premier accouchement). Pour une multipare (accouchements précédents) : 4 à 8 heures. Au-delà, on parle de dystocie de progression.'},
    {type:'qcm',
     text:'La délivrance (expulsion du placenta) doit survenir dans quel délai après la naissance ?',
     choices:['5 minutes maximum','30 minutes maximum','2 heures maximum','Elle peut attendre le lendemain'],
     correct:1, expl:'30 minutes maximum. Au-delà, on parle de rétention placentaire — urgence obstétricale. Ne jamais tirer sur le cordon pour accélérer. Si pas de délivrance spontanée : délivrance artificielle manuelle.'},
    {type:'vf',
     text:'Tirer sur le cordon ombilical est une technique recommandée pour accélérer la délivrance.',
     correct:false, expl:'FAUX — Tirer sur le cordon peut provoquer une inversion utérine (l\'utérus se retourne comme un gant) — urgence mortelle. Attendre la délivrance spontanée. Si nécessaire : pression sus-pubienne douce (manœuvre de Brandt-Andrews).'},
    {type:'qcm',
     text:'La fréquence cardiaque fœtale normale est de :',
     choices:['60 à 80 battements/minute','100 à 120 battements/minute','120 à 160 battements/minute','180 à 220 battements/minute'],
     correct:2, expl:'120 à 160 battements/minute. En dessous de 100 ou au-dessus de 180 = souffrance fœtale = urgence. À ausculter au stéthoscope de Pinard ou à l\'oreille posée sur l\'abdomen.'},
    {type:'qcm',
     text:'Le signe de Hegar est :',
     choices:['La présence de contractions régulières','Le ramollissement de l\'isthme utérin — signe précoce de grossesse à 6-8 semaines','La dilatation complète du col','Le décollement du placenta'],
     correct:1, expl:'Le signe de Hegar est le ramollissement de l\'isthme utérin (jonction col-corps de l\'utérus), palpable dès 6-8 semaines. Signe précoce et fiable de grossesse avant que l\'utérus soit palpable à l\'abdomen.'},
    {type:'vf',
     text:'Une présentation par le siège nécessite toujours une césarienne.',
     correct:false, expl:'FAUX — En 1904, l\'accouchement par le siège par voie naturelle est possible avec une technique maîtrisée. La version céphalique externe (retourner le bébé de l\'extérieur) est possible avant 36 semaines. La césarienne reste un dernier recours à cause de sa mortalité maternelle élevée (25-50% en zone rurale).'},
    {type:'qcm',
     text:'L\'infection puerpérale (fièvre des accouchées) est principalement transmise par :',
     choices:['L\'air de la chambre','Les mains non lavées de l\'accoucheur','L\'eau de boisson','Le lait maternel'],
     correct:1, expl:'Les mains non lavées de l\'accoucheur — découverte de Semmelweis en 1847. Streptococcus pyogenes transmis par contact direct. Le lavage des mains à l\'eau de Javel avant tout examen obstétrical est obligatoire.'},
    {type:'qcm',
     text:'L\'hémorragie du post-partum est définie par une perte de sang supérieure à :',
     choices:['100 ml','500 ml','1000 ml','2000 ml'],
     correct:1, expl:'500 ml après un accouchement vaginal. Première cause de mortalité maternelle en 1904. Causes principales : atonie utérine (utérus mou qui ne se contracte pas), déchirures, rétention placentaire. Traitement immédiat : massage utérin énergique.'},
    {type:'qcm',
     text:'Les manœuvres de Léopold servent à :',
     choices:['Accélérer le travail','Déterminer la présentation et la position du fœtus à la palpation abdominale','Mesurer la dilatation du col','Ausculter le cœur fœtal'],
     correct:1, expl:'Les manœuvres de Léopold (4 temps de palpation abdominale) permettent de déterminer la présentation (tête, siège, épaule) et la position fœtale dès 32 semaines. À réaliser systématiquement à chaque consultation du 3e trimestre.'},
    {type:'cas', partie:'Partie II — Cas cliniques',
     cas:'Une femme en travail depuis 14 heures (primipare) présente des contractions toutes les 3 minutes. Le col est dilaté à 5 cm depuis 4 heures sans progression. Le fœtus est en présentation céphalique. La mère est épuisée.',
     text:'Quel est votre diagnostic et votre conduite ?',
     choices:['Travail normal — attendre','Dystocie de progression — évaluer causes et décider','Souffrance fœtale — accoucher immédiatement','Fausse couche imminente — arrêter le travail'],
     correct:1, expl:'Dystocie de progression (travail qui n\'avance pas). Évaluer : bassin maternel trop étroit ? Position défavorable du fœtus ? Épuisement maternel ? Options en 1904 : rotation manuelle du fœtus, forceps si col complètement dilaté et tête engagée, ou en dernier recours césarienne. Surveiller en continu les bruits du cœur fœtal.'},
    {type:'cas',
     cas:'48 heures après un accouchement, une accouchée présente une fièvre à 39,5°C, des douleurs utérines intenses à la palpation et des lochies (écoulements) malodorantes.',
     text:'Diagnostic et traitement ?',
     choices:['Montée de lait normale — rassurer','Infection puerpérale — isolement et traitement antiseptique local','Appendicite — chirurgie urgente','Méningite — ponction lombaire'],
     correct:1, expl:'Infection puerpérale (fièvre des accouchées). Streptocoque pyogenes le plus souvent. Traitement en 1904 : antiseptiques locaux (lavages utérins à solution iodée diluée), antipyrétiques, repos, surveillance rapprochée. Pronostic sombre dans les formes graves — septicémie possible en 3-7 jours. Isoler de la salle commune pour protéger les autres accouchées.'},
    {type:'cas',
     cas:'Vous êtes appelé en urgence : une parturiente vient d\'accoucher et saigne abondamment. L\'utérus est mou et peu rétracté. Le placenta est déjà sorti.',
     text:'Conduite d\'urgence ?',
     choices:['Attendre que le saignement s\'arrête spontanément','Massage utérin énergique immédiat + compression bi-manuelle si nécessaire','Transfusion sanguine en urgence','Suturer le col'],
     correct:1, expl:'Atonie utérine — première cause de décès maternel. Massage utérin énergique immédiat (fondement de la main dans l\'abdomen, on malaxe l\'utérus pour le faire se contracter). Si insuffisant : compression bi-manuelle (une main dans le vagin, une dans l\'abdomen, comprimer l\'utérus entre les deux). En dernier recours : garrot aortique. Chaque minute compte.'},
    {type:'cas',
     cas:'Une femme enceinte de 36 semaines consulte pour maux de tête violents, vision trouble et gonflement des pieds et des mains. Sa tension artérielle est très élevée.',
     text:'Quel danger cette situation représente-t-elle ?',
     choices:['Grippe saisonnière — repos','Pré-éclampsie — risque d\'éclampsie (convulsions) imminente','Accouchement prématuré normal','Migraine de grossesse — aspirine'],
     correct:1, expl:'Pré-éclampsie sévère — risque d\'éclampsie (convulsions généralisées) pouvant être mortelle pour la mère et le fœtus. En 1904 : repos absolu allongée sur le côté gauche (diminue la compression de la veine cave), alimentation légère, surveiller toutes les heures. Si convulsions déclenchées (éclampsie) : décubitus latéral, protéger contre les blessures, provoquer l\'accouchement si possible.'},
    {type:'cas',
     cas:'Lors d\'un accouchement, la tête fœtale est sortie mais les épaules ne passent pas. Le cordon est comprimé.',
     text:'Il s\'agit de :',
     choices:['Un accouchement normal — attendre','Une dystocie des épaules — manœuvre de McRoberts urgente','Une présentation de l\'épaule — césarienne','Un nœud vrai du cordon'],
     correct:1, expl:'Dystocie des épaules — urgence obstétricale majeure. Le cordon comprimé coupe l\'oxygène au fœtus : 4-5 minutes avant lésions cérébrales irréversibles. Manœuvre de McRoberts (1908) : hyper-flexion des cuisses de la mère sur l\'abdomen pour élargir le détroit. En 1904, on utilise la traction douce sur la tête + pression sus-pubienne pour dégager l\'épaule antérieure. Appeler de l\'aide immédiatement.'},
    {type:'vf',
     text:'Le colostrum (premier lait) est moins nutritif que le lait maternel définitif et peut être remplacé par du lait de vache dès la naissance.',
     correct:false, expl:'FAUX — Le colostrum est précieux. Riche en immunoglobulines (anticorps maternels), il protège le nouveau-né contre les infections les premières semaines. Le lait de vache donné dès la naissance expose à un risque d\'infection grave (pasteurisation non disponible en zone rurale). L\'allaitement précoce doit être systématiquement encouragé.'}
  ]
},
{
  id:'s6', icon:'🦷', title:'Certification Chirurgien-dentiste',
  reqScore:80, totalQ:15,
  meta:['15 questions','80% requis','Titre : Chirurgien-dentiste certifié'],
  questions:[
    {type:'qcm', partie:'Partie I — Théorie',
     text:'Quel antiseptique local est utilisé comme anesthésique en dentisterie depuis 1884 ?',
     choices:['La morphine','La cocaïne à 4%','L\'éther','Le chloroforme'],
     correct:1, expl:'La cocaïne à 4% — découverte de Carl Koller en 1884. Révolution absolue : l\'extraction dentaire sans douleur devient possible. Injection dans le ligament alvéolo-dentaire et la gencive. Durée d\'action : 20-40 minutes. La Stovaïne (Fourneau, 1904) commence à la remplacer — moins toxique.'},
    {type:'qcm',
     text:'Une dent comporte de l\'extérieur vers le centre :',
     choices:['Pulpe → dentine → émail','Émail → dentine → pulpe','Dentine → émail → pulpe','Émail → pulpe → dentine'],
     correct:1, expl:'Émail (tissu le plus dur du corps, protège la couronne) → dentine (tissu calcifié, sensible à la douleur) → pulpe (tissu vivant avec nerfs et vaisseaux). La carie progresse de l\'émail vers la pulpe. Quand elle atteint la pulpe : pulpite douloureuse puis nécrose puis abcès.'},
    {type:'vf',
     text:'Un abcès dentaire non traité peut mettre la vie du patient en danger.',
     correct:true, expl:'VRAI — L\'infection peut se propager du périapex vers l\'os alvéolaire, puis les tissus mous du cou (phlegmon cervical), le médiastin et le cœur. L\'angine de Ludwig (cellulite cervicale diffuse) issue d\'une infection dentaire mandibulaire tue par asphyxie. Mortalité 50% même traitée en 1904.'},
    {type:'qcm',
     text:'La pyorrhée alvéolaire est :',
     choices:['Une carie profonde','Une infection chronique des gencives et de l\'os alvéolaire','Un abcès aigu','Une fracture dentaire'],
     correct:1, expl:'La pyorrhée alvéolaire est l\'infection chronique des gencives et de l\'os alvéolaire — principale cause de perte des dents chez l\'adulte en 1904. Évolution lente sur des années. Traitement : détartrage, antiseptiques gingivaux (créosote), extractions des dents les plus atteintes.'},
    {type:'qcm',
     text:'Quel matériau est utilisé pour les obturations (plombages) en 1904 ?',
     choices:['Or pur','Amalgame d\'argent (Taveau, 1826)','Porcelaine','Plomb'],
     correct:1, expl:'L\'amalgame d\'argent — mélange de mercure et de limaille d\'argent, développé par Taveau en 1826. Malléable lors de la pose, il durcit en quelques minutes. Bon marché et efficace pour les petites caries. Les dents en porcelaine sont réservées aux prothèses.'},
    {type:'vf',
     text:'Lors d\'une extraction, on peut commencer avant que l\'anesthésie locale soit complète si le patient semble "assez calme".',
     correct:false, expl:'FAUX — Attendre impérativement 3 à 5 minutes après l\'injection de cocaïne. Un patient «calme« peut être angoissé et retenir sa douleur. Tester l\'anesthésie avec une pression légère sur la gencive avant de commencer. Une extraction douloureuse traumatise le patient et nuit à la relation thérapeutique.'},
    {type:'qcm',
     text:'L\'arseniate de sodium appliqué sur la pulpe dentaire sert à :',
     choices:['Désinfecter la carie','Tuer le nerf (dévitalisation) pour permettre un traitement conservateur','Renforcer l\'émail','Anesthésier la gencive'],
     correct:1, expl:'La dévitalisation — arseniate de sodium appliqué sur la pulpe exposée pendant 24-48h tue le nerf. La douleur disparaît. On peut ensuite travailler sans douleur. Technique limitée mais qui permet parfois d\'éviter l\'extraction. Précaution : ne pas laisser en place trop longtemps (nécrose de l\'os alvéolaire).'},
    {type:'qcm',
     text:'Une angine de Ludwig présente :',
     choices:['Seulement une douleur dentaire','Gonflement du plancher buccal + trismus + voix modifiée + risque d\'asphyxie','Saignement des gencives chronique','Aphtes buccaux multiples'],
     correct:1, expl:'Angine de Ludwig = cellulite cervicale diffuse à partir d\'une infection dentaire mandibulaire. Trismus (impossibilité d\'ouvrir la bouche), plancher buccal soulevé, voix comme «patate chaude«, dysphagie, stridor. URGENCE ABSOLUE. Drainage chirurgical et trachéotomie si asphyxie imminente. Mortalité 50% en 1904.'},
    {type:'cas', partie:'Partie II — Cas cliniques',
     cas:'Un cowboy de 35 ans arrive avec une douleur dentaire pulsatile violente depuis 3 jours, empêchant le sommeil. La gencive autour de la molaire inférieure droite est rouge et gonflée. Il a de la fièvre.',
     text:'Diagnostic et conduite ?',
     choices:['Donner de l\'aspirine et attendre','Abcès alvéolaire aigu — extraction de la dent + drainage si nécessaire','Prescrire du laudanum et revoir dans une semaine','Nettoyer la carie et refermer'],
     correct:1, expl:'Abcès alvéolaire aigu sur la molaire. Extraction de la dent causale pour permettre le drainage — c\'est le traitement de base en 1904. Si la gencive est fluctuante (abcès mûr) : incision et drainage avant ou après l\'extraction. Après extraction : bains de bouche antiseptiques, surveillance de l\'extension (gonflement cervical = urgence).'},
    {type:'cas',
     cas:'Pendant l\'extraction d\'une canine supérieure sous cocaïne, le davier glisse et fracture la racine. La partie coronaire est retirée mais la racine reste dans l\'os.',
     text:'Que faites-vous ?',
     choices:['Laisser la racine — elle sera résorbée naturellement','Tenter l\'extraction de la racine avec des élévateurs — si impossible, laisser et surveiller','Fermer immédiatement et ignorer','Amputer la mâchoire'],
     correct:1, expl:'Tenter l\'extraction de la racine avec des élévateurs (levier dans l\'espace entre racine et os). Si la racine est profonde, courte et asymptomatique, on peut la laisser — elle sera souvent tolérée. Mais une racine laissée infectée provoquera un abcès chronique. Surveiller. Informer le patient.'},
    {type:'cas',
     cas:'Un patient présente une prothèse dentaire totale cassée en deux morceaux. Il est sans ressources.',
     text:'Quelle solution proposez-vous ?',
     choices:['Rien — une nouvelle prothèse est la seule option','Réparer avec de la vulcanite ou de la colle — solution provisoire acceptée','Commander une prothèse en or','Extraire les dents restantes'],
     correct:1, expl:'En 1904, réparer une prothèse en vulcanite (caoutchouc vulcanisé) est courant et acceptable. La vulcanite peut être retaillée, chauffée et assemblée. Solution provisoire qui peut durer des années. Pour un patient sans ressources, c\'est souvent la seule option réaliste. Une nouvelle prothèse en porcelaine serait idéale mais coûteuse.'},
    {type:'cas',
     cas:'Un enfant de 8 ans présente une dent définitive qui ne sort pas alors que la dent de lait correspondante est tombée depuis 6 mois. La gencive est tendue au-dessus.',
     text:'Votre conduite ?',
     choices:['Attendre — c\'est normal jusqu’à 15 ans','Inciser la gencive pour laisser sortir la dent incluse','Extraire toutes les dents de lait restantes','Prescrire du calcium'],
     correct:1, expl:'Dent définitive incluse sous la gencive. Une simple incision gingivale (section de la gencive fibreuse qui bloque la dent) permet souvent à la dent de sortir spontanément ensuite. Procédure simple sous anesthésie locale. Si la dent est très profonde dans l\'os : extraction chirurgicale.'},
    {type:'vf',
     text:'Les bains de bouche à la créosote sont un traitement efficace des maladies gingivales en 1904.',
     correct:true, expl:'VRAI — La créosote (dérivé du goudron de bois) est un antiseptique local puissant utilisé en dentisterie. En solution diluée pour les bains de bouche dans les infections gingivales chroniques (pyorrhée). Efficace contre les bactéries buccales. Son odeur forte est son principal inconvénient.'},
    {type:'qcm',
     text:'Lors d\'une extraction, l\'ordre correct des gestes est :',
     choices:['Saisir avec le davier → injecter la cocaïne → extraire','Injecter la cocaïne → attendre 3-5 min → décoller le ligament → luxer → extraire','Inciser la gencive → injecter → extraire immédiatement','Extraire → anesthésier → rincer'],
     correct:1, expl:'Injecter la cocaïne → attendre 3-5 minutes (ne jamais commencer avant) → décoller le ligament alvéolo-dentaire avec le syndesmotome → luxer la dent avec des mouvements progressifs de rotation et de bascule → extraire par traction axiale → comprimer le socket avec une compresse.'},
    {type:'cas',
     cas:'Trois jours après une extraction, un patient revient avec une douleur violente dans l\'alvéole vide. Il n\'y a pas de pus mais l\'os est visible et grisâtre.',
     text:'De quoi s\'agit-il ?',
     choices:['Infection — donner des antiseptiques','Alvéolite sèche (dry socket) — nettoyage et pansement alvéolaire','Cicatrisation normale — rassurer','Réimplantation nécessaire'],
     correct:1, expl:'Alvéolite sèche — complication fréquente post-extractionnelle. Le caillot sanguin qui protégeait l\'alvéole s\'est dissous ou décollé (tabac, rinçage trop vigoureux). L\'os est exposé et très douloureux. Traitement : nettoyer doucement l\'alvéole à l\'eau bouillie tiède, pansement alvéolaire (gaze imbibée d\'huile de clou de girofle — analgésique naturel), changer tous les 2-3 jours jusqu’à cicatrisation.'}
  ]
},
{
  id:'s7', icon:'👁️', title:'Certification Ophtalmologue',
  reqScore:80, totalQ:15,
  meta:['15 questions','80% requis','Titre : Ophtalmologue certifié'],
  questions:[
    {type:'qcm', partie:'Partie I — Théorie',
     text:'L\'ophtalmoscope permettant d\'examiner le fond d\'œil a été inventé par :',
     choices:['Louis Pasteur en 1865','Hermann von Helmholtz en 1851','Joseph Lister en 1867','Carl Koller en 1884'],
     correct:1, expl:'Hermann von Helmholtz en 1851. Révolution de l\'ophtalmologie : on peut pour la première fois voir la rétine, la papille et les vaisseaux d\'un œil vivant. Permet de diagnostiquer les pathologies rétiniennes, le glaucome (excavation papillaire) et même des maladies systémiques (diabète, hypertension).'},
    {type:'qcm',
     text:'La pression intra-oculaire normale est de :',
     choices:['2 à 5 mmHg','10 à 21 mmHg','25 à 35 mmHg','40 à 50 mmHg'],
     correct:1, expl:'10 à 21 mmHg. Au-delà de 21 mmHg de façon chronique = glaucome chronique à angle ouvert. Une pression aiguë très élevée (> 40 mmHg) avec douleur violente = glaucome aigu par fermeture d\'angle — urgence absolue.'},
    {type:'vf',
     text:'Le trachome est une maladie rétinienne héréditaire fréquente au Texas.',
     correct:false, expl:'FAUX — Le trachome est une conjonctivite chronique à Chlamydia trachomatis, d\'origine infectieuse et contagieuse. C\'est la principale cause de cécité évitable dans le monde en 1904. Endémique dans certaines zones du Texas. Traitement : nitrate d\'argent, sulfate de cuivre. Non héréditaire.'},
    {type:'qcm',
     text:'Le signe d\'Argyll Robertson (pupilles qui réagissent à l\'accommodation mais pas à la lumière) est caractéristique de :',
     choices:['La cataracte','La syphilis tertiaire (tabès)','Le glaucome aigu','La myopie sévère'],
     correct:1, expl:'Signe d\'Argyll Robertson — pathognomonique de la syphilis tertiaire neurologique (tabès dorsalis ou paralysie générale). Les pupilles accommodent pour la vision de près mais ne réagissent pas à la lumière. Ce signe à l\'examen ophtalmologique doit faire suspecter une syphilis même si le patient ne le mentionne pas.'},
    {type:'qcm',
     text:'La cataracte est une opacification de :',
     choices:['La cornée','Le cristallin','La rétine','Le corps vitré'],
     correct:1, expl:'Le cristallin — lentille biologique transparente derrière la pupille. Son opacification (cataracte) provoque un brouillard progressif de la vision. Principale cause de cécité réversible en 1904. Traitement chirurgical : extraction du cristallin opacifié sous anesthésie locale à la cocaïne.'},
    {type:'vf',
     text:'Pour une brûlure chimique oculaire à la chaux vive, il faut d\'abord retirer les particules solides avant d\'irriguer.',
     correct:true, expl:'VRAI — La chaux vive (CaO) réagit avec l\'eau en dégageant de la chaleur. Retirer les particules solides en premier (coincement sous la paupière), PUIS irriguer abondamment. Si on irrigue sur des particules de chaux solide, on aggrave les brûlures. L\'irrigation doit ensuite être massive — des dizaines de litres si possible.'},
    {type:'qcm',
     text:'La méthode de Credé (instillation de nitrate d\'argent à 1% dans les yeux du nouveau-né) prévient :',
     choices:['La cataracte congénitale','L\'ophtalmie du nouveau-né à gonocoque','Le strabisme','Le trachome congénital'],
     correct:1, expl:'L\'ophtalmie du nouveau-né à Neisseria gonorrhoeae — transmise lors du passage dans la voie génitale. Sans prévention, elle peut conduire à la cécité en quelques jours. La méthode de Credé (1880) a drastiquement réduit la cécité infantile. À réaliser systématiquement sur tous les nouveau-nés.'},
    {type:'cas', partie:'Partie II — Cas cliniques',
     cas:'Un forgeron de 45 ans arrive aux urgences avec un œil rouge et douloureux après avoir travaillé sans protection. Il dit "avoir quelque chose dans l\'œil".',
     text:'Votre conduite immédiate ?',
     choices:['Prescrire du repos et des compresses','Anesthésie locale à la cocaïne, examen à la lumière, ablation du corps étranger à l\'aiguille ou pointe de couteau','Refermer l\'œil sans examiner','Appliquer de l\'iode directement sur l\'œil'],
     correct:1, expl:'Corps étranger cornéen ou conjonctival — très fréquent chez les forgerons. Cocaïne à 2-4% en collyre pour anesthésier. Examiner sous bonne lumière. Ablation à l\'aiguille fine ou à la pointe d\'un couteau fin sous loupe. Ne JAMAIS faire frotter l\'œil. Pansement occlusif 24h pour la cicatrisation cornéenne. Si corps étranger métallique profond ou intra-oculaire : extraction chirurgicale à l\'aimant de Hirschberg.'},
    {type:'cas',
     cas:'Un patient de 60 ans consulte pour une douleur violente à l\'œil gauche apparue brutalement, vision floue et nausées. L\'œil est rouge, la cornée semble trouble et la pupille dilatée et non réactive.',
     text:'Diagnostic et urgence ?',
     choices:['Conjonctivite infectieuse — collyre antiseptique','Glaucome aigu par fermeture d\'angle — urgence absolue, paracentèse et atropine','Migraine ophtalmique — aspirine','Corps étranger — extraction'],
     correct:1, expl:'Glaucome aigu par fermeture d\'angle — urgence absolue. Pression intra-oculaire très élevée (peut dépasser 60 mmHg). Sans traitement immédiat : cécité irréversible en heures. Traitement : paracentèse de la chambre antérieure (évacuer l\'humeur aqueuse à l\'aiguille pour abaisser la pression), atropine pour dilater la pupille et rouvrir l\'angle. Le patient restera toujours fragilisé.'},
    {type:'cas',
     cas:'Une petite fille de 6 ans est amenée car ses parents remarquent qu\'elle ferme un œil pour regarder au loin et se cogne dans les objets sur le côté gauche.',
     text:'Que suspectez-vous ?',
     choices:['Un comportement normal pour son âge','Myopie sévère + peut-être hémianopsie (perte du champ visuel latéral) — examen complet urgent','Strabisme simple — correction chirurgicale','Cataracte congénitale'],
     correct:1, expl:'Fermer un œil pour voir au loin = myopie possible. Se cogner sur les côtés = rétrécissement du champ visuel (hémianopsie) qui peut indiquer une tumeur cérébrale comprimant le chiasma optique. Examen complet : acuité visuelle des deux yeux séparément, champ visuel par confrontation, fond d\'œil (œdème papillaire ?). Urgence si signes neurologiques associés.'},
    {type:'cas',
     cas:'Vous préparez l\'opération de la cataracte d\'un patient de 70 ans sous cocaïne locale. En incisant le limbe (jonction cornée-sclérotique), le patient tousse violemment.',
     text:'Quel est le danger immédiat ?',
     choices:['Aucun — la toux est sans conséquence pendant l\'opération','Expulsion du vitré et du cristallin hors de l\'œil — appliquer immédiatement une compresse et cesser l\'intervention','L\'anesthésie locale est insuffisante — rajouter de la cocaïne','Saignement conjonctival — tamponner'],
     correct:1, expl:'Lors de la chirurgie intra-oculaire, toute augmentation brusque de la pression intra-oculaire (toux, vomissements, effort) peut expulser le contenu de l\'œil par l\'ouverture chirurgicale. Compresse stérile immédiatement, ne pas paniquer, cesser les manœuvres, refermer si possible. Prévention : s\'assurer que le patient ne tousse pas avant de commencer, anesthésie générale légère si risque.'},
    {type:'vf',
     text:'Un œil blanc et indolore qui perd progressivement la vision périphérique sur des mois est caractéristique du glaucome chronique à angle ouvert.',
     correct:true, expl:'VRAI — Contrairement au glaucome aigu (douloureux, œil rouge), le glaucome chronique à angle ouvert est sournois, indolore, et détruit progressivement le nerf optique par années. Le patient ne consulte souvent que quand la vision centrale est atteinte — le champ visuel périphérique est déjà fortement réduit. Traitement : pilocarpine en collyre (myotique qui abaisse la pression).'},
    {type:'qcm',
     text:'La correction des lunettes pour un myope utilise des verres :',
     choices:['Convergents (convexes)','Divergents (concaves)','Cylindriques','Prismatiques'],
     correct:1, expl:'Verres divergents (concaves) — ils dispersent la lumière pour corriger la convergence excessive du myope. Mnémotechnique : Myope = Moins = concave. L\'hypermètre au contraire a besoin de verres convergents (convexes). L\'astigmate a besoin de verres cylindriques.'},
    {type:'cas',
     cas:'Vous examinez au fond d\'œil un patient hypertendu de 55 ans. Vous voyez une papille dont les bords sont flous et soulevés, les veines dilatées et tortueuses.',
     text:'Que signifie cet aspect ?',
     choices:['Fond d\'œil normal pour un homme de 55 ans','Œdème papillaire — hypertension intracrânienne — urgence','Début de cataracte','Trachome rétinien'],
     correct:1, expl:'Œdème papillaire bilatéral = hypertension intracrânienne (tumeur cérébrale, hémorragie, méningite). URGENCE. Les bords flous de la papille sont le signe classique. Chez l\'hypertendu, peut aussi indiquer une rétinopathie hypertensive sévère. Rechercher les signes neurologiques : maux de tête matinaux, vomissements, troubles visuels.'}
  ]
},
{
  id:'s8', icon:'👂', title:'Certification ORL',
  reqScore:80, totalQ:15,
  meta:['15 questions','80% requis','Titre : ORL certifié'],
  questions:[
    {type:'qcm', partie:'Partie I — Théorie',
     text:'La laryngoscopie indirecte a été inventée par :',
     choices:['Charcot en 1862','Manuel García, professeur de chant, en 1854','Koch en 1876','Lister en 1867'],
     correct:1, expl:'Manuel García, professeur de chant espagnol, en 1854 — en se regardant les cordes vocales dans un miroir à main dans un rayon de soleil. Les médecins adoptent rapidement ce petit miroir au bout d\'un manche (chauffé pour éviter la buée). Révolution : on peut voir les cordes vocales d\'un patient vivant pour la première fois.'},
    {type:'qcm',
     text:'La paracentèse du tympan (myringotomie) consiste à :',
     choices:['Enlever entièrement le tympan','Inciser le tympan pour drainer le pus de l\'oreille moyenne','Boucher une perforation tympanique','Extraire un corps étranger de l\'oreille externe'],
     correct:1, expl:'Incision du tympan pour drainer le pus accumulé dans l\'oreille moyenne lors d\'une otite moyenne aiguë purulente. Indication : tympan bombant, douleur intense, fièvre élevée sans amélioration. Soulagement immédiat de la douleur. Cicatrisation spontanée en quelques jours. Évite les complications graves : mastoïdite, méningite otogène.'},
    {type:'vf',
     text:'Une angine à fausse membrane blanche-grise doit faire systématiquement suspecter la diphtérie.',
     correct:true, expl:'VRAI — La diphtérie (Corynebacterium diphtheriae) produit des fausses membranes gris-blanc adhérentes sur l\'amygdale et le pharynx. Elles peuvent s\'étendre au larynx → asphyxie. URGENCE. Traitement : antitoxine diphtérique (Von Behring, 1894) le plus tôt possible. Trachéotomie si asphyxie imminente. Isolement strict du patient.'},
    {type:'qcm',
     text:'Le phlegmon péri-amygdalien se distingue de l\'angine simple par :',
     choices:['Une fièvre plus haute uniquement','Trismus + voix de "patate chaude" + luette déviée + gonflement unilatéral important','Une douleur bilatérale symétrique','Des amygdales blanches des deux côtés'],
     correct:1, expl:'Phlegmon péri-amygdalien = abcès autour de l\'amygdale. Trismus (impossibilité d\'ouvrir la bouche) car les muscles masticateurs sont irrités. Voix modifiée dite «de patate chaude« (chevrotante, nasonnée). Luette déviée du côté sain. Gonflement asymétrique. URGENCE : drainage chirurgical sous anesthésie locale.'},
    {type:'qcm',
     text:'La trompe d\'Eustache relie :',
     choices:['L\'oreille externe à l\'oreille interne','L\'oreille moyenne au rhinopharynx','Le larynx à la trachée','Le sinus maxillaire à la fosse nasale'],
     correct:1, expl:'L\'oreille moyenne au rhinopharynx (arrière du nez). Elle équilibre les pressions entre l\'oreille moyenne et l\'atmosphère (bâillement en avion) et draine les sécrétions. Une infection nasopharyngée peut remonter par la trompe → otite moyenne. Son obstruction par les végétations adénoïdes chez l\'enfant cause les otites à répétition.'},
    {type:'vf',
     text:'La trachéotomie d\'urgence peut être réalisée avec un simple couteau si aucun instrument chirurgical n\'est disponible.',
     correct:true, expl:'VRAI — En urgence absolue (corps étranger asphyxiant, diphtérie laryngée, œdème de Quincke), une trachéotomie ou cricothyrotomie d\'urgence peut sauver une vie. Incision entre le 2e et 4e anneau trachéal. Un couteau, un canif, même une plume de stylo pour maintenir l\'ouverture ouverte. La vie du patient prime sur l\'asepsie dans ces secondes critiques.'},
    {type:'qcm',
     text:'L\'épistaxis postérieure (saignement de nez venant de l\'arrière) est traitée par :',
     choices:['Simple compression des narines 10 minutes','Méchage nasal postérieur avec tampons de gaze','Cautérisation immédiate','Trachéotomie'],
     correct:1, expl:'Méchage nasal postérieur — tamponner la fosse nasale avec de la gaze depuis le fond jusqu’à l\'avant. Technique plus difficile que la compression simple. L\'épistaxis postérieure ne répond pas à la simple compression des narines car le saignement coule dans la gorge. Le patient doit cracher, pas avaler le sang.'},
    {type:'cas', partie:'Partie II — Cas cliniques',
     cas:'Un enfant de 3 ans est amené en urgence : il a aspiré une pièce de monnaie il y a 30 minutes. Il tousse, fait un bruit inspiratoire aigu (stridor) et commence à bleuir.',
     text:'Conduite d\'urgence absolue ?',
     choices:['Attendre que l\'enfant la recrache','Frappes dans le dos + tentative d\'extraction manuelle + si échec trachéotomie immédiate','Faire vomir l\'enfant','Donner à boire pour faire descendre'],
     correct:1, expl:'Corps étranger laryngé ou trachéal avec asphyxie. 1) Cinq frappes vigoureuses dans le dos (enfant penché en avant, tête en bas). 2) Si inefficace : compressions abdominales (manœuvre de Heimlich — non encore décrite en 1904 mais les compressions sous-sternales sont intuitives). 3) Si toujours inefficace et enfant qui perd conscience : extraction manuelle à l\'aveugle ou trachéotomie d\'urgence. Chaque seconde compte.'},
    {type:'cas',
     cas:'Un patient de 40 ans présente depuis 6 semaines une enrouement persistant, sans douleur. Il fume beaucoup et boit régulièrement. La laryngoscopie montre une lésion blanchâtre sur une corde vocale.',
     text:'Quelle est votre préoccupation principale ?',
     choices:['Laryngite chronique simple — repos vocal','Leucoplasie ou cancer du larynx — biopsie si possible, surveillance rapprochée','Nodule du chanteur — repos vocal 3 semaines','Polype laryngé — extraction endoscopique'],
     correct:1, expl:'Enrouement persistant > 3 semaines + alcool + tabac + lésion blanche sur corde vocale = cancer du larynx à exclure en priorité. En 1904, la biopsie laryngée directe est difficile. Surveiller l\'évolution. Si la lésion s\'étend → pronostic sombre. Arrêt absolu du tabac et de l\'alcool. La laryngectomie existe depuis 1873 (Billroth) mais avec une mortalité élevée.'},
    {type:'cas',
     cas:'Un enfant de 5 ans ronfle toutes les nuits, respire la bouche ouverte, fait des otites à répétition (3 en 6 mois). Sa mère dit qu\'il est "toujours fatigué".',
     text:'Quelle est la cause probable et le traitement ?',
     choices:['Asthme bronchique — traitement respiratoire','Végétations adénoïdes hypertrophiques — adénoïdectomie','Malformation cardiaque — bilan cardiaque','Allergie alimentaire — régime'],
     correct:1, expl:'Végétations adénoïdes hypertrophiques — tissu lymphoïde du cavum obstruant les fosses nasales ET les trompes d\'Eustache. Conséquences : ronflements, respiration buccale, otites à répétition (obstruction tubaire), faciès adénoïdien (bouche ouverte, air fatigué). Traitement : adénoïdectomie (ablation des végétations à la curette sous anesthésie générale légère). Résultats spectaculaires.'},
    {type:'cas',
     cas:'Un patient développe une fièvre à 40°C, une douleur derrière l\'oreille, un gonflement mastoïdien rouge et chaud, 10 jours après une otite moyenne.',
     text:'Diagnostic et urgence ?',
     choices:['Furoncle du conduit auditif — antibiotiques locaux','Mastoïdite aiguë — complication de l\'otite — drainage chirurgical urgent','Parotidite — traitement symptomatique','Zona auriculaire — repos'],
     correct:1, expl:'Mastoïdite aiguë — infection de l\'os mastoïde, complication de l\'otite non traitée. URGENCE chirurgicale. Sans drainage : l\'infection peut se propager vers le sinus latéral (thrombose septique), les méninges (méningite), le cerveau (abcès). Mastoïdectomie (ablation chirurgicale des cellules mastoïdiennes infectées) est la seule solution. Mortalité élevée sans intervention.'},
    {type:'vf',
     text:'Le cérumen (cire d\'oreille) ne doit jamais être retiré car il protège l\'oreille.',
     correct:false, expl:'FAUX — Le cérumen en bouchon obstructif (bouchon de cérumen) cause une surdité de conduction et doit être retiré. Méthode : ramollir avec de l\'huile tiède pendant 2-3 jours, puis irrigation douce à l\'eau tiède à la seringue. Ne jamais introduire un objet pointu dans le conduit. Un bouchon de cérumen correctement retiré peut restaurer instantanément l\'audition.'},
    {type:'qcm',
     text:'Le sinus maxillaire est souvent le point de départ d\'une sinusite d\'origine dentaire car :',
     choices:['Il est le plus grand des sinus','Les racines des molaires et prémolaires supérieures sont proches de son plancher','Il est le plus superficiel','Il communique directement avec l\'oreille'],
     correct:1, expl:'Les racines des molaires et prémolaires supérieures peuvent pénétrer dans le plancher du sinus maxillaire. Une infection dentaire peut se propager directement au sinus → sinusite maxillaire d\'origine dentaire. Caractéristique : unilatérale, coïncide avec une douleur dentaire, présence de pus fétide. Traitement : traiter la dent causale + ponction-lavage du sinus.'},
    {type:'cas',
     cas:'Une patiente revient 2 semaines après une amygdalectomie avec un saignement actif venant de la loge amygdalienne gauche.',
     text:'Quelle est votre conduite ?',
     choices:['Aspirer et attendre — saignement normal post-opératoire','Compression locale, suture si visible, réévaluation urgente — hémorragie post-amygdalectomie tardive','Recommencer l\'amygdalectomie de l\'autre côté','Donner du laudanum pour calmer'],
     correct:1, expl:'Hémorragie post-amygdalectomie tardive (J10-J15) — correspond à la chute des croûtes. Peut être grave. Compression locale avec compresse imbibée d\'antiseptique. Si saignement visible en loge : suture au fil. Si saignement important ingéré (crachats de sang) : risque d\'asphyxie par inhalation. Surveiller constamment. En 1904, les hémorragies post-amygdalectomie sont la principale complication redoutée.'}
  ]
},
{
  id:'s9', icon:'🧬', title:'Certification Dermatologue',
  reqScore:80, totalQ:15,
  meta:['15 questions','80% requis','Titre : Dermatologue certifié'],
  questions:[
    {type:'qcm', partie:'Partie I — Théorie',
