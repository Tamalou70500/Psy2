     text:'La "grande simulatrice" en dermatologie — la maladie qui peut imiter presque toutes les autres — est :',
     choices:['Le psoriasis','La syphilis','La tuberculose cutanée','L\'eczéma'],
     correct:1, expl:'La syphilis — à tous ses stades, elle peut imiter presque n\'importe quelle affection cutanée et systémique. «Qui connaît la syphilis connaît la médecine.« Stade 1 : chancre. Stade 2 : roséole, plaques muqueuses, alopécie. Stade 3 : gommes destructrices, anévrisme, tabès, démence.'},
    {type:'qcm',
     text:'Une vésicule est :',
     choices:['Une tache colorée sans relief','Une élévure solide < 1 cm','Une élévure contenant un liquide clair < 5 mm','Une perte de substance cutanée'],
     correct:2, expl:'Vésicule = élévure contenant un liquide clair < 5 mm (herpès, varicelle, eczéma aigu). Au-delà de 5 mm : bulle (pemphigus, brûlures). Remplie de pus : pustule (acné, impétigo). Solide < 1 cm : papule. Cette terminologie précise est indispensable pour décrire les lésions et communiquer entre confrères.'},
    {type:'vf',
     text:'L\'impétigo est une infection profonde du follicule pileux.',
     correct:false, expl:'FAUX — L\'impétigo est une infection SUPERFICIELLE de la peau (épiderme) par Streptocoque ou Staphylocoque. Très contagieux, surtout chez les enfants. Lésions caractéristiques : vésicules → bulles → croûtes jaunâtres «en miel«. Le furoncle, lui, est une infection profonde du follicule pileux.'},
    {type:'qcm',
     text:'Le traitement de la gale en 1904 est :',
     choices:['Bains chauds uniquement','Soufre en pommade pendant 3 jours consécutifs — toute la famille simultanément','Mercure en onction','Teinture d\'iode en bains'],
     correct:1, expl:'Soufre en pommade (pommade souffrée à 10-15%) appliquée sur tout le corps (sauf le visage) pendant 3 nuits consécutives. Traitement simultané de TOUTE la famille et du personnel de maison. Lavage et désinfection des vêtements et literie. Sarcoptes scabiei est le parasite microscopique qui creuse des sillons dans la peau.'},
    {type:'qcm',
     text:'Les "lignes de Mees" sur les ongles sont un signe d\'intoxication chronique à :',
     choices:['Au mercure','À l\'arsenic','Au plomb','À la strychnine'],
     correct:1, expl:'Lignes de Mees = bandes blanches transversales sur les ongles. Chaque bande correspond à un épisode d\'intoxication arsénique. L\'ongle pousse de 3 mm par mois — on peut dater les expositions chroniques. Élément médico-légal crucial dans les suspicions d\'empoisonnement à l\'arsenic.'},
    {type:'vf',
     text:'Un chancre syphilitique est toujours très douloureux.',
     correct:false, expl:'FAUX — Le chancre syphilitique est classiquement INDOLORE. C\'est sa caractéristique qui le distingue des autres ulcères génitaux (herpès est douloureux). Base indurée «cartonnée«, bords réguliers, indolore. Cette indolence fait que les patients le négligent — et restent contagieux. Guérison spontanée en 3-6 semaines sans traitement (mais la syphilis progresse).'},
    {type:'qcm',
     text:'La bromodermie (acné sévère) est un signe de :',
     choices:['Allergie au soufre','Accumulation toxique de bromure de potassium','Syphilis stade 2','Psoriasis aigu'],
     correct:1, expl:'Bromodermie = acné sévère et étendue causée par l\'accumulation de bromure de potassium. Signe d\'alerte formelle — indique un surdosage. Stopper immédiatement le bromure. La bromodermie peut être très sévère et défigurante si non reconnue à temps.'},
    {type:'cas', partie:'Partie II — Cas cliniques',
     cas:'Un patient de 25 ans présente depuis 3 semaines un ulcère unique sur le gland du pénis, indolore, à base indurée, avec un ganglion inguinal indolore. Il avoue avoir eu des rapports avec une prostituée il y a 3 semaines.',
     text:'Votre diagnostic et traitement ?',
     choices:['Herpès génital — crèmes locales','Chancre syphilitique stade 1 — mercure + surveillance rapprochée','Furoncle génital — incision','Cancer du gland — chirurgie'],
     correct:1, expl:'Chancre syphilitique stade 1 — tous les critères : ulcère unique indolore, base indurée, ganglion satellite indolore, délai de 3 semaines après le contact. Traitement en 1904 : frictions mercurielles ou injections de protoiodure de mercure. Expliquer que la guérison apparente du chancre ne signifie pas la guérison de la syphilis — surveillance nécessaire pour détecter le stade 2.'},
    {type:'cas',
     cas:'Une femme de 30 ans consulte pour une éruption rouge symétrique sur le tronc apparue il y a 2 semaines, pas prurigineuse, avec des plaques blanchâtres sur les joues à l\'intérieur de la bouche. Elle avait eu "un bouton" guéri spontanément 2 mois auparavant.',
     text:'Diagnostic ?',
     choices:['Rougeole — isolement','Syphilis stade 2 — roséole + plaques muqueuses','Eczéma allergique — rechercher l\'allergène','Psoriasis débutant'],
     correct:1, expl:'Syphilis stade 2 — la timeline est parfaite : chancre (stade 1) guéri 2 mois avant, maintenant roséole (taches roses non prurigineuses sur le tronc) + plaques muqueuses (lésions blanchâtres sur les muqueuses buccales — très contagieuses). La patiente est au stade le plus contagieux. Traitement mercuriel. Informer des risques de transmission.'},
    {type:'cas',
     cas:'Un homme de 55 ans a des plaques rouges avec squames argentées sur les coudes, genoux et cuir chevelu depuis 10 ans. Elles disparaissent en été et reviennent en hiver. Pas de fièvre, pas de contagion familiale.',
     text:'Diagnostic et approche thérapeutique ?',
     choices:['Dermatomycosite — antifongiques','Psoriasis chronique — goudron de houille, bains sulfureux, ensoleillement','Syphilis tertiaire cutanée — mercure','Eczéma de contact — rechercher l\'allergène'],
     correct:1, expl:'Psoriasis — tous les critères : plaques bien délimitées, squames argentées, coudes/genoux/cuir chevelu, évolution chronique par poussées, amélioration estivale (soleil), non contagieux. Traitement en 1904 : goudron de houille (puissant mais malodorant), bains sulfureux, exposition au soleil. Maladie chronique sans guérison définitive.'},
    {type:'cas',
     cas:'Un bûcheron présente depuis 6 semaines un nodule profond sur l\'avant-bras qui s\'est ramolli au centre et commence à s\'ulcérer avec un fond jaunâtre non purulent.',
     text:'Que suspectez-vous en 1904 au Texas ?',
     choices:['Furoncle simple — incision-drainage','Gomme syphilitique (syphilis tertiaire) ou tuberculose cutanée — examen complet et antécédents','Cancer de la peau — chirurgie urgente','Morsure d\'araignée — antiseptiques'],
     correct:1, expl:'Nodule profond qui se ramollit et s\'ulcère avec fond non purulent = gomme. En 1904 au Texas : syphilis tertiaire (gomme syphilitique) ou tuberculose cutanée (scrofuloderme). Interrogatoire essentiel : antécédents de chancre ? Contacts tuberculeux ? Examen général complet. Traitement : mercure + iodure de potassium si syphilis. Repos + alimentation si tuberculose.'},
    {type:'vf',
     text:'L\'érysipèle peut entraîner un lymphœdème chronique de la jambe après guérison.',
     correct:true, expl:'VRAI — L\'érysipèle (infection streptococcique du derme) peut endommager les vaisseaux lymphatiques de la jambe. Des récidives multiples → destruction progressive des lymphatiques → lymphœdème chronique (grosse jambe dure qui ne désenfle plus). Prévention : traiter rapidement chaque érysipèle, protéger la jambe des blessures qui pourraient déclencher de nouvelles crises.'},
    {type:'qcm',
     text:'Le traitement de la syphilis en 1904 avant le Salvarsan (1910) est :',
     choices:['Aspirine et repos','Mercure sous toutes ses formes — partiellement efficace mais toxique','Quinine','Morphine pour soulager les douleurs'],
     correct:1, expl:'Mercure — utilisé depuis le XVe siècle contre la syphilis. Frictions mercurielles (onguent mercuriel sur la peau), pilules de protoiodure de mercure, injections de sublimé corrosif. Partiellement efficace sur les stades 1 et 2. Toxique : stomatite mercurielle (gencives qui saignent, haleine fétide), chute des dents, atteinte rénale. Le Salvarsan d\'Ehrlich (1910) sera un bond en avant.'},
    {type:'cas',
     cas:'Un patient vous consulte pour des démangeaisons nocturnes intenses entre les doigts, aux poignets et sur le ventre depuis 2 semaines. Sa femme et ses deux enfants ont les mêmes symptômes.',
     text:'Diagnostic et conduite ?',
     choices:['Allergie alimentaire familiale — régime d\'éviction','Gale — soufre en pommade toute la famille simultanément','Varicelle — isolement','Eczéma atopique familial'],
     correct:1, expl:'Gale — transmission familiale, prurit NOCTURNE intense (le parasite est plus actif la nuit), localisation caractéristique (espaces interdigitaux, poignets, ventre, aisselles). Traitement simultané de toute la famille et du personnel : soufre en pommade 10-15%, 3 nuits de suite sur tout le corps sauf le visage. Lavage et désinfection literie et vêtements le lendemain matin.'}
  ]
},
{
  id:'s10', icon:'👶', title:'Certification Pédiatre',
  reqScore:80, totalQ:15,
  meta:['15 questions','80% requis','Titre : Pédiatre certifié'],
  questions:[
    {type:'qcm', partie:'Partie I — Théorie',
     text:'La mortalité infantile au Texas rural en 1904 est estimée à :',
     choices:['10 pour 1000 naissances','50 pour 1000 naissances','200 à 250 pour 1000 naissances','500 pour 1000 naissances'],
     correct:2, expl:'200 à 250 pour 1000 naissances avant l\'âge d\'un an. Principale cause : infections gastro-intestinales liées à l\'eau et au lait contaminés. La vaccination, l\'hygiène et la réhydratation orale sauveront des millions d\'enfants au XXe siècle.'},
    {type:'qcm',
     text:'La fontanelle antérieure (grand fontanelle) se ferme normalement entre :',
     choices:['2 et 4 mois','18 et 24 mois','4 et 6 ans','À la naissance'],
     correct:1, expl:'18 à 24 mois. Bombée = hypertension intracrânienne (méningite, hématome, hydrocéphalie). Déprimée = déshydratation sévère. Ne jamais exercer de pression dessus. La fontanelle postérieure (petit fontanelle) se ferme entre 6 et 8 semaines.'},
    {type:'vf',
     text:'Un nourrisson allaité au sein est quasi-immunisé contre la diarrhée infectieuse.',
     correct:true, expl:'VRAI — Le lait maternel contient des immunoglobulines (IgA sécrétoires), des anticorps spécifiques, des facteurs bifidogènes (favorisent une flore protectrice), du lysozyme. Un nourrisson allaité résiste beaucoup mieux aux diarrhées infectieuses qu\'un nourrisson au lait de vache. En 1904, l\'allaitement maternel est une question de survie.'},
    {type:'qcm',
     text:'Les taches de Koplik sont pathognomoniques (caractéristiques exclusives) de :',
     choices:['La scarlatine','La rougeole','La diphtérie','La varicelle'],
     correct:1, expl:'Taches de Koplik = petites taches blanches sur fond rouge sur la muqueuse buccale interne (joue), apparaissant 1-2 jours AVANT l\'éruption de la rougeole. Pathognomoniques = présentes UNIQUEMENT dans la rougeole. Leur apparition permet le diagnostic précoce et l\'isolement avant la phase contagieuse maximale.'},
    {type:'qcm',
     text:'Le signe le plus précoce et fiable de déshydratation chez le nourrisson est :',
     choices:['La fièvre','La dépression de la fontanelle antérieure','La diarrhée elle-même','La pâleur'],
     correct:1, expl:'La dépression de la fontanelle antérieure — signe précoce fiable. Normalement plate ou légèrement bombée, elle se creuse à la déshydratation. Autres signes : pli cutané persistant, yeux enfoncés, bouche sèche, larmes absentes. Un nourrisson perd proportionnellement beaucoup plus d\'eau qu\'un adulte — la déshydratation est une urgence pédiatrique.'},
    {type:'vf',
     text:'La coqueluche est dangereuse principalement pour les enfants de plus de 5 ans.',
     correct:false, expl:'FAUX — La coqueluche est dangereuse principalement chez le NOURRISSON (< 6 mois). Elle provoque des apnées (arrêts respiratoires), des convulsions hypoxiques, des pneumonies sévères. Le nourrisson peut ne pas avoir la toux caractéristique «en chant du coq« — il peut juste arrêter de respirer après les quintes. Mortalité élevée chez le nourrisson.'},
    {type:'qcm',
     text:'L\'huile de foie de morue est utilisée empiriquement depuis 1850 pour prévenir :',
     choices:['La coqueluche','Le rachitisme','La diphtérie','La rougeole'],
     correct:1, expl:'Le rachitisme — carence en vitamine D (non encore identifiée en 1904). L\'huile de foie de morue est riche en vitamine D. Son efficacité est reconnue empiriquement depuis 1850 même si le mécanisme est inconnu. Palm (1890) suggère un lien avec le manque de soleil. La vitamine D ne sera isolée qu\'en 1922.'},
    {type:'cas', partie:'Partie II — Cas cliniques',
     cas:'Un nourrisson de 8 mois présente depuis 2 jours des diarrhées aqueuses (6-8 selles par jour) et des vomissements en été. Il est agité, sa fontanelle est déprimée, ses yeux sont cernés et enfoncés, sa bouche est sèche.',
     text:'Votre conduite immédiate ?',
     choices:['Attendre que la diarrhée s\'arrête spontanément — donner de l\'eau sucrée','Réhydratation orale urgente — eau bouillie + sel + sucre, cuillère toutes les 5 minutes','Donner du laudanum pour arrêter les diarrhées','Nourrir normalement pour compenser les pertes'],
     correct:1, expl:'Déshydratation sévère par gastro-entérite — urgence. Réhydratation orale : eau bouillie + 1 c. à café de sel + 2 c. à soupe de sucre par litre. Si vomissements : petites quantités à la cuillère toutes les 5 minutes. La patience est une vertu médicale. Le laudanum (opiacé) arrête certes les diarrhées mais peut masquer l\'évolution et déprimer la respiration — contre-indiqué chez le nourrisson.'},
    {type:'cas',
     cas:'Un enfant de 4 ans présente depuis 5 jours une fièvre à 39°C, une angine avec plaques blanches et une éruption rouge écarlate sur tout le corps épargnant le triangle naso-labial. La langue est rouge avec des papilles proéminentes.',
     text:'Diagnostic et mesures d\'isolement ?',
     choices:['Rougeole — isolement 2 semaines','Scarlatine streptococcique — isolement 3 semaines, surveiller complications rénales et cardiaques','Diphtérie — antitoxine urgente','Varicelle — isolement (croûtes tombées)'],
     correct:1, expl:'Scarlatine — tous les signes : éruption écarlate épargnant le triangle naso-labial, langue «en fraise» (framboisée), angine streptococcique. Isolement 3 semaines (très contagieux). Surveiller les complications tardives : glomérulonéphrite aiguë (sang dans les urines 2-3 semaines après) et rhumatisme articulaire aigu (cœur) — principales causes de décès. Traitement symptomatique uniquement.'},
    {type:'cas',
     cas:'Un bébé de 6 semaines présente à la naissance des opacités blanches des deux cristallins (cataracte bilatérale congénitale). Sa mère dit avoir eu "une éruption avec des ganglions" au 2e mois de grossesse.',
     text:'Quelle est la cause probable ?',
     choices:['Malnutrition maternelle pendant la grossesse','Rubéole congénitale — infection de la mère au 1er trimestre','Hérédité familiale uniquement','Médicaments pris pendant la grossesse'],
     correct:1, expl:'Rubéole congénitale — la mère a eu la rubéole au 1er trimestre (moment critique du développement des organes). Peut causer la triade de Gregg : cataracte, malformation cardiaque, surdité. En 1904, la rubéole n\'est pas encore identifiée comme virus distinct ni son danger pendant la grossesse compris. La vaccination contre la rubéole n\'arrivera qu\'en 1969.'},
    {type:'cas',
     cas:'Un enfant de 2 ans a un périmètre crânien augmenté, les fontanelles bombées, les yeux fixés vers le bas ("yeux en coucher de soleil"), pleure un cri aigu et vomit en jet.',
     text:'Diagnostic urgent ?',
     choices:['Retard mental simple','Hydrocéphalie — hypertension intracrânienne — urgence neurologique','Otite avec fièvre','Rachitisme crânien'],
     correct:1, expl:'Hydrocéphalie — accumulation de liquide céphalo-rachidien dans les ventricules cérébraux. Signes : macrocéphalie progressive, fontanelles bombées, yeux «en coucher de soleil« (paralysie du regard vers le haut par pression), cri aigu cérébral, vomissements en jet. URGENCE neurologique. En 1904, aucun traitement chirurgical efficace — pronostic très sombre.'},
    {type:'vf',
     text:'La diphtérie peut être traitée efficacement en 1904 grâce à l\'antitoxine de Von Behring.',
     correct:true, expl:'VRAI — L\'antitoxine diphtérique de Von Behring (1894) est le premier traitement par sérothérapie. Premier Prix Nobel de médecine en 1901. L\'antitoxine neutralise la toxine diphtérique. Elle doit être administrée le plus tôt possible — avant que la toxine ne lèse le cœur et les nerfs. C\'est l\'un des rares traitements curatifs réels disponibles en 1904.'},
    {type:'qcm',
     text:'Un enfant de 18 mois qui ne marche pas encore, a les jambes arquées en "O" et un thorax en carène, doit faire suspecter :',
     choices:['Un retard moteur simple','Le rachitisme par carence en vitamine D','Une fracture non diagnostiquée','Une malformation congénitale des membres'],
     correct:1, expl:'Rachitisme — carence en vitamine D (non encore identifiée). Malformations osseuses typiques chez l\'enfant en croissance : genoux cagneux ou arqués (genu varum / valgum), thorax en carène ou en entonnoir, crâne «en balle de ping-pong«. Prévention : huile de foie de morue, ensoleillement. Si sévère : fractures pathologiques.'},
    {type:'cas',
     cas:'Un nouveau-né de 2 jours présente des yeux rouges avec un écoulement purulent abondant des deux côtés. La mère avait une infection génitale à la naissance.',
     text:'Diagnostic et traitement en urgence ?',
     choices:['Conjonctivite virale — attendre la guérison spontanée','Ophtalmie du nouveau-né à gonocoque — nitrate d\'argent 1% ou collyre antiseptique + traitement de la mère','Larmoiement normal du nouveau-né','Corps étranger oculaire'],
     correct:1, expl:'Ophtalmie gonococcique du nouveau-né — contamination lors du passage dans la voie génitale. Sans traitement rapide : ulcération cornéenne → cécité en 24-48h. Collyre au nitrate d\'argent 1% (méthode de Credé, 1880) ou antiseptique. Traiter également la mère (gonocoque). La méthode de Credé systématique à la naissance prévient cette complication — à appliquer sur tous les nouveau-nés.'}
  ]
},
{
  id:'s11', icon:'☢️', title:'Certification Radiologue',
  reqScore:80, totalQ:15,
  meta:['15 questions','80% requis','Titre : Radiologue certifié'],
  questions:[
    {type:'qcm', partie:'Partie I — Théorie',
     text:'Les rayons X ont été découverts par Wilhelm Röntgen le :',
     choices:['8 novembre 1885','8 novembre 1895','8 novembre 1905','8 novembre 1875'],
     correct:1, expl:'8 novembre 1895 — en manipulant un tube cathodique dans l\'obscurité, Röntgen remarque qu\'un écran fluorescent s\'illumine à distance. Il interpose des objets : les structures denses apparaissent claires. La main de sa femme révèle son squelette et son alliance. Il reçoit le premier Prix Nobel de physique en 1901.'},
    {type:'qcm',
     text:'Sur une radiographie, les os apparaissent blancs parce qu\'ils :',
     choices:['Émettent leur propre lumière','Absorbent les rayons X (haute densité)','Laissent passer les rayons X','Réfléchissent les rayons X'],
     correct:1, expl:'Les structures denses (os, métal, calcifications) ABSORBENT les rayons X — moins de rayons atteignent la plaque → zone claire (blanche). Les structures peu denses (poumons, graisse, air) LAISSENT PASSER les rayons X → zone sombre (noire). Principe de base de l\'interprétation radiographique.'},
    {type:'vf',
     text:'Les premiers radiologues comprenaient parfaitement les dangers des rayons X et se protégeaient efficacement.',
     correct:false, expl:'FAUX — Les pionniers ignoraient totalement les dangers. Ils mettaient leurs mains dans le faisceau pour régler l\'appareil. Dès 1902, des cancers de la peau de la main apparaissent chez des radiologues américains. Marie Curie mourra en 1934 d\'une aplasie médullaire. Les tabliers de plomb et mesures de protection ne viendront qu\'en 1910-1920.'},
    {type:'qcm',
     text:'L\'opacité alvéolaire visible à la radiographie thoracique correspond cliniquement à :',
     choices:['Un pneumothorax','Une pneumonie — les alvéoles remplies de pus apparaissent blanches','Un emphysème','Un épanchement péricardique'],
     correct:1, expl:'Pneumonie — les alvéoles normalement remplies d\'air (noires) sont remplacées par du pus ou du liquide (blanches). L\'opacité suit un territoire lobaire ou segmentaire. À l\'inverse, un pneumothorax = hyperclarté (air dans la plèvre, pas de parenchyme = plus noir que normal, sans trame vasculaire).'},
    {type:'qcm',
     text:'Le principal avantage de la radiographie pour les fractures est :',
     choices:['Elle guérit la fracture','Elle montre précisément le type de fracture, le déplacement et localise les projectiles','Elle remplace le plâtre','Elle indolore l\'extraction des fragments'],
     correct:1, expl:'La radiographie révolutionne la traumatologie : type de fracture (transversale, oblique, comminutive), déplacement des fragments, présence d\'un projectile (balle), qualité de la réduction après plâtre, évolution de la consolidation. Avant 1896, le chirurgien opérait «à l\'aveugle«.'},
    {type:'vf',
     text:'Le temps d\'exposition pour une radiographie abdominale en 1904 est de quelques millisecondes.',
     correct:false, expl:'FAUX — En 1904, les appareils à rayons X sont primitifs (tubes de Crookes, bobines d\'induction). Le temps d\'exposition pour une radiographie abdominale peut être de plusieurs MINUTES. Le patient doit rester parfaitement immobile. Un bougé donne une image floue inutilisable. Les films rapides et les appareils puissants ne viendront que plus tard.'},
    {type:'qcm',
     text:'L\'image radiographique en 1904 se forme sur :',
     choices:['Du papier photographique ordinaire','Une plaque de verre ou celluloïd au bromure d-argent (chambre noire)','Un écran fluorescent permanent','Un tube cathodique'],
     correct:1, expl:'Plaque photographique au bromure d\'argent — le même principe que la photographie ordinaire. Les rayons X impressionnent les cristaux d\'argent. Développement en chambre noire (solution révélatrice, puis fixateur). Résultat en quelques heures. Les cassettes avec films modernes et les écrans renforçateurs ne viendront que plus tard.'},
    {type:'cas', partie:'Partie II — Cas cliniques',
     cas:'Un cowboy arrive blessé par balle à l\'épaule droite. La balle est entrée mais il n\'y a pas d\'orifice de sortie. Le patient est stable. Vous avez accès à l\'appareil à rayons X de Saint-Denis.',
     text:'Quelle est l\'utilité de la radiographie dans ce cas ?',
     choices:['Aucune — extraire la balle sans radiographie','Localiser la balle avec précision avant toute extraction chirurgicale — éviter une incision à l\'aveugle','Guérir la blessure par les rayons X','Stériliser la plaie'],
     correct:1, expl:'Localiser la balle avant extraction — révolution de la chirurgie de guerre. Sans radiographie : incision à l\'aveugle, risque d\'endommager nerfs et vaisseaux, exploration longue et traumatisante. Avec radiographie : incision directe au bon endroit, extraction rapide, moins de dommages. Demander deux incidences (face + profil) pour la localisation en 3D.'},
    {type:'cas',
     cas:'Vous interprétez une radiographie thoracique d\'un homme de 45 ans. Les deux lobes supérieurs montrent des opacités infiltratives mal limitées avec des zones plus claires en leur centre.',
     text:'Quel diagnostic évoquez-vous en premier en 1904 au Texas ?',
     choices:['Pneumonie lobaire à Pneumocoque','Tuberculose pulmonaire — les cavernes correspondent aux zones claires centrales','Cancer du poumon','Abcès pulmonaire d\'origine dentaire'],
     correct:1, expl:'Tuberculose pulmonaire — prédominance aux lobes supérieurs caractéristique, opacités infiltratives et cavernes (zones claires = destruction du parenchyme avec formation d\'une cavité). En 1904 au Texas, la tuberculose est la première cause de mortalité. La radiographie complète le diagnostic clinique (toux chronique, hémoptysie, amaigrissement, fièvre vespérale).'},
    {type:'cas',
     cas:'Un technicien radiologue de Saint-Denis travaille chaque jour avec l\'appareil à rayons X depuis 2 ans. Il présente des lésions cutanées chroniques sur les mains : peau rouge, sèche, qui se craquelle et ne guérit pas.',
     text:'Que signifient ces lésions ?',
     choices:['Eczéma de contact aux produits chimiques de développement','Radiodermite — lésions causées par les rayonnements — risque élevé de cancer cutané','Psoriasis professionnel','Infection fongique'],
     correct:1, expl:'Radiodermite chronique — lésion caractéristique des pionniers de la radiologie. Les mains reçoivent des doses cumulées de rayonnements lors du positionnement des patients et du réglage de l\'appareil. Progression : érythème → ulcérations chroniques → cancer cutané. Conduite : cesser toute exposition immédiatement, protéger les lésions. Plusieurs radiologues pionniers ont perdu des doigts.'},
    {type:'cas',
     cas:'Vous réalisez une radiographie d\'un enfant de 6 ans avec une douleur à la jambe après une chute. L\'image montre une fracture transversale du fémur mais aussi une ancienne fracture guérie et une autre en cours de guérison sur d\'autres os.',
     text:'Que devez-vous suspecter ?',
     choices:['Ostéoporose juvénile — supplément de calcium','Maltraitance (enfant battu) — fractures à différents stades de guérison — alerter les autorités','Rachitisme sévère — huile de foie de morue','Tuberculose osseuse — repos'],
     correct:1, expl:'Fractures multiples à différents stades de guérison chez un enfant = MALTRAITANCE jusqu’à preuve du contraire. En 1904, ce concept n\'est pas encore formellement décrit (Tardieu avait publié en 1860 mais peu reconnu). Mais un médecin attentif doit s\'interroger : des accidents «répétés« chez un enfant sont suspects. Signaler aux autorités locales (shérif). Le rôle de protecteur de l\'enfant fait partie du devoir médical.'},
    {type:'vf',
     text:'Un pneumothorax se présente sur la radiographie thoracique comme une hyperclarté (zone plus noire) sans trame vasculaire.',
     correct:true, expl:'VRAI — Pneumothorax = air dans la cavité pleurale qui comprime le poumon. Zone plus noire que le parenchyme normal car l\'air absorbe très peu les rayons X. Absence de trame vasculaire (pas de poumon dans cette zone). Ligne de décollement pleural visible. Si grand pneumothorax avec déviation du médiastin = pneumothorax compressif — urgence vitale.'},
    {type:'qcm',
     text:'Pour une radiographie du thorax de qualité, le patient doit :',
     choices:['Respirer normalement pendant l\'exposition','Être en inspiration profonde et apnée pendant l\'exposition','Être en expiration forcée','La respiration n\'a aucune importance'],
     correct:1, expl:'Inspiration profonde + apnée (bloquer la respiration) pendant l\'exposition. En inspiration profonde, les poumons sont bien aérés (plus noirs) et le diaphragme est abaissé — meilleure visualisation des bases pulmonaires. Un flou respiratoire (patient qui respire) donne une image inutilisable. Expliquer clairement au patient avant l\'exposition.'},
    {type:'cas',
     cas:'Une patiente de 65 ans a une radiographie du poignet après une chute sur la paume. L\'image montre un trait de fracture au radius distal avec un fragment qui s\'est déplacé vers l\'arrière.',
     text:'Quel type de fracture est-ce et quel est le traitement ?',
     choices:['Fracture de Smith — traitement chirurgical','Fracture de Pouteau-Colles — réduction sous anesthésie puis plâtre antébrachial 4-6 semaines','Entorse simple — bandage élastique','Fracture du carpe — immobilisation 3 semaines'],
     correct:1, expl:'Fracture de Pouteau-Colles (Colles 1814) — fracture du radius distal avec déplacement postérieur du fragment, donnant la déformation en «dos de fourchette«. La plus fréquente des fractures de l\'adulte, surtout chez les femmes ménopausées (os fragilisés). Traitement : réduction (manœuvre de traction et manipulation) sous anesthésie locale ou générale légère, plâtre antébrachial 4-6 semaines.'}
  ]
},
{
  id:'s12', icon:'❤️', title:'Certification Chirurgien cardiaque',
  reqScore:85, totalQ:20,
  meta:['20 questions','85% requis','Statut Pionnier · Difficulté extrême'],
  questions:[
    {type:'qcm', partie:'Partie I — Théorie',
     text:'Ludwig Rehn réalise la première suture cardiaque réussie sur un patient vivant en :',
     choices:['1886 à Vienne','1896 à Frankfurt','1906 à Berlin','1876 à Paris'],
     correct:1, expl:'9 septembre 1896 à Frankfurt — Wilhelm Justus, 22 ans, poignardé. Rehn ouvre le thorax en urgence, voit le ventricule droit perforé et qui bat, comprime manuellement, puis passe 3 points de suture en soie pendant les diastoles. Justus vivra 20 ans. De 1896 à 1907 : 124 interventions similaires avec 45% de survie.'},
    {type:'qcm',
     text:'La technique de suture anastomotique vasculaire permettant de raccorder des vaisseaux bout à bout a été développée par :',
     choices:['Ludwig Rehn en 1896','Alexis Carrel en 1902','Daniel Hale Williams en 1893','Ernst von Bergmann en 1886'],
     correct:1, expl:'Alexis Carrel en 1902 — technique de triangulation : trois fils placés à 120° permettent de déployer la paroi vasculaire et de la suturer sans plisser. Prix Nobel 1912. Ses techniques permettront plus tard les transplantations d\'organes. En 1904, disponible dans très peu de centres d\'avant-garde.'},
    {type:'vf',
     text:'Theodor Billroth, grand chirurgien de son époque, était favorable à la chirurgie cardiaque.',
     correct:false, expl:'FAUX — Billroth a écrit en 1883 : «Un chirurgien qui tenterait d\'opérer le cœur perdrait le respect de ses collègues.« Cette phrase illustre l\'état d\'esprit de l\'époque. Il n\'avait pas tort dans sa prudence — mais il sous-estimait ce que l\'audace chirurgicale pouvait accomplir. Rehn lui donnera tort 13 ans plus tard.'},
    {type:'qcm',
     text:'La triade de Beck (qui signe la tamponnade cardiaque) comprend :',
     choices:['Fièvre + douleur thoracique + toux','Tension artérielle effondrée + veines du cou gonflées + bruits du cœur assourdis','Tachycardie + hypotension + pâleur','Dyspnée + cyanose + stridor'],
     correct:1, expl:'Triade de Beck : tension artérielle effondrée (le cœur comprimé ne peut plus pomper) + veines du cou gonflées (retour veineux bloqué) + bruits du cœur assourdis (liquide autour du cœur). La tamponnade = accumulation de sang ou liquide dans le péricarde qui comprime le cœur. Traitement immédiat : ponction péricardique sous le processus xiphoïde.'},
    {type:'qcm',
     text:'La péricardectomie (ablation du péricarde) est indiquée pour :',
     choices:['L\'endocardite infectieuse','La péricardite constrictive — épaississement du péricarde qui étouffe le cœur','L\'infarctus du myocarde','La fibrillation ventriculaire'],
     correct:1, expl:'Péricardite constrictive — le péricarde s\'épaissit et se fibre, formant une coque rigide autour du cœur qui empêche son remplissage. Brauer réalise la première péricardectomie en 1902. Intervention à haut risque mais seule option curative. Symptômes : insuffisance cardiaque, ascite, œdèmes sans autre explication.'},
    {type:'vf',
     text:'En 1904, il est possible de réaliser un pontage coronarien pour traiter l\'angine de poitrine.',
     correct:false, expl:'FAUX — Le pontage coronarien ne sera réalisé qu\'en 1964 (DeBakey). En 1904, on ne peut ni visualiser les artères coronaires (coronarographie : 1958) ni les réparer chirurgicalement. L\'angine de poitrine (angor) est traitée par repos, nitroglycérine (découverte en 1879 par Murrell), et régime. Aucun traitement curatif disponible.'},
    {type:'qcm',
     text:'Lors d\'une suture de plaie cardiaque, pourquoi passe-t-on les fils pendant la diastole (relâchement du cœur) ?',
     choices:['C\'est plus facile techniquement','La paroi est plus épaisse en diastole','Le cœur est plus immobile et la paroi est relâchée — réduisant le risque de déchirer le fil','Le patient est moins conscient en diastole'],
     correct:2, expl:'En diastole, le cœur se relâche et se remplit — la paroi est moins tendue, plus malléable. Passer le fil en systole (contraction) risque de déchirer le myocarde qui se contracte fortement autour du fil. La technique de Rehn : observer le rythme cardiaque, synchroniser les mouvements de suture avec la diastole. Concentration absolue requise.'},
    {type:'qcm',
     text:'Daniel Hale Williams réalise en 1893 à Chicago la première :',
     choices:['Suture ventriculaire directe','Suture du péricarde sur un patient poignardé (première chirurgie cardiaque réussie)','Transplantation cardiaque','Péricardectomie'],
     correct:1, expl:'Daniel Hale Williams suture le péricarde d\'un patient poignardé à Chicago en 1893 — 3 ans avant Rehn. Ce n\'est pas le ventricule directement mais le sac péricardique. Considéré comme la première chirurgie cardiaque réussie. Williams est afro-américain dans une Amérique ségrégationniste — sa réussite est doublement remarquable.'},
    {type:'vf',
     text:'La mortalité de la suture cardiaque d\'urgence en 1904 est proche de zéro avec une bonne technique.',
     correct:false, expl:'FAUX — La mortalité reste de 40 à 60% même avec la meilleure technique disponible. Ces patients sont des cas désespérés — ils mouraient à 100% sans intervention. La règle du chirurgien pionnier : «N\'opérer que les cas désespérés où la mort sans intervention est certaine. Une chance sur deux vaut mieux que zéro.«'},
    {type:'qcm',
     text:'L\'artère coronaire gauche naît de :',
     choices:['L\'artère pulmonaire','L\'aorte, juste au-dessus de la valve aortique','La veine cave supérieure','L\'artère sous-clavière gauche'],
     correct:1, expl:'Les deux artères coronaires (gauche et droite) naissent de l\'aorte ascendante juste au-dessus de la valve aortique, dans les sinus de Valsalva. Elles irriguent le myocarde. Leur obstruction = infarctus. En 1904, leur anatomie est connue mais aucune technique chirurgicale ne permet de les réparer.'},
    {type:'cas', partie:'Partie II — Cas cliniques',
     cas:'Un homme de 30 ans arrive poignardé à l\'hôpital de Saint-Denis. Il est en état de choc : tension artérielle quasi-nulle, veines du cou gonflées, bruits du cœur inaudibles. La plaie est au niveau du 5e espace intercostal gauche.',
     text:'Diagnostic et conduite d\'urgence ?',
     choices:['Hémothorax simple — drain thoracique','Tamponnade cardiaque par hémopéricarde — ponction péricardique urgente puis thoracotomie','Pneumothorax — aiguille de décompression','Attendre que la tension remonte spontanément'],
     correct:1, expl:'Tamponnade cardiaque — triade de Beck complète + localisation de la plaie. URGENCE des urgences. Ponction péricardique sous le processus xiphoïde (aiguille longue à 45° vers l\'épaule gauche) pour décomprimer immédiatement. Dès que la tension remonte un peu : thoracotomie d\'urgence pour suturer le cœur. Chaque seconde compte — le cœur comprimé ne peut plus pomper.'},
    {type:'cas',
     cas:'Lors d\'une suture ventriculaire droite sur un patient poignardé, vous avez placé 3 fils. Alors que vous serrez le 3e fil, le cœur entre en fibrillation (tremblements désorganisés, pas de pompage).',
     text:'Quelle est votre action ?',
     choices:['Arrêter l\'opération et déclarer le patient mort','Massage cardiaque externe immédiat + compressions directes du cœur si thorax ouvert','Attendre que le cœur reprenne spontanément','Donner de la morphine'],
     correct:1, expl:'Massage cardiaque direct (thorax ouvert) — comprimer le cœur entre les deux mains rythmiquement (60-80 fois/minute). En 1904, le défibrillateur n\'existe pas. Le massage cardiaque direct peut parfois restaurer un rythme sinusal. Alternatives : injection intracardiaque d\'adrénaline (si disponible), compression du cœur avec une main pendant 5-10 minutes. Résultats imprévisibles mais c\'est la seule chance.'},
    {type:'cas',
     cas:'Un patient de 55 ans présente une insuffisance cardiaque progressive avec ascite importante, œdèmes des membres inférieurs, et veines du cou gonflées. À l\'auscultation : bruits du cœur lointains et assourdis. Son pouls paradoxal (qui diminue à l\'inspiration). Antécédent de tuberculose.',
     text:'Quel diagnostic expliquerait l\'ensemble du tableau ?',
     choices:['Insuffisance cardiaque par hypertension artérielle','Péricardite constrictive — coque fibreuse post-tuberculeuse autour du cœur','Valvulopathie mitrale','Anévrisme de l\'aorte abdominale'],
     correct:1, expl:'Péricardite constrictive post-tuberculeuse — le péricarde épaissi et fibrosé forme une coque rigide qui empêche le cœur de se remplir (insuffisance cardiaque restrictive). Signes : pouls paradoxal, ascite disproportionnée, veines du cou gonflées. La tuberculose est une cause classique. Seul traitement curatif : péricardectomie (Brauer, 1902) — ablation du péricarde pathologique. Intervention lourde à haut risque.'},
    {type:'cas',
     cas:'Vous êtes le premier chirurgien cardiaque de Saint-Denis. Un administrateur vous demande de réaliser une suture cardiaque sur un patient qui a 30% de chances de survie AVEC l\'opération, mais 100% de chance de mourir sans.',
     text:'Quelle est votre décision éthique et médicale ?',
     choices:['Refuser — trop risqué pour votre réputation','Opérer — 30% de survie vaut infiniment mieux que 0%','Demander l\'accord du shérif avant d\'opérer','Attendre un deuxième avis médical pendant 24 heures'],
     correct:1, expl:'Opérer — c\'est le principe fondamental du chirurgien pionnier de 1904 : «N\'opérer que les cas désespérés où la mort sans intervention est certaine. Une chance sur deux vaut mieux que zéro.« La mort sans intervention est certaine (100%). L\'opération donne 30% de chance. Éthiquement, l\'abstention équivaut à condamner le patient à mort. Le consentement (si le patient est conscient) est souhaitable mais l\'urgence prime.'},
    {type:'cas',
     cas:'Lors d\'une thoracotomie d\'urgence pour plaie cardiaque, vous constatez que le ventricule gauche (paroi épaisse) est atteint en plus du ventricule droit. Le patient saigne abondamment.',
     text:'Quel est le défi supplémentaire par rapport à une plaie du ventricule droit ?',
     choices:['Aucune différence — même technique','Le ventricule gauche a une paroi 3-4 fois plus épaisse et se contracte avec beaucoup plus de force — les fils arrachent plus facilement, le saignement est massif','Le ventricule gauche est plus petit, plus facile à suturer','La plaie du ventricule gauche ne saigne pas'],
     correct:1, expl:'Le ventricule gauche a une paroi 3 à 4 fois plus épaisse que le droit (il doit propulser le sang dans tout le corps). Sa contraction est extrêmement puissante — les fils de suture ont tendance à déchirer le myocarde. Technique : points en U ou en matelas pour répartir les tensions, comprimer manuellement entre les sutures, travailler TRÈS vite. La mortalité d\'une plaie du ventricule gauche est plus élevée que du droit.'},
    {type:'qcm',
     text:'L\'anévrisme de l\'aorte abdominale se présente cliniquement comme :',
     choices:['Une douleur aiguë de l\'épaule gauche','Une masse pulsatile palpable à l\'abdomen avec un souffle aortique à l\'auscultation','Une douleur thoracique avec irradiation au bras gauche','Une douleur lombaire chronique sans masse palpable'],
     correct:1, expl:'Masse pulsatile palpable (battant en rythme avec le pouls) dans l\'abdomen, autour de l\'ombilic. Souffle systolique à l\'auscultation de l\'aorte abdominale. Douleur lombaire profonde souvent. Si rupture : douleur abdominale ou dorsale catastrophique + choc hémorragique = mort rapide. Mortalité de rupture > 90% en 1904 (aucun traitement chirurgical efficace de la rupture).'},
    {type:'vf',
     text:'Le drainage péricardique (ponction péricardique) peut être réalisé sans ouvrir la poitrine.',
     correct:true, expl:'VRAI — La ponction péricardique (paracentèse péricardique) se fait par voie sous-xiphoïdienne : aiguille longue insérée sous le processus xiphoïde à 45° vers l\'épaule gauche. Sans ouverture du thorax. Permet d\'évacuer l\'hémopéricarde en urgence (tamponnade) ou l\'épanchement dans la péricardite exsudative. Risque : perforations du ventricule — l\'opérateur doit sentir la pulsation cardiaque sur l\'aiguille pour savoir qu\'il est proche.'},
    {type:'qcm',
     text:'La circulation extracorporelle (cœur-poumon artificiel) qui permettra la chirurgie à cœur ouvert sera inventée en :',
     choices:['1920 par Carrel','1937 par Gibbon (tests animaux) — utilisation humaine 1953','1904 — elle est déjà disponible à Saint-Denis','1960 par DeBakey'],
     correct:1, expl:'John Gibbon commence ses expériences sur des animaux en 1937 et réalise la première utilisation chez l\'homme en 1953. La CEC permet d\'arrêter le cœur et de prendre en charge la circulation et l\'oxygénation par une machine externe — ouvrant la voie à toute la chirurgie cardiaque moderne. En 1904 : IMPOSSIBLE. C\'est la frontière infranchissable de l\'époque.'},
    {type:'cas',
     cas:'Vous avez réussi une suture cardiaque sur un patient poignardé. 48 heures après l\'opération, il est fébrile à 38,5°C, se plaint de douleur thoracique et une frottement péricardique est audible à l\'auscultation.',
     text:'Quelle complication suspectez-vous ?',
     choices:['Récidive de la tamponnade — re-ponction urgente','Péricardite post-opératoire — réaction inflammatoire du péricarde après la chirurgie','Pneumonie — traitement antibiotique','Endocardite infectieuse — ne rien faire'],
     correct:1, expl:'Péricardite post-opératoire — réaction inflammatoire du péricarde après manipulation chirurgicale. Fièvre modérée + douleur thoracique + frottement péricardique à l\'auscultation (bruit de cuir neuf). Distinguer de la tamponnade (pas de signe de Beck). En 1904 : traitement symptomatique (repos, antipyrétiques, aspiration si épanchement). La plupart se résorbent spontanément.'},
    {type:'vf',
     text:'La règle "ne jamais opérer un cœur qui bat" était la doctrine acceptée avant Rehn.',
     correct:true, expl:'VRAI — Avant 1896, la doctrine médicale était absolue : le cœur est intouchable. Non seulement par superstition mais par raison pratique — comment suturer quelque chose qui bouge 70 fois par minute et qui saigne à toute vitesse ? Rehn a brisé ce tabou en 1896 par nécessité absolue (patient mourant). Son audace a ouvert une voie nouvelle à toute la chirurgie cardiaque.'}
  ]
}
];

// ── ÉTAT
var examState = {examId:null, questions:[], current:0, answers:[], errors:[], score:0};

function shuffleQ(questions){
  var th=[], cas=[], inCas=false;
  questions.forEach(function(q){
    if(q.partie && q.partie.indexOf('Cas')>-1) inCas=true;
    if(q.type==='cas'||inCas){ cas.push(Object.assign({},q)); }
    else { th.push(Object.assign({},q)); }
  });
  for(var i=th.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=th[i];th[i]=th[j];th[j]=t; }
  if(th.length>0) th[0].partie='Partie I — Théorie';
  if(cas.length>0) cas[0].partie='Partie II — Cas cliniques';
  return th.concat(cas);
}

function renderAccueil(){
  var scores=JSON.parse(localStorage.getItem('psy_exam_scores')||'{}');
  var niv4=scores['e4']&&scores['e4'].passed;
  var grid=document.getElementById('spe-exam-grid');

  // 4 examens complets
  var html = EXAMENS_SPE.map(function(e){
    var locked=!niv4;
    var myScore=scores[e.id];
    var passed=myScore&&myScore.passed;
    return '<div class="spe-exam-card'+(locked?' locked':'')+(passed?' passed':'')+'"'
      +(locked?'':' onclick="startExamen(\''+e.id+'\')"')+'>'
      +(passed?'<div class="spe-score-badge">'+myScore.pct+'%</div>':'')
      +(locked?'<div class="lock-icon">🔒</div>':'')
      +'<div class="spe-card-icon">'+e.icon+'</div>'
      +'<div class="spe-card-title">'+e.title+'</div>'
      +'<div class="spe-card-meta">'+e.meta.join(' · ')+'</div>'
      +(locked?'<div class="spe-card-lieu" style="color:#c07070">Niveau 4 requis</div>':'<div class="spe-card-lieu" style="color:#6abf6a">Disponible</div>')
      +'</div>';
  }).join('');

  // 8 examens en construction
  html += SPE_SIMPLE.map(function(e){
    return '<div class="spe-exam-card locked">'
      +'<div class="lock-icon">🚧</div>'
      +'<div class="spe-card-icon">'+e.icon+'</div>'
      +'<div class="spe-card-title">'+e.title+'</div>'
      +'<div class="spe-card-meta">'+e.meta.join(' · ')+'</div>'
      +'<div class="spe-card-lieu" style="color:var(--parch4)">En cours de rédaction</div>'
      +'</div>';
  }).join('');

  grid.innerHTML = html;
}

function startExamen(id){
  var exam=EXAMENS_SPE.find(function(e){return e.id===id;});
  if(!exam) return;
  examState={examId:id, questions:shuffleQ(exam.questions.slice()), current:0, answers:[], errors:[], score:0};
  document.getElementById('exam-running-title').textContent=exam.title;
  show('view-exam'); renderQuestion();
}

function renderQuestion(){
  var q=examState.questions[examState.current];
  var total=examState.questions.length;
  document.getElementById('exam-prog-fill').style.width=Math.round(examState.current/total*100)+'%';
  document.getElementById('exam-prog-text').textContent=(examState.current+1)+' / '+total;
  var letters=['A','B','C','D'];
  var html='';
  if(q.partie) html+='<div class="partie-label">'+q.partie+'</div>';
  html+='<div class="question-card">';
  html+='<div class="question-num">Question '+(examState.current+1)+' sur '+total;
  html+='<span class="question-type-badge">'+({qcm:'QCM',vf:'Vrai / Faux',cas:'Cas clinique'}[q.type]||'')+'</span></div>';
  if(q.cas) html+='<div class="cas-block"><span class="cas-label">🩺 Situation clinique</span>'+q.cas+'</div>';
  html+='<div class="question-text">'+q.text+'</div>';
  var choices=q.type==='vf'?['Vrai','Faux']:q.choices;
  html+='<div class="choices" id="choices">';
  choices.forEach(function(c,i){
    html+='<div class="choice" id="ch-'+i+'" onclick="selectAnswer('+i+')">'
      +'<span class="choice-letter">'+letters[i]+'</span><span>'+c+'</span></div>';
  });
  html+='</div>';
  html+='<div class="feedback" id="feedback"><div class="feedback-title" id="fb-title"></div><div class="feedback-expl" id="fb-expl"></div></div>';
  html+='<button class="btn-next" id="btn-next" onclick="nextQuestion()">'
    +(examState.current===examState.questions.length-1?'Voir les résultats →':'Question suivante →')+'</button>';
  html+='</div>';
  document.getElementById('exam-question-wrap').innerHTML=html;
}

function selectAnswer(idx){
  if(document.getElementById('btn-next').classList.contains('show')) return;
  var q=examState.questions[examState.current];
  var ci=q.type==='vf'?(q.correct?0:1):q.correct;
  document.querySelectorAll('.choice').forEach(function(c){c.style.pointerEvents='none';});
  document.getElementById('ch-'+idx).classList.add(idx===ci?'correct':'wrong');
  if(idx!==ci){
    document.getElementById('ch-'+ci).classList.add('reveal-correct');
    examState.errors.push({q:q.text,correct:(q.type==='vf'?(q.correct?'Vrai':'Faux'):q.choices[ci])});
  } else { examState.score++; }
  examState.answers.push(idx);
  var fb=document.getElementById('feedback');
  fb.className='feedback show '+(idx===ci?'good':'bad');
  document.getElementById('fb-title').textContent=idx===ci?'✓ Correct !':'✗ Incorrect';
  document.getElementById('fb-expl').textContent=q.expl;
  document.getElementById('btn-next').classList.add('show');
}

function nextQuestion(){
  examState.current++;
  if(examState.current>=examState.questions.length){ showResult(); }
  else { renderQuestion(); window.scrollTo(0,0); }
}

function showResult(){
  var exam=EXAMENS_SPE.find(function(e){return e.id===examState.examId;});
  var total=examState.questions.length, score=examState.score;
  var pct=Math.round(score/total*100), passed=pct>=exam.reqScore;
  var mention='';
  if(!passed){ mention='Ajourné — à représenter'; }
  else if(pct>=95){ mention='Reçu avec distinction majeure'; }
  else if(pct>=90){ mention='Reçu avec distinction'; }
  else if(pct>=80){ mention='Reçu avec satisfaction'; }
  else { mention='Reçu'; }

  var scores=JSON.parse(localStorage.getItem('psy_exam_scores')||'{}');
  if(!scores[examState.examId]||pct>scores[examState.examId].pct){
    scores[examState.examId]={pct,passed,mention,date:new Date().toLocaleDateString('fr-FR')};
    localStorage.setItem('psy_exam_scores',JSON.stringify(scores));
  }
  if(window._fbSaveExam) window._fbSaveExam(examState.examId,pct,passed,mention);

  var diplome='';
  if(passed){
    var today=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
    diplome=['╔═══════════════════════════════════════╗',
      '║   CABINET MÉDICAL DU NOUVEAU MONDE    ║',
      '║   École de Saint-Denis · 1904         ║',
      '╚═══════════════════════════════════════╝','',
      'Nous certifions que','  Dr. [Votre nom]','',
      'a obtenu la certification de','  '+exam.title.toUpperCase(),'',
      'Mention : '+mention.toUpperCase(),'',
      'Score : '+pct+'% / '+exam.reqScore+'% requis','',
      'Saint-Denis, Louisiane, le '+today,
      '══════════════════════════════════════'].join('\n');
  }

  var errHtml='';
  if(examState.errors.length>0){
    errHtml='<div class="errors-list"><div class="label" style="text-align:left;margin-bottom:.6rem">Questions manquées ('+examState.errors.length+')</div>';
    examState.errors.forEach(function(e){
      errHtml+='<div class="error-item"><div class="error-q">'+e.q+'</div><div class="error-correct">✓ '+e.correct+'</div></div>';
    });
    errHtml+='</div>';
  }

  var html='<div class="result-score '+(passed?'passed':'failed')+'">'+pct+'%</div>'
    +'<div class="result-mention" style="color:'+(passed?'#c050d0':'#c07070')+'">'+mention+'</div>'
    +'<div class="result-details">'
    +'<div class="result-detail"><strong>'+score+'/'+total+'</strong>Bonnes réponses</div>'
    +'<div class="result-detail"><strong>'+exam.reqScore+'%</strong>Score requis</div>'
    +'<div class="result-detail"><strong>'+(passed?'✓ Certifié':'✗ Échoué')+'</strong>Statut</div>'
    +'</div>';
  if(passed) html+='<div class="diplome-spe" id="diplome-txt">'+diplome+'</div>'
    +'<button class="btn w-full" style="margin-bottom:.75rem;border-color:#9020c0;color:#c050d0" onclick="copyDiplome()">Copier le certificat RP</button>';
  html+=errHtml;
  html+='<div style="display:flex;gap:.6rem;margin-top:1.25rem;flex-wrap:wrap;justify-content:center">'
    +'<button class="btn" onclick="backToAccueil()">← Retour</button>'
    +'<button class="btn" style="border-color:#9020c0;color:#c050d0" onclick="startExamen(\''+examState.examId+'\')">Repasser l\'examen</button>'
    +'</div>';

  document.getElementById('result-card').innerHTML=html;
  show('view-result'); window.scrollTo(0,0);
}

function copyDiplome(){
  navigator.clipboard.writeText(document.getElementById('diplome-txt').textContent).then(function(){
    alert('Certificat copié — collez-le dans le chat du jeu !');
  });
}

function show(v){ ['view-accueil','view-exam','view-result'].forEach(function(x){ document.getElementById(x).classList.toggle('hidden',x!==v); }); }
function backToAccueil(){ show('view-accueil'); renderAccueil(); window.scrollTo(0,0); }

document.addEventListener('DOMContentLoaded', function(){
  var waitG=setInterval(function(){
    if(window.guardPage){ clearInterval(waitG);
      guardPage({ minGrade:'medecin', onReady:function(p){
        if(p&&p.examens){
          var scores={}; Object.entries(p.examens).forEach(function(kv){ scores[kv[0]]={pct:kv[1].pct,passed:kv[1].passed}; });
          localStorage.setItem('psy_exam_scores',JSON.stringify(scores));
        }
        renderAccueil();
      }});
    }
  }, 80);
});
</script>
