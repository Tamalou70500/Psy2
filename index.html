<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabinet du Dr. Abernathy Lucius</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; }
.bg-grid {
  position:fixed; inset:0; pointer-events:none;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 49px,rgba(184,132,58,0.03) 50px),
    repeating-linear-gradient(90deg,transparent,transparent 49px,rgba(184,132,58,0.03) 50px);
}
.wrap { width:100%; max-width:380px; padding:1rem; position:relative; z-index:1; }

.seal-area { text-align:center; margin-bottom:1.75rem; }
.seal { display:inline-block; animation:sealDrop 0.9s cubic-bezier(.22,.61,.36,1) both; cursor:default; }
@keyframes sealDrop {
  0%  { transform:translateY(-60px) scale(0.5) rotate(-20deg); opacity:0; }
  65% { transform:translateY(5px) scale(1.06) rotate(2deg); opacity:1; }
  100%{ transform:translateY(0) scale(1) rotate(0deg); opacity:1; }
}

.login-card {
  background:var(--ink2);
  border:1px solid var(--border2);
  border-radius:var(--r-lg);
  padding:2rem 1.75rem 1.75rem;
  position:relative;
}
.login-card::before {
  content:'';
  position:absolute;
  inset:4px;
  border:1px solid rgba(184,132,58,0.08);
  border-radius:calc(var(--r-lg) - 2px);
  pointer-events:none;
}

.doc-name {
  font-family:'Playfair Display',serif;
  font-size:1.45rem;
  color:var(--parchment);
  text-align:center;
  letter-spacing:0.04em;
  margin-bottom:0.15rem;
}
.doc-title {
  font-family:'Courier Prime',monospace;
  font-size:0.68rem;
  color:var(--parchment3);
  text-align:center;
  letter-spacing:0.18em;
  text-transform:uppercase;
  margin-bottom:1.5rem;
}

.sep {
  display:flex; align-items:center; gap:0.75rem; margin-bottom:1.5rem;
}
.sep::before,.sep::after { content:''; flex:1; height:1px; background:var(--border); }
.sep span { font-family:'Courier Prime',monospace; font-size:0.62rem; color:var(--parchment4); letter-spacing:0.2em; white-space:nowrap; }

.field-wrap { position:relative; margin-bottom:1rem; }
.field-icon {
  position:absolute; left:0.85rem; top:50%; transform:translateY(-50%);
  color:var(--parchment4); font-size:0.85rem; pointer-events:none;
}
.field-wrap .form-control { padding-left:2.25rem; }

.submit-btn {
  width:100%;
  padding:0.7rem;
  margin-top:0.5rem;
  background:rgba(122,24,24,0.18);
  border:1px solid rgba(122,24,24,0.5);
  border-radius:var(--r);
  color:#c4956a;
  font-family:'Playfair Display',serif;
  font-size:1rem;
  font-style:italic;
  letter-spacing:0.06em;
  cursor:pointer;
  transition:all .25s;
  position:relative;
  overflow:hidden;
}
.submit-btn::after {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(184,132,58,0.06) 50%,transparent 100%);
  transform:translateX(-100%);
  transition:transform .4s ease;
}
.submit-btn:hover { background:rgba(122,24,24,0.32); border-color:rgba(168,32,32,0.8); color:var(--parchment); }
.submit-btn:hover::after { transform:translateX(100%); }

.login-footer { text-align:center; margin-top:1.25rem; font-family:'EB Garamond',serif; font-size:0.82rem; color:var(--parchment4); font-style:italic; }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="wrap fade-up">
  <div class="seal-area">
    <div class="seal">
      <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <circle cx="40" cy="40" r="38" fill="#6B1414"/>
        <circle cx="40" cy="40" r="38" fill="url(#waxSheen)" opacity="0.3"/>
        <circle cx="40" cy="40" r="33" fill="none" stroke="rgba(212,168,90,0.35)" stroke-width="0.75" stroke-dasharray="4 3"/>
        <circle cx="40" cy="40" r="29" fill="none" stroke="rgba(212,168,90,0.15)" stroke-width="0.5"/>
        <text x="40" y="28" text-anchor="middle" font-family="Playfair Display,serif" font-size="9" fill="rgba(212,201,168,0.6)" letter-spacing="3">DR.</text>
        <text x="40" y="46" text-anchor="middle" font-family="Playfair Display,serif" font-size="18" fill="#E8D4A0" font-weight="700" letter-spacing="3">A.L.</text>
        <text x="40" y="60" text-anchor="middle" font-family="Courier Prime,monospace" font-size="6.5" fill="rgba(212,201,168,0.35)" letter-spacing="2.5">MDCCCXCIX</text>
        <path d="M18 40 Q19 37 22 38 Q24 35 26 37" fill="none" stroke="rgba(212,168,90,0.2)" stroke-width="0.5"/>
        <path d="M54 40 Q55 37 58 38 Q60 35 62 37" fill="none" stroke="rgba(212,168,90,0.2)" stroke-width="0.5"/>
        <defs>
          <radialGradient id="waxSheen" cx="35%" cy="30%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#000000"/>
          </radialGradient>
        </defs>
      </svg>
    </div>
  </div>

  <div class="login-card">
    <div class="doc-name">Abernathy Lucius</div>
    <div class="doc-title">Aliéniste · West Elizabeth · 1899</div>

    <div class="sep"><span>Accès cabinet</span></div>

    <div id="err" class="alert alert-error hidden">Identifiants incorrects.</div>

    <div class="form-group">
      <label class="form-label" for="u">Identifiant</label>
      <div class="field-wrap">
        <span class="field-icon">⚕</span>
        <input class="form-control" type="text" id="u" placeholder="Votre identifiant…" autocomplete="username">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="p">Mot de passe</label>
      <div class="field-wrap">
        <span class="field-icon">🔒</span>
        <input class="form-control" type="password" id="p" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>

    <button class="submit-btn" onclick="doLogin()">Entrer dans le cabinet</button>
  </div>

  <p class="login-footer">Dossiers médicaux confidentiels · Usage RP exclusif</p>
</div>

<script src="js/auth.js"></script>
<script>
if(authGetSession()) window.location.href='annuaire.html';
document.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
function doLogin(){
  const u=document.getElementById('u').value.trim();
  const p=document.getElementById('p').value;
  const err=document.getElementById('err');
  if(authLogin(u,p)){ window.location.href='annuaire.html'; }
  else { err.classList.remove('hidden'); document.getElementById('p').value=''; document.getElementById('p').focus(); }
}
</script>
</body>
</html>
