<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Cabinet du Psychiatre · RedM</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .login-wrap {
    width: 100%;
    max-width: 380px;
    padding: 1rem;
  }

  .login-header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .login-icon { font-size: 3.5rem; line-height: 1; margin-bottom: 0.75rem; }
  .login-title { font-size: 1.5rem; color: var(--gold-light); letter-spacing: 0.06em; }
  .login-sub { font-size: 0.8rem; color: var(--text3); font-style: italic; margin-top: 0.3rem; letter-spacing: 0.08em; }

  .login-card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-xl);
    padding: 2rem 1.75rem;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  .login-card h2 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text3);
    margin-bottom: 1.5rem;
    text-align: center;
  }

  .input-icon-wrap { position: relative; }
  .input-icon-wrap .icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1rem;
    opacity: 0.4;
    pointer-events: none;
  }
  .input-icon-wrap .form-control { padding-left: 2.2rem; }

  .login-btn {
    width: 100%;
    padding: 0.7rem;
    margin-top: 1.25rem;
    background: rgba(200,164,90,0.1);
    border: 1px solid var(--gold);
    border-radius: var(--radius);
    color: var(--gold-light);
    font-family: 'Georgia', serif;
    font-size: 0.95rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all .2s;
  }
  .login-btn:hover { background: rgba(200,164,90,0.2); }
  .login-btn:active { transform: scale(0.99); }

  .login-footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: var(--text3);
    font-style: italic;
    letter-spacing: 0.05em;
  }

  /* Fond animé subtil */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c8a45a' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }
  .login-wrap { position: relative; z-index: 1; }
</style>
</head>
<body>

<div class="login-wrap">

  <div class="login-header">
    <div class="login-icon">🎩</div>
    <h1 class="login-title">Cabinet du Psychiatre</h1>
    <p class="login-sub">West Elizabeth · 1899 · RedM RP</p>
  </div>

  <div class="login-card">
    <h2>✦ Accès réservé ✦</h2>

    <div id="login-error" class="alert alert-error hidden">
      Identifiants incorrects. Veuillez réessayer.
    </div>

    <div class="form-group">
      <label class="form-label" for="login-user">Identifiant</label>
      <div class="input-icon-wrap">
        <span class="icon">👤</span>
        <input class="form-control" type="text" id="login-user" placeholder="Votre identifiant" autocomplete="username">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="login-pass">Mot de passe</label>
      <div class="input-icon-wrap">
        <span class="icon">🔒</span>
        <input class="form-control" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>

    <button class="login-btn" onclick="doLogin()">Entrer dans le cabinet</button>
  </div>

  <p class="login-footer">⚕ Dossiers médicaux confidentiels · Usage RP uniquement</p>
</div>

<script src="js/auth.js"></script>
<script>
  // Déjà connecté → rediriger
  if (authGetSession()) window.location.href = "annuaire.html";

  // Connexion via touche Entrée
  document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

  function doLogin() {
    const login = document.getElementById("login-user").value.trim();
    const pass  = document.getElementById("login-pass").value;
    const err   = document.getElementById("login-error");

    if (authLogin(login, pass)) {
      window.location.href = "annuaire.html";
    } else {
      err.classList.remove("hidden");
      document.getElementById("login-pass").value = "";
      document.getElementById("login-pass").focus();
    }
  }
</script>
</body>
</html>
