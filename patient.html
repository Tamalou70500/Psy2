<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dossier patient — Cabinet du Dr. Abernathy Lucius</title>
<link rel="stylesheet" href="css/style.css">
<style>
.patient-band {
  background: var(--ink2); border-bottom: 1px solid var(--bdr);
  padding: 1.75rem 2rem;
  display: flex; align-items: flex-start; gap: 1.75rem; flex-wrap: wrap;
}
.patient-photo {
  width: 100px; height: 100px; object-fit: cover;
  border: 1px solid var(--bdr2); flex-shrink: 0;
  filter: sepia(12%) contrast(1.05) brightness(0.95);
}
.patient-photo-ph {
  width: 100px; height: 100px; flex-shrink: 0;
  background: var(--ink4); border: 1px solid var(--bdr);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif; font-size: 2rem;
  color: var(--parch3); font-style: italic;
}
.patient-info { flex: 1; min-width: 200px; }
.patient-fullname {
  font-family: 'Playfair Display', serif; font-size: 1.6rem;
  color: var(--parch); letter-spacing: 0.01em; margin-bottom: 0.4rem;
}
.meta-row { display: flex; flex-wrap: wrap; gap: 0.4rem 1.5rem; margin-top: 0.5rem; }
.meta-item {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--parch4);
}
.meta-item strong { color: var(--parch3); }
.patient-band-actions { margin-left: auto; display: flex; gap: 0.5rem; flex-shrink: 0; align-self: flex-start; }

/* BODY */
.content { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--bdr); margin: 1px; }
.content-cell { background: var(--ink); padding: 1.5rem 2rem; }
.content-cell.full { grid-column: 1/-1; }

.cell-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--gold-d); display: flex; align-items: center; gap: 0.75rem;
  margin-bottom: 0.75rem;
}
.cell-label::after { content: ''; flex: 1; height: 1px; background: var(--bdr); }
.cell-value {
  font-family: 'EB Garamond', serif;
  font-size: 1rem; color: var(--parch); font-style: italic; line-height: 1.65;
}
.cell-empty { color: var(--parch4); font-style: italic; font-size: 0.9rem; }

/* SEANCES */
.seance-list { display: flex; flex-direction: column; gap: 1px; }
.seance {
  background: var(--ink2); padding: 1rem 1.25rem;
  border-left: 2px solid var(--gold-d); position: relative;
  animation: fadeUp .3s ease both;
}
.seance-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 0.5rem; flex-wrap: wrap; gap: 0.5rem; }
.seance-date { font-family: 'Cormorant Garamond', serif; font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); }
.seance-humeur { font-family: 'EB Garamond', serif; font-size: 0.85rem; color: var(--parch3); font-style: italic; }
.seance-text { font-family: 'EB Garamond', serif; font-size: 0.95rem; color: var(--parch2); line-height: 1.75; white-space: pre-wrap; }
.seance-del { position: absolute; top: 0.6rem; right: 0.6rem; background: transparent; border: none; color: var(--parch4); cursor: pointer; font-size: 0.7rem; padding: 2px 5px; transition: color .15s; font-family: serif; }
.seance-del:hover { color: #b05050; }

/* FORM SEANCE */
.seance-form { background: var(--ink2); border-top: 1px solid var(--bdr); padding: 1.5rem 2rem; }
.seance-form-title { font-family: 'Playfair Display', serif; font-size: 0.9rem; font-style: italic; color: var(--gold); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.75rem; }
.seance-form-title::after { content: ''; flex: 1; height: 1px; background: var(--bdr); }
.seance-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }

/* EDIT PANEL */
.edit-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.88);
  z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1rem;
  backdrop-filter: blur(6px);
}
.edit-panel {
  background: var(--ink2); border: 1px solid var(--bdr2);
  padding: 2rem; width: 100%; max-width: 540px; max-height: 92vh; overflow-y: auto; position: relative;
}
.edit-panel::before { content: ''; position: absolute; inset: 6px; border: 1px solid rgba(192,154,74,0.06); pointer-events: none; }
.edit-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-style: italic; color: var(--gold-l); margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; }

@media(max-width:700px) { .content { grid-template-columns: 1fr; } .seance-form-grid { grid-template-columns: 1fr; } .patient-band { gap: 1rem; } }
</style>

<!-- Sélecteur de thème -->
<script>
(function(){
  var saved = localStorage.getItem('psy_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  
  window.setTheme = function(t){
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('psy_theme', t);
    document.querySelectorAll('.theme-btn').forEach(function(b){
      b.classList.toggle('active', b.dataset.theme === t);
    });
  };
  
  
  });
})();
</script>
</head>
<body>

<nav class="navbar">
  <span class="navbar-brand">Dr. Abernathy Lucius</span>
  <div class="navbar-sep"></div>
  <div class="navbar-links">
    <a href="annuaire.html">Dossiers</a>
    <a href="lexique.html">Lexique</a>
    <a href="visite.html">Visite</a>
    <a href="cours.html">Cours</a>
    <a href="examen.html">Examens</a>
  </div>
  <div class="navbar-right">

    <div class="theme-switcher" title="Changer le thème">
      <button class="theme-btn theme-btn-dark"      data-theme="dark"      onclick="setTheme('dark')"      title="Sombre"></button>
      <button class="theme-btn theme-btn-parchment" data-theme="parchment" onclick="setTheme('parchment')" title="Parchemin"></button>
      <button class="theme-btn theme-btn-day"       data-theme="day"       onclick="setTheme('day')"       title="Jour"></button>
    </div>
    <span class="navbar-user" id="navbar-user"></span>
    <button class="btn btn-sm" id="logout-btn">Quitter</button>
  </div>
</nav>

<div id="main"></div>

<!-- EDIT -->
<div class="edit-overlay hidden" id="edit-overlay">
<div class="edit-panel">
  <div class="edit-title">
    <span>Modifier le dossier</span>
    <button class="btn btn-sm" onclick="closeEdit()">✕</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
    <div class="form-group"><label class="form-label">Nom</label><input class="form-control" id="e-nom"></div>
    <div class="form-group"><label class="form-label">Prénom</label><input class="form-control" id="e-prenom"></div>
    <div class="form-group"><label class="form-label">Âge</label><input class="form-control" type="number" id="e-age"></div>
    <div class="form-group"><label class="form-label">Sexe</label>
      <select class="form-control" id="e-sexe"><option value="">—</option><option value="M">Masculin</option><option value="F">Féminin</option></select>
    </div>
    <div class="form-group"><label class="form-label">Origine</label><input class="form-control" id="e-origine"></div>
    <div class="form-group"><label class="form-label">Profession</label><input class="form-control" id="e-profession"></div>
  </div>
  <div class="form-group"><label class="form-label">Statut clinique</label>
    <select class="form-control" id="e-statut"><option value="suivi">En suivi</option><option value="stable">Stable</option><option value="grave">Grave</option></select>
  </div>
  <div class="form-group"><label class="form-label">Diagnostic</label><input class="form-control" id="e-diagnostic"></div>
  <div class="form-group"><label class="form-label">Traitement prescrit</label><input class="form-control" id="e-traitement"></div>
  <div class="form-group">
    <label class="form-label">Portrait — URL de l'image</label>
    <input class="form-control" id="e-photo" placeholder="https://cdn.discordapp.com/… ou imgur.com/…" oninput="previewEditUrl(this)">
    <div style="display:flex;align-items:center;gap:0.75rem;margin-top:0.6rem">
      <div id="ep-ph" style="width:52px;height:52px;background:var(--ink3);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--parch4);font-style:italic">✦</div>
      <img id="ep-img" style="width:52px;height:52px;object-fit:cover;border:1px solid var(--bdr2);display:none;filter:sepia(10%)" alt="">
      <p style="font-family:'Cormorant Garamond',serif;font-size:0.68rem;color:var(--parch4);font-style:italic">Discord CDN, Imgur ou autre lien direct</p>
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-top:1rem">
    <button class="btn w-full" onclick="closeEdit()">Annuler</button>
    <button class="btn btn-gold w-full" id="save-btn" onclick="saveEdit()">Enregistrer</button>
  </div>
  <hr class="divider mt-3">
  <button class="btn btn-danger w-full mt-1" onclick="deletePatient()">Supprimer définitivement ce dossier</button>
</div>
</div>


<script src="js/voice.js"></script>
<script type="module">
import { patientsGetById, patientsUpdate, patientsDelete, patientsAddSeance, patientsDeleteSeance, formatDate } from './js/patients.js';

const session = authRequire(); authInjectUser();
document.getElementById('logout-btn').onclick = authLogout;

const pid = new URLSearchParams(window.location.search).get('id');
let patient = null;

const SB = { stable:'badge-stable', suivi:'badge-suivi', grave:'badge-grave' };
const SL = { stable:'Stable', suivi:'En suivi', grave:'Grave' };

async function load(){
  patient = await patientsGetById(pid);
  if(!patient){ document.getElementById('main').innerHTML='<div class="container"><div class="alert alert-error mt-3">Dossier introuvable. <a href="annuaire.html">Retour</a></div></div>'; return; }
  render();
}

function render(){
  const p = patient;
  const initials = (p.prenom?.[0]||'')+(p.nom?.[0]||'');
  const photoEl = p.photo
    ? `<img class="patient-photo" src="${p.photo}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="patient-photo-ph" style="display:none">${initials}</div>`
    : `<div class="patient-photo-ph">${initials}</div>`;

  const seancesHtml = (p.seances&&p.seances.length)
    ? p.seances.map(s=>`
      <div class="seance">
        <button class="seance-del" onclick="window.delSeance('${s.id}')">✕</button>
        <div class="seance-top">
          <span class="seance-date">${formatDate(s.date)}</span>
          ${s.humeur?`<span class="seance-humeur">${s.humeur}</span>`:''}
        </div>
        <div class="seance-text">${s.resume||'—'}</div>
      </div>`).join('')
    : `<div style="padding:1.5rem;font-family:'Cormorant Garamond',serif;font-size:0.88rem;color:var(--parch4);font-style:italic;text-align:center">Aucune séance enregistrée pour ce patient.</div>`;

  document.getElementById('main').innerHTML=`
    <div class="patient-band fade-up">
      ${photoEl}
      <div class="patient-info">
        <div class="patient-fullname">${p.prenom} ${p.nom}</div>
        <span class="badge ${SB[p.statut]||'badge-suivi'}" style="margin-top:0.25rem">${SL[p.statut]||p.statut}</span>
        <div class="meta-row mt-1">
          ${p.age?`<span class="meta-item"><strong>Âge :</strong> ${p.age} ans</span>`:''}
          ${p.sexe?`<span class="meta-item"><strong>Sexe :</strong> ${p.sexe==='M'?'Masculin':'Féminin'}</span>`:''}
          ${p.origine?`<span class="meta-item"><strong>Origine :</strong> ${p.origine}</span>`:''}
          ${p.profession?`<span class="meta-item"><strong>Profession :</strong> ${p.profession}</span>`:''}
        </div>
      </div>
      <div class="patient-band-actions">
        <a href="annuaire.html" class="btn btn-sm">← Dossiers</a>
        <button class="btn btn-sm btn-gold" onclick="window.openEdit()">Modifier</button>
      </div>
    </div>

    <div class="content">
      <div class="content-cell">
        <div class="cell-label">Diagnostic</div>
        <div class="cell-value">${p.diagnostic||'<span class="cell-empty">Non renseigné</span>'}</div>
      </div>
      <div class="content-cell">
        <div class="cell-label">Traitement prescrit</div>
        <div class="cell-value">${p.traitement||'<span class="cell-empty">Aucun traitement</span>'}</div>
      </div>
      <div class="content-cell full">
        <div class="cell-label">Historique — ${(p.seances||[]).length} séance${(p.seances||[]).length!==1?'s':''}</div>
        <div class="seance-list">${seancesHtml}</div>
      </div>
    </div>

    <div class="seance-form">
      <div class="seance-form-title">Ajouter une séance</div>
      <div class="seance-form-grid">
        <div class="form-group">
          <label class="form-label">Date</label>
          <input class="form-control" type="date" id="s-date" value="${new Date().toISOString().split('T')[0]}">
        </div>
        <div class="form-group">
          <label class="form-label">État clinique observé</label>
          <select class="form-control" id="s-humeur">
            <option value="">— Observation —</option>
            <option>Mélancolique</option><option>Anxieux</option><option>Agité</option>
            <option>Apathique</option><option>En amélioration</option><option>Stable</option>
            <option>Maniaque</option><option>Confus</option><option>Hostile</option><option>Délirant</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" style="display:flex;align-items:center;justify-content:space-between">
          <span>Notes de séance</span>
          <button class="voice-btn" id="voice-btn">🎙 Dicter</button>
        </label>
        <textarea class="form-control" id="s-resume" placeholder="Observations cliniques, propos du patient, décisions thérapeutiques…" style="min-height:120px"></textarea>
      </div>
      <button class="btn btn-gold" id="add-btn" onclick="window.addSeance()">Enregistrer la séance</button>
    </div>
  `;
  voiceInit('s-resume','voice-btn');
}

window.addSeance = async function(){
  const resume = document.getElementById('s-resume').value.trim(); if(!resume)return;
  const btn=document.getElementById('add-btn'); btn.textContent='Enregistrement…'; btn.disabled=true;
  await patientsAddSeance(pid,{ resume, date:document.getElementById('s-date').value, humeur:document.getElementById('s-humeur').value });
  patient = await patientsGetById(pid); render();
};
window.delSeance = async function(sid){
  if(!confirm('Supprimer cette séance ?'))return;
  await patientsDeleteSeance(pid,sid); patient=await patientsGetById(pid); render();
};
window.openEdit = function(){
  const p=patient;
  ['nom','prenom','age','origine','profession','diagnostic','traitement','photo'].forEach(k=>{
    const el=document.getElementById('e-'+k); if(el) el.value=p[k]||'';
  });
  document.getElementById('e-sexe').value=p.sexe||'';
  document.getElementById('e-statut').value=p.statut||'suivi';
  if(p.photo){
    document.getElementById('ep-img').src=p.photo;
    document.getElementById('ep-img').style.display='block';
    document.getElementById('ep-ph').style.display='none';
  } else {
    document.getElementById('ep-img').style.display='none';
    document.getElementById('ep-ph').style.display='flex';
  }
  document.getElementById('edit-overlay').classList.remove('hidden');
};
window.closeEdit  = ()=>document.getElementById('edit-overlay').classList.add('hidden');
window.previewEditUrl = function(input){
  const url=input.value.trim();
  const img=document.getElementById('ep-img'); const ph=document.getElementById('ep-ph');
  if(url){img.src=url;img.style.display='block';ph.style.display='none';}
  else{img.style.display='none';ph.style.display='flex';}
};
window.saveEdit = async function(){
  const btn=document.getElementById('save-btn'); btn.textContent='Enregistrement…'; btn.disabled=true;
  const data={};
  ['nom','prenom','age','origine','profession','diagnostic','traitement','photo'].forEach(k=>{
    const el=document.getElementById('e-'+k); if(el) data[k]=el.value.trim();
  });
  data.sexe=document.getElementById('e-sexe').value;
  data.statut=document.getElementById('e-statut').value;
  await patientsUpdate(pid,data); patient=await patientsGetById(pid); closeEdit(); render();
};
window.deletePatient = async function(){
  if(!confirm(`Supprimer définitivement le dossier de ${patient.prenom} ${patient.nom} ?`))return;
  await patientsDelete(pid); window.location.href='annuaire.html';
};
load();
</script>

<script type="module" src="js/auth-firebase.js"></script>
<script src="js/guard.js" defer></script>
<script>
document.addEventListener('DOMContentLoaded', function(){
  var t = localStorage.getItem('psy_theme') || 'dark';
  var f = localStorage.getItem('psy_font')  || 'victorien';
  document.documentElement.setAttribute('data-theme', t);
  document.documentElement.setAttribute('data-font', f);
  document.querySelectorAll('.theme-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.theme === t);
  });
  guardPage({ minGrade: 'apprenti' });
});
</script>
</body>
</html>
