<style>
.frise-page { min-height: calc(100vh - 54px); }

/* CONTROLS */
.frise-controls {
  background: var(--ink2); border-bottom: 1px solid var(--bdr);
  padding: .65rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
  position: sticky; top: 54px; z-index: 20;
}
.frise-controls-title {
  font-family: 'Playfair Display', serif; font-size: .95rem;
  color: var(--parch); font-style: italic; margin-right: .5rem;
}
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
.fbtn {
  font-family: 'Cormorant Garamond', serif; font-size: .65rem;
  letter-spacing: .1em; text-transform: uppercase; padding: .28rem .75rem;
  border: 1px solid var(--bdr); background: transparent;
  color: var(--parch3); cursor: pointer; transition: all .15s;
}
.fbtn:hover { border-color: var(--bdr2); color: var(--parch2); }
.fbtn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
.legend { display: flex; gap: 1.25rem; align-items: center; margin-left: auto; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: .35rem; font-family: 'Cormorant Garamond', serif; font-size: .62rem; letter-spacing: .08em; text-transform: uppercase; color: var(--parch4); }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* FRISE CONTAINER */
.frise-container { overflow-x: auto; padding: 2rem 0 3rem; }
.frise-inner { display: inline-flex; flex-direction: column; min-width: 100%; padding: 0 2rem; }

/* AXEL HORIZONTAL */
.frise-axis-row { display: flex; align-items: center; gap: 0; position: relative; margin: 2.5rem 0; }
.axis-line { flex: 1; height: 2px; background: linear-gradient(90deg, transparent, var(--bdr2) 5%, var(--bdr2) 95%, transparent); }

/* ÉVÉNEMENTS par groupe de décennie */
.decade-group { display: flex; flex-direction: column; min-width: 140px; flex-shrink: 0; }
.decade-header {
  text-align: center; padding: .25rem .5rem;
  font-family: 'Cormorant Garamond', serif; font-size: .7rem;
  letter-spacing: .14em; text-transform: uppercase; color: var(--parch4);
  border-bottom: 1px solid var(--bdr); margin-bottom: .5rem;
}
.decade-tick {
  width: 1px; height: 12px; background: var(--bdr2);
  margin: 0 auto .5rem;
}

/* LISTE ÉVÉNEMENTS */
.frise-list { max-width: 860px; margin: 0 auto; padding: 1rem 2rem 3rem; }
.frise-year-group { margin-bottom: 0; }
.frise-year-label {
  font-family: 'Playfair Display', serif; font-size: 1.4rem;
  color: var(--parch); font-weight: 400; font-style: italic;
  padding: 1.25rem 0 .5rem;
  display: flex; align-items: center; gap: 1rem;
}
.frise-year-label::after { content: ''; flex: 1; height: 1px; background: var(--bdr); }
.evt-row {
  display: flex; gap: 1rem; padding: .65rem 0;
  border-bottom: 1px solid var(--bdr);
  cursor: pointer; transition: background .15s;
}
.evt-row:hover { background: var(--ink2); margin: 0 -1rem; padding: .65rem 1rem; }
.evt-row.hidden { display: none; }
.evt-dot-wrap { padding-top: .2rem; flex-shrink: 0; }
.evt-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.evt-content { flex: 1; }
.evt-title {
  font-family: 'EB Garamond', serif; font-size: .95rem;
  color: var(--parch); margin-bottom: .15rem; line-height: 1.4;
}
.evt-short {
  font-family: 'EB Garamond', serif; font-size: .85rem;
  color: var(--parch3); font-style: italic; line-height: 1.5;
}
.evt-type-tag {
  font-family: 'Cormorant Garamond', serif; font-size: .58rem;
  letter-spacing: .12em; text-transform: uppercase;
  padding: 1px 6px; border: 1px solid; flex-shrink: 0;
  margin-top: .2rem; height: fit-content;
}

/* PANEL DETAIL */
.detail-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200;
  display: none; align-items: center; justify-content: center; padding: 1rem;
}
.detail-overlay.open { display: flex; }
.detail-card {
  background: var(--ink2); border: 1px solid var(--bdr2);
  max-width: 560px; width: 100%; max-height: 80vh;
  overflow-y: auto; padding: 2rem; position: relative;
}
.detail-card::before { content: ''; position: absolute; inset: 5px; border: 1px solid rgba(192,154,74,.06); pointer-events: none; }
.detail-close {
  position: absolute; top: 1rem; right: 1rem;
  background: transparent; border: 1px solid var(--bdr); color: var(--parch3);
  width: 28px; height: 28px; cursor: pointer; font-size: .8rem; z-index: 1;
}
.detail-close:hover { border-color: var(--gold); color: var(--gold); }
.detail-year { font-family: 'Playfair Display', serif; font-size: 2.5rem; line-height: 1; margin-bottom: .25rem; }
.detail-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--parch); font-style: italic; margin-bottom: 1rem; padding-bottom: .75rem; border-bottom: 1px solid var(--bdr); }
.detail-body { font-family: 'EB Garamond', serif; font-size: .97rem; color: var(--parch2); line-height: 1.8; }
.detail-body strong { color: var(--parch); }
</style>

<script>
var EVENTS = [
  {y:1796,type:'decouverte',title:'Vaccin antivariolique',
   short:'Jenner — 1er vaccin de l\'histoire',
   detail:'<strong>Edward Jenner</strong> observe que les trayeuses ayant eu la vaccine (maladie des vaches) ne contractent pas la variole. Il vaccine le jeune James Phipps avec du pus de vaccine, puis l\'expose à la variole — l\'enfant est protégé. Début de la vaccinologie. La vaccination antivariolique sera rendue obligatoire dans de nombreux pays au cours du XIXe siècle.'},

  {y:1805,type:'decouverte',title:'Isolation de la morphine',
   short:'Sertürner — 10× plus puissant que le laudanum',
   detail:'<strong>Friedrich Sertürner</strong> isole la morphine en 1805, la nommant d\'après Morphée, dieu grec des rêves. C\'est le premier alcaloïde pur extrait d\'une plante — 10 fois plus puissant que le laudanum brut. Révolution de la gestion de la douleur chirurgicale et palliative.'},

  {y:1816,type:'decouverte',title:'Invention du stéthoscope',
   short:'Laennec — écouter le cœur à distance',
   detail:'<strong>René Laennec</strong> invente le stéthoscope en 1816, initialement un simple tube de papier enroulé. Il observe qu\'il peut entendre les battements du cœur bien mieux qu\'en posant l\'oreille directement. Révolution de l\'auscultation médicale — le médecin peut désormais entendre la respiration et le rythme cardiaque avec précision.'},

  {y:1820,type:'decouverte',title:'Isolation de la quinine',
   short:'Pelletier & Caventou — seul traitement du paludisme',
   detail:'<strong>Pierre Joseph Pelletier</strong> et <strong>Joseph Bienaimé Caventou</strong> isolent la quinine de l\'écorce de quinquina. Premier traitement efficace contre le paludisme, maladie qui décimait les armées et les colons dans les régions tropicales. En 1904, la quinine reste le seul traitement antimalarique disponible.'},

  {y:1840,type:'specialite',title:'Dentisterie — première école au monde',
   short:'Baltimore — profession distincte de la médecine',
   detail:'Le <strong>Baltimore College of Dental Surgery</strong>, fondé en 1840, est la première école dentaire au monde. La dentisterie devient une profession distincte de la médecine générale aux États-Unis. En 1904 au Texas, les chirurgiens-dentistes sont des praticiens courants dans les villes.'},

  {y:1842,type:'decouverte',title:'Première anesthésie à l\'éther',
   short:'Crawford Long — Georgia, USA',
   detail:'<strong>Crawford Long</strong> pratique la première anesthésie à l\'éther diéthylique en mars 1842 à Jefferson, Georgia. Il ne publie pas ses résultats pendant des années. C\'est Morton qui aura la reconnaissance historique pour sa démonstration publique de 1846, mais Long est bien le véritable pionnier.'},

  {y:1846,type:'decouverte',title:'Démonstration publique de l\'anesthésie',
   short:'Morton à Boston — "Ce n\'est pas un mensonge"',
   detail:'Le 16 octobre 1846 au <strong>Massachusetts General Hospital</strong>, William Morton endort un patient à l\'éther. Le chirurgien Warren retire une tumeur sans que le patient ne souffre. Il déclare : <em>"Gentlemen, this is no humbug."</em> (Ce n\'est pas une supercherie). La chirurgie change à jamais — la douleur n\'est plus une fatalité.'},

  {y:1847,type:'personnage',title:'Semmelweis — le lavage des mains',
   short:'Vienne — mortalité de 18% à 1,5% avec l\'eau de Javel',
   detail:'<strong>Ignace Semmelweis</strong> impose le lavage des mains à l\'eau de Javel dans sa maternité de Vienne. La mortalité maternelle s\'effondre de 18% à 1,5%. Ses collègues refusent de le croire. Il mourra fou dans un asile en 1865, sans avoir vu sa découverte reconnue. Pasteur et Lister lui rendront justice post-mortem.'},

  {y:1851,type:'decouverte',title:'Ophtalmoscope de Helmholtz',
   short:'Voir le fond de l\'œil pour la première fois',
   detail:'<strong>Hermann von Helmholtz</strong> invente l\'ophtalmoscope en 1851, permettant d\'examiner directement la rétine, les vaisseaux et le nerf optique. Naissance de l\'ophtalmologie clinique moderne. Permet de détecter glaucome, rétinite, et signes de maladies systémiques (diabète, hypertension).'},

  {y:1851,type:'specialite',title:'Ophtalmologie — naissance de la spécialité',
   short:'Premières chaires universitaires en Europe vers 1866',
   detail:'L\'invention de l\'ophtalmoscope rend possible l\'examen du fond de l\'œil. En quelques années, l\'ophtalmologie s\'établit comme spécialité universitaire. En 1884, la cocaïne de Koller révolutionne la chirurgie oculaire — on peut désormais opérer sans douleur. En 1904, c\'est une spécialité bien établie dans les grandes villes.'},

  {y:1852,type:'decouverte',title:'Plâtre de Paris en chirurgie',
   short:'Mathijsen — immobilisation des fractures révolutionnée',
   detail:'<strong>Antonius Mathijsen</strong>, chirurgien militaire néerlandais, développe la technique du plâtre de Paris pour immobiliser les fractures. Révolution dans le traitement des fractures — avant, on utilisait des éclisses de bois ou d\'autres matériaux beaucoup moins efficaces et moins confortables.'},

  {y:1858,type:'decouverte',title:'Gray\'s Anatomy',
   short:'La référence anatomique mondiale depuis 1858',
   detail:'<strong>Henry Gray</strong> publie Anatomy of the Human Body en 1858, illustré par Henry Vandyke Carter. L\'ouvrage restera la référence anatomique mondiale pendant plus d\'un siècle. Chaque médecin diplômé depuis 1858 a étudié sur ce livre. En 1904, c\'est la bible de tout étudiant en médecine.'},

  {y:1861,type:'personnage',title:'Broca localise l\'aire du langage',
   short:'Lobe frontal gauche — le cerveau a des zones spécialisées',
   detail:'<strong>Paul Broca</strong> examine post-mortem le cerveau du patient "Tan" (qui ne pouvait dire que ce mot) et trouve une lésion dans le lobe frontal gauche. Première preuve que le cerveau a des zones fonctionnellement spécialisées. Naissance de la neurologie localisatrice. L\'aire de Broca porte son nom.'},

  {y:1861,type:'decouverte',title:'Théorie des germes — Pasteur',
   short:'Les maladies ont des causes vivantes — micro-organismes',
   detail:'<strong>Louis Pasteur</strong> démontre que la fermentation et la putréfaction sont causées par des micro-organismes vivants. Il réfute définitivement la génération spontanée. Cette découverte révolutionne la compréhension des maladies infectieuses et ouvre la voie à la bactériologie et aux vaccins.'},

  {y:1865,type:'personnage',title:'Mort de Semmelweis — martyr de la médecine',
   short:'Meurt à 47 ans dans un asile — probablement d\'une septicémie',
   detail:'<strong>Ignace Semmelweis</strong> meurt à 47 ans dans un asile psychiatrique à Vienne, probablement d\'une septicémie contractée lors d\'une autopsie — ironie tragique de l\'histoire. Il n\'a jamais vu ses idées reconnues. Aujourd\'hui considéré comme un précurseur de l\'hygiène hospitalière et de la médecine des preuves.'},

  {y:1867,type:'decouverte',title:'Antisepsie chirurgicale — Joseph Lister',
   short:'Acide phénique — mortalité de 46% à 15%',
   detail:'<strong>Joseph Lister</strong> publie six articles dans The Lancet décrivant ses résultats avec l\'acide phénique. La mortalité post-amputation dans son service passe de 46% à 15%. Il a compris que les infections ne viennent pas de l\'air mais de particules vivantes — les germes de Pasteur. Révolution chirurgicale absolue.'},

  {y:1876,type:'decouverte',title:'Marteau à réflexes — Erb & Westphal',
   short:'Standardisation de l\'examen neurologique',
   detail:'<strong>Wilhelm Erb</strong> et <strong>Carl Westphal</strong> décrivent les réflexes ostéo-tendineux et introduisent le marteau à réflexes. Le réflexe rotulien absent (signe d\'Erb) et le signe de Westphal (rotulien aboli dans le tabès) portent leurs noms. Naissance de l\'examen neurologique objectif et reproductible.'},

  {y:1876,type:'personnage',title:'Koch — bacille du charbon',
   short:'1ère preuve qu\'une maladie = un micro-organisme précis',
   detail:'<strong>Robert Koch</strong> démontre en 1876 que la maladie du charbon (anthrax) est causée par une bactérie spécifique — Bacillus anthracis. C\'est la première preuve expérimentale qu\'une maladie précise est causée par un micro-organisme précis. Naissance de la microbiologie médicale.'},

  {y:1880,type:'specialite',title:'ORL — spécialité distincte',
   short:'Laryngoscope + otoscopes → examen précis ORL',
   detail:'Entre 1870 et 1890, l\'<strong>oto-rhino-laryngologie</strong> s\'établit comme spécialité distincte, séparée de la chirurgie générale. Le laryngoscope (1854) et les otoscopes permettent des examens précis. En 1904, Chevalier Jackson améliore le bronchoscope — naissance de la bronchoscopie.'},

  {y:1882,type:'personnage',title:'Koch — bacille de la tuberculose',
   short:'24 mars 1882 — 1 Européen sur 7 mourait de la TB',
   detail:'<strong>Robert Koch</strong> annonce le 24 mars 1882 qu\'il a isolé Mycobacterium tuberculosis. La tuberculose, qui tue alors 1 Européen sur 7, a enfin un agent causal identifié. Koch recevra le Prix Nobel de médecine en 1905. En 1904, aucun traitement curatif n\'existe encore — la streptomycine ne viendra qu\'en 1943.'},

  {y:1882,type:'personnage',title:'Charcot à l\'apogée — la Salpêtrière',
   short:'Paris — leçons du mardi, 400 spectateurs, Freud y assiste',
   detail:'<strong>Jean-Martin Charcot</strong> est à l\'apogée de sa gloire à la Salpêtrière. Ses leçons du mardi attirent médecins, artistes et aristocrates. Ses élèves : Sigmund Freud (1885-86), Pierre Janet, Joseph Babinski, Gilles de la Tourette, Alfred Binet. Il forme une génération entière de neurologues et psychiatres.'},

  {y:1883,type:'personnage',title:'Koch — vibrion du choléra',
   short:'Mission en Égypte — la transmission hydrique confirmée',
   detail:'<strong>Robert Koch</strong> isole Vibrio cholerae lors d\'une mission en Égypte et en Inde. Il confirme ce que John Snow avait démontré épidémiologiquement en 1854 : le choléra se transmet par l\'eau contaminée. Désormais, on sait quoi chercher et comment l\'éliminer — fermer le puits suffit.'},

  {y:1884,type:'decouverte',title:'Cocaïne — anesthésique local',
   short:'Koller — révolutionne la chirurgie oculaire',
   detail:'<strong>Carl Koller</strong>, ophtalmologue autrichien, découvre en 1884 que la cocaïne anesthésie parfaitement les yeux. Cette découverte révolutionne la chirurgie oculaire — pour la première fois, on peut opérer l\'œil sans douleur. La cocaïne sera ensuite utilisée en dentisterie et en ORL. La Stovaïne (1904) la remplacera progressivement.'},

  {y:1885,type:'decouverte',title:'Vaccin contre la rage — Pasteur',
   short:'Joseph Meister — 1er vaccin développé en laboratoire',
   detail:'<strong>Louis Pasteur</strong> vaccine avec succès le jeune Joseph Meister, mordu par un chien enragé. C\'est la première fois qu\'un vaccin est développé en laboratoire (et non découvert empiriquement). Pasteur est désormais une légende vivante de son vivant. La rage était auparavant toujours fatale.'},

  {y:1885,type:'decouverte',title:'Première appendicectomie réussie',
   short:'Iowa, USA — l\'urgence abdominale maîtrisée',
   detail:'La première appendicectomie réussie est réalisée en 1885 dans l\'Iowa. L\'opération sera standardisée par <strong>Charles McBurney</strong> (point de McBurney) et von Volkmann. En 1904, l\'appendicectomie est une procédure établie dans les hôpitaux équipés — encore rare en zone rurale au Texas.'},

  {y:1886,type:'decouverte',title:'Autoclave en chirurgie — Von Bergmann',
   short:'De l\'antisepsie à l\'asepsie — empêcher les germes d\'entrer',
   detail:'<strong>Ernst von Bergmann</strong> introduit l\'autoclave en 1886, passant de l\'antisepsie (tuer les germes présents) à l\'asepsie (empêcher les germes d\'entrer). Les instruments sont stérilisés à la vapeur avant l\'opération. Complémentaire de l\'antisepsie de Lister — la chirurgie moderne est née.'},

  {y:1889,type:'personnage',title:'Pierre Janet — L\'automatisme psychologique',
   short:'Précurseur de la psychologie moderne — subconscient',
   detail:'<strong>Pierre Janet</strong> publie en 1889 L\'Automatisme psychologique, décrivant le subconscient et les idées fixes comme causes de l\'hystérie. Il développe la théorie de la dissociation psychologique. Freud lira Janet attentivement — et ne lui en donnera pas toujours le crédit mérité.'},

  {y:1890,type:'decouverte',title:'Gants chirurgicaux en caoutchouc',
   short:'Halsted — protéger le patient ET le chirurgien',
   detail:'<strong>William Halsted</strong> introduit les gants chirurgicaux en caoutchouc, initialement pour protéger les mains de son infirmière (future femme) des effets corrosifs de l\'acide phénique. La révolution hygiénique est complète : lavage des mains, désinfection des instruments, gants stériles.'},

  {y:1893,type:'personnage',title:'1ère chirurgie cardiaque — Daniel Hale Williams',
   short:'Chicago — suture du péricarde, patient survit 20 ans',
   detail:'Le 10 juillet 1893, <strong>Daniel Hale Williams</strong> opère James Cornish, poignardé près du cœur. Il suture le péricarde — le patient survit 20 ans. Williams est afro-américain dans une Amérique ségrégationniste. Il fondera le premier hôpital non-ségrégué des USA. En 1896, Rehn suturera directement le ventricule.'},

  {y:1893,type:'specialite',title:'Psychiatrie institutionnelle reconnue',
   short:'L\'aliénisme de Pinel structuré en spécialité médicale',
   detail:'L\'aliénisme, né avec <strong>Pinel</strong> en 1793, s\'est progressivement structuré en psychiatrie institutionnelle. En 1904, c\'est une spécialité reconnue dans les grandes villes. Charcot, Freud, Kraepelin, Janet ont établi ses bases scientifiques au cours des deux décennies précédentes.'},

  {y:1895,type:'decouverte',title:'Rayons X — Wilhelm Röntgen',
   short:'8 novembre 1895 — voir à travers la chair humaine',
   detail:'<strong>Wilhelm Röntgen</strong> découvre les rayons X le 8 novembre 1895 à Würzburg. Sa première radiographie montre la main de sa femme avec son alliance. En quelques mois, des appareils à rayons X apparaissent dans les hôpitaux. Prix Nobel de physique en 1901 — le premier décerné en physique.'},

  {y:1895,type:'personnage',title:'Freud & Breuer — Études sur l\'hystérie',
   short:'Naissance de la psychanalyse — "talking cure"',
   detail:'<strong>Sigmund Freud</strong> et Josef Breuer publient les Études sur l\'hystérie (1895), contenant cinq cas cliniques dont Anna O. (traitée par Breuer) et Elisabeth von R. (première patiente traitée par Freud seul par association libre). Anna O. baptise elle-même la méthode <em>"talking cure"</em>. Acte fondateur de la psychanalyse.'},

  {y:1896,type:'decouverte',title:'Rehn suture le cœur — ventricule droit',
   short:'Francfort — 40% de survie, la frontière absolue en 1904',
   detail:'Le 9 septembre 1896, <strong>Ludwig Rehn</strong> suture une plaie du ventricule droit d\'un jeune homme poignardé. C\'est la première suture directe du muscle cardiaque. Rehn pratiquera 124 fois cette intervention avec un taux de survie de 40%. Billroth avait écrit en 1883 qu\'un tel chirurgien "perdrait le respect de ses pairs".'},

  {y:1896,type:'personnage',title:'Kraepelin — Classification des maladies mentales',
   short:'Démence précoce vs Psychose maniaco-dépressive',
   detail:'<strong>Emil Kraepelin</strong> publie la 5e édition de son Traité de psychiatrie (1896), distinguant la démence précoce (future schizophrénie) de la psychose maniaco-dépressive. Cette distinction fondamentale structure encore la psychiatrie moderne (DSM). Kraepelin est à la psychiatrie ce que Linné est à la botanique.'},

  {y:1896,type:'specialite',title:'Radiologie — naissance immédiate',
   short:'1895 : rayons X → 1896 : premiers services de radiologie',
   detail:'L\'engouement pour les rayons X est tel qu\'en 1896, des services de radiologie apparaissent dans les hôpitaux des grandes villes. En 1904 à <strong>Saint-Denis</strong>, un appareil à rayons X représente le nec plus ultra de la médecine — ultra-rare et futuriste pour le Texas rural.'},

  {y:1897,type:'decouverte',title:'Aspirine synthétisée — Bayer',
   short:'Felix Hoffmann — 1er médicament de masse',
   detail:'<strong>Felix Hoffmann</strong> synthétise l\'acide acétylsalicylique pour Bayer en 1897. Commercialisée en 1899 sous le nom d\'<strong>Aspirine</strong>, c\'est le premier médicament de masse. Antidouleur, antipyrétique et anti-inflammatoire sans les risques des opiacés. En 1904, l\'aspirine est déjà une révolution bien connue.'},

  {y:1898,type:'decouverte',title:'Bayer commercialise l\'héroïne',
   short:'Traitement "non addictif" de la morphinomanie — erreur tragique',
   detail:'<strong>Bayer</strong> commercialise la diacétylmorphine (héroïne) en 1898 comme traitement de la toux et de la dépendance à la morphine. L\'ironie est cruelle : l\'héroïne est encore plus addictive que la morphine. Son potentiel addictif ne sera reconnu qu\'après des milliers de cas. Erreur pharmacologique majeure de l\'histoire.'},

  {y:1900,type:'personnage',title:'Freud — L\'Interprétation des rêves',
   short:'Die Traumdeutung — 351 exemplaires en 6 ans',
   detail:'<strong>Die Traumdeutung</strong> est publiée en novembre 1900. Elle vend 351 exemplaires en 6 ans — succès d\'estime confidentiel. Les rêves, dit Freud, sont la "voie royale vers l\'inconscient" — représentation déguisée de désirs refoulés. Aujourd\'hui considérée comme l\'œuvre fondatrice de la psychanalyse.'},

  {y:1901,type:'decouverte',title:'Groupes sanguins A, B, O — Landsteiner',
   short:'Les transfusions peuvent enfin réussir',
   detail:'<strong>Karl Landsteiner</strong> découvre les groupes sanguins A, B, O en 1901 (le groupe AB sera identifié en 1902). Les transfusions sanguines échouaient souvent avant — à cause d\'incompatibilités inconnues. Landsteiner recevra le Prix Nobel en 1930. En 1904, les transfusions restent expérimentales mais prometteuses.'},

  {y:1903,type:'decouverte',title:'Électrocardiogramme — Einthoven',
   short:'270 kg, 5 personnes — mais l\'activité cardiaque sur papier',
   detail:'<strong>Willem Einthoven</strong> invente l\'électrocardiogramme (ECG) en 1903. Il peut enregistrer l\'activité électrique du cœur sur papier. En 1904, l\'appareil pèse 270 kg et nécessite 5 personnes pour l\'opérer — c\'est une merveille scientifique, pas encore un outil clinique pratique. Prix Nobel en 1924.'},

  {y:1904,type:'decouverte',title:'Stovaïne — 1er anesthésique local de synthèse',
   short:'Ernest Fourneau — la cocaïne remplacée, moins toxique',
   detail:'<strong>Ernest Fourneau</strong> développe la Stovaïne en 1904 — premier anesthésique local de synthèse, dérivé synthétique de la cocaïne, moins toxique. La novocaïne suivra en 1906. En 1904, c\'est une découverte toute fraîche disponible dans les hôpitaux d\'avant-garde comme <strong>Saint-Denis</strong>.'},

  {y:1904,type:'specialite',title:'Neurologie — spécialité à Montréal',
   short:'Expansion des spécialités médicales en Amérique du Nord',
   detail:'En 1904, la neurologie apparaît comme spécialité à l\'Hôpital général de Montréal. La dermatologie obtient sa première chaire en Prusse cette même année. Les spécialités médicales s\'établissent progressivement en Amérique du Nord, suivant le modèle des grandes universités européennes.'},

  {y:1904,type:'ecole',title:'Protocole Lucius — anamnèse psychiatrique',
   short:'Premier formulaire structuré pour les névroses traumatiques',
   detail:'Le <strong>Dr Abernathy Lucius</strong>, aliéniste au Cabinet de Sunset et Professeur associé à l\'École de Saint-Denis, publie le "Protocole Lucius" — premier formulaire standardisé d\'anamnèse psychiatrique adapté aux névroses traumatiques. Adopté par l\'hôpital de Saint-Denis et plusieurs cabinets du Texas et de Louisiane.'},

  {y:1904,type:'ecole',title:'Méthode Saint-Denis — −60% mortalité chirurgicale',
   short:'Antisepsie + morphine dosée + suivi 10 jours',
   detail:'L\'École de Saint-Denis standardise en 1904 un protocole opératoire complet : antisepsie rigoureuse (méthode Lister), morphine dosée selon le poids du patient (innovation), suivi post-opératoire systématique sur 10 jours. Résultat mesuré : mortalité post-chirurgicale réduite de 60% à l\'hôpital général de Saint-Denis.'},

  {y:1904,type:'ecole',title:'Carte épidémiologique du Texas',
   short:'Méthode Snow adaptée — cartographier typhöide et choléra',
   detail:'Inspirée des travaux de <strong>John Snow</strong> sur le choléra à Londres (1854), l\'École de Saint-Denis produit la première carte épidémiologique systématique du Texas et de la Louisiane. Localisation des puits contaminés, des foyers de typhoïde, des zones à risque. Outil révolutionnaire pour la santé publique régionale.'},

  {y:1904,type:'ecole',title:'Formulaire légiste standardisé',
   short:'Rapports médico-légaux reconnus par les tribunaux du Texas',
   detail:'Le formulaire standardisé de rapport médico-légal développé à Saint-Denis est reconnu par les tribunaux du Texas et de Louisiane. Cause de la mort, estimation de l\'heure, description des blessures, nature des coups — tout est codifié pour être utilisable devant un juge. Révolution pour la médecine légale dans l\'Ouest.'},

  {y:1904,type:'ecole',title:'Classification des aliénés créoles',
   short:'Kraepelin adapté au contexte louisianais — 3 nouvelles catégories',
   detail:'L\'École de Saint-Denis adapte la classification de <strong>Kraepelin</strong> (1896) au contexte créole de Louisiane. Trois nouvelles catégories cliniques sont identifiées, tenant compte des traumatismes spécifiques à la région. Publication dans le Journal de Médecine de la Nouvelle-Orléans — reconnaissance académique officielle.'},
];

var COLORS = {
  decouverte: {dot:'#c89820', tag:'rgba(200,152,32,0.2)', text:'#c89820'},
  personnage:  {dot:'#4a80b8', tag:'rgba(74,128,184,0.2)', text:'#4a80b8'},
  specialite:  {dot:'#4a9a4a', tag:'rgba(74,154,74,0.2)',  text:'#4a9a4a'},
  ecole:       {dot:'#c83030', tag:'rgba(200,48,48,0.2)',   text:'#c83030'},
};
var TYPE_LABELS = {
  decouverte:'Découverte', personnage:'Personnage', specialite:'Spécialité', ecole:'École St-Denis'
};

var currentFilter = 'all';

function render(){
  var list = document.getElementById('frise-list');
  var byYear = {};
  EVENTS.forEach(function(e){
    if(!byYear[e.y]) byYear[e.y] = [];
    byYear[e.y].push(e);
  });
  var years = Object.keys(byYear).map(Number).sort(function(a,b){return a-b;});
  var html = '';
  years.forEach(function(y){
    var evts = byYear[y];
    var hasVisible = evts.some(function(e){ return currentFilter === 'all' || e.type === currentFilter; });
    html += '<div class="frise-year-group" data-year="'+y+'" '+(hasVisible?'':'style="display:none"')+'>';
    html += '<div class="frise-year-label">'+y+'</div>';
    evts.forEach(function(e, i){
      var col = COLORS[e.type] || COLORS.decouverte;
      var visible = currentFilter === 'all' || e.type === currentFilter;
      var idx = EVENTS.indexOf(e);
      html += '<div class="evt-row'+(visible?'':' hidden')+'" onclick="openDetail('+idx+')">'
        + '<div class="evt-dot-wrap"><div class="evt-dot" style="background:'+col.dot+'"></div></div>'
        + '<div class="evt-content">'
        + '<div class="evt-title">'+e.title+'</div>'
        + '<div class="evt-short">'+e.short+'</div>'
        + '</div>'
        + '<div class="evt-type-tag" style="color:'+col.text+';border-color:'+col.dot+';background:'+col.tag+'">'+TYPE_LABELS[e.type]+'</div>'
        + '</div>';
    });
    html += '</div>';
  });
  list.innerHTML = html;
}

function openDetail(idx){
  var e = EVENTS[idx];
  var col = COLORS[e.type] || COLORS.decouverte;
  document.getElementById('detail-inner').innerHTML =
    '<div class="detail-year" style="color:'+col.dot+'">'+e.y+'</div>'
    + '<div class="detail-title">'+e.title+'</div>'
    + '<div class="detail-body">'+e.detail+'</div>';
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail(event){
  if(!event || event.target === document.getElementById('detail-overlay')){
    document.getElementById('detail-overlay').classList.remove('open');
  }
}

function setFilter(btn, filter){
  currentFilter = filter;
  document.querySelectorAll('.fbtn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  render();
}

document.addEventListener('DOMContentLoaded', function(){
  render();
  var waitG = setInterval(function(){
    if(window.guardPage){ clearInterval(waitG); guardPage({ minGrade:'stagiaire' }); }
  }, 80);
});
</script>
</body>
</html>
