<style>
/* ═══ FOND IMMERSIF — FRISE ════════════════════════════════ */
.frise-scene {
  position: fixed; inset: 0; z-index: 0;
  background: url('images/dico/dico.png') center center / cover no-repeat;
}
.frise-scene::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(10,6,2,0.38);
}

/* ═══ PANNEAU GLASSMORPHISM ════════════════════════════════ */
.frise-panel {
  position: fixed; inset: 0; z-index: 3;
  display: flex; flex-direction: column;
  padding-top: 54px;
}
.frise-inner {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  width: min(1200px, 97vw);
  margin: 0.75rem auto;
  background: color-mix(in srgb, var(--ink) 80%, transparent);
  backdrop-filter: blur(12px);
  border: 1px solid var(--bdr2);
  animation: friseOpen 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes friseOpen {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Éléments intérieurs transparents */
.frise-panel .frise-page { background: transparent !important; flex:1; display:flex; flex-direction:column; overflow:hidden; }
.frise-panel .frise-controls { background: transparent !important; border-bottom: 1px solid var(--bdr); flex-shrink:0; }
.frise-panel .frise-scroll { flex:1; background: transparent !important; }
.frise-panel .legend { background: transparent !important; }

nav.navbar {
  position: fixed !important; top:0; left:0; right:0; z-index:10 !important;
  background: rgba(10,6,2,0.88) !important; backdrop-filter: blur(12px);
}

@media(max-width:768px){
  .frise-scene { display:none; }
  nav.navbar { position:sticky !important; }
  .frise-panel { position:static; padding-top:0; }
  .frise-inner { width:100%; margin:0; background:var(--ink); backdrop-filter:none; border:none; animation:none; }
}
</style>
</head>

<script>
var EVENTS = [
  {y:1796,type:'decouverte',title:'Vaccin antivariolique',short:'Jenner',
   detail:'<strong>Edward Jenner</strong> vaccine le jeune James Phipps avec du pus de vaccine, puis l\'expose à la variole — l\'enfant est protégé. Premier vaccin de l\'histoire. Naissance de la vaccinologie.'},
  {y:1805,type:'decouverte',title:'Morphine isolée',short:'Sertürner',
   detail:'<strong>Friedrich Sertürner</strong> isole la morphine de l\'opium. 10× plus puissant que le laudanum brut. Premier alcaloïde pur extrait d\'une plante. Révolution de la gestion de la douleur.'},
  {y:1816,type:'decouverte',title:'Stéthoscope',short:'Laennec',
   detail:'<strong>René Laennec</strong> invente le stéthoscope — un tube de papier enroulé. Permet d\'entendre le cœur et les poumons avec précision. Révolution de l\'auscultation médicale.'},
  {y:1818,type:'decouverte',title:'1ère transfusion humaine réussie',short:'Blundell — Londres',
   detail:'<strong>James Blundell</strong> (1791–1878), obstétricien londonien, réalise la première transfusion de sang humain à humain sur une femme en hémorragie post-partum. 50% de succès dans ses 10 cas. Prouve que seul le sang humain convient. Première étape vers la médecine transfusionnelle.'},
  {y:1820,type:'decouverte',title:'Quinine isolée',short:'Pelletier & Caventou',
   detail:'<strong>Pelletier & Caventou</strong> isolent la quinine de l\'écorce de quinquina. Seul traitement efficace contre le paludisme en 1904.'},
  {y:1840,type:'specialite',title:'École dentaire — Baltimore',short:'1ère spécialité',
   detail:'Le <strong>Baltimore College of Dental Surgery</strong> est la première école dentaire au monde. La dentisterie devient une profession distincte de la médecine générale.'},
  {y:1842,type:'decouverte',title:'1ère anesthésie éther',short:'Crawford Long',
   detail:'<strong>Crawford Long</strong> pratique la première anesthésie à l\'éther diéthylique en Georgia. Ne publie pas ses résultats — Morton en aura la gloire en 1846.'},
  {y:1846,type:'decouverte',title:'Anesthésie publique',short:'Morton — Boston',
   detail:'<strong>William Morton</strong> endort un patient à l\'éther au Massachusetts General Hospital. Warren retire une tumeur sans douleur : <em>"Gentlemen, this is no humbug."</em> La chirurgie change à jamais.'},
  {y:1844,type:'personnage',title:'Florence Nightingale', wiki:'Florence Nightingale',short:'Mère des soins infirmiers',
   detail:'<strong>Florence Nightingale</strong> (1820–1910) révolutionne les soins infirmiers. Lors de la guerre de Crimée (1854), elle réduit la mortalité des hôpitaux militaires de 42% à 2% par hygiène stricte. Fonde la première école d\'infirmières en 1860. En 1904, son modèle est la norme mondiale.'},
  {y:1847,type:'personnage',title:'Semmelweis — mains', wiki:'Ignaz Semmelweis',short:'18% → 1,5% mortalité',
   detail:'<strong>Ignace Semmelweis</strong> impose le lavage des mains à l\'eau de Javel à Vienne. La mortalité maternelle s\'effondre. Ses collègues refusent de le croire. Il mourra fou en 1865.'},
  {y:1851,type:'decouverte',title:'Ophtalmoscope',short:'Helmholtz',
   detail:'<strong>Hermann von Helmholtz</strong> invente l\'ophtalmoscope. Voir le fond de l\'œil pour la première fois. Naissance de l\'ophtalmologie clinique.'},
  {y:1851,type:'specialite',title:'Ophtalmologie naît',short:'Premières chaires',
   detail:'L\'ophtalmoscope de Helmholtz rend l\'ophtalmologie possible. Premières chaires universitaires en Europe vers 1866. En 1904, spécialité bien établie dans les grandes villes.'},
  {y:1852,type:'decouverte',title:'Plâtre de Paris',short:'Mathijsen',
   detail:'<strong>Antonius Mathijsen</strong> développe le plâtre de Paris pour immobiliser les fractures. Révolution dans le traitement orthopédique.'},
  {y:1858,type:'decouverte',title:'Gray\'s Anatomy',short:'Référence mondiale',
   detail:'<strong>Henry Gray</strong> publie le traité d\'anatomie humaine de référence mondiale, illustré par Vandyke Carter. Chaque médecin depuis 1858 l\'a étudié.'},
  {y:1861,type:'personnage',title:'Broca — langage', wiki:'Paul Broca',short:'Lobe frontal gauche',
   detail:'<strong>Paul Broca</strong> localise l\'aire du langage dans le lobe frontal gauche — première preuve que le cerveau a des zones spécialisées. Naissance de la neurologie localisatrice.'},
  {y:1861,type:'decouverte',title:'Théorie des germes', wiki:'Louis Pasteur',short:'Pasteur',
   detail:'<strong>Louis Pasteur</strong> démontre que les maladies sont causées par des micro-organismes vivants. Réfute la génération spontanée. Ouvre la voie à toute la bactériologie moderne.'},
  {y:1865,type:'personnage',title:'Mort de Semmelweis', wiki:'Ignaz Semmelweis',short:'Martyr de la médecine',
   detail:'<strong>Semmelweis</strong> meurt à 47 ans dans un asile — probablement d\'une septicémie lors d\'une autopsie. Ironie tragique. Pasteur et Lister lui rendront justice posthume.'},
  {y:1867,type:'decouverte',title:'Antisepsie — Lister', wiki:'Joseph Lister',short:'46% → 15% mortalité',
   detail:'<strong>Joseph Lister</strong> publie dans The Lancet ses résultats avec l\'acide phénique. La mortalité post-amputation passe de 46% à 15%. Révolution chirurgicale absolue.'},
  {y:1876,type:'decouverte',title:'Marteau à réflexes',short:'Erb & Westphal',
   detail:'<strong>Erb & Westphal</strong> standardisent les réflexes ostéo-tendineux et le marteau à réflexes. Naissance de l\'examen neurologique objectif.'},
  {y:1876,type:'personnage',title:'Koch — bacille du charbon', wiki:'Robert Koch (physician)',short:'1ère bactériologie',
   detail:'<strong>Robert Koch</strong> prouve qu\'une maladie précise est causée par un micro-organisme précis. Naissance de la microbiologie médicale.'},
  {y:1880,type:'specialite',title:'ORL — spécialité',short:'Laryngoscope + otoscope',
   detail:'L\'ORL s\'autonomise de la chirurgie générale. Laryngoscope et otoscopes permettent des examens précis. En 1904, Chevalier Jackson améliore le bronchoscope.'},
  {y:1882,type:'personnage',title:'Koch — tuberculose', wiki:'Robert Koch (physician)',short:'1 Européen sur 7',
   detail:'<strong>Robert Koch</strong> annonce le 24 mars 1882 l\'identification de Mycobacterium tuberculosis. La maladie la plus meurtrière a enfin un agent causal. Prix Nobel 1905.'},
  {y:1882,type:'personnage',title:'Charcot — Salpêtrière', wiki:'Jean-Martin Charcot',short:'Leçons du mardi',
   detail:'<strong>Jean-Martin Charcot</strong> est à l\'apogée à la Salpêtrière. Ses leçons attirent 400 spectateurs. Ses élèves : Freud, Janet, Babinski, Gilles de la Tourette.'},
  {y:1883,type:'personnage',title:'Koch — choléra', wiki:'Robert Koch (physician)',short:'Vibrion identifié',
   detail:'<strong>Robert Koch</strong> isole Vibrio cholerae en Égypte. Confirme la transmission hydrique démontrée par Snow en 1854. On sait désormais comment éliminer la maladie.'},
  {y:1884,type:'decouverte',title:'Cocaïne anesthésique',short:'Koller — chirurgie oculaire',
   detail:'<strong>Carl Koller</strong> découvre que la cocaïne anesthésie les yeux. Révolutionne la chirurgie oculaire. Puis dentisterie et ORL. La Stovaïne (1904) la remplacera.'},
  {y:1885,type:'decouverte',title:'Vaccin rage — Pasteur', wiki:'Louis Pasteur',short:'Joseph Meister sauvé',
   detail:'<strong>Louis Pasteur</strong> vaccine avec succès le jeune Joseph Meister, mordu par un chien enragé. Premier vaccin développé en laboratoire. La rage était toujours fatale avant.'},
  {y:1885,type:'decouverte',title:'1ère appendicectomie',short:'Iowa, USA',
   detail:'Première appendicectomie réussie dans l\'Iowa. Standardisée par <strong>McBurney</strong> (point de McBurney) dès 1894. En 1904 : procédure établie dans les hôpitaux équipés.'},
  {y:1886,type:'decouverte',title:'Autoclave chirurgical',short:'Von Bergmann',
   detail:'<strong>Ernst von Bergmann</strong> introduit l\'autoclave. Passage de l\'antisepsie à l\'asepsie — empêcher les germes d\'entrer plutôt que les tuer après. Chirurgie moderne née.'},
  {y:1889,type:'personnage',title:'Janet — subconscient', wiki:'Pierre Janet',short:'Automatisme psychologique',
   detail:'<strong>Pierre Janet</strong> publie L\'Automatisme psychologique. Subconscient, idées fixes, dissociation. Freud lira Janet attentivement — sans toujours le citer.'},
  {y:1890,type:'decouverte',title:'Gants chirurgicaux',short:'Halsted — caoutchouc',
   detail:'<strong>William Halsted</strong> introduit les gants chirurgicaux en caoutchouc pour protéger son infirmière de l\'acide phénique. Hygiène opératoire complète.'},
  {y:1893,type:'personnage',title:'1ère chir. cardiaque', wiki:'Daniel Hale Williams',short:'Daniel Hale Williams',
   detail:'<strong>Daniel Hale Williams</strong>, chirurgien afro-américain, suture le péricarde d\'un patient poignardé à Chicago. Le patient survit 20 ans. Williams fondera le 1er hôpital non-ségrégué des USA.'},
  {y:1893,type:'specialite',title:'Psychiatrie institutionnelle',short:'Aliénisme → spécialité',
   detail:'L\'aliénisme de Pinel (1793) s\'est structuré en psychiatrie institutionnelle. En 1904, spécialité reconnue dans les grandes villes, enrichie par Charcot, Freud et Kraepelin.'},
  {y:1893,type:'personnage',title:'William Osler — médecine moderne', wiki:'William Osler',short:'The Principles & Practice of Medicine',
   detail:'<strong>William Osler</strong> (1849–1919) publie son traité de médecine interne — le manuel le plus influent du XX° siècle. Il invente le stage hospitalier, l\'examen clinique rigoureux, l\'internat. En 1904, il est à Oxford. Ses anciens étudiants de Baltimore sont les meilleurs médecins d\'Amérique du Nord.'},
  {y:1895,type:'decouverte',title:'Rayons X — Röntgen', wiki:'Wilhelm Röntgen',short:'8 nov. 1895 — voir l\'os',
   detail:'<strong>Wilhelm Röntgen</strong> découvre les rayons X. 1ère radiographie : la main de sa femme avec son alliance. En quelques mois, des services de radiologie ouvrent partout. Prix Nobel 1901.'},
  {y:1895,type:'personnage',title:'Freud & Breuer', wiki:'Sigmund Freud',short:'Études sur l\'hystérie',
   detail:'<strong>Freud & Breuer</strong> publient les Études sur l\'hystérie. Anna O. invente le terme <em>"talking cure"</em>. Acte fondateur de la psychanalyse.'},
  {y:1896,type:'decouverte',title:'Rehn suture le cœur',short:'Ventricule droit — 40% survie',
   detail:'<strong>Ludwig Rehn</strong> suture directement le ventricule droit à Francfort. 40% de survie. Billroth avait dit en 1883 qu\'un tel chirurgien "perdrait le respect de ses pairs".'},
  {y:1896,type:'personnage',title:'Kraepelin — classification', wiki:'Emil Kraepelin',short:'Démence précoce vs PMD',
   detail:'<strong>Emil Kraepelin</strong> distingue la démence précoce (future schizophrénie) de la psychose maniaco-dépressive. Cette distinction structure encore le DSM actuel.'},
  {y:1896,type:'specialite',title:'Radiologie — services ouverts',short:'Dès 1896 dans les hôpitaux',
   detail:'L\'engouement pour les rayons X crée des services de radiologie dans les grands hôpitaux dès 1896. En 1904 à <strong>Saint-Denis</strong>, un appareil à rayons X est le nec plus ultra.'},
  {y:1897,type:'decouverte',title:'Aspirine — Bayer',short:'1er médicament de masse',
   detail:'<strong>Felix Hoffmann</strong> synthétise l\'aspirine pour Bayer (1897), commercialisée en 1899. Antidouleur, antipyrétique, anti-inflammatoire. Premier médicament de masse de l\'histoire.'},
  {y:1898,type:'decouverte',title:'Héroïne — Bayer',short:'Traitement "non addictif"…',
   detail:'<strong>Bayer</strong> commercialise l\'héroïne comme traitement non-addictif de la morphinomanie. Erreur tragique — l\'héroïne est encore plus addictive. Reconnue trop tard.'},
  {y:1900,type:'personnage',title:'Freud — Interprétation des rêves', wiki:'Sigmund Freud',short:'351 exemplaires en 6 ans',
   detail:'<strong>Die Traumdeutung</strong> (1900) — les rêves sont la "voie royale vers l\'inconscient". 351 exemplaires vendus en 6 ans. Succès d\'estime confidentiel. Œuvre fondatrice de la psychanalyse.'},
  {y:1901,type:'personnage',title:'Landsteiner — Groupes A, B, O', wiki:'Karl Landsteiner',short:'La fin des transfusions mortelles',
   detail:'<strong>Karl Landsteiner</strong> (1868–1943), médecin viennois, découvre que les globules rouges portent des antigènes différents selon les individus. Il identifie trois groupes : A, B et C (rebaptisé O). Comprendre pourquoi certaines transfusions tuaient et d\'autres sauvaient. Prix Nobel de Physiologie 1930. En 1904, sa découverte est connue des médecins formés — ignorée dans les campagnes.'},
  {y:1902,type:'decouverte',title:'Groupe AB — le 4ème groupe',short:'Von Decastello & Sturli',
   detail:'<strong>Alfred Von Decastello</strong> et <strong>Adriano Sturli</strong> découvrent le quatrième groupe sanguin : AB. Porteur des deux antigènes A et B, sans anticorps — receveur universel. La carte complète des groupes sanguins est désormais établie. Quatre groupes, un système cohérent. La transfusion moderne peut commencer.'},
  {y:1903,type:'decouverte',title:'Électrocardiogramme',short:'Einthoven — 270 kg',
   detail:'<strong>Einthoven</strong> invente l\'ECG (1903). En 1904, l\'appareil pèse 270 kg et nécessite 5 personnes. Merveille scientifique — pas encore outil clinique pratique. Prix Nobel 1924.'},
  {y:1898,type:'personnage',title:'Marie Curie — Radium', wiki:'Marie Curie',short:'Radioactivité · Prix Nobel ×2',
   detail:'<strong>Marie Curie</strong> (1867–1934) isole le polonium puis le radium avec Pierre Curie. Elle invente le terme <em>radioactivité</em>. Prix Nobel de Physique 1903, de Chimie 1911. En 1904, on utilise déjà le radium contre les tumeurs cancéreuses — sans en connaître les dangers mortels. Elle mourra d\'aplasie médullaire en 1934.'},
  {y:1902,type:'personnage',title:'Alexis Carrel — suture vasculaire', wiki:'Alexis Carrel',short:'Transplantations & Nobel 1912',
   detail:'<strong>Alexis Carrel</strong> (1873–1944) perfectionne la suture des vaisseaux sanguins — technique de triangulation encore utilisée aujourd\'hui. Coud les artères sans les boucher. Ouvre la voie aux transplantations d\'organes et à la chirurgie cardiaque. Prix Nobel 1912. En 1904, il est à Lyon, ses travaux font déjà sensation.'},
  {y:1903,type:'personnage',title:'Harvey Cushing — neurochirurgie', wiki:'Harvey Cushing',short:'Père de la neurochirurgie',
   detail:'<strong>Harvey Cushing</strong> (1869–1939) ramène la mortalité des opérations cérébrales de 90% à 8% grâce à la précision, l\'anesthésie contrôlée et le monitoring de la pression intracrânienne. En 1904, il opère à Johns Hopkins. Son nom reste attaché au syndrome de Cushing et à la maladie de Cushing.'},
  {y:1897,type:'personnage',title:'Doyen filme ses opérations', wiki:'Eugène-Louis Doyen',short:'1ers films chirurgicaux de l\'histoire',
   detail:'<strong>Eugène-Louis Doyen</strong> (1859–1916) fait filmer ses opérations par les cameramen Clément Maurice puis Ambroise-François Parnaland — parmi les tout premiers films chirurgicaux au monde. Ovariotomies, gastrectomies, trépanations. Il y voit un outil pédagogique. Ses confrères y voient une indécence scandaleuse.'},
  {y:1900,type:'personnage',title:'Doyen — vitesse opératoire', wiki:'Eugène-Louis Doyen',short:'4 min pour une gastrectomie',
   detail:'<strong>Doyen</strong> est le chirurgien le plus rapide d\'Europe. Gastrectomie en 4 minutes, mastectomie en moins de 6. Ses disciples viennent du monde entier assister à sa clinique privée rue du Faubourg-Saint-Honoré. Un billet d\'entrée se revend au marché noir.'},
  {y:1902,type:'personnage',title:'Doyen sépare des siamoises', wiki:'Eugène-Louis Doyen',short:'Doodica & Radica — Paris',
   detail:'<strong>Doyen</strong> opère les sœurs siamoises indiennes Doodica et Radica, reliées au sacrum. L\'opération est un succès technique — mais Doodica meurt d\'une septicémie après l\'intervention. Polémique internationale. Doyen fait filmer l\'opération.'},
  {y:1904,type:'decouverte',title:'Stovaïne',short:'Fourneau — 1er anesthésique synthèse',
   detail:'<strong>Ernest Fourneau</strong> développe la Stovaïne — premier anesthésique local de synthèse, moins toxique que la cocaïne. Disponible à l\'hôpital de <strong>Saint-Denis</strong>.'},
  {y:1904,type:'specialite',title:'Neurologie — Montréal',short:'Spécialité en Amérique du Nord',
   detail:'La neurologie apparaît comme spécialité à l\'Hôpital général de Montréal en 1904. Expansion des spécialités médicales en Amérique du Nord.'},
  {y:1904,type:'ecole',title:'Protocole Lucius',short:'Anamnèse psychiatrique',
   detail:'Le <strong>Dr Abernathy Lucius</strong> publie le premier formulaire d\'anamnèse psychiatrique structuré pour les névroses traumatiques. Adopté par Saint-Denis et plusieurs cabinets du Texas.'},
  {y:1904,type:'ecole',title:'Méthode Saint-Denis',short:'−60% mortalité chirurgicale',
   detail:'Protocole opératoire complet : antisepsie Lister + morphine dosée selon le poids + suivi 10 jours. Mortalité chirurgicale réduite de 60% à l\'hôpital général de Saint-Denis.'},
  {y:1904,type:'ecole',title:'Carte épidémiologique Texas',short:'Méthode Snow adaptée',
   detail:'Première cartographie systématique des épidémies de typhoïde et choléra au Texas et Louisiane. Outil révolutionnaire pour la santé publique régionale de l\'Ouest américain.'},
  {y:1904,type:'ecole',title:'Formulaire légiste',short:'Reconnu par les tribunaux',
   detail:'Formulaire standardisé de rapport médico-légal reconnu par les tribunaux du Texas et de Louisiane. Codification officielle de la médecine légale dans l\'Ouest.'},
  {y:1904,type:'ecole',title:'Classification créoles',short:'Kraepelin adapté Louisiane',
   detail:'Adaptation de la classification Kraepelin au contexte créole. Trois nouvelles catégories cliniques. Publication dans le Journal de Médecine de la Nouvelle-Orléans.'},
];

var COLS = {
  decouverte: '#c89820',
  personnage:  '#4a80b8',
  specialite:  '#4a9a4a',
  ecole:       '#c83030',
};
var YEAR_MIN = 1793;
var YEAR_MAX = 1907;
var PX_PER_YEAR = 36;   /* espace entre années */
var PAD_H = 80;         /* padding gauche/droit */
var AXIS_OFFSET = 0;    /* décalage de l'axe depuis le centre = 0 (centré) */
var SLOT_H = 100;       /* hauteur d'un slot haut ou bas */
var LABEL_MAX_W = 110;  /* largeur max carte événement */
var currentFilter = 'all';
var openEvt = -1;

function yearToX(y){ return PAD_H + (y - YEAR_MIN) * PX_PER_YEAR; }
function totalW(){ return PAD_H + (YEAR_MAX - YEAR_MIN) * PX_PER_YEAR + PAD_H; }

function render(){
  var scroll = document.getElementById('frise-scroll');
  var scrollH = scroll.clientHeight || window.innerHeight - 110;
  var axisY = scrollH / 2;              /* axe EXACTEMENT au milieu */
  var svgH = scrollH;
  var svgW = totalW();

  var svg = document.getElementById('frise-svg');
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.setAttribute('viewBox', '0 0 ' + svgW + ' ' + svgH);

  var parts = [];

  /* ── Fond léger ── */
  parts.push('<rect width="' + svgW + '" height="' + svgH + '" fill="none"/>');

  /* ── Décennies ── */
  for(var yr = 1800; yr <= 1904; yr += 10){
    var xd = yearToX(yr);
    var isMaj = yr % 50 === 0;
    parts.push(
      '<line x1="' + xd + '" y1="' + (axisY - (isMaj?14:8)) + '"'
      + ' x2="' + xd + '" y2="' + (axisY + (isMaj?14:8)) + '"'
      + ' stroke="' + (isMaj ? 'rgba(192,154,74,0.35)' : 'rgba(192,154,74,0.15)') + '"'
      + ' stroke-width="' + (isMaj ? 1.5 : 0.75) + '"/>'
    );
    parts.push(
      '<text x="' + xd + '" y="' + (axisY + 28) + '"'
      + ' text-anchor="middle" font-size="10" font-family="\'Cormorant Garamond\',serif"'
      + ' fill="rgba(180,160,100,0.5)" letter-spacing="1">' + yr + '</text>'
    );
  }

  /* ── Axe ── */
  parts.push(
    '<line x1="' + (PAD_H - 20) + '" y1="' + axisY + '"'
    + ' x2="' + (svgW - PAD_H + 20) + '" y2="' + axisY + '"'
    + ' stroke="rgba(192,154,74,0.4)" stroke-width="1.5"/>'
  );
  /* flèche fin */
  parts.push(
    '<polygon points="' + (svgW - PAD_H + 20) + ',' + axisY + ' '
    + (svgW - PAD_H + 12) + ',' + (axisY - 4) + ' '
    + (svgW - PAD_H + 12) + ',' + (axisY + 4) + '"'
    + ' fill="rgba(192,154,74,0.4)"/>'
  );

  /* ── Tri par année ── */
  var visible = EVENTS.filter(function(e){
    return currentFilter === 'all' || e.type === currentFilter;
  });

  /* Assigner top/bot — anti-collision intelligente */
  var byYear = {};
  visible.forEach(function(e){
    if(!byYear[e.y]) byYear[e.y] = [];
    byYear[e.y].push(e);
  });

  /* Trier par année puis assigner côtés en évitant collisions */
  /* Deux événements dans un rayon de 3 ans doivent être côtés opposés */
  var assignments = {};  /* idx → {side, stack} */
  var lastTop = -999, lastBot = -999;  /* dernière année utilisée de chaque côté */

  visible.forEach(function(e, globalIdx){
    var yearEvts = byYear[e.y];
    var posInYear = yearEvts.indexOf(e);
    var side;

    if(posInYear > 0){
      /* Même année : alterner */
      var prevInYear = assignments[visible.indexOf(yearEvts[posInYear-1])];
      side = prevInYear && prevInYear.side === 'top' ? 'bot' : 'top';
    } else {
      /* Choisir le côté le moins récemment utilisé dans un rayon de 4 ans */
      var topDist = e.y - lastTop;
      var botDist = e.y - lastBot;
      if(topDist >= botDist){ side = 'top'; }
      else { side = 'bot'; }
    }

    if(side === 'top') lastTop = e.y; else lastBot = e.y;

    var stackOff = posInYear * 25;
    assignments[globalIdx] = {side: side, stack: stackOff};
    e._side = side;
    e._stack = stackOff;
    e._idx = globalIdx;
  });

  /* ── Dessiner chaque événement ── */
  visible.forEach(function(e, i){
    var col = COLS[e.type] || '#c89820';
    var x = yearToX(e.y);
    var side = e._side;
    var stackOff = e._stack || 0;
    var lineLen = 70 + stackOff;
    var dotY = axisY;
    var lineY1 = side === 'top' ? axisY - 6 : axisY + 6;
    var lineY2 = side === 'top' ? axisY - lineLen : axisY + lineLen;
    var textY  = side === 'top' ? lineY2 - 4 : lineY2 + 4;
    var anchor = 'start';
    var textX  = x - 52;   /* centrer le label sur le point */

    /* Ligne verticale */
    parts.push(
      '<line x1="' + x + '" y1="' + lineY1 + '"'
      + ' x2="' + x + '" y2="' + lineY2 + '"'
      + ' stroke="' + col + '" stroke-width="0.75" opacity="0.5"/>'
    );

    /* Petit point sur l'axe */
    parts.push(
      '<circle cx="' + x + '" cy="' + dotY + '" r="4.5"'
      + ' fill="' + col + '" stroke="none" opacity="0.9"/>'
    );

    /* Cercle hover */
    var evtJson = JSON.stringify(e).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    parts.push(
      '<circle cx="' + x + '" cy="' + dotY + '" r="9"'
      + ' fill="' + col + '" fill-opacity="0" stroke="none"'
      + ' style="cursor:pointer"'
      + ' onmouseover="this.setAttribute(\'fill-opacity\',\'0.12\')"'
      + ' onmouseout="this.setAttribute(\'fill-opacity\',\'0\')"'
      + ' onclick="showPopup(' + EVENTS.indexOf(e) + ',event)"/>'
    );

    /* Texte incliné 45° */
    var angle = side === 'top' ? -45 : 45;
    var ty = side === 'top' ? textY - 2 : textY + 14;
    parts.push(
      '<text'
      + ' transform="translate(' + x + ',' + ty + ') rotate(' + angle + ')"'
      + ' font-size="10.5" font-family="\'EB Garamond\',serif"'
      + ' fill="' + col + '" style="cursor:pointer"'
      + ' onclick="showPopup(' + EVENTS.indexOf(e) + ',event)">'
      + e.y + ' · ' + e.title
      + '</text>'
    );
  });

  svg.innerHTML = parts.join('');
}

/* ── POPUP ──────────────────────────────────────── */
var _photoCache = {};

function showPopup(idx, event){
  var e = EVENTS[idx];
  var col = COLS[e.type] || '#c89820';
  document.getElementById('popup-year').style.color = col;
  document.getElementById('popup-year').textContent = e.y + ' — ' + e.short;
  document.getElementById('popup-title').textContent = e.title;
  document.getElementById('popup-detail').innerHTML = e.detail;

  var photoEl = document.getElementById('popup-photo');
  photoEl.style.display = 'none';
  photoEl.src = '';

  if(e.wiki){
    /* Charger via API Wikipedia REST — CORS autorisé dans les navigateurs */
    if(_photoCache[e.wiki]){
      photoEl.src = _photoCache[e.wiki];
      photoEl.style.display = 'block';
    } else {
      var wikiName = encodeURIComponent(e.wiki.replace(/ /g,'_'));
      fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + wikiName)
        .then(function(r){ return r.json(); })
        .then(function(data){
          var thumb = data && data.thumbnail && data.thumbnail.source;
          if(thumb){
            _photoCache[e.wiki] = thumb;
            photoEl.src = thumb;
            photoEl.style.display = 'block';
          }
        })
        .catch(function(){ /* pas de photo = pas de problème */ });
    }
  }

  var popup = document.getElementById('popup');
  popup.classList.add('show');
  positionPopup(event);
  event.stopPropagation();
}

function positionPopup(event){
  var popup = document.getElementById('popup');
  var pw = 280, ph = 180;
  var x = event.clientX + 16;
  var y = event.clientY + 16;
  if(x + pw > window.innerWidth - 10)  x = event.clientX - pw - 8;
  if(y + ph > window.innerHeight - 10) y = event.clientY - ph - 8;
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
}

function closePopup(){
  document.getElementById('popup').classList.remove('show');
}

/* ── FILTRE ─────────────────────────────────────── */
function setFilter(btn, filter){
  currentFilter = filter;
  document.querySelectorAll('.fbtn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  render();
}

/* ── DRAG TO SCROLL ──────────────────────────────── */
(function(){
  var el, isDown = false, startX, scrollLeft;
  window.addEventListener('DOMContentLoaded', function(){
    el = document.getElementById('frise-scroll');
    el.addEventListener('mousedown', function(e){ isDown=true; el.classList.add('scrolling'); startX=e.pageX-el.offsetLeft; scrollLeft=el.scrollLeft; });
    window.addEventListener('mouseup',   function(){ isDown=false; el.classList.remove('scrolling'); });
    el.addEventListener('mousemove', function(e){ if(!isDown) return; e.preventDefault(); var x=e.pageX-el.offsetLeft; el.scrollLeft = scrollLeft-(x-startX)*1.2; });
    /* Fermer popup en cliquant ailleurs */
    document.addEventListener('click', function(e){ if(!e.target.closest('#popup') && !e.target.closest('svg')) closePopup(); });
  });
})();

/* ── INIT ───────────────────────────────────────── */
window.addEventListener('load', function(){
  render();
  /* Scroller vers 1860 */
  var scroll = document.getElementById('frise-scroll');
  setTimeout(function(){
    scroll.scrollLeft = yearToX(1860) - scroll.clientWidth/2;
  }, 50);
});

window.addEventListener('resize', function(){ render(); });

document.addEventListener('DOMContentLoaded', function(){
  var waitG = setInterval(function(){
    if(window.guardPage){ clearInterval(waitG); guardPage({ allowIncomplete:true, minGrade:'stagiaire' }); }
  }, 80);
});
</script>
