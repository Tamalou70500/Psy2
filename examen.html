    {type:'cas',

     correct:1, expl:'L\'association libre : le patient dit TOUT ce qui lui passe par l\'esprit sans censure. Les résistances (ce qu\'il évite) sont aussi informatives que le contenu. Cette technique permet d\'accéder à l\'inconscient sans l\'état artificiel de l\'hypnose.'},
    {type:'qcm',
     text:'La distinction fondamentale de Kraepelin (1896) oppose :',

    {type:'vf',
     text:'Un patient en stupeur mélancolique présente le risque suicidaire le plus élevé au plus fort de son immobilité.',

    {type:'qcm',
     text:'La règle d\'or face à un délire paranoïaque est :',

    {type:'qcm',
     text:'Charcot pensait que l\'hypnose était accessible :',

     correct:1, expl:'Charcot (Salpêtrière) : l\'hypnose est un état pathologique réservé aux hystériques. Bernheim (Nancy) : tout le monde est hypnotisable par suggestion. Freud, qui a étudié les deux, a donné raison à Bernheim.'},
    {type:'vf',
     text:'Un patient en manie aiguë présente une conscience intacte de sa maladie (insight).',

    {type:'qcm',
     text:'L\'hystérie de conversion — le patient :',

    {type:'qcm',
     text:'Le signe de Romberg positif (perte d\'équilibre yeux fermés) oriente vers :',

    {type:'qcm',
     text:'La neurasthénie, terme créé par Beard en 1869, correspond probablement aujourd\'hui à :',

     correct:1, expl:'La neurasthénie ("épuisement nerveux") était un diagnostic fourre-tout de l\'époque. Elle recouvre probablement plusieurs entités distinctes de la psychiatrie moderne : dépression, anxiété généralisée, trouble somatoforme. Largement diagnostiquée chez les femmes de la bourgeoisie.'},
    {type:'cas', partie:'Partie II — Cas cliniques',

     text:'Votre diagnostic et approche ?',

     correct:1, expl:'La "belle indifférence" (calme étrange face à un handicap sévère) est caractéristique de l\'hystérie de conversion. Le bras est vraiment paralysé — elle ne simule pas. Début brutal après un trauma émotionnel confirme. Approche : entretiens progressifs, association libre, hypnose légère pour accéder au trauma refoulé.'},
    {type:'cas',
     cas:'Un homme de 55 ans est amené par le shérif. Il a mis le feu à la grange de son voisin, convaincu que ce dernier empoisonne ses puits depuis 3 ans. Il est calme avec vous, son récit est parfaitement logique en interne, il ne reconnaît aucun problème.',

     correct:1, expl:'Critères d\'internement réunis : 1) Passage à l\'acte (incendie) prouvant le danger. 2) Délire systématisé inébranlable. 3) Absence totale d\'insight. 4) Danger réel pour autrui (voisin visé). L\'internement est une protection médicale, pas une punition.'},
    {type:'cas',

     choices:['Entrer dans son délire pour établir un lien','Rester calme, ne pas contredire, mais ne pas valider non plus. Évaluer la dangerosité. Internement probable.','Le confronter fermement à la réalité','Prescrire du bromure et laisser rentrer chez lui'],
     correct:1, expl:'Ne pas contredire (coupe la relation) mais ne pas valider (renforce le délire). Rester calme et neutre. La dilapidation de sa fortune + idées de grandeur + absence d\'insight = manie aiguë. Internement probable pour le protéger de lui-même — il peut se mettre en danger financier, physique, juridique.'},
    {type:'cas',
     cas:'Une patiente guérie depuis 3 semaines d\'un épisode de stupeur mélancolique sévère. Elle parle maintenant, mange, sourit. Sa famille est soulagée et veut qu\'elle rentre chez elle.',
     text:'Quelle est votre recommandation ?',
     choices:['Elle peut rentrer — la guérison est apparente','Surveillance renforcée encore 2-4 semaines minimum — sortie de stupeur = risque suicidaire maximal','Augmenter les médicaments pour maintenir l\'amélioration','Référer à un autre aliéniste'],
     correct:1, expl:'La sortie de stupeur est la phase la plus dangereuse de la mélancolie. Le patient retrouve l\'énergie d\'agir mais la souffrance profonde n\'a pas disparu. Nombreux suicides "inattendus" surviennent à ce stade. Surveillance renforcée et contact quotidien pendant au moins 2-4 semaines.'},

    {type:'cas', partie:'Partie II — Cas cliniques',

/* ══ ÉTAT DE L\'EXAMEN ═══════════════════════════════════════ */
var examState = { examId:null, questions:[], current:0, answers:[], errors:[], score:0 };

/* ══ ROTATION DES QUESTIONS THÉORIQUES ══════════════════════ */
function shuffleQuestions(questions){
  var theorie = [], cas = [], inCas = false;
  questions.forEach(function(q){
    if(q.partie && q.partie.indexOf('Mise en situation') > -1) inCas = true;
    if(q.type === 'cas' || inCas){ cas.push(Object.assign({},q)); }
    else { theorie.push(Object.assign({},q)); }
  });
  for(var i=theorie.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=theorie[i]; theorie[i]=theorie[j]; theorie[j]=tmp;
  }
  if(theorie.length>0) theorie[0].partie='Partie I — Théorie';
  if(cas.length>0) cas[0].partie='Partie II — Mise en situation';
  return theorie.concat(cas);
}

    {id:'s5',  icon:'🏥', title:'Accoucheur',         disponible:true},
    {id:'s6',  icon:'🦷', title:'Dentiste',           disponible:true},
    {id:'s7',  icon:'👁️', title:'Ophtalmologue',    disponible:true},
    {id:'s8',  icon:'👂', title:'ORL',               disponible:true},
    {id:'s9',  icon:'🧬', title:'Dermatologue',      disponible:true},
    {id:'s10', icon:'👶', title:'Pédiatre',           disponible:true},

/* ══ DÉMARRER ════════════════════════════════════════════════ */
function startExamen(id){
  var exam = EXAMENS.find(function(e){return e.id===id;});
  if(!exam) return;
  examState = {examId:id, questions:shuffleQuestions(exam.questions.slice()), current:0, answers:[], errors:[], score:0};
  document.getElementById('exam-running-title').textContent = exam.title;
  show('view-exam');
  renderQuestion();
}

/* ══ QUESTION ════════════════════════════════════════════════ */
function renderQuestion(){
  var q = examState.questions[examState.current];
  var total = examState.questions.length;
  var pct = Math.round(examState.current/total*100);
  document.getElementById('exam-prog-fill').style.width = pct+'%';
  document.getElementById('exam-prog-text').textContent = (examState.current+1)+' / '+total;

  var letters = ['A','B','C','D'];
  var html = '';
  if(q.partie) html += '<div class="partie-label">'+q.partie+'</div>';
  html += '<div class="question-card">';
  html += '<div class="question-num">Question '+(examState.current+1)+' sur '+total;
  var tl = {qcm:'QCM',vf:'Vrai / Faux',cas:'Cas clinique'}[q.type]||'';
  html += '<span class="question-type-badge">'+tl+'</span></div>';
  if(q.cas) html += '<div class="cas-block"><span class="cas-label">🩺 Situation clinique</span>'+q.cas+'</div>';
  html += '<div class="question-text">'+q.text+'</div>';
  var choices = q.type==='vf' ? ['Vrai','Faux'] : q.choices;
  html += '<div class="choices" id="choices">';
  choices.forEach(function(c,i){
    html += '<div class="choice" id="ch-'+i+'" onclick="selectAnswer('+i+')">'
      +'<span class="choice-letter">'+letters[i]+'</span><span>'+c+'</span></div>';
  });
  html += '</div>';
  html += '<div class="feedback" id="feedback"><div class="feedback-title" id="fb-title"></div><div class="feedback-expl" id="fb-expl"></div></div>';
  html += '<button class="btn-next" id="btn-next" onclick="nextQuestion()">'
    +(examState.current===examState.questions.length-1?'Voir les résultats →':'Question suivante →')
    +'</button>';
  html += '</div>';
  document.getElementById('exam-question-wrap').innerHTML = html;
}

/* ══ RÉPONSE ═════════════════════════════════════════════════ */
function selectAnswer(idx){
  if(document.getElementById('btn-next').classList.contains('show')) return;
  var q = examState.questions[examState.current];
  var correctIdx = q.type==='vf' ? (q.correct?0:1) : q.correct;
  document.querySelectorAll('.choice').forEach(function(c){c.style.pointerEvents='none';});
  document.getElementById('ch-'+idx).classList.add(idx===correctIdx?'correct':'wrong');
  if(idx!==correctIdx){
    document.getElementById('ch-'+correctIdx).classList.add('reveal-correct');
    examState.errors.push({q:q.text, correct:(q.type==='vf'?(q.correct?'Vrai':'Faux'):q.choices[correctIdx])});
  } else { examState.score++; }
  examState.answers.push(idx);
  var fb = document.getElementById('feedback');
  var ok = idx===correctIdx;
  fb.className='feedback show '+(ok?'good':'bad');
  document.getElementById('fb-title').textContent = ok?'✓ Correct !':'✗ Incorrect';
  document.getElementById('fb-expl').textContent = q.expl;
  document.getElementById('btn-next').classList.add('show');
}

/* ══ RÉSULTATS ═══════════════════════════════════════════════ */
function nextQuestion(){
  examState.current++;
  if(examState.current>=examState.questions.length){ showResult(); }
  else { renderQuestion(); window.scrollTo(0,0); }
}

function showResult(){
  var exam = EXAMENS.find(function(e){return e.id===examState.examId;})
           || EXAMENS_SPE.find(function(e){return e.id===examState.examId;});
  var total=examState.questions.length, score=examState.score;
  var pct=Math.round(score/total*100), passed=pct>=(exam?exam.reqScore:80);
  var mention='', mColor='';
  if(!passed){ mention='Ajourné — à représenter'; mColor='color:#c07070'; }
  else if(pct>=90){ mention='Reçu avec distinction'; mColor='color:#d4b870'; }
  else if(pct>=80){ mention='Reçu avec satisfaction'; mColor='color:#4a9a4a'; }
  else { mention='Reçu — mention passable'; mColor='color:#6abf6a'; }

  /* Sauvegarde locale */
  var scores=JSON.parse(localStorage.getItem('psy_exam_scores')||'{}');
  if(!scores[examState.examId]||pct>scores[examState.examId].pct){
    scores[examState.examId]={pct,passed,mention,date:new Date().toLocaleDateString('fr-FR')};
    localStorage.setItem('psy_exam_scores',JSON.stringify(scores));
  }
  /* Sauvegarde Firebase */
  if(window._fbSaveExam) window._fbSaveExam(examState.examId,pct,passed,mention);

  var diplome='';
  if(passed){
    var today=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
    diplome=['═══════════════════════════════════════',
      '  CABINET MÉDICAL DU NOUVEAU MONDE',
      '  École de Saint-Denis · Texas · 1904',
      '═══════════════════════════════════════','',
      'Nous certifions que','',
      '  Dr. [Votre nom]','',
      'a satisfait aux épreuves de','  '+exam.title.toUpperCase(),'',
      'et est déclaré :','  '+mention.toUpperCase(),'',
      'Score : '+pct+'% ('+score+'/'+total+') — Requis : '+exam.reqScore+'%','',
      'Saint-Denis, Louisiane, le '+today,'',
      '  Cabinet Médical du Nouveau Monde',
      '═══════════════════════════════════════'].join('\n');
  }

  var errHtml='';
  if(examState.errors.length>0){
    errHtml='<div class="errors-list"><div class="label" style="margin-bottom:.6rem;text-align:left">Questions manquées ('+examState.errors.length+')</div>';
    examState.errors.forEach(function(e){
      errHtml+='<div class="error-item"><div class="error-q">'+e.q+'</div><div class="error-correct">✓ '+e.correct+'</div></div>';
    });
    errHtml+='</div>';
  }

  var html='<div class="result-score '+(passed?'passed':'failed')+'">'+pct+'%</div>'
    +'<div class="result-mention" style="'+mColor+'">'+mention+'</div>'
    +'<div class="result-details">'
    +'<div class="result-detail"><strong>'+score+'/'+total+'</strong>Bonnes réponses</div>'
    +'<div class="result-detail"><strong>'+exam.reqScore+'%</strong>Score requis</div>'
    +'<div class="result-detail"><strong>'+(passed?'✓ Validé':'✗ Échoué')+'</strong>Statut</div>'
    +'</div>';
  if(passed) html+='<div class="diplome" id="diplome-txt">'+diplome+'</div>'
    +'<button class="btn btn-gold w-full" style="margin-bottom:1rem" onclick="copyDiplome()">Copier le diplôme RP</button>';
  html+=errHtml;
  html+='<div style="display:flex;gap:.6rem;margin-top:1.25rem;flex-wrap:wrap;justify-content:center">';
  html+='<button class="btn" onclick="backToAccueil()">← Retour</button>';
  html+='<button class="btn btn-gold" onclick="startExamen(\''+examState.examId+'\')">Repasser l\'examen</button>';
  if(passed){
    var nextIdx=EXAMENS.findIndex(function(e){return e.id===examState.examId;})+1;
    if(nextIdx<EXAMENS.length) html+='<button class="btn btn-gold" onclick="startExamen(\''+EXAMENS[nextIdx].id+'\')">Niveau suivant →</button>';
    else html+='<a href="specialites.html" class="btn btn-gold">Choisir ma spécialisation →</a>';
  }
  html+='</div>';

  document.getElementById('result-card').innerHTML=html;
  show('view-result'); window.scrollTo(0,0);
}

function copyDiplome(){
  navigator.clipboard.writeText(document.getElementById('diplome-txt').textContent).then(function(){
    alert('Diplôme copié — collez-le dans le chat du jeu !');
  });
}


/* ── EXAMENS DE SPÉCIALISATION ── */
function shuffleQSpe(questions){
  var th=[], cas=[], inCas=false;
  questions.forEach(function(q){
    if(q.partie && q.partie.indexOf('Cas')>-1) inCas=true;
    if(q.type==='cas'||inCas){ cas.push(Object.assign({},q)); }
    else { th.push(Object.assign({},q)); }
  });
  for(var i=th.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=th[i];th[i]=th[j];th[j]=t; }
  if(th.length>0) th[0].partie='Partie I — Théorie';
  if(cas.length>0) cas[0].partie='Partie II — Cas cliniques';
  return th.concat(cas);
}

function startSpeExamen(id){
  var exam = EXAMENS_SPE.find(function(e){return e.id===id;});
  if(!exam) return;
  // Réutiliser le même système mais avec couleur spé
  examState = {examId:id, questions:shuffleQSpe(exam.questions.slice()), current:0, answers:[], errors:[], score:0, isSpe:true};
  document.getElementById('exam-running-title').textContent = exam.title;
  show('view-exam');
  renderQuestion();
}

/* ══ NAVIGATION ══════════════════════════════════════════════ */
function show(viewId){
  ['view-accueil','view-exam','view-result'].forEach(function(v){
    document.getElementById(v).classList.toggle('hidden',v!==viewId);
  });
}
function backToAccueil(){ show('view-accueil'); renderAccueil(); window.scrollTo(0,0); }

document.addEventListener('DOMContentLoaded', function(){
  var waitG = setInterval(function(){
    if(window.guardPage){ clearInterval(waitG);
      guardPage({ popupIfIncomplete:true, minGrade:'stagiaire', onReady:function(p){
        // Synchroniser scores Firebase → localStorage
        if(p && p.examens){
          var scores={};
          Object.entries(p.examens).forEach(function(kv){
            scores[kv[0]]={pct:kv[1].pct,passed:kv[1].passed,date:kv[1].date};
          });
          localStorage.setItem('psy_exam_scores',JSON.stringify(scores));
        }
        renderAccueil();
      }});
    }
  }, 80);
});
</script>
</body>
</html>
