   correct:1, expl:'La cellulite cervicofaciale peut se propager par les espaces cervicaux profonds jusqu\'au médiastin (médiastinite), provoquant une mort en 24-48 heures. Signes d\'alarme : trismus, dysphagie, dyspnée. Traitement : incision large et drainage immédiat.'},
  {type:'vf',
   text:'On peut extraire une dent sur un foyer infectieux aigu avec abcès fluctuant.',
   correct:true, expl:'VRAI — L\'extraction sur abcès fluctuant est indiquée et libère le pus (drainage naturel). L\'anesthésie locale est toutefois moins efficace en milieu acide (abcès). On peut inciser l\'abcès d\'abord, puis extraire. JAMAIS d\'extraction sur cellulite diffuse (risque de diffusion).'},
  {type:'qcm',
   text:'La meilleure prévention de la carie en 1904 est :',
   choices:['Boire de l\'eau sucrée','Brossage des dents avec poudre abrasive + éviter le sucre raffiné','Prendre du calcium','Se rincer à l\'alcool'],
   correct:1, expl:'En 1904, on sait que les sucres fermentent et attaquent l\'émail. La poudre dentifrice (craie précipitée, charbon activé, bicarbonate) nettoie mécaniquement. Le brossage régulier + limitation du sucre raffiné (récent en 1904) restent la meilleure prévention disponible.'},
  {type:'qcm',
   text:'L\'ostéite de la mâchoire (ostéomyélite) post-extraction est favorisée par :',
   choices:['Un brossage trop vigoureux','Une extraction sur terrain septique ou un patient débilité (alcoolisme, malnutrition)','Un patient trop jeune','Une anesthésie insuffisante'],
   correct:1, expl:'L\'ostéomyélite maxillaire est une infection osseuse grave. Terrain favorisant : infection préexistante, immunodépression, malnutrition, alcoolisme chronique. Signes : douleur osseuse profonde, séquestre (os mort), fistule. Traitement : séquestrectomie + antisepsie locale prolongée.'},
  {type:'vf',
   text:'La douleur après extraction disparaît toujours en moins de 24 heures.',
   correct:false, expl:'FAUX — L\'alvéolite sèche (dry socket) survient J2-J4 quand le caillot sanguin se lyse avant cicatrisation. Douleur irradiante intense, alvéole vide et malodorante. Traitement : nettoyage doux, obturation temporaire à l\'eugénol (huile de girofle antiseptique). Douleur peut durer 1-2 semaines.'},
  {type:'qcm',
   text:'L\'huile de girofle (eugénol) est utilisée en dentisterie pour :',
   choices:['L\'anesthésie locale injectée','Ses propriétés antiseptiques et analgésiques locales (pansements, alvéolite)','Blanchir les dents','Extraire les racines'],
   correct:1, expl:'L\'eugénol (principe actif de l\'huile de girofle) est antiseptique et analgésique de contact. En 1904, utilisé en pansements dans les caries profondes, les alvéolites, les pulpites. Encore utilisé aujourd\'hui dans les ciments dentaires (oxyde de zinc-eugénol).'},
  {type:'cas', partie:'Partie II — Cas cliniques',
   cas:'Homme de 40 ans, douleur de joue gauche depuis 5 jours, gonflement sous l\'œil gauche, fièvre 38,8 °C. La dent 25 (prémolaire) est nécrosée.',
   text:'Votre action ?',
   choices:['Antibiotiques et revoir dans 15 jours','Extraction de la 25 + drainage de l\'abcès jugal si fluctuant, surveillance rapprochée','Analgésiques seulement','Attendre l\'évolution naturelle'],
   correct:1, expl:'Abcès jugal d\'origine dentaire avec fièvre = ne pas temporiser. Extraction de la dent causale + incision-drainage si collection fluctuante. Surveiller l\'extension cervicale (trismus, dysphagie = cellulite diffuse → urgence). Les antibiotiques seuls sans drainage sont insuffisants sur une collection formée.'},
  {type:'cas',
   cas:'Après extraction d\'une molaire inférieure J3, patient avec douleur intense irradiante vers l\'oreille, alvéole vide et malodorante.',
   text:'Diagnostic et traitement ?',
   choices:['Infection post-opératoire banale — antibiotiques','Alvéolite sèche — nettoyage doux de l\'alvéole, pansement à l\'eugénol, antalgiques','Douleur normale post-extraction — rassurer','Réextraction pour voir'],
   correct:1, expl:'Alvéolite sèche : perte précoce du caillot sanguin, os alvéolaire exposé. Douleur irradiante caractéristique vers oreille/tempe. Traitement : irrigation douce à l\'eau tiède, pansement à l\'eugénol protecteur et analgésique. Guérison sous 7-14 jours. Ne pas cureter agressivement.'},
  {type:'cas',
   cas:'Enfant de 8 ans, dent de lait infectée avec fistule gingivale. Les parents veulent absolument garder la dent.',
   text:'Votre conseil ?',
   choices:['Garder la dent coûte que coûte — la dent définitive compensera','Extraire la dent de lait infectée — le foyer peut infecter le germe de la dent définitive sous-jacente','Antibiotiques à vie jusqu\'à la chute naturelle','Aucun traitement — la dent de lait tombera seule'],
   correct:1, expl:'Une dent de lait infectée chronique met en danger le germe de la dent définitive sous-jacent. L\'infection peut détruire l\'émail de la dent permanente avant même son éruption (dent de Turner). Extraction indiquée. La dent définitive fait son éruption normalement.'},
  {type:'cas',
   cas:'Patient nécessitant une extraction. Vous injectez de la cocaïne en anesthésie locale. Quelques minutes après, le patient est agité, tachycarde, transpire.',
   text:'Que se passe-t-il et que faites-vous ?',
   choices:['Réaction normale — continuer l\'extraction','Signe de surdosage ou de passage vasculaire de cocaïne — stopper l\'injection, allonger le patient, surveiller le pouls','Simple anxiété — rassurer','Allergie — continuer quand même'],
   correct:1, expl:'La cocaïne est un vasoconstricteur et stimulant du système nerveux central. Agitation + tachycardie + sueurs après injection = signe de passage vasculaire ou surdosage. Stopper immédiatement. Allonger le patient, surveiller le pouls. Convulsions et arrêt cardiaque possibles en cas de surdosage franc. La dose dentaire doit être minimale.'},
  {type:'cas',
   cas:'Femme de 55 ans, douleur mandibulaire gauche depuis 3 semaines, sans carie visible, sans dent infectée, douleur irradiante vers l\'oreille et la tempe.',
   text:'Qu\'évoquez-vous en plus d\'une cause dentaire ?',
   choices:['Carie profonde non visible — extraire toutes les dents suspectes','Névralgie du trijumeau ou pathologie de l\'articulation temporo-mandibulaire — examen complet avant tout acte irréversible','Douleur simulée','Sinusite maxillaire'],
   correct:1, expl:'Toute douleur faciale n\'est pas dentaire. La névralgie du trijumeau (douleur intense, décharges électriques) et les pathologies articulaires temporo-mandibulaires sont fréquentes chez la femme de 50-60 ans. Extraire des dents saines est une erreur grave et irréversible. Examen complet avant tout acte.'},
 ]},

{id:'s7', icon:'👁️', title:'Certification Ophtalmologue', reqScore:80, totalQ:15,
 meta:['15 questions','80% requis','Titre : Ophtalmologue certifié'],
 questions:[
  {type:'qcm', partie:'Partie I — Théorie',
   text:'L\'ophtalmoscope, permettant l\'examen du fond d\'œil, est inventé par :',
   choices:['Pasteur en 1860','Helmholtz en 1851','Lister en 1867','Freud en 1895'],
   correct:1, expl:'Hermann von Helmholtz invente l\'ophtalmoscope en 1851. Révolution : pour la première fois, on peut voir directement la rétine, le nerf optique et les vaisseaux sans ouvrir l\'œil. Permet de diagnostiquer glaucome, décollement de rétine, et signes neurologiques (œdème papillaire).'},
  {type:'qcm',
   text:'L\'œdème papillaire bilatéral au fond d\'œil évoque en priorité :',
   choices:['Un glaucome','Une hypertension intracrânienne','Une cataracte','Une conjonctivite'],
   correct:1, expl:'La papille (nerf optique) peut être refoulée par une pression intracrânienne élevée — tumeur, méningite, hématome. Signe précoce et précieux. Un œdème papillaire bilatéral = chercher une cause neurologique urgente. Contrindique la ponction lombaire avant neurochirurgie.'},
  {type:'vf',
   text:'La cataracte en 1904 se traite médicalement par des collyres.',
   correct:false, expl:'FAUX — La cataracte (opacification du cristallin) n\'a aucun traitement médical à aucune époque. En 1904, l\'opération de la cataracte (ablation du cristallin) est réalisée sous cocaïne locale. Technique : extraction extra-capsulaire. Résultats bons dans les mains expertes, catastrophiques sinon.'},
  {type:'qcm',
   text:'Le trachome, cause majeure de cécité mondiale en 1904, est transmis par :',
   choices:['Voie sanguine','Contact direct (mains, mouches) — infection à Chlamydia trachomatis','L\'eau de pluie','Hérédité'],
   correct:1, expl:'Le trachome est une kératoconjonctivite à Chlamydia (bactérie intracellulaire, non connue comme telle en 1904). Endémique dans les zones pauvres et arides. Transmission par contact avec sécrétions oculaires, mouches. Cicatrices progressives de la conjonctive → entropion → opacification cornéenne → cécité.'},
  {type:'qcm',
   text:'Devant un œil rouge douloureux avec halo coloré autour des lumières et vision floue, vous évoquez :',
   choices:['Conjonctivite banale','Crise de glaucome aigu à angle fermé — urgence absolue','Corps étranger superficiel','Kératite herpétique'],
   correct:1, expl:'Triade glaucome aigu : œil rouge + douleur intense + halos colorés (cornée oedématiée). La pression intraoculaire monte brutalement (40-70 mmHg au lieu de 15). Sans traitement en quelques heures : nécrose du nerf optique, cécité définitive. Urgence absolue.'},
  {type:'vf',
   text:'L\'ophtalmie des nouveau-nés (conjonctivite gonococcique) peut entraîner la cécité.',
   correct:true, expl:'VRAI — L\'ophtalmie néonatale à gonocoque, contractée lors du passage dans les voies génitales d\'une mère infectée, peut perforer la cornée en 2-3 jours et provoquer une cécité définitive. Méthode de Credé (1880) : instillation de nitrate d\'argent à la naissance. Réduit la cécité néonatale de 10 % à moins de 0,5 %.'},
  {type:'qcm',
   text:'Une pupille en mydriase (dilatée) fixe unilatérale chez un patient comateux indique :',
   choices:['Un simple choc vagal','Un engagement temporal — compression du nerf oculomoteur par hernie cérébrale','Une intoxication à l\'atropine','Un simple traumatisme de l\'iris'],
   correct:1, expl:'Pupille fixe dilatée unilatérale chez le comateux = engagement temporal (hernie transtentorielle). Le lobe temporal comprime le nerf III (oculomoteur). Signe d\'alarme neurochirurgicale extreme — mort imminente sans décompression. En 1904 : trépanation d\'urgence si possible.'},
  {type:'qcm',
   text:'La cocaïne en collyre est utilisée en ophtalmologie en 1904 pour :',
   choices:['Traiter le glaucome','Anesthésie topique pour les interventions oculaires','Dilater la pupille pour le fond d\'œil','Traiter les infections oculaires'],
   correct:1, expl:'Depuis la découverte de Koller (1884), la cocaïne à 2-4 % en collyre est l\'anesthésique de surface de référence pour les interventions oculaires : extractions de corps étrangers, chirurgie de la cataracte, examens douloureux. Elle provoque aussi une légère mydriase et vasoconstriction.'},
  {type:'vf',
   text:'Une perte brutale et indolore de la vision d\'un œil est une urgence.',
   correct:true, expl:'VRAI — Perte visuelle brutale et indolore : décollement de rétine (photopsies + voile sombre), occlusion de l\'artère centrale de la rétine (ischémie), occlusion de la veine centrale. Toutes sont des urgences où chaque heure compte pour espérer récupérer la vision. En 1904 les ressources sont limitées mais l\'examen au fond d\'œil est décisif.'},
  {type:'qcm',
   text:'L\'atropine en collyre dilate la pupille (mydriatique) et sert à :',
   choices:['Traiter les infections','Examiner le fond d\'œil et traiter l\'uvéite','Réduire la pression oculaire','Anesthésier l\'œil'],
   correct:1, expl:'L\'atropine bloque les récepteurs muscariniques de l\'iris (muscle sphincter) → mydriase et cycloplégie (paralysie de l\'accommodation). Utilisée pour examiner le fond d\'œil (dilatation pupillaire), traiter l\'uvéite (empêche les synéchies), traiter le strabisme accommodatif chez l\'enfant. Contre-indiquée en cas de glaucome.'},
  {type:'cas', partie:'Partie II — Cas cliniques',
   cas:'Homme de 60 ans, voit de moins en moins bien la nuit, vision tubulaire (comme un tunnel), fond d\'œil révèle une excavation de la papille et une pression oculaire élevée.',
   text:'Votre diagnostic ?',
   choices:['Cataracte — opérer','Glaucome chronique à angle ouvert — traitement pour réduire la pression oculaire','Décollement de rétine — urgence','Névrite optique'],
   correct:1, expl:'Triade du glaucome chronique : vision tubulaire progressive + excavation papillaire + hypertension oculaire. Contrairement au glaucome aigu, il est indolore et insidieux — le patient consulte tard. En 1904 : ésérine ou pilocarpine en collyre pour réduire la pression. Évolution vers cécité sans traitement.'},
  {type:'cas',
   cas:'Enfant de 4 ans avec déviation d\'un œil vers l\'intérieur (strabisme convergent) depuis 6 mois. Il ne se plaint de rien.',
   text:'Pourquoi traiter rapidement ce strabisme ?',
   choices:['Pour des raisons esthétiques uniquement','Pour prévenir l\'amblyopie — le cerveau va ignorer l\'œil dévié si non traité, entraînant une cécité fonctionnelle définitive','Aucune urgence — attendre l\'adolescence','Ce strabisme disparaît toujours seul'],
   correct:1, expl:'Amblyopie (œil paresseux) : le cerveau supprime l\'image de l\'œil dévié pour éviter la diplopie. Avant 7-8 ans (période critique), cette suppression devient définitive. Traitement : occlusion de l\'œil sain pour forcer l\'utilisation de l\'œil amblyope. Après la période critique : amblyopie irréversible.'},
  {type:'cas',
   cas:'Patient revenant d\'une région où le trachome est endémique. Ses paupières présentent des granulations et ses cils se retournent vers l\'intérieur (entropion).',
   text:'Quel est le danger immédiat ?',
   choices:['Douleur — traiter par analgésiques','Les cils retournés érodent la cornée à chaque clignement — risque de kératite et cécité par opacification cornéenne','Simple irritation — rassurer','Contagion pour le médecin uniquement'],
   correct:1, expl:'L\'entropion cicatriciel (retournement des paupières vers l\'intérieur) est une complication du trachome tardif. Chaque clignement = cils qui rayent la cornée. Kératite traumatique chronique → vascularisation cornéenne (pannus) → opacification → cécité. Traitement chirurgical de l\'entropion en urgence pour sauver la cornée.'},
  {type:'cas',
   cas:'Après un coup de poing sur l\'œil, patient avec vision double (diplopie) et enfoncement du plancher de l\'orbite visible.',
   text:'Qu\'évoque cette situation ?',
   choices:['Contusion simple — glace et repos','Fracture en trappe du plancher de l\'orbite avec hernie du muscle droit inférieur — urgence chirurgicale pour libérer le muscle incarcéré','Décollement de rétine — fond d\'œil','Hémophtalmie — résorption spontanée'],
   correct:1, expl:'Fracture en trappe du plancher orbitaire : le muscle droit inférieur est incarcéré dans la fracture → paralysie du regard vers le bas → diplopie verticale. Si non libéré rapidement : fibrose irréversible du muscle. Urgence chirurgicale dans les 24-48 heures.'},
  {type:'cas',
   cas:'Nourrisson de 3 semaines avec conjonctivite purulente bilatérale abondante, depuis J2 de vie.',
   text:'Votre priorité ?',
   choices:['Simple conjonctivite banale — eau bouillie','Ophtalmie néonatale (probable gonococcique) — nettoyage immédiat, nitrate d\'argent ou antiseptique, traitement maternel','Attendre que ça passe','Fermer les yeux avec un pansement'],
   correct:1, expl:'Conjonctivite purulente à J2-J3 chez le nouveau-né = ophtalmie néonatale gonococcique jusqu\'à preuve du contraire. Risque de cécité en 48-72h sans traitement. Nettoyage toutes les heures, nitrate d\'argent ou collyre antiseptique. Traitement de la mère (gonorrhée maternelle non diagnostiquée). Urgence.'},
 ]},

{id:'s8', icon:'👂', title:'Certification ORL', reqScore:80, totalQ:15,
 meta:['15 questions','80% requis','Titre : ORL certifié'],
 questions:[
  {type:'qcm', partie:'Partie I — Théorie',
   text:'La trachéotomie est indiquée en urgence dans :',
   choices:['Toute laryngite','L\'obstruction des voies aériennes supérieures menaçant l\'asphyxie','Toute angine','Les épistaxis sévères'],
   correct:1, expl:'La trachéotomie (ouverture chirurgicale de la trachée) est un acte de sauvetage quand les voies aériennes supérieures sont obstruées : croup diphtérique, corps étranger non extractible, œdème laryngé, tumeur. En 1904, elle sauve des centaines d\'enfants atteints de diphtérie.'},
  {type:'qcm',
   text:'Le croup diphtérique provoque l\'asphyxie par :',
   choices:['Destruction des cordes vocales','Formation d\'une fausse membrane obstruant progressivement le larynx','Paralysie des muscles respiratoires d\'emblée','Œdème allergique'],
   correct:1, expl:'La bactérie de la diphtérie (Corynebacterium diphtheriae) produit une toxine qui provoque une nécrose épithéliale. La fausse membrane fibrinopurulente croît et obstrue progressivement le larynx. Stridor + tirage intercostal + cyanose = urgence. Trachéotomie si l\'antitoxine n\'est pas disponible.'},
  {type:'vf',
   text:'Une otite moyenne non traitée peut provoquer une méningite.',
   correct:true, expl:'VRAI — L\'oreille moyenne communique avec la mastoïde (cellules mastoïdiennes osseuses). Une otite non traitée peut évoluer vers la mastoïdite, puis vers la méningite (par l\'os pétreux) ou l\'abcès cérébral. En 1904 : drainage chirurgical (mastoïdectomie) si méningite otogène suspectée.'},
  {type:'qcm',
   text:'Le traitement d\'urgence d\'un corps étranger nasal chez l\'enfant qui obstrue complètement une narine est :',
   choices:['Faire souffler fort par le nez','Tentative d\'extraction sous visualisation directe avec instrument adapté — jamais à l\'aveugle','Attendre que ça vienne seul','Faire boire beaucoup d\'eau'],
   correct:1, expl:'Corps étranger nasal : extraction sous vision directe avec crochet ou pince à anneau, après anesthésie locale si possible. Jamais à l\'aveugle (risque d\'enfoncement vers les voies aériennes). Souffler par le nez peut déplacer le corps étranger dans le larynx — danger. Crichotomie si asphyxie.'},
  {type:'qcm',
   text:'L\'épistaxis (saignement du nez) postérieure grave se contrôle par :',
   choices:['Pincement des narines 5 minutes','Tamponnement postérieur avec mèche iodoformée remontant dans le nasopharynx','Glace sur la nuque uniquement','Faire cracher le sang'],
   correct:1, expl:'L\'épistaxis postérieure vient des artères du nasopharynx (tache vasculaire postérieure). Le pincement nasal est inefficace. Tamponnement postérieur : mèche passée dans la fosse nasale jusqu\'au nasopharynx, ancrée. En 1904 : sulfate de fer ou perchlorure de fer comme hémostatiques locaux.'},
  {type:'vf',
   text:'La surdité brutale unilatérale est toujours bénigne.',
   correct:false, expl:'FAUX — Surdité brutale unilatérale peut être : bouchon de cérumen (bénin), otite (bénin), rupture de la membrane tympanique (trauma), fracture du rocher, accident vasculaire cochléaire (ischémie de l\'artère auditoire interne — urgence). Examen systématique nécessaire.'},
  {type:'qcm',
   text:'La mastoïdite aiguë post-otite se manifeste par :',
   choices:['Douleur d\'oreille simple','Tuméfaction douloureuse rétro-auriculaire avec décolllement du pavillon en avant et fièvre élevée','Simple acouphène','Vertige isolé'],
   correct:1, expl:'La mastoïdite : l\'infection de l\'otite envahit la mastoïde (os temporal poreux). Clinique caractéristique : tuméfaction rétro-auriculaire rouge et chaude + le pavillon est décollé vers l\'avant et le bas. Fièvre élevée. Risque de méningite, abcès de Bezold (cervical), labyrinthite. Mastoïdectomie en urgence.'},
  {type:'qcm',
   text:'Le symptôme cardinal de la labyrinthite (atteinte de l\'oreille interne) est :',
   choices:['Surdité unilatérale isolée','Vertiges rotatoires intenses avec nausées, vomissements et nystagmus (mouvements involontaires des yeux)','Douleur d\'oreille','Bourdonnement d\'oreille isolé'],
   correct:1, expl:'Le labyrinthe contient les organes de l\'équilibre (canaux semi-circulaires) et de l\'audition (cochlée). Labyrinthite = vertige rotatoire violent + nystagmus + nausées/vomissements. Peut s\'accompagner d\'une surdité. Complication d\'une otite ou d\'une méningite. En 1904 : repos strict, bromure.'},
  {type:'vf',
   text:'L\'angine à fausses membranes (diphtérique) est bénigne et ne nécessite pas d\'isolement.',
   correct:false, expl:'FAUX — L\'angine diphtérique est mortelle sans antitoxine. Les fausses membranes gris-blanc, adhérentes, saignant au décollement sont pathognomoniques. La toxine diphtérique cause paralysies et myocardite. ISOLEMENT strict (très contagieux). Antitoxine diphthérique si disponible. Trachéotomie si croup associé.'},
  {type:'qcm',
   text:'Quel geste réalisez-vous en premier devant un corps étranger laryngé chez un enfant qui s\'étouffe et ne peut plus parler ?',
   choices:['Attendre qu\'il tousse spontanément','Tapes dans le dos et compression abdominale (manœuvre de Heimlich adaptée) pour expulser le corps étranger','Trachéotomie immédiate','Faire boire de l\'eau'],
   correct:1, expl:'Corps étranger laryngé avec obstruction complète : 5 tapes dans le dos entre les omoplates, puis 5 compressions abdominales sous-diaphragmatiques (Heimlich). Répéter jusqu\'à expulsion. Si échec et cyanose : laryngoscopie directe d\'extraction ou cricotomie (incision cricothyroïdienne) en dernier recours.'},
  {type:'cas', partie:'Partie II — Cas cliniques',
   cas:'Enfant de 3 ans ramené en urgence. Depuis 2 heures : fièvre 40 °C, voix éteinte, stridor inspiratoire, tirage intercostal, cyanose des lèvres.',
   text:'Diagnostic et action immédiate ?',
   choices:['Laryngite striduleuse banale — humidifier l\'air','Croup diphtérique ou épiglottite sévère — trachéotomie en urgence avant asphyxie complète','Angine — antibiotiques par voie orale','Corps étranger — tapes dans le dos'],
   correct:1, expl:'Stridor + tirage + fièvre élevée + cyanose = obstruction des voies aériennes hautes en progression. En 1904 la diphtérie est la première cause. La trachéotomie est l\'acte qui sauve la vie — ne pas attendre. Parallèlement : antitoxine diphtérique si disponible. Chaque minute compte.'},
  {type:'cas',
   cas:'Enfant de 7 ans avec otite moyenne bilatérale récidivante. Depuis 6 mois : surdité partielle, difficultés scolaires, parle fort. Examen : tympans bombés, gris, sans perforation.',
   text:'Votre diagnostic ?',
   choices:['Surdité de perception — nerf auditif atteint','Otite séromuqueuse (oreille collante) — liquide visqueux dans l\'oreille moyenne bloquant la transmission','Simple retard de langage','Simulation'],
   correct:1, expl:'L\'otite séromuqueuse (glue ear) : l\'oreille moyenne se remplit d\'un liquide épais et visqueux qui bloque la chaîne ossiculaire. Surdité de transmission progressive. Cause fréquente de retard de langage. En 1904 : paracentèse (incision du tympan) pour évacuer. Traitement limité avant les aérateurs tympaniques (XX° s.).'},
  {type:'cas',
   cas:'Homme de 45 ans, nez bouché chronique, maux de tête frontaux, sécrétions purulentes postérieures depuis 3 semaines après un rhume.',
   text:'Diagnostic probable ?',
   choices:['Rhume prolongé — rassurer','Sinusite frontale ou maxillaire chronique — traitement antiseptique local, décongestionnants, ponction-lavage si nécessaire','Tumeur nasale — biopsie urgente','Rhinite allergique'],
   correct:1, expl:'Sinusite post-rhinite : le mucus du rhume obstrue les ostiums des sinus, stagnation et surinfection bactérienne. Frontal : douleur sus-orbitaire. Maxillaire : douleur sous-orbitaire + dents du haut douloureuses. Traitement : décongestionnants, antiseptiques locaux. Ponction-lavage du sinus maxillaire (trocart) si échec.'},
  {type:'cas',
   cas:'Après une bagarre, patient avec déviation nasale, epistaxis, nez douloureux et oedème. La radiographie (si disponible) confirme une fracture des os propres.',
   text:'Quand et comment réduire la fracture ?',
   choices:['Immédiatement sous morphine','Dans les 48-72 premières heures avant oedème important (ou après 10-14 jours une fois l\'oedème résorbé) — réduction sous anesthésie locale','Jamais — ça se remet seul','Attendre 6 mois'],
   correct:1, expl:'Fracture des os propres du nez : la réduction optimale se fait dans les 48-72 premières heures avant consolidation. Si l\'œdème est trop important : attendre sa résorption (10-14 jours) avant réduction chirurgicale. Au-delà de 3 semaines : os consolidé en mauvaise position, ostéotomie nécessaire.'},
  {type:'cas',
   cas:'Enfant de 5 ans avec amygdales très volumineuses, ronfle la nuit, a eu 6 angines en 1 an, difficultés à avaler.',
   text:'Votre recommandation ?',
   choices:['Garder les amygdales coûte que coûte','Amygdalectomie (ablation des amygdales) — infections récidivantes > 5/an + hypertrophie obstructive = indication validée','Antibiotiques à vie','Régime alimentaire particulier'],
   correct:1, expl:'Indications classiques d\'amygdalectomie : angines récidivantes (> 5/an) ET/OU hypertrophie obstructive (dysphagie, ronflement, apnées). En 1904 l\'amygdalectomie est un acte courant. Technique sous chloroforme, hémostase par ligature ou caustique. Risque hémorragique post-opératoire : surveillance 24h.'},
 ]},

{id:'s9', icon:'🧬', title:'Certification Dermatologue', reqScore:80, totalQ:15,
 meta:['15 questions','80% requis','Titre : Dermatologue certifié'],
 questions:[
  {type:'qcm', partie:'Partie I — Théorie',
   text:'La syphilis primaire se manifeste par :',
   choices:['Une éruption généralisée','Un chancre : ulcération indolore au point d\'inoculation avec adénopathie satellite','Une fièvre isolée','Des pustules sur le visage'],
   correct:1, expl:'Le chancre syphilitique primaire est une ulcération indolore (important : le patient ne consulte souvent pas), à base indurée (carton), avec adénopathie inguinale ferme et indolore. Disparaît spontanément en 3-6 semaines. Le patient croit être guéri — il ne l\'est pas.'},
  {type:'qcm',
   text:'La roséole syphilitique (syphilis secondaire) se différencie des autres éruptions car :',
   choices:['Elle est très prurigineuse','Elle est non prurigineuse, maculeuse, touche les paumes et les plantes — signe quasi pathognomonique','Elle touche uniquement le visage','Elle est vésiculeuse'],
   correct:1, expl:'La roséole syphilitique : macules rosées, non prurigineuses, touchant le tronc ET les paumes/plantes (caractéristique). La non-démangeaison dans une éruption généralisée oriente fortement vers la syphilis. Tous les malades de syphilis secondaire sont contagieux.'},
  {type:'vf',
   text:'L\'eczéma de contact et l\'eczéma atopique ont la même cause.',
   correct:false, expl:'FAUX — L\'eczéma de contact est une réaction allergique à une substance externe (nickel, latex, plantes). L\'eczéma atopique (constitution) est une prédisposition génétique à l\'hypersensibilité avec peau sèche chronique. Mécanismes différents, traitements similaires (éviction, corticoïdes topiques).'},
  {type:'qcm',
   text:'La gale (Sarcoptes scabiei) se transmet principalement par :',
   choices:['L\'air et la respiration','Le contact cutané prolongé direct et le partage de vêtements/literie','Les insectes piqueurs','L\'eau contaminée'],
   correct:1, expl:'La gale se transmet par contact cutané prolongé (partage d\'un lit, rapports sexuels, contacts familiaux intenses). Le Sarcoptes creuse des sillons dans l\'épiderme pour y déposer ses œufs. Signe pathognomonique : sillon acarien + vésicule perlée aux espaces interdigitaux, poignets, abdomen. Prurit nocturne intense.'},
  {type:'qcm',
   text:'Le traitement de référence de la gale en 1904 est :',
   choices:['Le soufre en pommade appliqué sur tout le corps','Les antibiotiques oraux','Les bains chauds uniquement','L\'arsenic par voie orale'],
   correct:0, expl:'La pommade soufrée (soufre précipité à 5-10 % dans du saindoux ou de la vaseline) est le traitement de la gale depuis le XVIII° siècle. Application sur tout le corps (sauf le visage) pendant 3-5 jours. Le soufre est acaricide. Désinfecter simultanément vêtements et literie pour éviter la recontamination.'},
  {type:'vf',
   text:'Un érythème migrant circulaire après piqûre de tique est un signe spécifique d\'infection.',
   correct:true, expl:'VRAI — L\'érythème migrant (maladie de Lyme, Borrelia burgdorferi) : macule érythémateuse s\'étendant en cercle autour du point de piqûre. Non décrit en 1904 (Willy Burgdorfer l\'isolera en 1982), mais la tique véhicule réellement une spirochète. En 1904 : "arthrite fébrile" après piqûre de tique, cause mystérieuse.'},
  {type:'qcm',
   text:'Le zona résulte de la réactivation de :',
   choices:['Un nouveau virus contracté en vieillissant','Le virus de la varicelle (VZV) latent dans les ganglions sensitifs depuis l\'enfance','Une infection bactérienne cutanée','Une allergie médicamenteuse'],
   correct:1, expl:'Le zona (Herpes zoster) : le virus de la varicelle reste latent dans les ganglions nerveux sensitifs après la primo-infection. Des décennies plus tard, une immunodépression (fatigue, stress, maladie) permet sa réactivation. Il suit le trajet d\'un nerf sensitif (dermatome) — unilatéral, douloureux, avec vésicules.'},
  {type:'qcm',
   text:'Un ulcère de jambe chronique chez un patient avec varices est probablement un ulcère :',
   choices:['Tuberculeux','De stase veineuse (ulcère variqueux) par insuffisance veineuse chronique','Syphilitique (gomme)','Cancéreux'],
   correct:1, expl:'L\'ulcère de stase : l\'insuffisance veineuse chronique (varices) provoque hypertension veineuse, stase, œdème chronique, trouble trophique → ulcère sus-malléolaire indolore à bords étalés. Traitement : compression (bandages), élévation du membre, antisepsie locale. Guérison lente (mois).'},
  {type:'vf',
   text:'L\'impétigo est contagieux et nécessite l\'isolement scolaire de l\'enfant.',
   correct:true, expl:'VRAI — L\'impétigo (infection streptococcique/staphylococcique superficielle) : vésicules qui se rompent en croûtes mielleuses jaunâtres. Très contagieux par contact direct, notamment chez l\'enfant. L\'isolement est nécessaire jusqu\'à guérison. Traitement local : nettoyage antiseptique, pommade.'},
  {type:'qcm',
   text:'L\'arsenicisme chronique (ingestion régulière de petites doses d\'arsenic) laisse des traces cutanées typiques :',
   choices:['Urticaire généralisée','Hyperpigmentation mélanique (mélanodermie) avec zones blanchâtres (leucodermie) et kératoses palmaires','Éruption vésiculeuse','Rosacée'],
   correct:1, expl:'L\'arsenicisme chronique : mélanodermie (taches brunes) avec îlots clairs (pluie sur poussière), kératoses palmaires et plantaires. La peau garde la mémoire de l\'intoxication des années après l\'arrêt. Les cheveux et ongles archivient également les dépôts (test de Marsh).'},
  {type:'cas', partie:'Partie II — Cas cliniques',
   cas:'Homme de 32 ans vient pour une "plaie" génitale. À l\'examen : ulcération arrondie, bords nets, fond propre, base indurée (dure au toucher), indolore. Adénopathie inguinale ferme bilatérale.',
   text:'Votre diagnostic immédiat et conduite ?',
   choices:['Furoncle — incision-drainage','Chancre syphilitique — isolement, traitement (mercure), prévenir la transmission, surveiller l\'évolution','Ulcère traumatique — cicatrisant spontanément','Chancre mou — douloureux donc non syphilitique'],
   correct:1, expl:'Chancre syphilitique : ulcère indolore + base indurée + adénopathie satellite indolore = triade classique. À ne pas confondre avec le chancre mou (H. ducreyi) douloureux. En 1904 : calomel (mercure) par voie orale ou en frictions locales. La pénicilline n\'existe pas encore. Prévenir toute relation sexuelle.'},
  {type:'cas',
   cas:'Famille entière : prurit nocturne intense depuis 2 semaines chez parents et enfants. L\'aîné a des sillons entre les doigts. La bonne de maison est aussi atteinte.',
   text:'Diagnostic et mesures ?',
   choices:['Allergie alimentaire commune — régime','Gale familiale — traitement simultané de tous les membres + désinfection literie/vêtements','Eczéma de contact — chercher l\'allergène','Urticaire infectieuse'],
   correct:1, expl:'Gale : prurit nocturne + sillons interdigitaux + contamination familiale et domestique. Traiter SIMULTANÉMENT tous les membres (même sans symptômes) sinon recontamination certaine. Laver literie et vêtements à 60 °C ou isoler en sac fermé 72h (les sarcoptes meurent sans hôte). Pommade soufrée ou solution de Meylan.'},
  {type:'cas',
   cas:'Femme de 60 ans, ulcère de jambe gauche depuis 3 mois, sus-malléolaire, bords plats, fond rosé, peu douloureux. Varices importantes.',
   text:'Quel est le traitement de base ?',
   choices:['Amputation prophylactique','Compression veineuse (bandage) + élévation du membre + antisepsie locale + traitement des varices','Morphine pour la douleur','Incision et drainage'],
   correct:1, expl:'Ulcère variqueux : la guérison nécessite de corriger l\'hypertension veineuse. Bandage compressif (fond à plat, comprimer les varices), élévation du membre la nuit, nettoyage quotidien (eau bouillie, antiseptique doux). Guérison en 2-6 mois si compliance. Récidive si varices non traitées.'},
  {type:'cas',
   cas:'Enfant de 6 ans avec éruption vésiculeuse diffuse prurigineuse apparue il y a 3 jours. Sa sœur a eu la même chose il y a 2 semaines.',
   text:'Diagnostic et mesures d\'isolement ?',
   choices:['Gale — traitement soufreux','Varicelle — contagieuse de J-2 avant éruption à croûtes sèches. Isolement scolaire 5 jours. Calamine pour le prurit. Surveiller les surinfections.','Impétigo — antiseptique local','Rougeole — vaccin'],
   correct:1, expl:'Varicelle : vésicules sur fond érythémateux, prurigineuses, différents stades simultanément (vésicule + pustule + croûte). Contagieuse par voie aérienne dès J-2. Isolement jusqu\'à dessèchement de toutes les croûtes. Calamine ou bicarbonate pour le prurit. Danger : surinfection bactérienne des vésicules grattées, pneumonie varicelleuse.'},
  {type:'cas',
   cas:'Homme de 55 ans, agriculteur, lésion ulcérée du dos de la main droite, bords irréguliers, fond granuleux, évoluant depuis 4 mois sans guérison malgré soins locaux.',
   text:'Que craignez-vous ?',
   choices:['Ulcère traumatique banal — soins prolongés','Épithélioma spinocellulaire (cancer cutané) sur kératose solaire — biopsie indispensable avant tout traitement','Syphilis tertiaire (gomme)','Anthrax (furoncles groupés)'],
   correct:1, expl:'Tout ulcère cutané qui ne guérit pas en 6-8 semaines malgré les soins = biopsie obligatoire. L\'épithélioma spinocellulaire touche les zones exposées (mains, visage) chez les travailleurs en plein air. En 1904 : excision chirurgicale large si diagnostic confirmé. La biopsie évite une amputation inutile ou un traitement insuffisant.'},
 ]},

{id:'s10', icon:'👶', title:'Certification Pédiatre', reqScore:80, totalQ:15,
 meta:['15 questions','80% requis','Titre : Pédiatre certifié'],
 questions:[
  {type:'qcm', partie:'Partie I — Théorie',
   text:'La principale cause de mortalité infantile avant 5 ans en 1904 est :',
   choices:['Les traumatismes','Les maladies infectieuses (diarrhée, pneumonie, diphtérie, rougeole)','La malnutrition isolée','Les maladies cardiaques congénitales'],
   correct:1, expl:'En 1904, 1 enfant sur 4 meurt avant 5 ans dans les pays développés, 1 sur 2 dans les zones rurales pauvres. La diarrhée des nourrissons (déshydratation), la pneumonie, la diphtérie, la scarlatine et la rougeole sont les principales tueuses. L\'hygiène et la réhydratation sauvent des vies même sans antibiotiques.'},
  {type:'qcm',
   text:'Le signe le plus fiable de déshydratation sévère chez le nourrisson est :',
   choices:['La fièvre','La fontanelle antérieure déprimée + pli cutané persistant + yeux creux + absence de larmes','Les pleurs','La diarrhée elle-même'],
   correct:1, expl:'Déshydratation sévère : fontanelle enfoncée (pression intracrânienne basse), pli cutané (la peau reste plissée après être pincée), yeux creux, muqueuses sèches, absence de larmes, oligurie. Perte de > 10 % du poids corporel = urgence vitale. Réhydratation orale ou par clystère (rectale) en 1904 faute de perfusion IV.'},
  {type:'vf',
   text:'On peut donner du lait de vache non modifié à un nourrisson de 1 mois.',
   correct:false, expl:'FAUX — Le lait de vache non modifié est inadapté au nourrisson : trop de protéines (surcharge rénale), pas assez de lactose, manque en acides gras essentiels, excès de sodium. Mortalité élevée avec alimentation exclusive au lait de vache non dilué. Le lait maternel est irremplaçable ou, à défaut, lait dilué + sucre en 1904.'},
  {type:'qcm',
   text:'La rougeole est grave chez le nourrisson principalement à cause de :',
   choices:['La fièvre en elle-même','Les complications : pneumonie, encéphalite, cécité par kératite. Mortalité 1-5% même dans les pays développés en 1904.','Les éruptions cutanées','L\'isolation sociale'],
   correct:1, expl:'La rougeole est une infection virale immunodéprimante. Les vraies tueuses sont les complications bactériennes secondaires : pneumonie (30 % des décès), otite → mastoïdite, encéphalite (1/1000, 30 % de mortalité), kératite → cécité (malnutrition). La "maladie bénigne de l\'enfance" tue encore des milliers en 1904.'},
  {type:'qcm',
   text:'La convulsion fébrile simple chez l\'enfant de 18 mois avec fièvre à 40 °C — votre attitude ?',
   choices:['Hospitalisation urgente pour méningite','Refroidir l\'enfant (déshabiller, éponger), surveiller la durée de la convulsion, position latérale de sécurité. Une convulsion fébrile simple cède en < 5 min.','Prescrire du bromure de façon définitive','Ponction lombaire systématique'],
   correct:1, expl:'Convulsion fébrile simple (< 5 min, généralisée, enfant < 6 ans, fièvre haute) : presque toujours bénigne. Refroidir l\'enfant. Position latérale de sécurité. Si la convulsion dure > 5 min ou est focalisée : chercher une méningite (ponction lombaire). La convulsion fébrile simple ne laisse pas de séquelle.'},
  {type:'vf',
   text:'La diphtérie peut tuer par toxine cardiaque plusieurs semaines après la guérison apparente des symptômes pharyngés.',
   correct:true, expl:'VRAI — La toxine diphtérique provoque une myocardite (inflammation du muscle cardiaque) et des paralysies (voile du palais, accommodation, membres). Ces complications peuvent survenir 2-6 semaines après la guérison des angines. Repos strict prolongé obligatoire même chez le patient "guéri".'},
  {type:'qcm',
   text:'Le traitement spécifique de la diphtérie en 1904 est :',
   choices:['La quinine','L\'antitoxine diphtérique (sérothérapie de von Behring, 1894)','La saignée','L\'aspirine'],
   correct:1, expl:'Von Behring (Nobel 1901) développe la sérothérapie antidiphtérique en 1894. Le sérum de cheval immunisé neutralise la toxine. Premier traitement ciblé d\'une maladie infectieuse par sérothérapie. Efficace si donné tôt. La trachéotomie reste nécessaire si le croup obstrue le larynx.'},
  {type:'qcm',
   text:'L\'ictère du nouveau-né apparaissant à J1 de vie est :',
   choices:['Un ictère physiologique normal — rassurer','Un ictère pathologique précoce (probable incompatibilité rhésus ou ABO) — urgence','Une infection bénigne','Un problème hépatique héréditaire'],
   correct:1, expl:'L\'ictère à J1 est TOUJOURS pathologique. L\'ictère physiologique normal commence à J2-J3 et est dû à la destruction des globules rouges fœtaux. À J1 : incompatibilité fœto-maternelle (rhésus ou ABO), avec hémolyse massive et bilirubine libre neurotoxique → ictère nucléaire (encéphalopathie) → décès ou séquelles graves.'},
  {type:'vf',
   text:'La coqueluche est bénigne chez le nourrisson de moins de 3 mois.',
   correct:false, expl:'FAUX — La coqueluche est particulièrement dangereuse avant 6 mois : accès de quintes sans "reprise" sifflante typique, cyanose, apnées, bradycardie, mort subite. Mortalité de 1-3 % chez les nourrissons non vaccinés. Les nourrissons contractent la coqueluche de leurs parents ou de l\'entourage adulte non vacciné.'},
  {type:'qcm',
   text:'Un enfant de 3 ans ne marche pas encore, retard de langage, fontanelle encore ouverte, membres courts. Vous évoquez :',
   choices:['Un simple retard constitutionnel — attendre','Rachitisme probable (carence en vitamine D) et/ou hypothyroïdie — examen et traitement sans délai','Autisme — consultation spécialisée','Malnutrition calorique isolée'],
   correct:1, expl:'Le rachitisme (carence en vitamine D) en 1904 : déformations osseuses (crâne mou, chapelet costal, jambes en O), retard de fermeture des fontanelles, hypotonie. L\'hypothyroïdie congénitale (crétinisme) : retard mental et physique, visage bouffi. Les deux se traitent efficacement si diagnostiqués tôt.'},
  {type:'cas', partie:'Partie II — Cas cliniques',
   cas:'Nourrisson de 4 mois amené pour diarrhée depuis 3 jours. Il n\'a pas uriné depuis 12 heures, fontanelle enfoncée, pleure sans larmes, peau qui se plisse quand on la pince.',
   text:'Quel est le degré de déshydratation et l\'urgence ?',
   choices:['Déshydratation légère — continuer l\'allaitement','Déshydratation sévère (> 10% du poids) — réhydratation urgente par voie orale ou rectale (clystère), surveiller le pouls et la conscience','Aucune déshydratation — surveiller','Chirurgie d\'urgence'],
   correct:1, expl:'Déshydratation sévère chez le nourrisson : fontanelle déprimée + pli cutané persistant + oligurie + absence de larmes. Sans réhydratation : choc hypovolémique, mort en heures. En 1904 : réhydratation orale (eau sucrée salée) si conscient, lavement rectal si inconscient. Surveiller toutes les 30 min.'},
  {type:'cas',
   cas:'Enfant de 6 ans, fièvre depuis 5 jours, angine à fausses membranes grisâtres qui saignent au décollement, voix nasonnée, enfant épuisé.',
   text:'Diagnostic et urgence ?',
   choices:['Angine banale — paracétamol','Diphtérie probable — isolement strict, antitoxine en urgence, surveiller la trachée, repos cardio-vasculaire absolu','Mononucléose infectieuse — repos','Abcès périamygdalien — incision'],
   correct:1, expl:'Angine diphtérique : fausses membranes gris-blanc adhérentes saignant au décollement (non retrouvées dans les autres angines). Voix nasonnée (paralysie naissante). Isolement immédiat. Antitoxine sans attendre la confirmation bactériologique. Surveiller la propagation laryngée (stridor) et le cœur (myocardite).'},
  {type:'cas',
   cas:'Nouveau-né à terme, accouchement par forceps. Depuis la naissance : bras droit en rotation interne, coude en extension, poignet fléchi ("main de garçon de café"). Pas de fracture visible.',
   text:'Votre diagnostic ?',
   choices:['Fracture de l\'humérus — attelle','Paralysie obstétricale du plexus brachial (paralysie d\'Erb-Duchenne C5-C6) — immobilisation douce, rééducation précoce','Dislocation de l\'épaule — réduction','Rien — position normale du nouveau-né'],
   correct:1, expl:'Paralysie d\'Erb (C5-C6) : élongation ou déchirure du plexus brachial lors de la traction sur la tête pendant l\'accouchement. Posture caractéristique "main de garçon de café". Traitement : immobilisation en position anatomique pour éviter les rétractions, rééducation précoce. 90 % récupèrent en quelques mois.'},
  {type:'cas',
   cas:'Enfant de 2 ans, nuit précédente : toux aboyante brutale, stridor inspiratoire, fièvre modérée 38 °C. Ce matin : calme, mange normalement.',
   text:'Diagnostic et conseils aux parents ?',
   choices:['Diphtérie — urgence hospitalière','Laryngite sous-glottique (croup viral) — humidification de l\'air, air frais de la nuit. Bénin mais surveiller aggravation.','Corps étranger — radiographie','Épiglottite — urgence'],
   correct:1, expl:'Croup viral (laryngite sous-glottique) : crise nocturne + toux aboyante + stridor + amélioration spontanée au petit matin (air frais et humide). Fièvre modérée. À distinguer de la diphtérie (fièvre élevée, fausses membranes, pas d\'amélioration spontanée) et de l\'épiglottite (urgence vitale, enfant plus grand). Traitement : air humide et frais.'},
  {type:'cas',
   cas:'Enfant de 7 ans avec "scarlatine" diagnostiquée il y a 3 semaines. Aujourd\'hui : gonflement des chevilles et des paupières, urines rouges (hématurie), pression artérielle élevée.',
   text:'Que craignez-vous ?',
   choices:['Récidive de la scarlatine — rétraiter','Glomérulonéphrite aiguë post-streptococcique — atteinte rénale complication de la scarlatine. Repos strict, régime sans sel, surveillance rénale.','Allergie médicamenteuse à un traitement','Appendicite'],
   correct:1, expl:'Glomérulonéphrite aiguë post-streptococcique : complication rénale classique 2-3 semaines après une angine ou scarlatine à streptocoque. L\'immunité croisée attaque les glomérules. Triade : œdèmes + hématurie + HTA. En 1904 : repos strict, régime sans sel, surveiller la diurèse. Guérison dans 95 % des cas.'},
 ]},

{id:'s11', icon:'☢️', title:'Certification Radiologue', reqScore:80, totalQ:15,
 meta:['15 questions','80% requis','Titre : Radiologue certifié'],
 questions:[
  {type:'qcm', partie:'Partie I — Théorie',
   text:'Les rayons X sont découverts par Wilhelm Röntgen en :',
   choices:['1880','1895','1901','1910'],
   correct:1, expl:'8 novembre 1895 : Röntgen découvre les rayons X en remarquant qu\'un écran fluorescent s\'illumine même sans contact avec son tube cathodique. Première radiographie médicale : la main de sa femme Anna Bertha. Prix Nobel 1901. En 1904, la radiologie médicale a 9 ans et équipe déjà les grands hôpitaux.'},
  {type:'qcm',
   text:'Marie Curie développe les "petites Curies" pendant la Première Guerre mondiale — mais en 1904, elle a déjà :',
   choices:['Rien encore — les Curie travaillent en chimie uniquement','Découvert le polonium et le radium (1898) et établi que la radioactivité est une propriété atomique','Inventé la radiothérapie','Conçu la première radiographie'],
   correct:1, expl:'En 1898 Pierre et Marie Curie découvrent le polonium et le radium, et comprennent que la radioactivité est une propriété de l\'atome, pas une réaction chimique. Nobel de Physique 1903. En 1904 Marie Curie travaille sur les applications médicales du radium — radiumthérapie naissante pour les tumeurs.'},
  {type:'vf',
   text:'Les rayons X traversent également bien tous les tissus du corps humain.',
   correct:false, expl:'FAUX — Les rayons X sont absorbés différemment selon la densité des tissus. Os (calcium, dense) = blanc sur le cliché. Poumons (air, peu dense) = noir. Tissus mous = gris. Cette différence d\'absorption (contraste naturel) est la base de la radiologie diagnostique.'},
  {type:'qcm',
   text:'Le principal risque méconnu de la radiologie en 1904 est :',
   choices:['Le bruit des appareils','Les effets biologiques des radiations — brûlures, aplasie médullaire, cancers, non encore compris','L\'explosion de l\'équipement','La douleur de l\'examen'],
   correct:1, expl:'En 1904, les effets cancérigènes et génétiques des radiations ne sont pas encore connus. Les premiers radiologues travaillent sans protection : mains brûlées (radiodermite), aplasies médullaires, leucémies. Clarence Dally meurt en 1904 des suites d\'expositions massives. Les règles de radioprotection viendront dans les décennies suivantes.'},
  {type:'qcm',
   text:'Quelle affection pulmonaire est la plus visible sur une radiographie thoracique en 1904 ?',
   choices:['L\'asthme','La tuberculose (opacités apicales, cavernes, calcifications)','Le rhume','La pleurite bénigne'],
   correct:1, expl:'La tuberculose laisse des traces radiologiques caractéristiques : infiltrats apicaux (zones supérieures des poumons), cavernes (zones détruites = zones sombres), calcifications (ancienne TB guérie = petits points blancs). En 1904 la TB est épidémique — la radiologie aide au diagnostic mais pas au traitement (Bacille de Koch, 1882).'},
  {type:'vf',
   text:'Une radiographie sans préparation peut suffire à diagnostiquer une occlusion intestinale.',
   correct:true, expl:'VRAI — L\'occlusion intestinale distend les anses en amont avec de l\'air et des liquides. En position debout, on voit les niveaux hydroaériques (interface liquide-air caractéristiques). Signe diagnostique sans injection de produit de contraste. En 1904 ce signe est déjà utilisé dans les hôpitaux équipés de radioscopie.'},
  {type:'qcm',
   text:'La radioscopie (fluoroscopie) permet, contrairement à la radiographie classique :',
   choices:['Un meilleur contraste des os','L\'observation des mouvements en temps réel (déglutition, cœur, diaphragme)','Une dose de radiation plus faible','Un examen plus rapide'],
   correct:1, expl:'La radioscopie projette les rayons X sur un écran fluorescent — l\'image est visible en temps réel. Permet d\'observer la déglutition, les mouvements du diaphragme, les battements cardiaques. En revanche : dose de radiation beaucoup plus élevée qu\'un cliché fixe. Utilisée pour les examens digestifs avec produit de contraste (baryum).'},
  {type:'qcm',
   text:'Pour visualiser le tube digestif en radiologie, on utilise comme produit de contraste :',
   choices:['L\'iode injecté','Le sulfate de baryum administré par voie orale ou rectale','L\'eau oxygénée','Le mercure'],
   correct:1, expl:'Le sulfate de baryum est radio-opaque, non absorbé par l\'intestin, non toxique à cette dose. Avalé (transit œsophago-gastroduodénal) ou administré en lavement (lavement baryté), il enrobe la muqueuse digestive et permet de visualiser ulcères, tumeurs, sténoses. Encore utilisé aujourd\'hui.'},
  {type:'vf',
   text:'Une fracture tassement vertébrale peut être invisible à l\'examen clinique et nécessite une radiographie.',
   correct:true, expl:'VRAI — Une fracture par tassement ostéoporotique (personne âgée après chute légère) peut ne donner qu\'une douleur dorsale diffuse sans signe neurologique. La radiographie de profil montre l\'écrasement d\'un corps vertébral (coin antérieur). En 1904 : diagnostic difficile sans radio, traitement = corset et alitement prolongé.'},
  {type:'qcm',
   text:'Le principal danger lors d\'une radioscopie prolongée pour le patient en 1904 est :',
   choices:['La chaleur de l\'appareil','La dose de radiation cumulée — érythème, brûlures, puis risques à long terme','Le manque d\'oxygène','Le bruit de l\'appareil'],
   correct:1, expl:'Une séance de radioscopie prolongée expose le patient à une dose élevée. Les premiers signes : érythème (rougeur) apparaissant 1-2 semaines après, similaire à un coup de soleil profond. Épilation, ulcérations chroniques en cas d\'expositions répétées. En 1904 les médecins prescrivent parfois des séances de radioscopie gastrique répétées sans savoir.'},
  {type:'cas', partie:'Partie II — Cas cliniques',
   cas:'Mineur de 30 ans, toux chronique depuis 2 ans, amaigrissement, sueurs nocturnes. Vous réalisez une radiographie thoracique : opacité floue au sommet du poumon droit avec une zone sombre centrale (caverne).',
   text:'Votre interprétation ?',
   choices:['Pneumonie banale — antibiotiques','Tuberculose pulmonaire probable — isolement, régime, altitude si possible, surveillance. Informer les autorités sanitaires.','Cancer du poumon — chirurgie','Abcès pulmonaire — drainage'],
   correct:1, expl:'Infiltrat apical + caverne = tuberculose jusqu\'à preuve du contraire. L\'image de caverne (destruction du parenchyme pulmonaire) est caractéristique de la TB évoluée. En 1904 : pas d\'antibiotiques (streptomycine 1943). Traitement : isolement (sanatorium si possible), repos, air pur en altitude, alimentation renforcée. Déclaration obligatoire.'},
  {type:'cas',
   cas:'Homme de 45 ans, chute d\'un cheval, douleur du poignet droit. La radiographie montre une discontinuité osseuse du scaphoïde carpien.',
   text:'Pourquoi ce diagnostic est-il important à ne pas manquer ?',
   choices:['Fracture banale — attelle simple 10 jours','Fracture du scaphoïde — immobilisation plâtrée 6-12 semaines. Risque de pseudarthrose et de nécrose avasculaire si traitée insuffisamment.','Entorse — bandage de soutien','Rupture ligamentaire — chirurgie immédiate'],
   correct:1, expl:'Le scaphoïde est vascularisé uniquement par son pôle distal. Une fracture du tiers proximal peut priver le fragment proximal de sang → nécrose avasculaire → pseudarthrose douloureuse invalidante. Immobilisation stricte et prolongée (plâtre jusqu\'au pouce, 6-12 semaines). Fracture fréquemment non diagnostiquée et sous-traitée.'},
  {type:'cas',
   cas:'Vous réalisez de nombreuses radioscopies par semaine pour des examens digestifs. Vous remarquez une rougeur persistante et des croûtes sur le dos de vos mains.',
   text:'Que signifie cette lésion ?',
   choices:['Eczéma de contact à un désinfectant','Radiodermite chronique par exposition répétée aux rayons X — réduire drastiquement les expositions, protéger les mains (gants de plomb)','Infection staphylococcique — pommade','Psoriasis — cosmétique'],
   correct:1, expl:'Radiodermite : lésion chronique des mains des premiers radiologues, exposés sans protection. Peau verruqueuse, ulcérations, hyperpigmentation. Risque d\'évolution vers un carcinome cutané (épithélioma radiologique). En 1904 ce danger est peu connu. Dès que possible : gants de plomb, distance, paravent plombé.'},
  {type:'cas',
   cas:'Femme de 65 ans, après une chute de faible hauteur, douleur lombaire intense. La radiographie montre un corps vertébral L1 dont la hauteur antérieure est réduite de moitié.',
   text:'Diagnostic et conduite ?',
   choices:['Déchirure musculaire — antalgiques et retour à domicile','Fracture tassement de L1 par ostéoporose probable — alitement, corset, antalgiques, bilan osseux. Vérifier l\'absence de signe neurologique.','Tumeur métastatique — attendre la biopsie avant tout','Hernie discale — chirurgie urgente'],
   correct:1, expl:'Fracture tassement vertébrale sur ostéoporose : tassement du coin antérieur du corps vertébral (cunéiformisation). Fréquente chez la femme âgée après traumatisme minime. Vérifier les membres inférieurs (paresthésies, déficit moteur = urgence chirurgicale). Traitement : corset rigide, alitement, antalgiques. Prévention des autres vertèbres.'},
  {type:'cas',
   cas:'Après une bagarre, homme de 22 ans avec douleur thoracique gauche et dyspnée. Radiographie : poumon gauche refoulé vers la droite, clarté gazeuse gauche sans trame vasculaire.',
   text:'Votre diagnostic ?',
   choices:['Côte fracturée — simple bandage','Pneumothorax traumatique — urgence. Exsufflation à l\'aiguille si sous tension, puis drainage chirurgical.','Hémothorax — surveiller','Contusion pulmonaire — repos'],
   correct:1, expl:'Pneumothorax : air dans la cavité pleurale → poumon collabé. Radiographie : clarté gazeuse sans trame vasculaire + refoulement du médiastin. Si le médiastin est refoulé vers le côté opposé = pneumothorax sous tension (urgence vitale en minutes). Exsufflation à l\'aiguille en urgence puis drainage thoracique.'},
 ]},

{id:'s12', icon:'❤️', title:'Certification Chirurgien cardiaque', reqScore:85, totalQ:15,
 meta:['15 questions','85% requis','Statut Pionnier'],
 questions:[
  {type:'qcm', partie:'Partie I — Théorie',
   text:'Ludwig Rehn réalise la première suture cardiaque réussie en :',
   choices:['1880','1896','1905','1920'],
   correct:1, expl:'7 septembre 1896, Francfort. Ludwig Rehn suture une plaie du ventricule droit d\'un jeune jardinier poignardé. Le patient survit. Premier acte de chirurgie cardiaque. Mortalité globale de la procédure à l\'époque : 60 %. En 1904, la chirurgie cardiaque est une frontière absolue — réservée aux cas désespérés.'},
  {type:'qcm',
   text:'La tamponnade cardiaque est une urgence vitale. Elle résulte de :',
   choices:['Un infarctus du myocarde','L\'accumulation de sang ou de liquide dans le péricarde comprimant le cœur et empêchant son remplissage','Un trouble du rythme cardiaque','Une rupture de valvule'],
   correct:1, expl:'Le péricarde est un sac rigide. Si du liquide (sang post-traumatique, épanchement) s\'y accumule rapidement, la pression augmente et comprime le cœur. Les ventricules ne peuvent plus se remplir → choc cardiogénique. Triade de Beck : hypotension + veines jugulaires distendues + bruits cardiaques assourdis.'},
  {type:'vf',
   text:'En 1904, une plaie cardiaque pénétrante est toujours fatale.',
   correct:false, expl:'FAUX — Depuis Rehn (1896), on sait qu\'une plaie ventriculaire peut être suturée avec survie. Mortalité 40-60 % mais pas 100 %. Conditions pour opérer : patient encore vivant, chirurgien formé, bloc opératoire disponible. La plupart des blessés meurent avant d\'atteindre un chirurgien — mais l\'acte est techniquement possible.'},
  {type:'qcm',
   text:'La technique opératoire d\'une suture cardiaque nécessite de :',
   choices:['Arrêter le cœur avant de suturer','Suturer PENDANT QUE LE CŒUR BAT — le cœur ne peut pas être arrêté sans circulation extracorporelle (inventée en 1953)','Remplacer le cœur par une machine','Utiliser l\'hypothermie seule'],
   correct:1, expl:'En 1904 (et jusqu\'en 1953), il n\'existe pas de machine cœur-poumon. Toute suture cardiaque se fait sur cœur battant. Le chirurgien doit travailler vite entre les contractions, suturer pendant les diastoles. La circulation extracorporelle (Gibbon, 1953) permettra enfin d\'arrêter le cœur.'},
  {type:'qcm',
   text:'L\'auscultation cardiaque révèle un souffle systolique au foyer mitral irradiant vers l\'aisselle — vous évoquez :',
   choices:['Un bruit normal chez le sportif','Une insuffisance mitrale — reflux du sang vers l\'oreillette gauche à chaque systole','Une sténose aortique','Un péricardite'],
   correct:1, expl:'Insuffisance mitrale : la valve mitrale ne ferme pas hermétiquement. À chaque contraction ventriculaire, du sang reflue vers l\'oreillette gauche. Souffle systolique apexien irradiant en "jet de vapeur" vers l\'aisselle. En 1904 : aucun traitement chirurgical possible. Digitale pour l\'insuffisance cardiaque congestive.'},
  {type:'vf',
   text:'La péricardite constrictive peut être traitée chirurgicalement en 1904.',
   correct:true, expl:'VRAI — La péricardiectomie (ablation du péricarde calcifié comprimant le cœur) est réalisée depuis les années 1890-1900 par quelques chirurgiens pionniers. C\'est l\'une des premières interventions cardiaques non urgentes. Le péricarde épaissi et calcifié (souvent post-tuberculeux) emprisonne le cœur comme une coquille.'},
  {type:'qcm',
   text:'Les signes de tamponnade cardiaque (triade de Beck) sont :',
   choices:['Fièvre + douleur + rougeur','Hypotension + veines jugulaires distendues + bruits cardiaques assourdis','Tachycardie + fièvre + murmure vésiculaire','Douleur thoracique + sueurs + nausées'],
   correct:1, expl:'Triade de Beck (1935 mais physiopathologie connue avant) : 1) Hypotension (le cœur ne peut plus débiter). 2) Turgescence jugulaire (retour veineux bloqué). 3) Bruits cardiaques assourdis (liquide péricardique absorbe les sons). Traitement : péricardiocentèse d\'urgence (aspiration du liquide à l\'aiguille).'},
  {type:'qcm',
   text:'La péricardiocentèse (ponction du péricarde) se réalise par :',
   choices:['Ouverture thoracique systématique','Introduction d\'une longue aiguille sous l\'appendice xiphoïde orientée vers l\'épaule gauche, en aspiration douce','Incision intercostale','Par voie transœsophagienne'],
   correct:1, expl:'Voie sous-xiphoïdienne : l\'aiguille est introduite à 45° sous l\'appendice xiphoïde, dirigée vers l\'épaule gauche. On aspire doucement. Le liquide péricardique sort (hématique, séro-fibrineux ou purulent selon l\'étiologie). Même quelques ml évacués peuvent rétablir le débit cardiaque en cas de tamponnade.'},
  {type:'vf',
   text:'Un anévrisme de l\'aorte thoracique est opérable en 1904.',
   correct:false, expl:'FAUX — En 1904, l\'anévrisme de l\'aorte thoracique est une condamnation à mort. Sans circulation extracorporelle, clamper l\'aorte thoracique est impossible. Les anévrysmes abdominaux sous-rénaux seront opérés à partir de 1951 (Dubost). L\'aorte thoracique devra attendre Cooley et DeBakey dans les années 1950-1960.'},
  {type:'qcm',
   text:'La syphilis tertiaire cardiovasculaire (syphilis aortique) provoque :',
   choices:['Une myocardite aiguë','Un anévrisme de l\'aorte ascendante par destruction de la media et une insuffisance aortique','Une sténose mitrale','Une péricardite purulente'],
   correct:1, expl:'La syphilis tertiaire envahit l\'adventice et la media de l\'aorte ascendante (aortite syphilitique). Destruction élastique → anévrisme de l\'aorte ascendante (risque de rupture fatale) + insuffisance aortique (dilatation de l\'anneau). Cause majeure de mort cardiovasculaire en 1904. Aucun traitement chirurgical possible à cette localisation.'},
  {type:'cas', partie:'Partie II — Cas cliniques',
   cas:'Homme poignardé au thorax gauche amené inconscient. Pouls filant, veines jugulaires distendues, bruits cardiaques inaudibles, plaie à 2 cm du sternum gauche.',
   text:'Votre diagnostic et action immédiate ?',
   choices:['Pneumothorax — drainage pleural','Tamponnade cardiaque probable — péricardiocentèse d\'urgence sous-xiphoïdienne puis décision d\'exploration chirurgicale','Hémothorax — aspiration pleurale','Fracture sternale — antalgiques'],
   correct:1, expl:'Plaie pénétrante para-sternale gauche + triade de Beck (hypotension + jugulaires + bruits assourdis) = tamponnade cardiaque jusqu\'à preuve du contraire. Péricardiocentèse d\'urgence pour décompression immédiate. Si le patient survit et se stabilise : exploration chirurgicale pour suture cardiaque éventuelle (technique de Rehn).'},
  {type:'cas',
   cas:'Patient de 50 ans, ex-syphilitique traité il y a 10 ans, douleur thoracique pulsatile depuis 6 mois, souffle diastolique au foyer aortique, pouls bondissant.',
   text:'Qu\'évoquez-vous ?',
   choices:['Infarctus du myocarde — repos','Aortite syphilitique avec anévrisme de l\'aorte ascendante et insuffisance aortique — pronostic très sombre en 1904, aucun traitement chirurgical possible','Péricardite chronique — diurétiques','Sténose aortique — digitale'],
   correct:1, expl:'Insuffisance aortique (souffle diastolique + pouls bondissant de Corrigan) + antécédents syphilitiques = aortite syphilitique. L\'aorte ascendante est dilatée, l\'anneau s\'élargit, la valve ne ferme plus. En 1904 : pronostic fatal à 2-5 ans par insuffisance cardiaque. Aucun traitement chirurgical à cette localisation.'},
  {type:'cas',
   cas:'Pendant une thoracotomie exploratrice, vous identifiez une plaie de 1 cm sur le ventricule droit qui saigne activement. Le patient est encore vivant.',
   text:'Quelle est la technique de Rehn pour suturer ?',
   choices:['Arrêter le cœur avec de l\'éther puis suturer','Points en X au fil résistant, noués entre les diastoles (cœur relâché) pendant que l\'assistant comprime temporairement la plaie pour réduire le saignement','Colle chirurgicale uniquement','Cautérisation au fer rouge'],
   correct:1, expl:'Technique de Rehn (1896) : compression digitale initiale pour réduire le saignement. Sutures en X (ou mattress sutures) avec fil solide (soie). Passer les fils pendant les systoles (cœur dur), nouer pendant les diastoles (cœur mou et accessible). Anesthésie au chloroforme. Rapidité absolue. Chaque minute = perte sanguine supplémentaire.'},
  {type:'cas',
   cas:'Patient avec épanchement péricardique récidivant (3e ponction cette année). Fièvre persistante, antécédent de tuberculose pulmonaire 2 ans avant.',
   text:'Quelle est la cause probable et l\'évolution redoutée ?',
   choices:['Cancer du poumon avec métastases péricardiques — biopsie','Péricardite tuberculeuse avec risque d\'évolution vers la péricardite constrictive (calcification du péricarde emprisonnant le cœur)','Péricardite virale récidivante — repos','Insuffisance rénale — dialyse'],
   correct:1, expl:'Péricardite tuberculeuse : complication fréquente de la TB. Épanchements récidivants. Évolution redoutée : la fibrose et la calcification du péricarde créent une "coque" rigide comprimant le cœur (péricardite constrictive). Signes : dyspnée, œdèmes, ascite, pouls paradoxal. Traitement possible en 1904 : péricardiectomie (chirurgie risquée mais validée).'},
  {type:'cas',
   cas:'Après une opération thoracique, le patient présente une arythmie avec pouls irrégulier complet, fréquence ventriculaire à 120/min, absence d\'ondes P régulières.',
   text:'Vous reconnaissez une fibrillation auriculaire. En 1904, votre traitement ?',
   choices:['Choc électrique externe — défibrillateur','Digitaline pour ralentir la conduction auriculo-ventriculaire et contrôler la fréquence ventriculaire. La quinine peut parfois réduire le rythme.','Chirurgie d\'urgence','Saignée immédiate'],
   correct:1, expl:'La fibrillation auriculaire est connue depuis les années 1890 (MacKenzie). En 1904 : digitaline (ralentit la conduction AV, contrôle la fréquence ventriculaire), quinine (parfois antiarythmique). Le défibrillateur électrique externe sera inventé par Zoll en 1956. La cardioversion pharmacologique à la quinine est décrite par Wenckebach dès 1914.'},
 ]},
];

<script>
/* ══════════════════════════════════════════════════════════
   DONNÉES DES 4 EXAMENS — progression stricte niv1→4
══════════════════════════════════════════════════════════ */
var EXAMENS = [

/* ══ NIVEAU 1 — STAGIAIRE → APPRENTI ══════════════════════
   Cours couverts : hygiène, anatomie, premier contact patient
   Score requis : 70% sur 15 questions
══════════════════════════════════════════════════════════ */
{ id:'e1', level:1, levelClass:'lv1',
  title:'Examen de Stagiaire',
  subtitle:'Hygiène, anatomie, premier contact patient',
  reqScore:70, totalQ:15,
  meta:['15 questions','70% requis','Niv. 1 → Apprenti'],
  questions:[
    /* ── THÉORIE (10 questions mélangées) ── */
    {type:'qcm', partie:'Partie I — Théorie',
     text:'Qui a le premier imposé le lavage des mains pour réduire la mortalité hospitalière ?',
     choices:['Louis Pasteur','Ignace Semmelweis','Joseph Lister','Robert Koch'],
     correct:1,
     expl:'Semmelweis impose le lavage des mains à l\'eau de Javel à Vienne en 1847 — mortalité maternelle de 18% à 1,5%. Ses collègues l\'ignorent. Il mourra fou en 1865, incompris de son vivant.'},
    {type:'qcm',
     text:'Combien de minutes faut-il faire bouillir l\'eau pour la rendre sûre à boire ?',
     choices:['2 minutes','5 minutes','10 minutes','30 minutes'],
     correct:2,
     expl:'10 minutes d\'ébullition détruisent l\'immense majorité des agents pathogènes. Au Texas en 1904, toute eau de puits ou de rivière doit être bouillie avant consommation.'},
    {type:'vf',
     text:'Une artère fémorale sectionnée peut tuer un homme en moins de 5 minutes sans intervention.',
     correct:true,
     expl:'VRAI — L\'artère fémorale est l\'une des plus larges du corps. Sans garrot immédiat, la mort survient en 3 à 5 minutes par choc hémorragique. C\'est pourquoi l\'hémorragie est la priorité absolue numéro 1.'},
    {type:'qcm',
     text:'Combien d\'os compte le corps humain adulte ?',
     choices:['182','196','206','214'],
     correct:2,
     expl:'206 os chez l\'adulte. Le nourrisson en a 270 à la naissance — plusieurs fusionnent pendant la croissance. Le chirurgien doit connaître leur localisation par cœur.'},
    {type:'qcm',
     text:'En quelle année Pasteur publie-t-il sa théorie des germes ?',
     choices:['1847','1861','1867','1876'],
     correct:1,
     expl:'En 1861, Pasteur démontre que la fermentation et la putréfaction sont causées par des micro-organismes vivants. Il réfute définitivement la génération spontanée et ouvre la voie à la bactériologie.'},
    {type:'vf',
     text:'L\'iode est moins efficace que l\'alcool à 70° comme antiseptique pour les plaies.',
     correct:false,
     expl:'FAUX — L\'iode est plus efficace que l\'alcool seul. Il tue les bactéries, champignons et spores. L\'alcool est surtout utilisé pour désinfecter les instruments. Pour une plaie : toujours l\'iode.'},
    {type:'qcm',
     text:'Où se situe le point de McBurney — signe probable d\'une appendicite ?',
     choices:['Flanc gauche','Tiers externe de la ligne ombilico-iliaque droite','Sous les côtes droites','Fosse iliaque gauche'],
     correct:1,
     expl:'Le point de McBurney est au tiers externe de la ligne reliant l\'ombilic à l\'épine iliaque droite. Douleur à ce point = appendicite probable. En 1904, l\'appendicectomie est une chirurgie établie.'},
    {type:'qcm',
     text:'Philippe Pinel retire les chaînes des aliénés de la Bicêtre en :',
     choices:['1779','1787','1793','1800'],
     correct:2,
     expl:'Pinel retire les chaînes en 1793 en affirmant que la folie est une maladie, pas une punition. Acte fondateur de la psychiatrie humaniste — l\'aliéné mérite des soins, pas des fers.'},
    {type:'vf',
     text:'Gray\'s Anatomy, référence anatomique mondiale, est publié en 1858.',
     correct:true,
     expl:'VRAI — Henry Gray publie son traité d\'anatomie humaine en 1858, illustré par Vandyke Carter. Chaque médecin depuis cette date l\'a étudié. En 1904, c\'est encore LA référence absolue.'},
    {type:'qcm',
     text:'Qui a introduit les gants chirurgicaux en caoutchouc vers 1890 ?',
     choices:['Joseph Lister','Ernst von Bergmann','William Halsted','Robert Koch'],
     correct:2,
     expl:'William Halsted introduit les gants pour protéger son infirmière (future femme) de l\'acide phénique. La révolution hygiénique est complète : lavage des mains + antisepsie + gants stériles.'},

    /* ── CAS CLINIQUES (5 questions dans l\'ordre narratif) ── */
    {type:'cas', partie:'Partie II — Mise en situation',

/* ══ ROTATION DES QUESTIONS THÉORIQUES ══════════════════════ */
function shuffleQuestions(questions){
  var theorie = [], cas = [], inCas = false;
  questions.forEach(function(q){
    if(q.partie && q.partie.indexOf('Mise en situation') > -1) inCas = true;
    if(q.type === 'cas' || inCas){ cas.push(Object.assign({},q)); }
    else { theorie.push(Object.assign({},q)); }
  });
  for(var i=theorie.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=theorie[i]; theorie[i]=theorie[j]; theorie[j]=tmp;
  }
  if(theorie.length>0) theorie[0].partie='Partie I — Théorie';
  if(cas.length>0) cas[0].partie='Partie II — Mise en situation';
  return theorie.concat(cas);
}
