<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examens médicaux — Cabinet du Texas</title>
<script>(function(){ var t=localStorage.getItem("psy_theme")||"dark"; document.documentElement.setAttribute("data-theme",t); })();</script>
<link rel="stylesheet" href="css/style.css">
<style>
/* ACCUEIL */
.exam-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1px; background:var(--bdr); margin:1.5rem 0; }
.exam-card { background:var(--ink2); padding:1.75rem; cursor:pointer; transition:background .2s; position:relative; overflow:hidden; }
.exam-card:hover:not(.locked) { background:var(--ink3); }
.exam-card.locked { opacity:.5; cursor:not-allowed; }
.exam-card.passed { border-left:3px solid #4a9a4a; }
.exam-level-tag { display:inline-flex; align-items:center; gap:.5rem; font-family:'Cormorant Garamond',serif; font-size:.65rem; letter-spacing:.16em; text-transform:uppercase; margin-bottom:.75rem; }
.exam-title { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--parch); margin-bottom:.35rem; font-style:italic; }
.exam-desc { font-size:.88rem; color:var(--parch3); font-style:italic; line-height:1.5; margin-bottom:.85rem; font-family:'EB Garamond',serif; }
.exam-meta { display:flex; gap:.75rem; flex-wrap:wrap; }
.exam-meta span { font-family:'Cormorant Garamond',serif; font-size:.65rem; letter-spacing:.08em; text-transform:uppercase; color:var(--parch4); }
.exam-score-badge { position:absolute; top:1rem; right:1rem; background:rgba(74,154,74,.12); border:1px solid rgba(74,154,74,.25); color:#6abf6a; font-family:'Courier Prime',monospace; font-size:.68rem; padding:2px 8px; }
.lock-icon { position:absolute; top:1rem; right:1rem; font-size:1.1rem; opacity:.4; }

/* EXAMEN EN COURS */
.exam-wrap { max-width:780px; margin:0 auto; padding:2rem 1.5rem; }
.exam-header { margin-bottom:2rem; padding-bottom:1.25rem; border-bottom:1px solid var(--bdr); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; }
.progress-exam { display:flex; align-items:center; gap:.75rem; }
.progress-exam-bar { width:160px; height:5px; background:var(--bdr); border-radius:3px; overflow:hidden; }
.progress-exam-fill { height:100%; background:linear-gradient(90deg,var(--gold-d),var(--gold)); border-radius:3px; transition:width .4s; }
.progress-exam-text { font-family:'Courier Prime',monospace; font-size:.68rem; color:var(--parch3); white-space:nowrap; }

/* PARTIE */
.partie-label { background:var(--ink2); border:1px solid var(--bdr); border-left:3px solid var(--gold-d); padding:.65rem 1.1rem; margin-bottom:1.25rem; font-family:'Cormorant Garamond',serif; font-size:.68rem; letter-spacing:.16em; text-transform:uppercase; color:var(--gold); }

/* QUESTION */
.question-card { background:var(--ink2); border:1px solid var(--bdr); padding:1.5rem; margin-bottom:1.25rem; animation:fadeUp .25s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.question-num { font-family:'Cormorant Garamond',serif; font-size:.62rem; letter-spacing:.16em; text-transform:uppercase; color:var(--parch4); margin-bottom:.5rem; }
.question-type-badge { display:inline-block; font-family:'Cormorant Garamond',serif; font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; padding:1px 7px; border:1px solid var(--bdr2); color:var(--parch3); margin-left:.5rem; }
.question-text { font-family:'Playfair Display',serif; font-size:1rem; color:var(--parch); line-height:1.55; margin-bottom:1.1rem; font-style:italic; }
.cas-block { background:var(--ink3); border-left:3px solid var(--gold); padding:.85rem 1.1rem; margin-bottom:1rem; font-family:'EB Garamond',serif; font-size:.92rem; color:var(--parch2); line-height:1.75; }
.cas-label { font-family:'Cormorant Garamond',serif; font-size:.6rem; letter-spacing:.16em; text-transform:uppercase; color:var(--gold-d); display:block; margin-bottom:.4rem; }

/* CHOIX */
.choices { display:flex; flex-direction:column; gap:7px; }
.choice { display:flex; align-items:flex-start; gap:.8rem; padding:.65rem .9rem; background:var(--ink3); border:1px solid var(--bdr); cursor:pointer; transition:all .15s; font-family:'EB Garamond',serif; font-size:.92rem; color:var(--parch2); line-height:1.45; }
.choice:hover { border-color:var(--bdr2); color:var(--parch); background:var(--ink4); }
.choice.selected { border-color:var(--gold); background:var(--gold-dim); color:var(--parch); }
.choice.correct { border-color:#4a9a4a; background:rgba(74,154,74,.08); color:#6abf6a; }
.choice.wrong { border-color:#9a2424; background:rgba(154,36,36,.08); color:#c07070; }
.choice.reveal-correct { border-color:#4a9a4a; background:rgba(74,154,74,.05); color:#5aaf5a; }
.choice-letter { width:20px; height:20px; border-radius:50%; flex-shrink:0; border:1px solid var(--bdr2); display:flex; align-items:center; justify-content:center; font-family:'Courier Prime',monospace; font-size:.68rem; color:var(--parch3); transition:all .15s; }
.choice.selected .choice-letter { border-color:var(--gold); color:var(--gold); }
.choice.correct .choice-letter { border-color:#4a9a4a; color:#6abf6a; }
.choice.wrong .choice-letter { border-color:#9a2424; color:#c07070; }

/* FEEDBACK */
.feedback { margin-top:.85rem; padding:.75rem 1rem; border:1px solid transparent; font-family:'EB Garamond',serif; font-size:.9rem; line-height:1.6; display:none; }
.feedback.show { display:block; }
.feedback.good { background:rgba(74,154,74,.07); border-color:rgba(74,154,74,.25); color:#6abf6a; }
.feedback.bad  { background:rgba(154,36,36,.07); border-color:rgba(154,36,36,.25); color:#c07070; }
.feedback-title { font-family:'Playfair Display',serif; font-size:.85rem; margin-bottom:.3rem; }
.feedback-expl { color:var(--parch2); }
.btn-next { width:100%; padding:.7rem; margin-top:.85rem; background:var(--gold-dim); border:1px solid var(--gold); color:var(--gold-l); font-family:'Playfair Display',serif; font-size:.9rem; font-style:italic; cursor:pointer; transition:all .2s; display:none; }
.btn-next.show { display:block; }
.btn-next:hover { background:rgba(192,154,74,.2); color:var(--parch); }

/* RÉSULTAT */
.result-card { background:var(--ink2); border:1px solid var(--bdr2); padding:2.5rem; text-align:center; position:relative; }
.result-card::before { content:''; position:absolute; inset:5px; border:1px solid var(--bdr); pointer-events:none; }
.result-score { font-family:'Playfair Display',serif; font-size:4rem; font-weight:700; line-height:1; margin-bottom:.5rem; }
.result-score.passed { color:#6abf6a; }
.result-score.failed { color:#c07070; }
.result-mention { font-family:'Cormorant Garamond',serif; font-size:1rem; letter-spacing:.12em; text-transform:uppercase; margin-bottom:2rem; }
.result-details { display:flex; justify-content:center; gap:2rem; margin-bottom:2rem; flex-wrap:wrap; }
.result-detail { font-family:'EB Garamond',serif; font-size:.88rem; color:var(--parch3); }
.result-detail strong { display:block; font-size:1.4rem; color:var(--parch); font-family:'Playfair Display',serif; font-weight:400; }
.diplome { background:var(--ink3); border:1px solid var(--bdr2); border-left:3px solid var(--gold); padding:1.25rem; margin:1.25rem 0; text-align:left; font-family:'Courier Prime',monospace; font-size:.76rem; color:var(--parch2); white-space:pre-wrap; line-height:1.8; }
.errors-list { text-align:left; margin-top:1.25rem; }
.error-item { padding:.65rem .9rem; border-left:2px solid #9a2424; background:rgba(154,36,36,.04); margin-bottom:5px; }
.error-q { font-family:'EB Garamond',serif; font-size:.88rem; color:var(--parch); font-style:italic; margin-bottom:.25rem; }
.error-correct { font-family:'Cormorant Garamond',serif; font-size:.68rem; letter-spacing:.06em; color:#6abf6a; }

@media(max-width:640px){ .exam-wrap{padding:1rem} .result-details{gap:1rem} }
</style>
</head>
<body>
<script src="js/header.js"></script>

<!-- ACCUEIL -->
<div id="view-accueil" class="container">
  <div class="flex-between mt-2 mb-1">
    <div>
      <h2>Examens médicaux</h2>
      <p class="mt-1" style="font-family:'EB Garamond',serif;font-size:.92rem;color:var(--parch3);font-style:italic">Chaque niveau doit être validé avant d'accéder au suivant. Les questions théoriques sont mélangées à chaque passage.</p>
    </div>
  </div>
  <div class="exam-grid" id="exam-grid"></div>
</div>

<!-- EXAMEN EN COURS -->
<div id="view-exam" class="hidden">
  <div class="exam-wrap">
    <div class="exam-header">
      <div>
        <button class="btn btn-sm" onclick="backToAccueil()" style="margin-bottom:.5rem">← Examens</button>
        <h2 id="exam-running-title" style="font-style:italic"></h2>
      </div>
      <div class="progress-exam">
        <div class="progress-exam-bar"><div class="progress-exam-fill" id="exam-prog-fill" style="width:0%"></div></div>
        <span class="progress-exam-text" id="exam-prog-text">0 / 0</span>
      </div>
    </div>
    <div id="exam-question-wrap"></div>
  </div>
</div>

<!-- RÉSULTAT -->
<div id="view-result" class="hidden">
  <div class="exam-wrap">
    <button class="btn btn-sm" onclick="backToAccueil()" style="margin-bottom:1.5rem">← Examens</button>
    <div class="result-card" id="result-card"></div>
  </div>
</div>

<script type="module" src="js/auth-firebase.js"></script>
<script src="js/guard.js" defer></script>
<script>
/* ══════════════════════════════════════════════════════════
   DONNÉES DES 4 EXAMENS — progression stricte niv1→4
══════════════════════════════════════════════════════════ */
var EXAMENS = [

/* ══ NIVEAU 1 — STAGIAIRE → APPRENTI ══════════════════════
   Cours couverts : hygiène, anatomie, premier contact patient
   Score requis : 70% sur 15 questions
══════════════════════════════════════════════════════════ */
{ id:'e1', level:1, levelClass:'lv1',
  title:'Examen de Stagiaire',
  subtitle:'Hygiène, anatomie, premier contact patient',
  reqScore:70, totalQ:15,
  meta:['15 questions','70% requis','Niv. 1 → Apprenti'],
  questions:[
    /* ── THÉORIE (10 questions mélangées) ── */
    {type:'qcm', partie:'Partie I — Théorie',
     text:'Qui a le premier imposé le lavage des mains pour réduire la mortalité hospitalière ?',
     choices:['Louis Pasteur','Ignace Semmelweis','Joseph Lister','Robert Koch'],
     correct:1,
     expl:'Semmelweis impose le lavage des mains à l\'eau de Javel à Vienne en 1847 — mortalité maternelle de 18% à 1,5%. Ses collègues l\'ignorent. Il mourra fou en 1865, incompris de son vivant.'},
    {type:'qcm',
     text:'Combien de minutes faut-il faire bouillir l\'eau pour la rendre sûre à boire ?',
     choices:['2 minutes','5 minutes','10 minutes','30 minutes'],
     correct:2,
     expl:'10 minutes d\'ébullition détruisent l\'immense majorité des agents pathogènes. Au Texas en 1904, toute eau de puits ou de rivière doit être bouillie avant consommation.'},
    {type:'vf',
     text:'Une artère fémorale sectionnée peut tuer un homme en moins de 5 minutes sans intervention.',
     correct:true,
     expl:'VRAI — L\'artère fémorale est l\'une des plus larges du corps. Sans garrot immédiat, la mort survient en 3 à 5 minutes par choc hémorragique. C\'est pourquoi l\'hémorragie est la priorité absolue numéro 1.'},
    {type:'qcm',
     text:'Combien d\'os compte le corps humain adulte ?',
     choices:['182','196','206','214'],
     correct:2,
     expl:'206 os chez l\'adulte. Le nourrisson en a 270 à la naissance — plusieurs fusionnent pendant la croissance. Le chirurgien doit connaître leur localisation par cœur.'},
    {type:'qcm',
     text:'En quelle année Pasteur publie-t-il sa théorie des germes ?',
     choices:['1847','1861','1867','1876'],
     correct:1,
     expl:'En 1861, Pasteur démontre que la fermentation et la putréfaction sont causées par des micro-organismes vivants. Il réfute définitivement la génération spontanée et ouvre la voie à la bactériologie.'},
    {type:'vf',
     text:'L\'iode est moins efficace que l\'alcool à 70° comme antiseptique pour les plaies.',
     correct:false,
     expl:'FAUX — L\'iode est plus efficace que l\'alcool seul. Il tue les bactéries, champignons et spores. L\'alcool est surtout utilisé pour désinfecter les instruments. Pour une plaie : toujours l\'iode.'},
    {type:'qcm',
     text:'Où se situe le point de McBurney — signe probable d\'une appendicite ?',
     choices:['Flanc gauche','Tiers externe de la ligne ombilico-iliaque droite','Sous les côtes droites','Fosse iliaque gauche'],
     correct:1,
     expl:'Le point de McBurney est au tiers externe de la ligne reliant l\'ombilic à l\'épine iliaque droite. Douleur à ce point = appendicite probable. En 1904, l\'appendicectomie est une chirurgie établie.'},
    {type:'qcm',
     text:'Philippe Pinel retire les chaînes des aliénés de la Bicêtre en :',
     choices:['1779','1787','1793','1800'],
     correct:2,
     expl:'Pinel retire les chaînes en 1793 en affirmant que la folie est une maladie, pas une punition. Acte fondateur de la psychiatrie humaniste — l\'aliéné mérite des soins, pas des fers.'},
    {type:'vf',
     text:'Gray\'s Anatomy, référence anatomique mondiale, est publié en 1858.',
     correct:true,
     expl:'VRAI — Henry Gray publie son traité d\'anatomie humaine en 1858, illustré par Vandyke Carter. Chaque médecin depuis cette date l\'a étudié. En 1904, c\'est encore LA référence absolue.'},
    {type:'qcm',
     text:'Qui a introduit les gants chirurgicaux en caoutchouc vers 1890 ?',
     choices:['Joseph Lister','Ernst von Bergmann','William Halsted','Robert Koch'],
     correct:2,
     expl:'William Halsted introduit les gants pour protéger son infirmière (future femme) de l\'acide phénique. La révolution hygiénique est complète : lavage des mains + antisepsie + gants stériles.'},

    /* ── CAS CLINIQUES (5 questions dans l\'ordre narratif) ── */
    {type:'cas', partie:'Partie II — Mise en situation',
     cas:'Vous êtes appelé chez une famille à Sunset. Trois enfants ont de la fièvre depuis 48h, diarrhées, vomissements. Le père vous dit qu\'ils boivent l\'eau du puits depuis une semaine. Le voisin a eu les mêmes symptômes il y a dix jours.',
     text:'Quelle est votre PREMIÈRE mesure d\'urgence ?',
     choices:['Administrer du laudanum pour calmer les douleurs','Interdire immédiatement l\'eau du puits — eau bouillie uniquement','Demander à la famille de quitter la maison','Attendre 24h pour voir l\'évolution'],
     correct:1,
     expl:'L\'eau du puits est la source probable de contamination. Priorité absolue : COUPER LA SOURCE. L\'eau bouillie est la seule alternative sûre. En 1904 au Texas, les épidémies de typhoïde et choléra viennent quasi systématiquement de l\'eau.'},
    {type:'cas',
     cas:'Vous suspectez une typhoïde. Le père vous demande si ses enfants vont mourir.',
     text:'Que lui expliquez-vous honnêtement ?',
     choices:['Il existe un remède efficace — le bromure de potassium','Il n\'existe pas de remède curatif, mais avec repos et réhydratation les enfants passeront le cap en 3-4 semaines','Ils doivent être transportés à l\'hôpital immédiatement','La maladie est toujours mortelle, préparez-vous au pire'],
     correct:1,
     expl:'Honnêteté s\'impose : aucun antibiotique en 1904. Traitement uniquement symptomatique — repos, réhydratation, bains froids si fièvre > 40°C. Avec soins : mortalité 2-5%. Sans soins : 10-30%. Le père a besoin de vérité, pas de faux espoirs ni de catastrophisme.'},
    {type:'cas',
     cas:'En examinant la cour, vous constatez que le puits se trouve à 4 mètres des latrines de la ferme voisine. Le sol est sablonneux.',
     text:'Quelle mesure préventive recommandez-vous à long terme ?',
     choices:['Désinfecter le puits au phénol toutes les semaines','Construire un nouveau puits à l\'opposé des latrines — minimum 15 mètres','Bouillir l\'eau pour toujours — aucune autre mesure nécessaire','Fermer la ferme voisine'],
     correct:1,
     expl:'La contamination fécale-orale nécessite une séparation physique. Distance minimale recommandée : 15 mètres sur sol poreux. Bouillir l\'eau est une mesure palliative — pas une solution structurelle.'},
    {type:'cas',
     cas:'En sortant, un voisin vous attrape le bras. Il a une plaie profonde à la main entaillée avec une hache il y a 3 heures. Elle saigne encore légèrement. La plaie est souillée de terre.',
     text:'Dans quel ordre effectuez-vous les soins ?',
     choices:['Suturer immédiatement pour stopper le saignement','Rinçage eau claire abondant → désinfection iode → suture catgut et soie → pansement','Appliquer un cataplasme et laisser cicatriser naturellement','Amputer le doigt par précaution'],
     correct:1,
     expl:'L\'ordre est crucial : 1) Rinçage abondant pour éliminer la terre. 2) Iode pour tuer les germes. 3) Suture (catgut pour les profondeurs, soie pour la peau). 4) Pansement propre. Suturer sans nettoyer = enfermer l\'infection = gangrène.'},
    {type:'cas',
     cas:'La plaie nettoyée atteint le tendon fléchisseur de l\'index — le patient n\'arrive pas à plier le doigt.',
     text:'Que signifie cette incapacité et quelle est votre décision ?',
     choices:['C\'est normal après une plaie — cela passera avec du repos','Tendon fléchisseur sectionné — suture spécialisée nécessaire, référer si possible à un chirurgien','Il faut amputer l\'index immédiatement','C\'est une fracture — poser une attelle'],
     correct:1,
     expl:'Impossibilité de fléchir un doigt après plaie palmaire = section du tendon fléchisseur. La suture tendineuse est une technique spécialisée. En zone rurale au Texas : pansement propre et référer à un chirurgien. Sans réparation, le doigt restera en extension permanente.'},
  ]
},

/* ══ NIVEAU 2 — APPRENTI → MÉDECIN CAMPAGNE ═══════════════
   Cours couverts : antisepsie, chirurgie de base, médicaments
   Score requis : 75% sur 18 questions
══════════════════════════════════════════════════════════ */
{ id:'e2', level:2, levelClass:'lv2',
  title:'Examen d\'Apprenti médecin',
  subtitle:'Antisepsie, sutures, médicaments courants, urgences',
  reqScore:75, totalQ:18,
  meta:['18 questions','75% requis','Niv. 2 → Médecin campagne'],
  questions:[
    /* ── THÉORIE (13 questions) ── */
    {type:'qcm', partie:'Partie I — Théorie',
     text:'En quelle année Joseph Lister publie-t-il ses articles fondateurs sur l\'antisepsie dans The Lancet ?',
     choices:['1861','1863','1867','1871'],
     correct:2,
     expl:'1867 — Lister publie six articles décrivant ses résultats avec l\'acide phénique. La mortalité post-amputation dans son service : 46% → 15%. Révolution absolue de la chirurgie.'},
    {type:'vf',
     text:'Le catgut est un fil de suture résorbable utilisé pour les tissus profonds.',
     correct:true,
     expl:'VRAI — Le catgut (intestin de mouton) est résorbable en 10 à 20 jours. Pour les muscles et tissus internes. La soie, non résorbable, est réservée à la peau et doit être retirée en 7-10 jours.'},
    {type:'qcm',
     text:'Quel est le danger principal du chloroforme comme anesthésique ?',
     choices:['Il provoque des hallucinations imprévisibles','La dose anesthésique et la dose létale sont très proches','Il est incompatible avec le laudanum','Il ne fonctionne pas sur les hommes'],
     correct:1,
     expl:'La marge thérapeutique du chloroforme est dangereusement étroite. Quelques gouttes de trop = arrêt cardiaque. C\'est pourquoi l\'éther lui est préféré malgré son odeur — sa marge est beaucoup plus large.'},
    {type:'qcm',
     text:'Ernst von Bergmann introduit la stérilisation à la vapeur (autoclave) en chirurgie en :',
     choices:['1878','1882','1886','1892'],
     correct:2,
     expl:'1886 — Von Bergmann passe de l\'antisepsie (tuer les germes présents) à l\'asepsie (empêcher les germes d\'entrer). Révolution complémentaire à celle de Lister — la chirurgie propre est née.'},
    {type:'vf',
     text:'Un garrot posé peut rester en place indéfiniment sans risque pour le membre.',
     correct:false,
     expl:'FAUX — Maximum 2 heures. Au-delà, l\'ischémie (manque d\'oxygène) provoque des lésions irréversibles pouvant nécessiter l\'amputation. Toujours noter l\'heure de pose du garrot.'},
    {type:'qcm',
     text:'Technique correcte pour extraire un projectile superficiel palpable sous la peau ?',
     choices:['Explorer avec les doigts pour localiser','Incision au bistouri au-dessus du projectile, extraction à la pince en geste ferme','Appuyer fortement pour faire ressortir le projectile','Toujours laisser en place — l\'extraction est trop risquée'],
     correct:1,
     expl:'Projectile palpable près de la surface = extractible. Incision nette, pince, geste ferme et continu. Un projectile superficiel laissé en place peut causer infection, saturnisme (intoxication au plomb) ou migrer.'},
    {type:'qcm',
     text:'La soie utilisée pour suturer la peau doit être retirée après combien de jours ?',
     choices:['3-4 jours','7-10 jours','3 semaines','Elle est résorbable'],
     correct:1,
     expl:'7 jours pour le visage, 10 jours pour le tronc et les membres. Au-delà : réaction inflammatoire et risque d\'incrustation dans la cicatrice. Ne jamais oublier de prévenir le patient.'},
    {type:'qcm',
     text:'Avant de poser un plâtre de Paris, quelle étape est absolument nécessaire ?',
     choices:['Administrer de la morphine systématiquement','Réduire la fracture si nécessaire + poser une couche de coton protectrice','Appliquer de l\'iode sur toute la peau','Attendre 24h que le gonflement diminue'],
     correct:1,
     expl:'Deux étapes impératives : 1) Réduction (remettre l\'os en position). 2) Coton protecteur entre la peau et le plâtre. Un plâtre trop serré sur un membre qui continue à gonfler peut comprimer nerfs et vaisseaux.'},
    {type:'qcm',
     text:'La digitale est prescrite contre l\'insuffisance cardiaque. Sa principale contrainte ?',
     choices:['Elle ne fonctionne qu\'en injection','Marge thérapeutique très étroite — dose efficace proche de la dose toxique','Elle est incompatible avec l\'alcool','Elle ne fonctionne que chez les femmes'],
     correct:1,
     expl:'La digitale a une marge thérapeutique dangereusement étroite. Trop peu = inefficace. Trop = nausées, troubles du rythme, mort. Signe de surdosage : vision jaune-verte, bradycardie. Toujours commencer à dose minimale.'},
    {type:'qcm',
     text:'Le laudanum — teinture d\'opium — contient combien de mg de morphine par ml ?',
     choices:['1 mg','5 mg','10 mg','20 mg'],
     correct:2,
     expl:'Le laudanum standard contient 10 mg de morphine par ml (solution à 1%). Posologie standard : 10 à 20 gouttes. Dose toxique pour un sujet naïf : 30 à 50 gouttes en une prise. À prescrire avec prudence.'},
    {type:'vf',
     text:'Bayer a commercialisé l\'héroïne en 1898 comme traitement "non addictif" de la morphinomanie.',
     correct:true,

/* ══ ÉTAT DE L\'EXAMEN ═══════════════════════════════════════ */
var examState = { examId:null, questions:[], current:0, answers:[], errors:[], score:0 };

/* ══ ROTATION DES QUESTIONS THÉORIQUES ══════════════════════ */
function shuffleQuestions(questions){
  var theorie = [], cas = [], inCas = false;
  questions.forEach(function(q){
    if(q.partie && q.partie.indexOf('Mise en situation') > -1) inCas = true;
    if(q.type === 'cas' || inCas){ cas.push(Object.assign({},q)); }
    else { theorie.push(Object.assign({},q)); }
  });
  for(var i=theorie.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=theorie[i]; theorie[i]=theorie[j]; theorie[j]=tmp;
  }
  if(theorie.length>0) theorie[0].partie='Partie I — Théorie';
  if(cas.length>0) cas[0].partie='Partie II — Mise en situation';
  return theorie.concat(cas);
}

/* ══ ACCUEIL ════════════════════════════════════════════════ */
function renderAccueil(){
  var scores = JSON.parse(localStorage.getItem('psy_exam_scores')||'{}');
  var grid = document.getElementById('exam-grid');
  var COLS = {1:'#4a9a4a',2:'#c89820',3:'#4a80b8',4:'#9a3ab8'};
  grid.innerHTML = EXAMENS.map(function(e,idx){
    var prevPassed = idx===0 || (scores['e'+idx] && scores['e'+idx].passed);
    var myScore = scores[e.id];
    var locked = !prevPassed;
    var passed = myScore && myScore.passed;
    var col = COLS[e.level]||'#c89820';
    return '<div class="exam-card '+(locked?'locked':'')+(passed?' passed':'')+'"'
      + (locked?'':' onclick="startExamen(\''+e.id+'\')"')+'>'
      + (passed?'<div class="exam-score-badge">'+myScore.pct+'%</div>':'')
      + (locked?'<div class="lock-icon">🔒</div>':'')
      + '<div class="exam-level-tag"><span class="level-badge lv'+e.level+'" style="background:'+col+';color:#fff;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.75rem">'+e.level+'</span>'
      + '<span style="font-family:\'Cormorant Garamond\',serif;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--parch3)">Niveau '+e.level+'</span></div>'
      + '<div class="exam-title">'+e.title+'</div>'
      + '<div class="exam-desc">'+e.subtitle+'</div>'
      + '<div class="exam-meta">'+e.meta.map(function(m){return '<span>'+m+'</span>';}).join('')+'</div>'
      + '</div>';
  }).join('');
}

/* ══ DÉMARRER ════════════════════════════════════════════════ */
function startExamen(id){
  var exam = EXAMENS.find(function(e){return e.id===id;});
  if(!exam) return;
  examState = {examId:id, questions:shuffleQuestions(exam.questions.slice()), current:0, answers:[], errors:[], score:0};
  document.getElementById('exam-running-title').textContent = exam.title;
  show('view-exam');
  renderQuestion();
}

/* ══ QUESTION ════════════════════════════════════════════════ */
function renderQuestion(){
  var q = examState.questions[examState.current];
  var total = examState.questions.length;
  var pct = Math.round(examState.current/total*100);
  document.getElementById('exam-prog-fill').style.width = pct+'%';
  document.getElementById('exam-prog-text').textContent = (examState.current+1)+' / '+total;

  var letters = ['A','B','C','D'];
  var html = '';
  if(q.partie) html += '<div class="partie-label">'+q.partie+'</div>';
  html += '<div class="question-card">';
  html += '<div class="question-num">Question '+(examState.current+1)+' sur '+total;
  var tl = {qcm:'QCM',vf:'Vrai / Faux',cas:'Cas clinique'}[q.type]||'';
  html += '<span class="question-type-badge">'+tl+'</span></div>';
  if(q.cas) html += '<div class="cas-block"><span class="cas-label">🩺 Situation clinique</span>'+q.cas+'</div>';
  html += '<div class="question-text">'+q.text+'</div>';
  var choices = q.type==='vf' ? ['Vrai','Faux'] : q.choices;
  html += '<div class="choices" id="choices">';
  choices.forEach(function(c,i){
    html += '<div class="choice" id="ch-'+i+'" onclick="selectAnswer('+i+')">'
      +'<span class="choice-letter">'+letters[i]+'</span><span>'+c+'</span></div>';
  });
  html += '</div>';
  html += '<div class="feedback" id="feedback"><div class="feedback-title" id="fb-title"></div><div class="feedback-expl" id="fb-expl"></div></div>';
  html += '<button class="btn-next" id="btn-next" onclick="nextQuestion()">'
    +(examState.current===examState.questions.length-1?'Voir les résultats →':'Question suivante →')
    +'</button>';
  html += '</div>';
  document.getElementById('exam-question-wrap').innerHTML = html;
}

/* ══ RÉPONSE ═════════════════════════════════════════════════ */
function selectAnswer(idx){
  if(document.getElementById('btn-next').classList.contains('show')) return;
  var q = examState.questions[examState.current];
  var correctIdx = q.type==='vf' ? (q.correct?0:1) : q.correct;
  document.querySelectorAll('.choice').forEach(function(c){c.style.pointerEvents='none';});
  document.getElementById('ch-'+idx).classList.add(idx===correctIdx?'correct':'wrong');
  if(idx!==correctIdx){
    document.getElementById('ch-'+correctIdx).classList.add('reveal-correct');
    examState.errors.push({q:q.text, correct:(q.type==='vf'?(q.correct?'Vrai':'Faux'):q.choices[correctIdx])});
  } else { examState.score++; }
  examState.answers.push(idx);
  var fb = document.getElementById('feedback');
  var ok = idx===correctIdx;
  fb.className='feedback show '+(ok?'good':'bad');
  document.getElementById('fb-title').textContent = ok?'✓ Correct !':'✗ Incorrect';
  document.getElementById('fb-expl').textContent = q.expl;
  document.getElementById('btn-next').classList.add('show');
}

/* ══ RÉSULTATS ═══════════════════════════════════════════════ */
function nextQuestion(){
  examState.current++;
  if(examState.current>=examState.questions.length){ showResult(); }
  else { renderQuestion(); window.scrollTo(0,0); }
}

function showResult(){
  var exam = EXAMENS.find(function(e){return e.id===examState.examId;});
  var total=examState.questions.length, score=examState.score;
  var pct=Math.round(score/total*100), passed=pct>=exam.reqScore;
  var mention='', mColor='';
  if(!passed){ mention='Ajourné — à représenter'; mColor='color:#c07070'; }
  else if(pct>=90){ mention='Reçu avec distinction'; mColor='color:#d4b870'; }
  else if(pct>=80){ mention='Reçu avec satisfaction'; mColor='color:#4a9a4a'; }
  else { mention='Reçu — mention passable'; mColor='color:#6abf6a'; }

  /* Sauvegarde locale */
  var scores=JSON.parse(localStorage.getItem('psy_exam_scores')||'{}');
  if(!scores[examState.examId]||pct>scores[examState.examId].pct){
    scores[examState.examId]={pct,passed,mention,date:new Date().toLocaleDateString('fr-FR')};
    localStorage.setItem('psy_exam_scores',JSON.stringify(scores));
  }
  /* Sauvegarde Firebase */
  if(window._fbSaveExam) window._fbSaveExam(examState.examId,pct,passed,mention);

  var diplome='';
  if(passed){
    var today=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
    diplome=['═══════════════════════════════════════',
      '  CABINET MÉDICAL DU NOUVEAU MONDE',
      '  École de Saint-Denis · Texas · 1904',
      '═══════════════════════════════════════','',
      'Nous certifions que','',
      '  Dr. [Votre nom]','',
      'a satisfait aux épreuves de','  '+exam.title.toUpperCase(),'',
      'et est déclaré :','  '+mention.toUpperCase(),'',
      'Score : '+pct+'% ('+score+'/'+total+') — Requis : '+exam.reqScore+'%','',
      'Saint-Denis, Louisiane, le '+today,'',
      '  Cabinet Médical du Nouveau Monde',
      '═══════════════════════════════════════'].join('\n');
  }

  var errHtml='';
  if(examState.errors.length>0){
    errHtml='<div class="errors-list"><div class="label" style="margin-bottom:.6rem;text-align:left">Questions manquées ('+examState.errors.length+')</div>';
    examState.errors.forEach(function(e){
      errHtml+='<div class="error-item"><div class="error-q">'+e.q+'</div><div class="error-correct">✓ '+e.correct+'</div></div>';
    });
    errHtml+='</div>';
  }

  var html='<div class="result-score '+(passed?'passed':'failed')+'">'+pct+'%</div>'
    +'<div class="result-mention" style="'+mColor+'">'+mention+'</div>'
    +'<div class="result-details">'
    +'<div class="result-detail"><strong>'+score+'/'+total+'</strong>Bonnes réponses</div>'
    +'<div class="result-detail"><strong>'+exam.reqScore+'%</strong>Score requis</div>'
    +'<div class="result-detail"><strong>'+(passed?'✓ Validé':'✗ Échoué')+'</strong>Statut</div>'
    +'</div>';
  if(passed) html+='<div class="diplome" id="diplome-txt">'+diplome+'</div>'
    +'<button class="btn btn-gold w-full" style="margin-bottom:1rem" onclick="copyDiplome()">Copier le diplôme RP</button>';
  html+=errHtml;
  html+='<div style="display:flex;gap:.6rem;margin-top:1.25rem;flex-wrap:wrap;justify-content:center">';
  html+='<button class="btn" onclick="backToAccueil()">← Retour</button>';
  html+='<button class="btn btn-gold" onclick="startExamen(\''+examState.examId+'\')">Repasser l\'examen</button>';
  if(passed){
    var nextIdx=EXAMENS.findIndex(function(e){return e.id===examState.examId;})+1;
    if(nextIdx<EXAMENS.length) html+='<button class="btn btn-gold" onclick="startExamen(\''+EXAMENS[nextIdx].id+'\')">Niveau suivant →</button>';
    else html+='<a href="specialites.html" class="btn btn-gold">Choisir ma spécialisation →</a>';
  }
  html+='</div>';

  document.getElementById('result-card').innerHTML=html;
  show('view-result'); window.scrollTo(0,0);
}

function copyDiplome(){
  navigator.clipboard.writeText(document.getElementById('diplome-txt').textContent).then(function(){
    alert('Diplôme copié — collez-le dans le chat du jeu !');
  });
}

/* ══ NAVIGATION ══════════════════════════════════════════════ */
function show(viewId){
  ['view-accueil','view-exam','view-result'].forEach(function(v){
    document.getElementById(v).classList.toggle('hidden',v!==viewId);
  });
}
function backToAccueil(){ show('view-accueil'); renderAccueil(); window.scrollTo(0,0); }

/* ══ INIT ════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function(){
  var waitG = setInterval(function(){
    if(window.guardPage){ clearInterval(waitG);
      guardPage({ minGrade:'stagiaire', onReady:function(p){
        // Synchroniser scores Firebase → localStorage
        if(p && p.examens){
          var scores={};
          Object.entries(p.examens).forEach(function(kv){
            scores[kv[0]]={pct:kv[1].pct,passed:kv[1].passed,date:kv[1].date};
          });
          localStorage.setItem('psy_exam_scores',JSON.stringify(scores));
        }
        renderAccueil();
      }});
    }
  }, 80);
});
</script>
