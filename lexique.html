  { term:"Aspirine", sub:"remedy", cat:"ec-remedy", label:"Médicament",
    def:"Acide acétylsalicylique — médicament révolutionnaire commercialisé par Bayer en 1899. Antipyrétique, analgésique et anti-inflammatoire en un seul comprimé.",
    symptomes:"", traitement:"Fièvre, douleurs, rhumatismes, céphalées. Un comprimé de 0,5g à 1g — répéter toutes les 4 heures si nécessaire. Ne pas dépasser 4g par jour.",
    steps:[
      {role:"doc", text:"« J'ai quelque chose de nouveau pour vous — l'aspirine de Bayer. Commercialisée depuis cinq ans seulement, mais déjà remarquable. »"},
      {role:"action", text:"Présenter le comprimé blanc de 500mg. Faire boire avec un grand verre d'eau — jamais à sec : risque d'irritation de l'estomac."},
      {role:"doc", text:"« Un comprimé maintenant. Si la douleur ou la fièvre persiste dans quatre heures, vous en prenez un deuxième — mais pas plus de quatre par jour. »"},
      {role:"obs", text:"Contre-indications : estomac fragile (ulcère), tendance aux saignements, enfants en bas âge (risque de syndrome de Reye, non encore connu en 1904)."},
      {role:"doc", text:"« Si vous entendez un bourdonnement dans les oreilles ou si l'estomac brûle — arrêtez et venez me voir. Ce sont des signes que la dose est trop forte. »"},
    ],
    epoch:"Bayer commercialise l'aspirine en 1899. En 1904, c'est le médicament le plus moderne disponible — une véritable révolution thérapeutique." },

  { term:"Chloroforme — anesthésie", sub:"remedy", cat:"ec-remedy", label:"Anesthésique",
    def:"Agent anesthésique liquide volatil. Quelques gouttes sur un masque font sombrer le patient dans l'inconscience en moins de deux minutes.",
    symptomes:"", traitement:"Anesthésie générale pour chirurgie. Soulagement de douleurs aiguës. Dosage précis impératif — la différence entre l'endormissement et la mort est minime.",
    steps:[
      {role:"doc", text:"« Je vais vous endormir. Vous ne sentirez rien pendant l'opération. Quand vous vous réveillerez, ce sera terminé. »"},
      {role:"action", text:"Préparer le masque en gaze. Verser 2 à 3ml de chloroforme sur la gaze — jamais directement sur la peau ou la bouche."},
      {role:"obs", text:"Approcher le masque progressivement du visage. Observer la respiration — elle doit rester régulière. Yeux qui roulent vers le haut = endormissement atteint."},
      {role:"action", text:"Maintenir à distance de 2cm du visage — ne jamais plaquer hermétiquement. Surveiller le pouls toutes les 30 secondes. Arrêter si pouls faiblit ou irrégulier."},
      {role:"obs", text:"Signes d'urgence : apnée (arrêt respiratoire), cyanose (teint bleu), pouls imperceptible — retirer immédiatement et ventiler."},
      {role:"doc", text:"[Au réveil] « C'est terminé. Respirez profondément. Les nausées vont passer dans quelques minutes — restez allongé. »"},
    ],
    epoch:"Simpson introduit le chloroforme en chirurgie en 1847. En 1904, l'éther et le chloroforme sont les deux seules anesthésies générales disponibles." },

  { term:"Digitaline", sub:"remedy", cat:"ec-remedy", label:"Médicament",
    def:"Extrait purifié de la digitale pourpre. Renforce les contractions cardiaques et régule le rythme. Remède ancien modernisé par Withering (1785).",
    symptomes:"", traitement:"Insuffisance cardiaque, arythmie, pouls rapide et irrégulier. 15 gouttes de teinture trois fois par jour — doses très précises car marge toxique étroite.",
    steps:[
      {role:"obs", text:"Prendre le pouls avant toute administration. Si pouls < 60/min : ne pas donner. Si irrégulier et rapide (fibrillation) : indication principale."},
      {role:"doc", text:"« Votre cœur bat trop vite et de manière désordonnée. La digitaline va le ralentir et le régulariser — comme remettre une horloge à l'heure. »"},
      {role:"action", text:"Teinture de digitale : 15 gouttes dans un verre d'eau, trois fois par jour aux repas. Compter les gouttes avec précision — l'erreur peut être fatale."},
      {role:"doc", text:"« Si vous voyez les couleurs différemment — le jaune et le vert semblent étranges, ou des halos autour des lumières — arrêtez immédiatement et faites-moi chercher. »"},
      {role:"obs", text:"Signes de toxicité : nausées, vision jaune-verte (xanthopsie), pouls très lent. La digitaline a une marge thérapeutique très étroite — surveiller chaque semaine."},
      {role:"doc", text:"« Je veux vous revoir dans huit jours pour reprendre votre pouls. Ce médicament demande un suivi régulier — ne modifiez jamais la dose vous-même. »"},
    ],
    epoch:"William Withering décrit les propriétés de la digitale en 1785. La digitaline pure est isolée en 1841. Reste le seul traitement cardiaque efficace jusqu'au XXe siècle." },

  { term:"Permanganate de potassium", sub:"remedy", cat:"ec-remedy", label:"Antiseptique",
    def:"Sel cristallisé violet-noir qui se dissout en solution rose désinfectante. Antiseptique puissant pour plaies, lavages et intoxications.",
    symptomes:"", traitement:"Désinfection des plaies, lavage gastrique en cas d'intoxication à l'opium ou aux alcaloïdes, bains antiseptiques pour infections cutanées.",
    steps:[
      {role:"action", text:"Dilution pour plaie : 1 cristal dans un litre d'eau bouillie — solution rose pâle. Trop concentré (violet) = brûlant pour les tissus."},
      {role:"doc", text:"« Je vais laver cette plaie avec du permanganate. Ça va piquer légèrement — et la solution va tacher la peau en brun, c'est normal, ça disparaît. »"},
      {role:"action", text:"Irriguer abondamment la plaie. Le permanganate détruit les bactéries et neutralise certains venins (morsures de serpent en application locale)."},
      {role:"action", text:"Intoxication à l'opium : solution à 0.5g/litre pour lavage gastrique — faire boire puis provoquer le vomissement si ingestion récente."},
      {role:"doc", text:"« Pour les bains de pieds infectés : deux cristaux dans une cuvette d'eau tiède, 15 minutes matin et soir jusqu'à guérison. »"},
    ],
    epoch:"Découvert en 1659, popularisé comme antiseptique dans les années 1850. Indispensable dans toute trousse médicale de 1904." },

  { term:"Ipéca — émétique", sub:"remedy", cat:"ec-remedy", label:"Médicament",
    def:"Racine d'Ipecacuanha réduite en poudre ou teinture. Provoque les vomissements en 15 à 20 minutes. Traitement d'urgence en cas d'ingestion de poison.",
    symptomes:"", traitement:"Intoxication par ingestion (strychnine, arsenic, champignons, laudanum en excès). Une cuillerée à soupe de sirop dans un verre d'eau tiède.",
    steps:[
      {role:"doc", text:"« Qu'a-t-il avalé ? Quand ? Combien ? — Chaque réponse compte. »"},
      {role:"obs", text:"Contre-indications : ne pas donner si ingestion de produit caustique (acides, lessive) — le vomissement brûlerait à nouveau l'œsophage. Ne pas donner si inconscient."},
      {role:"action", text:"Si toxique non caustique et patient conscient : une cuillerée à soupe de sirop d'ipéca dans un verre d'eau tiède. Faire marcher le patient."},
      {role:"obs", text:"Le vomissement survient en 15-20 minutes. S'il ne vient pas : répéter une fois. Si toujours rien au bout de 30 minutes : lavage gastrique à la sonde."},
      {role:"action", text:"Après les vomissements : charbon de bois en poudre dans l'eau pour absorber les toxines résiduelles. Garder le patient sous observation 4 heures."},
      {role:"doc", text:"« Gardez ce flacon dans votre armoire. Si un enfant avale quelque chose de suspect, faites-le vomir et faites-moi chercher immédiatement. »"},
    ],
    epoch:"L'ipéca est utilisé depuis le XVIIe siècle. En 1904 il est le traitement d'urgence standard des intoxications par ingestion dans tous les foyers." },

  { term:"Morphine — injection", sub:"remedy", cat:"ec-remedy", label:"Médicament",
    def:"Alcaloïde de l'opium, beaucoup plus puissant que le laudanum. Injecté à la seringue hypodermique pour douleurs sévères.",
    symptomes:"", traitement:"Douleurs post-opératoires, fractures graves, blessures sévères. 5 à 15mg en injection sous-cutanée.",
    steps:[
      {role:"doc", text:"« La douleur est trop intense pour le laudanum. Je vais faire une injection de morphine — ça va agir en quelques minutes. »"},
      {role:"action", text:"Préparer la seringue hypodermique. Diluer la morphine si nécessaire. Désinfecter la zone d'injection à l'alcool."},
      {role:"doc", text:"« Petite piqûre. Restez allongé et ne vous levez pas — vous allez vous sentir partir, c'est normal et voulu. »"},
      {role:"action", text:"Injection lente en sous-cutané. Observer le patient 10 minutes. Vérifier la respiration reste régulière."},
      {role:"doc", text:"« Comment vous sentez-vous ? La douleur diminue ? Bien. Je reviens dans une heure vérifier. »"},
      {role:"obs", text:"Si respiration lente ou patient difficile à réveiller : danger de surdose. Stimuler, ne pas laisser dormir, appeler de l'aide."},
    ],
    epoch:"La seringue hypodermique est utilisée depuis 1850. Le morphinisme était un fléau à l'époque." },

  { term:"Bromure de potassium", sub:"remedy", cat:"ec-remedy", label:"Médicament",
    def:"Sel minéral sédatif du système nerveux. Principal anticonvulsivant et calmant nerveux de l'époque.",
    symptomes:"", traitement:"Épilepsie, agitation, insomnies, manie, nervosité excessive. 1 à 2g dans un verre d'eau, 2 fois par jour.",
    steps:[
      {role:"doc", text:"« Je vous prescris du bromure de potassium — une cuillère à café rase dans un grand verre d'eau, matin et soir après les repas. »"},
      {role:"doc", text:"« Ce médicament va ralentir votre esprit progressivement. Vous sentirez l'effet au bout de deux à trois jours. »"},
      {role:"doc", text:"« Ne conduisez pas de voiture, ne montez pas à cheval seul les premiers jours. Vos réflexes seront légèrement ralentis. »"},
      {role:"action", text:"Remettre le flacon avec l'ordonnance écrite. Traitement sur 3 semaines minimum avant réévaluation."},
      {role:"doc", text:"« Si vous voyez des boutons sur la peau ou une confusion mentale inhabituelle, arrêtez et revenez me voir. »"},
    ],
    epoch:"Introduit en médecine en 1857. Remplacé progressivement par les barbituriques après 1912." },

  { term:"Teinture d'iode — désinfection", sub:"remedy", cat:"ec-remedy", label:"Antiseptique",
    def:"Solution d'iode dans l'alcool. Antiseptique de référence pour toute plaie. Suit les principes de Lister.",
    symptomes:"", traitement:"Toute plaie ouverte avant suture ou pansement. Application directe.",
    steps:[
      {role:"doc", text:"« Je vais nettoyer la plaie à l'iode. Ça va brûler — vraiment brûler. Mais c'est ce qui va tuer les bactéries et éviter la gangrène. »"},
      {role:"action", text:"Verser l'iode sur un linge propre ou directement sur la plaie. Nettoyer du centre vers l'extérieur, jamais l'inverse."},
      {role:"doc", text:"« La coloration brune, c'est normal — ça partira en quelques jours. Si la peau autour devient rouge et chaude, revenez immédiatement. »"},
      {role:"action", text:"Laisser sécher 30 secondes avant de poser le pansement. Ne pas rincer l'iode."},
      {role:"doc", text:"« Changez le pansement tous les deux jours, nettoyez à l'iode à chaque fois. »"},
    ],
    epoch:"L'antisepsie de Lister (1867) avait révolutionné la chirurgie. L'iode remplaçait l'alcool pur." },

  { term:"Quinine", sub:"remedy", cat:"ec-remedy", label:"Médicament",
    def:"Alcaloïde du quinquina. Seul traitement efficace contre le paludisme (malaria) en 1904.",
    symptomes:"", traitement:"Paludisme, fièvres récurrentes. 1 gramme par jour en poudre ou pilule pendant 3 semaines.",
    steps:[
      {role:"doc", text:"« Ces fièvres qui reviennent exactement tous les deux ou trois jours, avec des frissons violents — c'est la malaria. »"},
      {role:"doc", text:"« La quinine est le seul remède que nous ayons contre cette maladie, et heureusement il est efficace. »"},
      {role:"action", text:"Prescrire quinine sulfate 1g/jour, à prendre le matin. Traitement sur 21 jours sans interruption."},
      {role:"doc", text:"« Vous allez avoir des bourdonnements d'oreilles et peut-être des vertiges — c'est un effet secondaire normal de la quinine, pas dangereux. »"},
      {role:"doc", text:"« Ne ratez aucune dose même si vous vous sentez mieux après une semaine. Arrêter trop tôt et la fièvre reviendra. »"},
    ],
    epoch:"Le quinquina contre la malaria est utilisé depuis le XVIIe siècle. Très efficace." },

  { term:"Cocaïne — anesthésie locale", sub:"remedy", cat:"ec-remedy", label:"Anesthésique",
    def:"Alcaloïde de la feuille de coca. Utilisée légalement en 1904 comme anesthésique local en ophtalmologie, dentisterie et petite chirurgie.",
    symptomes:"", traitement:"Anesthésie locale pour sutures, extraction dentaire, chirurgie oculaire. Solution à 4% en instillation ou injection locale.",
    steps:[
      {role:"doc", text:"« Je vais insensibiliser la zone — vous ne sentirez rien pendant l'acte. Une légère brûlure en piquant, puis plus rien. »"},
      {role:"action", text:"Préparer solution de cocaïne à 4% : injecter 0.5 à 1ml sous la peau autour de la zone à traiter. Attendre 3 à 5 minutes."},
      {role:"obs", text:"Tester l'anesthésie avec une pique d'épingle : si le patient ne sent rien, procéder. Si encore sensible, attendre deux minutes."},
      {role:"doc", text:"« Vous sentez encore quelque chose ? — Non ? Parfait. Je commence. Dites-moi si vous sentez une douleur vive — pas de pression, ça c'est normal. »"},
      {role:"obs", text:"Surveiller les signes de surdosage : agitation, convulsions, pouls rapide. Quantité maximale sûre : 1.5mg/kg. Ne jamais injecter dans un vaisseau."},
      {role:"doc", text:"« L'effet va durer 30 à 45 minutes. Vous ressentirez une légère excitation dans les minutes qui suivent — c'est normal, ça passe vite. »"},
    ],
    epoch:"La cocaïne comme anesthésique local est découverte par Koller en 1884. En 1904, c'est parfaitement légal et très utilisé. Freud l'avait recommandée comme antidépresseur." },

  { term:"Vin de Coca — tonique", sub:"remedy", cat:"ec-remedy", label:"Tonique",
    def:"Vin de Bordeaux macéré avec des feuilles de coca du Pérou. Le Vin Mariani (1863) était le tonique mondain le plus célèbre — approuvé par le Pape Léon XIII en personne.",
    symptomes:"", traitement:"Fatigue, anémie, convalescence, nervosité, manque d'appétit. Un verre à vin avant chaque repas. Reconstituant général.",
    steps:[
      {role:"doc", text:"« Je vous prescris du Vin Mariani — le tonique du Pape, du Président, des acteurs et des champions. Si c'est assez bon pour Sa Sainteté, c'est assez bon pour vous. »"},
      {role:"action", text:"Servir un verre à vin (150ml) de Vin Mariani avant chaque repas. Peut se prendre également chaud en hiver."},
      {role:"doc", text:"« Les feuilles de coca du Pérou fortifient le sang, stimulent l'appétit et chassent la mélancolie. C'est la science moderne qui parle. »"},
      {role:"obs", text:"Effets attendus : légère euphorie, sensation d'énergie, appétit revenu, moral amélioré. Ces effets sont ceux de la cocaïne contenue dans les feuilles."},
      {role:"doc", text:"« Si vous dormez mal après la dose du soir, décalez-la au déjeuner. Et si votre cœur s'emballe, réduisez à un verre par jour. »"},
    ],
    epoch:"Le Vin Mariani, inventé en 1863, obtient un médaillon d'or du Pape Léon XIII. Il inspire la recette originale du Coca-Cola (1886). Vendu librement dans tout l'Ouest américain." },

  { term:"Chloral hydraté — sédatif", sub:"remedy", cat:"ec-remedy", label:"Médicament",
    def:"Sédatif puissant introduit en médecine en 1869. Provoque un sommeil profond en 20 à 30 minutes. Connu dans les milieux criminels comme 'Mickey Finn' pour assommer les victimes.",
    symptomes:"", traitement:"Insomnies sévères, agitation maniaque, convulsions épileptiques, préparation à une chirurgie légère. 1 à 2g dans de l'eau ou du lait.",
    steps:[
      {role:"doc", text:"« Ce sédatif est plus fort que le laudanum pour le sommeil. Il ne crée pas la même accoutumance. Mais il demande la même précaution. »"},
      {role:"action", text:"Dissoudre 1g de chloral dans un verre de lait chaud — le lait masque l'amertume. Administrer au coucher. Patient allongé."},
      {role:"doc", text:"« Vous allez sentir la tête tourner dans dix minutes, puis une somnolence profonde. Ne résistez pas — laissez-vous aller. »"},
      {role:"obs", text:"Surveiller la respiration 30 minutes après administration. Le chloral déprime le centre respiratoire à haute dose. Contre-indiqué en cas de maladie cardiaque."},
      {role:"doc", text:"« Ne l'associez jamais avec de l'alcool — les deux ensemble peuvent arrêter la respiration. Et ne prenez jamais la dose vous-même — venez me voir. »"},
      {role:"obs", text:"Signe d'abus : teint grisâtre, tremblement matinal, irritabilité — le chloralisme est aussi redoutable que le morphinisme."},
    ],
    epoch:"Le chloral hydraté est synthétisé en 1832, utilisé en médecine depuis 1869. Le terme 'Mickey Finn' (boisson droguée) vient de son utilisation dans les bars louches de Chicago." },

  { term:"Acide phénique — antisepsie Lister", sub:"remedy", cat:"ec-remedy", label:"Antiseptique",
    def:"Le phénol de Lister (1867) — acide carbolique dilué. La révolution qui avait divisé par dix la mortalité post-opératoire en transformant la chirurgie sale en chirurgie aseptique.",
    symptomes:"", traitement:"Désinfection des plaies profondes, des instruments, des mains du chirurgien. Solution à 2-5% dans l'eau. Spray dans la salle d'opération.",
    steps:[
      {role:"action", text:"Préparer solution phéniquée à 2% : 2ml d'acide phénique pur dans 100ml d'eau bouillie. Solution légèrement laiteuse."},
      {role:"action", text:"Désinfecter les instruments : tremper 20 minutes dans la solution. Laver les mains du chirurgien avant toute opération."},
      {role:"doc", text:"« Je vais nettoyer cette plaie au phénol. Ça fait une légère brûlure — mais c'est ce phénol qui vous évite la gangrène. »"},
      {role:"action", text:"Irriguer la plaie à la solution phéniquée. Tamponner sans frotter. Pansement imbibé de solution phéniquée sur les plaies profondes."},
      {role:"obs", text:"Attention aux brûlures cutanées si trop concentré (>5%). Contact prolongé peut nécroser la peau. Travailler avec des gants si disponibles."},
      {role:"doc", text:"« Pasteur avait raison — c'est invisible mais c'est ce qui tue : les germes. Le phénol les détruit. Votre plaie est maintenant propre. »"},
    ],
    epoch:"Joseph Lister introduit l'antisepsie en 1867 en utilisant le phénol sur les plaies. Avant lui, 50% des amputés mouraient d'infection post-opératoire." },

  { term:"Sels d'ammoniaque — réanimation", sub:"remedy", cat:"ec-remedy", label:"Médicament",
    def:"Cristaux de carbonate d'ammonium. L'odeur âcre et puissante provoque un réflexe inspiratoire brutal qui réveille les personnes évanouies.",
    symptomes:"", traitement:"Syncope, évanouissement, hystérie avec perte de conscience. Flacon agité sous le nez à 5cm de distance.",
    steps:[
      {role:"action", text:"Ouvrir le flacon de sels. Agiter sous le nez de la personne évanouie — à 5cm de distance, pas directement contre la narine."},
      {role:"obs", text:"La personne réagit en général en moins de 10 secondes : mouvement de la tête, inspiration brusque, clignements. Si aucune réaction après 15 secondes : problème plus grave."},
      {role:"action", text:"Desserrer les vêtements (col, corset, ceinture). Allonger avec les jambes légèrement surélevées pour ramener le sang au cerveau."},
      {role:"doc", text:"« Respirez. Lentement. Vous avez simplement perdu connaissance — ce n'est pas dangereux en soi. »"},
      {role:"obs", text:"Chercher la cause : chaleur, émotion violente, douleur, faim, corset trop serré (fréquent), grossesse (toujours vérifier discrètement)."},
      {role:"doc", text:"« Gardez ce petit flacon sur vous — si cela se reproduit, votre entourage saura quoi faire. »"},
    ],
    epoch:"Les sels sont indispensables dans toute trousse médicale et tout sac à main bourgeois du XIXe siècle. Particulièrement prescrits aux femmes portant des corsets." },

  { term:"Solution de Fowler — arsenic", sub:"remedy", cat:"ec-remedy", label:"Médicament",
    def:"Solution d'arséniate de potassium à 1%. L'arsenic était utilisé en médecine comme tonique, traitement de l'anémie, du psoriasis et de la syphilis. Poison à haute dose, remède à faible dose.",
    symptomes:"", traitement:"Anémie sévère, psoriasis, leucémie, syphilis (quand le mercure échoue). 3 à 10 gouttes dans de l'eau trois fois par jour.",
    steps:[
      {role:"doc", text:"« Je vais vous prescrire de la solution de Fowler — de l'arsenic médical. Ne vous inquiétez pas : c'est une dose thérapeutique, pas un poison. »"},
      {role:"action", text:"Trois gouttes dans un grand verre d'eau aux repas. Jamais à jeun. Augmenter très progressivement — maximum 10 gouttes."},
      {role:"obs", text:"Surveiller chaque semaine : l'arsenic s'accumule dans l'organisme. Ongles blancs strié, peau rugueuse brune, fourmillements dans les mains = surdosage."},
      {role:"doc", text:"« Si vous voyez vos ongles blanchir ou si vos pieds fourmillent — arrêtez immédiatement et venez me voir. »"},
      {role:"action", text:"Cure de 6 semaines maximum puis arrêt 4 semaines. Ne jamais dépasser 8 semaines continues — risque de neuropathie et de cancer."},
      {role:"doc", text:"« En Angleterre on dit que les paysans styriennes mangent de l'arsenic pour avoir bonne mine. C'est vrai — en quantité infime. Vous aussi vous allez avoir meilleure mine. »"},
    ],
    epoch:"Thomas Fowler décrit sa solution en 1786. Utilisée jusqu'aux années 1950. Le paradoxe arsenic/remède persistait car on ignorait la toxicité cumulative." },

  { term:"Cataplasme de moutarde", sub:"remedy", cat:"ec-remedy", label:"Remède externe",
    def:"Emplâtre chaud à base de farine de moutarde appliqué sur la peau. Provoque un afflux de sang sous la peau (révulsion) pour traiter les congestions pulmonaires et les douleurs profondes.",
    symptomes:"", traitement:"Bronchite, pneumonie débutante, pleurésie, rhumatismes, douleurs musculaires profondes. Application 15 à 20 minutes maximum.",
    steps:[
      {role:"action", text:"Préparer : 2 cuillères de farine de moutarde noire mélangées à 4 cuillères de farine de froment. Ajouter eau tiède pour obtenir une pâte épaisse."},
      {role:"action", text:"Étaler sur une feuille de papier huilé. Appliquer sur la poitrine ou le dos selon la zone à traiter. Protéger la peau avec un linge fin."},
      {role:"obs", text:"La peau doit rougir sous l'emplâtre en 10 minutes — c'est l'effet voulu. Si la peau brunit ou si la douleur devient insupportable : retirer immédiatement."},
      {role:"action", text:"Retirer après 15 minutes (20 maximum). Rincer à l'eau tiède. Couvrir chaudement. Le patient ne doit pas sortir dans le froid les 2 heures suivantes."},
      {role:"doc", text:"« Ça brûle un peu — c'est le signe que ça fonctionne. La chaleur attire le sang sous la peau et libère la congestion en profondeur. »"},
      {role:"doc", text:"« Appliquez-en un chaque soir pendant cinq jours. Si la fièvre monte ou si les crachats deviennent de plus en plus colorés, venez me chercher. »"},
    ],
    epoch:"Le cataplasme sinapisé est utilisé depuis l'Antiquité. En 1904 c'est encore le traitement de première intention pour les affections pulmonaires en dehors de l'hôpital." },

  { term:"Strychnine — tonique nerveux", sub:"remedy", cat:"ec-remedy", label:"Médicament",
    def:"Alcaloïde de la noix vomique. Poison violent à haute dose — mais à dose infinitésimale, stimulant nerveux et musculaire prescrit pour les paralysies et l'épuisement extrême.",
    symptomes:"", traitement:"Paralysie post-AVC, épuisement profond, atonie musculaire, convalescence longue. 1 à 2mg en pilule ou injection. Marge thérapeutique très étroite.",
    steps:[
      {role:"doc", text:"« Ce que je vais vous prescrire est extrait de la noix vomique — ne vous alarmez pas. À cette dose, c'est un médicament parfaitement contrôlé. »"},
      {role:"action", text:"Pilule de strychnine à 1mg, une fois par jour le matin. Jamais plus — la marge entre la dose thérapeutique et la dose toxique est très réduite."},
      {role:"obs", text:"Signes thérapeutiques attendus : amélioration du tonus musculaire, retour de l'appétit, meilleur état général en deux semaines."},
      {role:"obs", text:"Signes de surdosage : contractions musculaires involontaires, raideur de la nuque, spasmes du visage, difficulté à ouvrir la bouche. ARRÊTER IMMÉDIATEMENT."},
      {role:"doc", text:"« Ne doublez jamais la dose même si vous pensez ne pas progresser assez vite. Et si vos mâchoires se crispent ou si vos muscles font des sauts tout seuls — venez me chercher de suite. »"},
    ],
    epoch:"La strychnine fut isolée en 1818 et utilisée comme médicament jusqu'aux années 1970. Elle figurait dans les préparations pour athlètes — certains coureurs olympiques de 1904 en prenaient." },

  { term:"Huile de foie de morue", sub:"remedy", cat:"ec-remedy", label:"Tonique",
    def:"Huile extraite du foie de cabillaud. Riche en vitamines A et D (inconnues en 1904 mais dont les effets sont observés). Traitement du rachitisme et remontant général.",
    symptomes:"", traitement:"Rachitisme chez l'enfant, tuberculose osseuse, convalescence, enfants chétifs, scorbut. Une à deux cuillerées à soupe par jour.",
    steps:[
      {role:"doc", text:"« Je vais vous prescrire de l'huile de foie de morue. Oui, ça sent fort et le goût est exécrable — mais les résultats sur les enfants sont remarquables. »"},
      {role:"action", text:"Une cuillerée à soupe le matin à jeun. Chez l'enfant : une cuillerée à café mélangée à du jus de citron pour masquer le goût."},
      {role:"obs", text:"Résultats attendus en 4 à 8 semaines : reprise de la croissance chez l'enfant, os moins douloureux, teint amélioré, meilleure résistance aux infections."},
      {role:"doc", text:"« Les os du petit sont mous parce qu'ils manquent d'un principe nutritif que l'on trouve dans ce foie de poisson. C'est la science qui parle. »"},
      {role:"action", text:"Cure de 3 mois. Renouveler si nécessaire. Stocker à l'abri de la chaleur et de la lumière — l'huile rance n'est plus efficace."},
      {role:"doc", text:"« Faites-le prendre tous les matins sans exception. C'est une cure de fond — les effets ne sont pas immédiats mais ils sont réels. »"},
    ],
    epoch:"L'huile de foie de morue est utilisée empiriquement contre le rachitisme depuis le XVIIIe siècle. La vitamine D ne sera identifiée qu'en 1922 — mais son effet sur les os était bien observé." },

  { term:"Nitrate d'argent — cautérisation", sub:"remedy", cat:"ec-remedy", label:"Antiseptique",
    def:"Sel d'argent utilisé en solution ou en crayon solide. Brûle chimiquement les tissus infectés ou envahis par des végétations, et détruit les bactéries par son action oligodynamique.",
    symptomes:"", traitement:"Ulcères, plaies bourgeonnantes qui ne cicatrisent pas, verrues, condylomes, infections oculaires, cautérisation de petits vaisseaux après extraction dentaire.",
    steps:[
      {role:"doc", text:"« Je vais cautériser cette plaie au nitrate d'argent. Ça va piquer brièvement — comme une allumette que l'on pose une seconde. »"},
      {role:"action", text:"Toucher délicatement le tissu à traiter avec le crayon de nitrate d'argent ou un coton imbibé de solution à 20%. Pas plus de 5 secondes."},
      {role:"obs", text:"La zone traitée noircit immédiatement — c'est l'argent qui se dépose et qui tue les bactéries. Cette coloration est temporaire et sans danger."},
      {role:"action", text:"Rincer à l'eau saline après l'application. Pansement propre. Ne pas toucher la zone les 24 heures suivantes."},
      {role:"obs", text:"Ne pas appliquer sur une surface trop large (risque de brûlure chimique profonde). Éviter tout contact avec les yeux ou les muqueuses délicates."},
      {role:"doc", text:"« La zone va noircir puis former une petite croûte qui tombe en 5 à 7 jours. Ne la retirez pas de force — laissez-la partir seule. »"},
    ],
    epoch:"Le nitrate d'argent est utilisé en médecine depuis le XVIe siècle. En 1904, le 'crayon infernal' est un outil indispensable dans toute trousse de médecin de campagne." },
],

/* ─── EXAMENS MÉDICAUX ───────────────────────────────────── */
exam:[
  { term:"Examen général complet", sub:"exam", cat:"ec-proc", label:"Bilan complet",
    def:"Bilan systématique de l'état général du patient. Toujours commencer par là avant tout examen spécialisé.",
    symptomes:"", traitement:"",
    steps:[
      {role:"doc", text:"« Je vais vous examiner de façon complète. Ôtez votre veste et votre chemise, et asseyez-vous sur cette chaise. »"},
      {role:"action", text:"INSPECTION GÉNÉRALE : observer la posture, le teint (pâleur, jaunisse, rougeur), l'état de la peau, la corpulence, l'expression du visage."},
      {role:"obs", text:"Noter : sueurs, tremblements, odeur (alcool, acétone, putréfaction), état des vêtements et de l'hygiène générale."},
      {role:"action", text:"TEMPÉRATURE : placer le thermomètre sous l'aisselle pendant 5 minutes. Normale : 37°C. Fièvre si > 38°C. Hypothermie si < 36°C."},
      {role:"doc", text:"« Je vais prendre votre pouls. Donnez-moi votre poignet. »"},
      {role:"action", text:"POULS : poser 3 doigts sur l'artère radiale au poignet. Compter 30 secondes × 2. Normal : 60-90 bpm. Noter le rythme et la force."},
      {role:"action", text:"RESPIRATION : observer le thorax pendant 30 secondes sans prévenir. Normal : 12-18 respirations/minute. Sifflante ? Laborieuse ?"},
      {role:"action", text:"YEUX : examiner les conjonctives (relevez la paupière) — roses = normal, pâles = anémie, jaunes = jaunisse."},
      {role:"action", text:"BOUCHE : faire ouvrir la bouche. Observer langue (chargée ?), dents, gorge (rouge, amygdales gonflées ?)."},
      {role:"action", text:"GANGLIONS : palper doucement le cou, les aisselles, l'aine. Douloureux ou gonflés = infection ou maladie sanguine."},
      {role:"doc", text:"« Allongez-vous maintenant. Je vais examiner votre ventre. »"},
      {role:"action", text:"ABDOMEN : palper en commençant par les zones sans douleur. Chercher organes augmentés de volume, douleurs à la pression, résistance musculaire."},
      {role:"doc", text:"« Bien. Voici ce que j'observe... [conclure selon les résultats]. Je vais maintenant examiner [organe spécifique si nécessaire]. »"},
    ],
    epoch:"L'examen clinique systématique se codifie au XIXe siècle. Laennec (stéthoscope, 1816) et Auenbrugger (percussion, 1761) en sont les pionniers." },

  { term:"Examen des yeux — Vue", sub:"exam", cat:"ec-proc", label:"Ophtalmologie",
    def:"Examen ophtalmologique complet adapté aux moyens de 1904. Évalue l'acuité, les pupilles et les signes neurologiques.",
    symptomes:"", traitement:"",
    steps:[
      {role:"doc", text:"« Je vais examiner vos yeux. Regardez droit devant vous, sans bouger la tête. »"},
      {role:"action", text:"INSPECTION : observer la position des globes oculaires (un œil dévié ?), les paupières (tombantes = ptosis), les conjonctives (couleur)."},
      {role:"action", text:"ACUITÉ VISUELLE : placer le patient à 6 mètres d'un tableau de lettres. Faire lire chaque ligne. Quel est le plus petit texte lisible ? Faire œil par œil."},
      {role:"doc", text:"« Suivez mon doigt des yeux sans bouger la tête. »"},
      {role:"action", text:"MOTRICITÉ OCULAIRE : déplacer le doigt en croix (haut, bas, gauche, droite) et en diagonales. Un œil qui se décroche = paralysie musculaire."},
      {role:"action", text:"PUPILLES au repos : observer la taille — dilatées (morphine, belladone, choc) ou contractées (opium, lésion cérébrale) ?"},
      {role:"action", text:"RÉFLEXE PUPILLAIRE : approcher une bougie ou une lampe de chaque œil. La pupille doit se contracter immédiatement. Si non : lésion neurologique grave."},
      {role:"action", text:"CHAMP VISUEL : se placer face au patient, lui faire fixer le nez du médecin. Bouger un doigt en périphérie — à quel moment le voit-il apparaître ?"},
      {role:"obs", text:"Signes d'alerte : pupilles inégales (traumatisme crânien), perte du champ visuel d'un côté (accident cérébral), déviation oculaire permanente."},
      {role:"doc", text:"« Voici ce que j'observe : [résultat]. Vos yeux [fonctionnent normalement / présentent une anomalie au niveau de...]. »"},
    ],
    epoch:"L'ophtalmoscope existe depuis 1851 (Helmholtz). Les lunettes correctrices sont disponibles chez l'opticien." },

  { term:"Examen pulmonaire — Poumons", sub:"exam", cat:"ec-proc", label:"Auscultation",
    def:"Examen complet des poumons par inspection, percussion et auscultation au stéthoscope. Technique codifiée par Laennec.",
    symptomes:"", traitement:"",
    steps:[
      {role:"doc", text:"« Je vais examiner vos poumons. Ôtez votre chemise et respirez normalement dans un premier temps. »"},
      {role:"action", text:"INSPECTION : observer le thorax. Symétrique ? Un côté se soulève moins que l'autre ? Respiration abdominale ou thoracique ? Cyanose des lèvres ?"},
      {role:"doc", text:"« Respirez profondément par la bouche, aussi fort que vous pouvez. Puis soufflez tout. Encore une fois. »"},
      {role:"obs", text:"Observer : essoufflement à l'effort respiratoire, bruits audibles sans stéthoscope (sifflements, gargouillements), douleur à l'inspiration profonde."},
      {role:"action", text:"PERCUSSION : placer un doigt à plat sur le thorax, taper dessus avec le doigt du milieu de l'autre main. Son creux = poumon sain. Son mat = consolidation, épanchement."},
      {role:"action", text:"Percuter méthodiquement les deux faces : commencer en haut à droite, descendre par zones, puis gauche. Comparer les deux côtés."},
      {role:"doc", text:"« Je vais poser mon stéthoscope sur votre dos. Respirez profondément par la bouche à chaque fois que je vous le demande. »"},
      {role:"action", text:"AUSCULTATION face antérieure : placer le stéthoscope en 4 points : sous chaque clavicule, puis sous chaque pectoral. Faire respirer profondément à chaque point."},
      {role:"action", text:"AUSCULTATION face postérieure : 6 points dans le dos — haut, milieu, bas de chaque côté. Comparer gauche et droite."},
      {role:"obs", text:"Ce que vous entendez : murmure vésiculaire normal (doux, continu) / râles crépitants (pneumonie) / sifflements (asthme) / silence (épanchement, pneumothorax)."},
      {role:"doc", text:"« Bien. Vos poumons [sont clairs des deux côtés / présentent des râles en bas à droite, évoquant une pneumonie / un épanchement du côté gauche...]. »"},
    ],
    epoch:"Laennec invente le stéthoscope en 1816. La percussion thoracique date d'Auenbrugger (1761)." },

  { term:"Examen cardiaque — Cœur", sub:"exam", cat:"ec-proc", label:"Cardiologie",
    def:"Examen du cœur par auscultation, palpation du choc de pointe et prise du pouls. Technique de base en 1904.",
    symptomes:"", traitement:"",
    steps:[
      {role:"doc", text:"« Je vais examiner votre cœur. Allongez-vous et respirer normalement — ne forcez pas la respiration. »"},
      {role:"action", text:"POULS : poignet gauche, 3 doigts sur l'artère radiale. Compter 60 secondes. Normal : 60-90 bpm. Rapide = tachycardie. Lent = bradycardie. Irrégulier = arythmie."},
      {role:"action", text:"CHOC DE POINTE : poser la paume sur le thorax gauche. Sentir les battements. Normalement situé au 5e espace intercostal, ligne médio-claviculaire. Déplacé = cœur agrandi."},
      {role:"doc", text:"« Je vais poser mon stéthoscope sur plusieurs points de votre poitrine. Respirez normalement. »"},
      {role:"action", text:"AUSCULTATION — 4 foyers : 1) Foyer aortique (2e espace droit) 2) Foyer pulmonaire (2e espace gauche) 3) Foyer tricuspide (sternum bas) 4) Foyer mitral (pointe)."},
      {role:"obs", text:"Sons normaux : deux bruits (boum-ta) réguliers. Anormal : souffle (frottement entre les deux bruits) = valvulopathie. Frottement = péricardite. Galop = cœur épuisé."},
      {role:"action", text:"VEINES DU COU : patient à 45°. Les veines jugulaires sont-elles gonflées au repos ? Oui = cœur droit défaillant, sang refoulé."},
      {role:"action", text:"ŒDÈMES : appuyer 30 secondes sur la cheville. Si une dépression reste = œdème cardiaque. Chercher aussi aux mollets et aux lombes."},
      {role:"doc", text:"« Votre cœur [bat régulièrement à [X] pulsations / présente un souffle au foyer mitral / montre des signes de défaillance avec ces œdèmes aux chevilles...]. »"},
    ],
    epoch:"La numérisation du pouls et l'auscultation cardiaque sont les seuls outils disponibles. L'électrocardiogramme date de 1903 (Einthoven) — non disponible au Texas." },

  { term:"Examen abdominal", sub:"exam", cat:"ec-proc", label:"Abdomen",
    def:"Inspection, auscultation, percussion et palpation de l'abdomen. Permet de diagnostiquer appendicite, péritonite, occlusion, organes élargis.",
    symptomes:"", traitement:"",
    steps:[
      {role:"doc", text:"« Allongez-vous sur le dos, les bras le long du corps. Dites-moi si quelque chose fait mal pendant l'examen — surtout ne retenez pas vos réactions. »"},
      {role:"action", text:"INSPECTION : observer l'abdomen. Gonflé ? Asymétrique ? Cicatrices ? Visible péristaltisme (ondulations sous la peau = occlusion possible) ?"},
      {role:"action", text:"AUSCULTATION EN PREMIER (avant la palpation qui perturberait) : stéthoscope sur 4 quadrants. Bruits intestinaux normaux = gargouillis réguliers. Silence = occlusion ou péritonite."},
      {role:"action", text:"PERCUSSION : taper sur tout l'abdomen. Son tympanique (creux) = gaz intestinaux normal. Son mat = organe plein, masse, liquide."},
      {role:"doc", text:"« Je vais appuyer sur votre ventre. Respirez normalement et dites-moi exactement où ça fait mal. »"},
      {role:"action", text:"PALPATION SUPERFICIELLE : commencer par la zone opposée à la douleur. Main à plat, pression douce. Chercher défense musculaire (ventre qui se contracte à la palpation)."},
      {role:"action", text:"PALPATION PROFONDE : chercher le foie (bord droit sous les côtes), la rate (gauche), les reins (flancs). Sont-ils augmentés de volume ?"},
      {role:"obs", text:"Signe de Blumberg : appuyer fort, relâcher brusquement — douleur au relâchement = péritonite (URGENCE). Signe de Murphy : douleur à l'inspiration sous les côtes droites = vésicule biliaire."},
      {role:"doc", text:"« Votre abdomen [est souple et indolore / présente une défense en fosse iliaque droite évoquant une appendicite / un foie augmenté de volume...]. »"},
    ],
    epoch:"" },

  { term:"Examen neurologique", sub:"exam", cat:"ec-proc", label:"Neurologie",
    def:"Bilan du système nerveux : réflexes, coordination, sensibilité, force musculaire. Essentiel pour les traumatismes crâniens et les maladies nerveuses.",
    symptomes:"", traitement:"",
    steps:[
      {role:"doc", text:"« Je vais tester vos nerfs et vos réflexes. Ce n'est pas douloureux — répondez simplement à mes questions et ne cherchez pas à contrôler vos réactions. »"},
      {role:"action", text:"ÉTAT MENTAL : noter l'orientation (Qui êtes-vous ? Quel jour ? Où sommes-nous ?). La mémoire récente (qu'avez-vous mangé ce matin ?). La logique du discours."},
      {role:"action", text:"RÉFLEXE ROTULIEN : patient assis, jambes pendantes. Taper avec le marteau à réflexes sous la rotule. La jambe doit se soulever. Absent = lésion nerveuse. Exagéré = lésion cérébrale."},
      {role:"action", text:"RÉFLEXE ACHILLÉEN : taper sur le tendon d'Achille. Le pied doit se fléchir. Même signification que le rotulien."},
      {role:"action", text:"FORCE MUSCULAIRE : faire serrer les deux mains simultanément. Asymétrie = faiblesse d'un côté. Faire marcher sur les talons, puis sur les pointes."},
      {role:"doc", text:"« Fermez les yeux et tendez les bras devant vous, paumes vers le haut. »"},
      {role:"obs", text:"SIGNE DE ROMBERG : si un bras descend les yeux fermés = lésion cérébelleuse. Si le patient se balance ou tombe = atteinte de l'équilibre."},
      {role:"action", text:"SENSIBILITÉ : piquer légèrement avec une épingle les deux côtés du corps en parallèle. Le patient sent-il la même chose des deux côtés ? Une zone anesthésiée ?"},
      {role:"action", text:"NERFS CRÂNIENS basiques : sourire (paralysie faciale ?), tirer la langue (déviée ?), hausser les épaules (force égale ?), suivre le doigt des yeux."},
      {role:"doc", text:"« Votre examen neurologique [est normal / révèle une faiblesse du côté gauche / des réflexes abolis aux membres inférieurs, évoquant une atteinte de la moelle épinière...]. »"},
    ],
    epoch:"Le marteau à réflexes est standardisé depuis 1880. La neurologie comme spécialité émerge avec Charcot à Paris." },

  { term:"Bilan psychiatrique", sub:"exam", cat:"ec-proc", label:"Psychiatrie",
    def:"Examen mental structuré permettant d'évaluer l'état psychique d'un patient. Base de tout diagnostic aliéniste.",
    symptomes:"", traitement:"",
    steps:[
      {role:"doc", text:"« Je vais vous poser plusieurs questions. Il n'y a pas de bonnes ou mauvaises réponses — répondez simplement ce qui vous vient naturellement. »"},
      {role:"action", text:"ORIENTATION : Quel est votre nom ? Quel jour sommes-nous ? Quelle ville ? Qui suis-je ? (Identifier une désorientation temporo-spatiale.)"},
      {role:"action", text:"MÉMOIRE IMMÉDIATE : dire 3 mots (cheval, nuage, montre) — les faire répéter immédiatement puis demander à nouveau 5 minutes plus tard."},
      {role:"action", text:"MÉMOIRE ANCIENNE : questions sur son passé, sa famille, son métier. Confabulation = invente des souvenirs pour combler les trous = lésion organique."},
      {role:"doc", text:"« Si je vous dis : une pierre dans l'eau coule, une plume flotte — qu'est-ce que cela signifie selon vous ? »"},
      {role:"obs", text:"ABSTRACTION : une réponse concrète (la pierre est lourde) = pensée peu abstraite. Une réponse symbolique (les choses légères résistent mieux) = bonne abstraction."},
      {role:"action", text:"HUMEUR : comment vous sentez-vous en ce moment ? Sur une échelle de très triste à très heureux ? Depuis quand ? Fluctuations dans la journée ?"},
      {role:"action", text:"HALLUCINATIONS : entendez-vous des voix quand personne ne parle ? Voyez-vous des choses que les autres ne voient pas ? Sentez-vous des odeurs inexplicables ?"},
      {role:"action", text:"IDÉES SUICIDAIRES : avez-vous eu des pensées de vous faire du mal ? Des plans ? (Cette question ne provoque pas le passage à l'acte — elle est indispensable.)"},
      {role:"obs", text:"COMPORTEMENT PENDANT L'ENTRETIEN : agitation ? Méfiance ? Contact visuel ? Tenue vestimentaire ? Cohérence entre les mots et l'expression du visage ?"},
      {role:"doc", text:"« Merci de m'avoir parlé aussi librement. Voici ce que j'observe : [synthèse]. Mon diagnostic est [X]. Voici ce que je propose comme traitement... »"},
    ],
    epoch:"L'examen mental structuré se développe avec Kraepelin et Bleuler à la fin du XIXe siècle." },

  { term:"Prise de température", sub:"exam", cat:"ec-proc", label:"Bilan complet",
    def:"Mesure de la chaleur corporelle à l'aide du thermomètre clinique de Wunderlich. La fièvre oriente le diagnostic — sa courbe raconte la maladie.",
    symptomes:"", traitement:"",
    steps:[
      {role:"doc", text:"« Je vais prendre votre température. Gardez le thermomètre bien sous l'aisselle, bras serré contre le corps — dix minutes sans bouger. »"},
      {role:"action", text:"Thermomètre au mercure sous l'aisselle : lire après 10 minutes. Normal : 36.5°C à 37.2°C. Fièvre légère : 37.5-38°C. Fièvre franche : >38.5°C."},
      {role:"obs", text:"La courbe thermique est diagnostique : plateau élevé régulier = fièvre typhoïde. Fièvre tierce (jour oui/non) = paludisme. Montée brutale = pneumonie ou grippe."},
      {role:"doc", text:"« Votre température est de [X]°C. [Normal : vos défenses font leur travail / Fièvre légère : restez au chaud / Fièvre élevée : nous devons agir.] »"},
      {role:"action", text:"Si fièvre > 40°C : envelopper dans des linges froids humides sur le tronc. Quinine 1g. Faire boire abondamment — la fièvre déshydrate."},
      {role:"doc", text:"« Prenez votre température vous-même matin et soir, notez-la. Si elle dépasse 40°C ou si elle revient après trois jours d'amélioration, faites-moi chercher. »"},
    ],
    epoch:"Carl Wunderlich établit en 1851 que 37°C est la norme et que la fièvre est un symptôme, pas une maladie. Le thermomètre clinique se généralise dans les années 1870." },

  { term:"Prise de pouls", sub:"exam", cat:"ec-proc", label:"Bilan complet",
    def:"Évaluation du rythme et de la qualité du pouls radial. En l'absence d'appareils, le pouls est la fenêtre principale sur l'état du cœur.",
    symptomes:"", traitement:"",
    steps:[
      {role:"action", text:"Positionner deux ou trois doigts sur l'artère radiale (face interne du poignet, côté pouce). Ne jamais utiliser le pouce — il a son propre pouls."},
      {role:"action", text:"Compter les battements sur 30 secondes, multiplier par 2. Normal adulte : 60 à 90/min. Enfant : 80-120/min. Vieillard : 60-70/min."},
      {role:"obs", text:"RYTHME : régulier ou irrégulier ? Irrégulier = fibrillation auriculaire possible. Pauses régulières = bloc de conduction."},
      {role:"obs", text:"QUALITÉ : plein et bondissant (fièvre, effort) · filant et rapide (hémorragie, choc) · lent et fort (intoxication à la digitaline, méningite) · imperceptible (agonie)."},
      {role:"doc", text:"« Votre pouls est à [X] battements par minute, [régulier / légèrement irrégulier / très irrégulier]. [Commentaire selon la valeur trouvée.] »"},
      {role:"action", text:"Si pouls > 120 au repos : chercher fièvre, anémie, anxiété, pathologie cardiaque. Si < 45 : chercher intoxication, bloc cardiaque. Toujours croiser avec la tension et la température."},
    ],
    epoch:"L'utilisation systématique du pouls comme diagnostic remonte à Harvey (1628). Le sphygmographe de Marey (1860) commence à le visualiser graphiquement." },

  { term:"Examen des urines", sub:"exam", cat:"ec-proc", label:"Bilan complet",
    def:"Analyse visuelle et chimique des urines. En 1904, sans laboratoire, le médecin observe la couleur, l'odeur, la clarté et utilise quelques réactifs simples.",
    symptomes:"", traitement:"",
    steps:[
      {role:"doc", text:"« Je vais avoir besoin d'un échantillon de vos urines — le premier jet du matin dans un flacon propre, si possible. »"},
      {role:"obs", text:"COULEUR : jaune paille (normal) · foncé (déshydratation) · rouge (sang = hématurie, urgence) · brun (problème hépatique) · blanc trouble (infection)."},
      {role:"obs", text:"ODEUR : forte et ammoniacale (infection urinaire) · sucrée (diabète sucré) · pourrie (gangrène voisine)."},
      {role:"obs", text:"CLARTÉ : limpide (normal) · trouble (infection ou phosphates) · mousseuse persistante après agitation (protéines = maladie rénale)."},
      {role:"action", text:"TEST AU CHALEUR : chauffer l'urine dans une cuillère. Si un précipité blanc se forme et se dissout à l'ajout d'acide acétique : phosphates. S'il reste = albumine (néphrite)."},
      {role:"action", text:"TEST AU SUCRE (Fehling) : si disponible — urine + réactif de Fehling chauffé. Précipité rouge-brique = glucose = diabète probable."},
      {role:"doc", text:"« Vos urines [sont normales / contiennent du sang — je dois examiner votre rein / montrent de l'albumine — vos reins sont en difficulté]. »"},
    ],
    epoch:"L'analyse d'urine est pratiquée depuis l'Antiquité. Les réactifs chimiques simples (Fehling, Esbach) permettent en 1904 un dépistage fiable du diabète et des néphrites." },

  { term:"Palpation des ganglions", sub:"exam", cat:"ec-proc", label:"Bilan complet",
    def:"Recherche de ganglions lymphatiques tuméfiés (adénopathies). Ils renseignent sur une infection ou une tumeur dans leur zone de drainage.",
    symptomes:"", traitement:"",
    steps:[
      {role:"doc", text:"« Je vais palper votre cou, vos aisselles et vos aines — dites-moi si quelque chose est douloureux. »"},

const SUB_LABELS = {
  diag:'Diagnostic', cond:'Condition', treat:'Traitement', phrase:'Phrase RP',
  wound:'Blessure', proc:'Procédure', disease:'Maladie', remedy:'Remède'
};
const SUB_BY_TAB = {
  psy:  ['diag','cond','treat','phrase'],
  chir: ['wound','proc'],
  mal:  ['disease'],
  rem:  ['remedy'],
  exam: ['exam']
};

let activeTab='psy', activeSub='all';

function setTab(el,tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); activeTab=tab; activeSub='all';
  buildSubFilters(); document.getElementById('search').value=''; render();
}
function buildSubFilters(){
  const subs=SUB_BY_TAB[activeTab]||[];
  const wrap=document.getElementById('sub-filters');
  if(subs.length<=1){wrap.innerHTML='';return;}
  wrap.innerHTML=`<button class="sfpill active" onclick="setSub(this,'all')">Tout</button>`
    +subs.map(s=>`<button class="sfpill" onclick="setSub(this,'${s}')">${SUB_LABELS[s]||s}</button>`).join('');
}
function setSub(el,sub){
  document.querySelectorAll('.sfpill').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); activeSub=sub; render();
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  let list=DATA[activeTab]||[];
  if(activeSub!=='all') list=list.filter(e=>e.sub===activeSub);
  if(q) list=list.filter(e=>(e.term+e.def+(e.symptomes||'')+(e.traitement||'')+(e.steps||[]).map(s=>s.text).join(' ')).toLowerCase().includes(q));
  document.getElementById('count-label').textContent=`${list.length} entrée${list.length!==1?'s':''}`;
  const wrap=document.getElementById('entries');
  if(!list.length){wrap.innerHTML='<div class="no-result">Aucun terme pour cette recherche.</div>';return;}

  const groups={};
  list.forEach(e=>{(groups[e.sub]=groups[e.sub]||[]).push(e);});

  let html='';
  Object.entries(groups).forEach(([sub,items])=>{
    if(Object.keys(groups).length>1)
      html+=`<div class="section-divider">${SUB_LABELS[sub]||sub}</div>`;
    items.forEach(e=>{
      /* ── ILLUSTRATION ── */
      const imgData=IMGS[e.term];
      const asideHtml=imgData?`<div class="dict-aside">
        <div class="dict-illus">
          <img src="${imgData.src}" alt="${imgData.cap}" loading="lazy"
               onerror="var a=this.closest('.dict-aside');a.style.display='none';a.closest('.dict-layout').classList.add('no-img')">
        </div>
        <div class="dict-illus-cap">${imgData.cap}</div>
      </div>`:'';

      /* ── CORPS DICTIONNAIRE ── */
      const defHtml=e.def?`<p class="dict-def">${e.def}</p>`:'';
      const sympHtml=e.symptomes?`<div class="dict-section"><div class="dict-section-label">Symptômes observés</div><div class="dict-section-text">${e.symptomes}</div></div>`:'';
      const traitHtml=e.traitement?`<div class="dict-section"><div class="dict-section-label">Traitement prescrit</div><div class="dict-section-text">${e.traitement}</div></div>`:'';
      const epochHtml=e.epoch?`<div class="dict-note">✦ ${e.epoch}</div>`:'';

      /* ── AIDE RP ── */
      const ROLE_LABEL={doc:'Docteur — parole',action:'Action / Geste',obs:'Observation clinique',phrase:'Phrase RP'};
      const ROLE_CLASS={doc:'role-doc',action:'role-action',obs:'role-obs'};
      const allText=(e.steps||[]).map(s=>s.text).join('\n');
      const allSafe=allText.replace(/'/g,"&#39;").replace(/"/g,'&quot;').replace(/\n/g,'\\n');
      const stepsHtml=(e.steps||[]).map((s,i)=>{
        const safe=s.text.replace(/'/g,"&#39;").replace(/"/g,'&quot;');
        return `<li class="rp-step">
          <div class="rp-step-num">${i+1}</div>
          <div class="rp-step-body">
            <span class="rp-step-role ${ROLE_CLASS[s.role]||''}">${ROLE_LABEL[s.role]||s.role}</span>
            <div class="rp-step-text">${s.text}</div>
          </div>
          <button class="rp-step-copy" onclick="cp(this,'${safe}')">Copier</button>
        </li>`;
      }).join('');
      const rpId='rp-'+Math.random().toString(36).slice(2);
      const rpHtml=e.steps&&e.steps.length?`
        <div class="rp-toggle" onclick="toggleRp('${rpId}',this)">
          <span>🎭 Fiche aide RP — protocole de jeu</span>
          <span class="rp-chev">▼</span>
        </div>
        <div class="rp-fiche" id="${rpId}" style="display:none">
          <div class="rp-fiche-header">
            <span class="rp-fiche-title">Protocole RP — étapes en jeu</span>
            <button class="copy-all-btn" onclick="cpAll(this,'${allSafe}')">Copier tout</button>
          </div>
          <ol class="rp-steps">${stepsHtml}</ol>
        </div>`:'';

      html+=`<div class="entry fade-up">
        <div class="entry-head" onclick="this.parentElement.classList.toggle('open')">
          <span class="entry-term">${e.term}</span>
          <span class="entry-cat ${e.cat}">${e.label}</span>
          <span class="entry-chev">▼</span>
        </div>
        <div class="entry-body">
          <div class="dict-layout${imgData?'':' no-img'}">
            <div class="dict-main">${defHtml}${sympHtml}${traitHtml}${epochHtml}</div>
            ${asideHtml}
          </div>
          ${rpHtml}
        </div>
      </div>`;
    });
  });
  wrap.innerHTML=html;
}

function toggleRp(id, btn){
  var el = document.getElementById(id);
  var open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  btn.querySelector('.rp-chev').textContent = open ? '▼' : '▲';
}

function cp(btn,text){
  const t=text.replace(/&#39;/g,"'").replace(/&quot;/g,'"');
  navigator.clipboard.writeText(t).then(()=>{
    btn.textContent='✓'; btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='Copier';btn.classList.remove('ok');},2000);
  });
}
function cpAll(btn,text){
  const t=text.replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/\\n/g,'\n');
  navigator.clipboard.writeText(t).then(()=>{
    btn.textContent='✓ Copié'; btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='Copier tout';btn.classList.remove('ok');},2000);
  });
}
