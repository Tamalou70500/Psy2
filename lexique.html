<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexique médical — Cabinet du Dr. Abernathy Lucius</title>
<link rel="stylesheet" href="css/style.css">
<style>
.page-band {
  background:var(--ink2); border-bottom:1px solid var(--bdr);
  padding:1.25rem 2rem;
  display:flex; align-items:flex-end; justify-content:space-between; gap:1rem; flex-wrap:wrap;
}
.page-band h2 { margin:0; }
.page-band .eyebrow { margin-bottom:0.3rem; }

/* ONGLETS */
.tabs {
  display:flex; gap:0; border-bottom:1px solid var(--bdr);
  background:var(--ink); overflow-x:auto;
}
.tab {
  font-family:'Cormorant Garamond',serif;
  font-size:0.72rem; letter-spacing:0.16em; text-transform:uppercase;
  color:var(--parch4); padding:0.85rem 1.5rem;
  border:none; border-bottom:2px solid transparent;
  background:transparent; cursor:pointer; transition:all .2s;
  white-space:nowrap; flex-shrink:0;
}
.tab:hover { color:var(--parch2); }
.tab.active { color:var(--gold-l); border-bottom-color:var(--gold); background:var(--gold-dim2); }

/* TOOLBAR */
.toolbar {
  display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap;
  padding:0.85rem 2rem; border-bottom:1px solid var(--bdr);
  background:var(--ink);
}
.search-wrap { position:relative; flex:1; min-width:180px; }
.search-wrap input { padding-left:2rem; background:var(--ink3); }
.search-icon { position:absolute; left:0.7rem; top:50%; transform:translateY(-50%); color:var(--parch4); font-style:italic; font-family:'EB Garamond',serif; font-size:1rem; pointer-events:none; }
.sub-filters { display:flex; gap:4px; flex-wrap:wrap; }
.sfpill {
  font-family:'Cormorant Garamond',serif; font-size:0.62rem; letter-spacing:0.1em; text-transform:uppercase;
  padding:0.2rem 0.8rem; border:1px solid var(--bdr); background:transparent; color:var(--parch4); cursor:pointer; transition:all .15s;
}
.sfpill:hover { border-color:var(--bdr2); color:var(--parch2); }
.sfpill.active { border-color:var(--gold-d); color:var(--gold); background:var(--gold-dim); }

/* STAT */
.stat-bar { padding:0.5rem 2rem; border-bottom:1px solid var(--bdr); background:var(--ink); }

/* ENTRIES */
.entries { padding:1px; background:var(--bdr); }
.entry {
  background:var(--ink2); margin-bottom:1px;
  border-left:2px solid transparent; transition:border-color .2s;
}
.entry:hover { border-left-color:var(--gold-d); }
.entry.open  { border-left-color:var(--gold); }

.entry-head {
  padding:1rem 1.5rem; cursor:pointer;
  display:flex; align-items:center; gap:1rem; user-select:none;
}
.entry-term {
  font-family:'Playfair Display',serif; font-size:1rem;
  color:var(--parch); font-style:italic; flex:1;
}
.entry-cat {
  font-family:'Cormorant Garamond',serif; font-size:0.62rem;
  letter-spacing:0.1em; text-transform:uppercase;
  padding:1px 9px; border:1px solid transparent;
}
.ec-diag   { color:#6a90c0; border-color:rgba(74,128,184,0.25); background:rgba(30,60,100,0.12); }
.ec-cond   { color:#c06060; border-color:rgba(154,24,24,0.25);  background:rgba(100,20,20,0.12); }
.ec-treat  { color:#70b070; border-color:rgba(74,154,74,0.25);  background:rgba(30,70,30,0.12); }
.ec-med    { color:#9070c0; border-color:rgba(122,80,168,0.25); background:rgba(60,20,80,0.12); }
.ec-phrase { color:#c09040; border-color:rgba(192,154,74,0.25); background:rgba(90,60,10,0.12); }
.ec-wound  { color:#c07050; border-color:rgba(180,80,30,0.25);  background:rgba(90,40,10,0.12); }
.ec-proc   { color:#50a0b0; border-color:rgba(50,140,160,0.25); background:rgba(20,70,80,0.12); }
.ec-disease{ color:#c0a040; border-color:rgba(180,150,30,0.25); background:rgba(80,60,10,0.12); }
.ec-remedy { color:#80b060; border-color:rgba(100,160,70,0.25); background:rgba(40,70,20,0.12); }

.entry-chev { color:var(--parch4); font-size:0.65rem; transition:transform .25s; flex-shrink:0; }
.entry.open .entry-chev { transform:rotate(180deg); }

.entry-body { display:none; padding:0 1.5rem 1.25rem; }
.entry.open .entry-body { display:block; }

/* FICHE MALADIE */
.fiche {
  display:grid; grid-template-columns:1fr 1fr; gap:1px;
  background:var(--bdr); margin-bottom:0.75rem;
}
.fiche-cell { background:var(--ink3); padding:0.75rem 1rem; }
.fiche-cell.full { grid-column:1/-1; }
.fiche-label {
  font-family:'Cormorant Garamond',serif; font-size:0.62rem;
  letter-spacing:0.16em; text-transform:uppercase; color:var(--gold-d);
  display:block; margin-bottom:0.35rem;
}
.fiche-value {
  font-family:'EB Garamond',serif; font-size:0.9rem;
  color:var(--parch2); line-height:1.65;
}

/* PHRASE RP */
.rp-block {
  background:var(--ink3); border-left:2px solid var(--gold-d);
  padding:0.75rem 1rem; margin-bottom:0.5rem; position:relative;
}
.rp-label { font-family:'Cormorant Garamond',serif; font-size:0.6rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold-d); display:block; margin-bottom:0.35rem; }
.rp-text { font-family:'EB Garamond',serif; font-size:0.92rem; color:var(--parch); line-height:1.7; font-style:italic; }
.copy-btn {
  position:absolute; top:0.6rem; right:0.75rem;
  background:transparent; border:1px solid var(--bdr); color:var(--parch4);
  padding:1px 8px; font-family:'Cormorant Garamond',serif; font-size:0.6rem;
  letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; transition:all .15s;
}
.copy-btn:hover { border-color:var(--gold); color:var(--gold); }
.copy-btn.ok { color:#70b870; border-color:rgba(74,154,74,0.4); }

/* EPOCH */
.epoch { font-family:'Cormorant Garamond',serif; font-size:0.7rem; letter-spacing:0.08em; color:var(--parch4); font-style:italic; padding-top:0.5rem; border-top:1px solid var(--bdr); margin-top:0.5rem; }

.no-result { padding:4rem 2rem; text-align:center; font-family:'Cormorant Garamond',serif; font-size:1rem; color:var(--parch4); font-style:italic; }
.section-divider {
  padding:0.6rem 1.5rem; background:var(--ink);
  font-family:'Cormorant Garamond',serif; font-size:0.65rem; letter-spacing:0.22em;
  text-transform:uppercase; color:var(--gold-d);
  border-bottom:1px solid var(--bdr); display:flex; align-items:center; gap:0.75rem;
}
.section-divider::after { content:''; flex:1; height:1px; background:var(--bdr); }

@media(max-width:640px){ .fiche{ grid-template-columns:1fr; } .tab{ padding:0.7rem 1rem; font-size:0.65rem; } }
</style>
</head>

<script>

/* ══════════════════════════════════════════════════════════

const DATA = {

/* ─── PSYCHIATRIE ────────────────────────────────────────── */
psy: [
  // DIAGNOSTICS
  { term:"Mélancolie", sub:"diag", cat:"ec-diag", label:"Diagnostic",
    def:"Trouble profond de l'humeur : abattement persistant, pensées sombres, retrait du monde, insomnie matinale. Considérée comme un excès de bile noire depuis l'Antiquité.",
    symptomes:"Tristesse profonde, pleurs sans raison apparente, perte d'appétit, insomnie, lenteur des mouvements et de la pensée, sentiment de culpabilité.",

  { term:"Hystérie", sub:"diag", cat:"ec-diag", label:"Diagnostic",
    def:"Réaction émotionnelle excessive et crises convulsives sans cause organique identifiable. Diagnostiquée presque exclusivement chez les femmes.",
    symptomes:"Crises de larmes ou de rires incontrôlés, spasmes, paralysies passagères, perte de sensibilité, sensation d'étouffement, comportements imprévisibles.",

  { term:"Aliénation mentale", sub:"diag", cat:"ec-diag", label:"Diagnostic",

/* ══════════════════════════════════════════════════════════ */

const SUB_LABELS = {
  diag:'Diagnostic', cond:'Condition', treat:'Traitement', phrase:'Phrase RP',
  wound:'Blessure', proc:'Procédure', disease:'Maladie', remedy:'Remède / Médicament'
};
const SUB_BY_TAB = {
  psy:  ['diag','cond','treat','phrase'],
  chir: ['wound','proc'],
  mal:  ['disease'],
  rem:  ['remedy']
};

let activeTab = 'psy';
let activeSub = 'all';

function setTab(el, tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  activeTab = tab; activeSub = 'all';
  buildSubFilters();
  document.getElementById('search').value = '';
  render();
}

function buildSubFilters(){
  const subs = SUB_BY_TAB[activeTab]||[];
  const wrap = document.getElementById('sub-filters');
  if(subs.length <= 1){ wrap.innerHTML=''; return; }
  wrap.innerHTML = `<button class="sfpill active" onclick="setSub(this,'all')">Tout</button>`
    + subs.map(s=>`<button class="sfpill" onclick="setSub(this,'${s}')">${SUB_LABELS[s]||s}</button>`).join('');
}

function setSub(el, sub){
  document.querySelectorAll('.sfpill').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); activeSub = sub; render();
}

function render(){
  const q = document.getElementById('search').value.toLowerCase();
  let list = DATA[activeTab]||[];
  if(activeSub !== 'all') list = list.filter(e=>e.sub===activeSub);
  if(q) list = list.filter(e=>(e.term+e.def+(e.symptomes||'')+(e.traitement||'')+(e.rp||'')).toLowerCase().includes(q));

  document.getElementById('count-label').textContent = `${list.length} entrée${list.length!==1?'s':''}`;

  const wrap = document.getElementById('entries');
  if(!list.length){ wrap.innerHTML='<div class="no-result">Aucun terme pour cette recherche.</div>'; return; }

  // Grouper par sous-catégorie
  const groups = {};
  list.forEach(e=>{ (groups[e.sub]=groups[e.sub]||[]).push(e); });

  let html = '';
  Object.entries(groups).forEach(([sub, items])=>{
    if(Object.keys(groups).length > 1){
      html += `<div class="section-divider">${SUB_LABELS[sub]||sub}</div>`;
    }
    items.forEach(e=>{
      const hasFiche = e.symptomes || e.traitement;
      const ficheHtml = hasFiche ? `<div class="fiche">
        ${e.symptomes?`<div class="fiche-cell"><span class="fiche-label">Symptômes</span><div class="fiche-value">${e.symptomes}</div></div>`:''}
        ${e.traitement?`<div class="fiche-cell"><span class="fiche-label">Traitement prescrit</span><div class="fiche-value">${e.traitement}</div></div>`:''}
      </div>` : '';
      const defHtml = e.def ? `<p style="font-family:'EB Garamond',serif;font-size:0.92rem;color:var(--parch2);line-height:1.75;margin-bottom:0.75rem;font-style:italic">${e.def}</p>` : '';
      const rpSafe = (e.rp||'').replace(/'/g,"\\'").replace(/\n/g,' ');
      const rpHtml = e.rp ? `<div class="rp-block">
        <button class="copy-btn" onclick="cp(this,'${rpSafe}')">Copier</button>
        <span class="rp-label">Phrase de jeu</span>
        <div class="rp-text">${e.rp}</div>
      </div>` : '';
      const epochHtml = e.epoch ? `<div class="epoch">Note · ${e.epoch}</div>` : '';

      html += `<div class="entry fade-up">
        <div class="entry-head" onclick="this.parentElement.classList.toggle('open')">
          <span class="entry-term">${e.term}</span>
          <span class="entry-cat ${e.cat}">${e.label}</span>
          <span class="entry-chev">▼</span>
        </div>
        <div class="entry-body">
          ${defHtml}${ficheHtml}${rpHtml}${epochHtml}
        </div>
      </div>`;
    });
  });
  wrap.innerHTML = html;
}

function cp(btn, text){
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='Copié'; btn.classList.add('ok');
    setTimeout(()=>{ btn.textContent='Copier'; btn.classList.remove('ok'); }, 2000);
  });
}

// Init
buildSubFilters();
render();
</script>
