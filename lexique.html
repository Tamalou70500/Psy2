<script>(function(){ var t=localStorage.getItem("psy_theme")||"dark"; var f=localStorage.getItem("psy_font")||"victorien"; document.documentElement.setAttribute("data-theme",t); document.documentElement.setAttribute("data-font",f); window.setTheme=function(t){document.documentElement.setAttribute("data-theme",t);localStorage.setItem("psy_theme",t);}; window.setFont=function(f){document.documentElement.setAttribute("data-font",f);localStorage.setItem("psy_font",f);}; })();</script>
<link rel="stylesheet" href="css/style.css">
<style>
/* ═══ FOND IMMERSIF DICTIONNAIRE ══════════════════════════ */
.dico-scene {
  position: fixed; inset: 0; z-index: 0;
  background: url('images/dico/dico.png') center center / cover no-repeat;
}
.dico-scene::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(8,5,2,0.45);
}

/* ═══ PANNEAU GLASSMORPHISM ════════════════════════════════ */
.dico-panel {
  position: fixed;
  inset: 0;
  z-index: 3;
  display: flex;
  flex-direction: column;
  padding-top: 54px;
  overflow: hidden;
}

.dico-inner {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  width: min(820px, 92vw);
  margin: 0.75rem auto;
  background: color-mix(in srgb, var(--ink) 80%, transparent);
  backdrop-filter: blur(12px);
  border: 1px solid var(--bdr2);
  animation: panelOpen 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes panelOpen {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}

/* En-tête dans le panneau */
.dico-header {
  padding: 1.25rem 1.75rem 1rem;
  border-bottom: 1px solid var(--bdr);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.dico-eyebrow {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--parch2); display: block; margin-bottom: 4px;
}
.dico-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem; font-weight: 700; font-style: italic;
  color: var(--parch); line-height: 1;
}

/* Tabs dans le panneau */
.dico-panel .tabs {
  border-bottom: 1px solid var(--bdr);
  padding: 0 1.75rem;
  display: flex; gap: 0; flex-wrap: wrap;
  flex-shrink: 0;
  background: transparent;
}
.dico-panel .tab {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.65rem; letter-spacing: 0.16em; text-transform: uppercase;
  padding: 0.65rem 0.9rem;
  border: none; border-bottom: 2px solid transparent;
  background: transparent; cursor: pointer;
  color: var(--parch3); transition: color .2s, border-color .2s;
}
.dico-panel .tab:hover { color: var(--parch); }
.dico-panel .tab.active { color: var(--gold); border-bottom-color: var(--gold-d); }

/* Toolbar dans le panneau */
.dico-panel .toolbar {
  padding: 0.65rem 1.75rem;
  border-bottom: 1px solid var(--bdr);
  background: transparent;
  flex-shrink: 0;
}

/* Zone des entrées — scrollable */
.dico-entries {
  flex: 1;
  overflow-y: auto;
  padding: 0 1.75rem 1rem;
  scrollbar-width: thin;
  scrollbar-color: var(--gold-d) transparent;
}
.dico-entries::-webkit-scrollbar { width: 4px; }
.dico-entries::-webkit-scrollbar-thumb { background: var(--gold-d); }

.dico-stat {
  padding: 0.5rem 1.75rem;
  border-top: 1px solid var(--bdr);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--parch3); flex-shrink: 0;
}

/* ═══ NAVBAR fixe au-dessus ════════════════════════════════ */
nav.navbar {
  position: fixed !important;
  top: 0; left: 0; right: 0; z-index: 10 !important;
  background: rgba(8,5,2,0.85) !important;
  backdrop-filter: blur(12px);
}

/* ═══ MOBILE — retour au layout normal ════════════════════ */
@media(max-width: 768px) {
  .dico-scene { display: none; }
  nav.navbar { position: sticky !important; }
  .dico-panel { position: static; padding-top: 0; overflow: visible; }
  .dico-inner { margin: 0; background: var(--ink); backdrop-filter: none; border: none; animation: none; }
  .dico-entries { overflow: visible; }
}
</style>
</head>

  </div>
</div>

      {role:"doc", text:"« Revenez chaque semaine — pas pour changer vos convictions, mais pour avoir quelqu'un à qui parler en confiance. »"},
    ],
    epoch:"Kraepelin distingue la paranoïa de la démence précoce en 1896." },

  { term:"Alcoolisme chronique", sub:"diag", cat:"ec-diag", label:"Diagnostic",
    def:"Dépendance physique et psychique à l'alcool avec dégradation progressive. Considéré comme maladie des nerfs à l'époque.",
    symptomes:"Tremblements matinaux, besoin de boire dès le réveil, hallucinations en manque (delirium tremens), dégradation physique, violence possible.",
    traitement:"Sevrage PROGRESSIF jamais brutal (risque mortel), chloral pour les tremblements, alimentation renforcée.",
    steps:[
      {role:"doc", text:"« Je dois vous poser une question directe : combien buvez-vous par jour, et depuis combien d'années ? »"},
      {role:"obs", text:"Tremblements des mains ? Yeux injectés ? Peau couperosée ? Ces signes indiquent une dépendance physique installée."},
      {role:"doc", text:"« Ce que vous avez n'est pas un manque de volonté. Votre corps est devenu physiquement dépendant — comme un malade dépend de son médicament. »"},
      {role:"doc", text:"« Arrêter d'un coup serait dangereux — votre cœur pourrait ne pas le supporter. Nous allons diminuer progressivement. »"},
      {role:"action", text:"Réduire d'un quart par semaine. Chloral 1g au coucher pour les tremblements. Alimentation renforcée."},
      {role:"doc", text:"« Si vous voyez des choses qui ne sont pas là ou entendez des voix — faites-moi chercher immédiatement, nuit ou jour. »"},
    ],
    epoch:"L'alcoolisme reconnu comme maladie par Magnus Huss en 1849. Très répandu dans l'Ouest américain." },

  { term:"Amnésie hystérique", sub:"diag", cat:"ec-diag", label:"Diagnostic",
    def:"Perte de mémoire partielle ou totale sans cause organique, souvent déclenchée par un choc émotionnel violent.",
    symptomes:"Oubli de l'identité ou d'une période précise, parfois fuite sans souvenir du trajet, personnalité parfois altérée.",
    traitement:"Hypnose pour retrouver les souvenirs enfouis, association libre, environnement sécurisant et familier.",
    steps:[
      {role:"doc", text:"« Comment vous appelez-vous ? Quel jour sommes-nous ? Savez-vous où vous êtes ? »"},
      {role:"obs", text:"Évaluer l'étendue de l'amnésie : identité, dates, événements récents, proches. Chercher un traumatisme déclencheur."},
      {role:"doc", text:"« Votre mémoire n'est pas détruite — elle est protégée. Votre esprit a enfermé quelque chose de douloureux pour vous garder entier. »"},
      {role:"doc", text:"« Nous allons l'approcher doucement. Je ne vais pas forcer — la mémoire revient quand elle se sent en sécurité. »"},
      {role:"action", text:"Environnement familier : objets personnels, visages connus. Séances d'hypnose légère pour accéder progressivement aux souvenirs."},
      {role:"doc", text:"« Si un souvenir revient — même un fragment — venez me le raconter immédiatement. Ne laissez pas ça s'envoler. »"},
    ],
    epoch:"Janet étudie l'amnésie hystérique dès 1889. Freud en fera un pilier de la psychanalyse." },

  { term:"Neurasthénie", sub:"diag", cat:"ec-diag", label:"Diagnostic",
    def:"Épuisement profond du système nerveux : le patient n'a plus de ressources pour faire face aux exigences du quotidien. Décrit par Beard (1869) comme la maladie de la modernité.",
    symptomes:"Fatigue extrême malgré le repos, céphalées persistantes, difficultés de concentration, irritabilité, douleurs diffuses, palpitations.",
    traitement:"Cure de repos stricte selon la méthode Mitchell, alimentation renforcée, éloignement du travail et des stimulations. Bromure en soutien.",
    steps:[
      {role:"doc", text:"« Décrivez-moi votre journée type. À quelle heure vous levez-vous ? Vous sentez-vous reposé le matin ? »"},
      {role:"obs", text:"Observer : cernes marqués, posture affaissée, gestes lents. Chercher la cause — surmenage professionnel, deuil, alcool, excès sexuels selon les conceptions de l'époque."},
      {role:"doc", text:"« Votre système nerveux est épuisé comme un muscle qu'on aurait fait travailler sans jamais le laisser récupérer. »"},
      {role:"doc", text:"« La modernité use les nerfs — le télégraphe, les chemins de fer, les exigences du commerce — tout cela a un prix sur votre constitution. »"},
      {role:"action", text:"Prescrire la cure Mitchell : repos total au lit deux semaines. Alimentation riche (lait, viande rouge). Interdire lecture, visiteurs, affaires."},
      {role:"doc", text:"« Vous n'avez pas le droit de travailler. Pas une lettre à écrire, pas un registre à ouvrir. Je reparlerai à votre patron si nécessaire. »"},
    ],
    epoch:"Beard (1869) décrit la neurasthénie comme 'la maladie du progrès'. S.W. Mitchell popularise la cure de repos pour femmes en 1877." },

  { term:"Folie circulaire", sub:"diag", cat:"ec-diag", label:"Diagnostic",
    def:"Alternance d'accès maniaques et de phases mélancoliques profondes chez un même patient. Ce que l'on nommera plus tard psychose maniaco-dépressive.",
    symptomes:"Semaines d'exaltation (énergie folle, dépenses, grandiosité) suivies de semaines de prostration totale et idées noires.",
    traitement:"Bromure en phase maniaque, laudanum pour le sommeil, suivi rigoureux. Internement en phase aiguë si nécessaire.",
    steps:[
      {role:"doc", text:"« Comment étiez-vous il y a trois semaines, comparé à aujourd'hui ? »"},
      {role:"obs", text:"Chercher la cyclicité : alternance régulière entre phases hautes (manie) et phases basses (mélancolie). Demander à la famille."},
      {role:"doc", text:"« Ce n'est pas deux maladies différentes — c'est une seule, qui oscille. Nous appelons ça la folie circulaire. »"},
      {role:"doc", text:"« Votre humeur suit un cycle comme les saisons. Nous n'y pouvons pas grand chose — mais nous pouvons atténuer les extrêmes. »"},
      {role:"action", text:"Phase maniaque : bromure 3g par jour, isolement. Phase mélancolique : laudanum 10 gouttes/soir, entretiens quotidiens, surveiller les risques."},
      {role:"doc", text:"« Quand vous sentez l'exaltation revenir — cette certitude de pouvoir tout — venez me voir avant d'agir. C'est notre signal d'alerte. »"},
    ],
    epoch:"Falret décrit la folie circulaire en 1851. Kraepelin la systématise sous le nom de psychose maniaco-dépressive en 1896." },

  { term:"Épilepsie", sub:"diag", cat:"ec-diag", label:"Diagnostic",
    def:"Maladie nerveuse caractérisée par des crises convulsives soudaines, parfois avec perte de conscience, liée à une décharge électrique anormale du cerveau.",
    symptomes:"Crise grand mal : chute brutale, convulsions tonico-cloniques, morsure de la langue, perte d'urine, confusion post-critique dite état de torpeur.",
    traitement:"Bromure de potassium au long cours (principal traitement de l'époque), régime alimentaire strict, éviter l'alcool et la fatigue.",
    steps:[
      {role:"obs", text:"EN CRISE : ne rien mettre dans la bouche. Retirer les objets dangereux autour. Protéger la tête avec un vêtement plié. Tourner sur le côté en cas de vomissements."},
      {role:"action", text:"Chronométrer la crise. Si elle dure plus de cinq minutes : situation grave, faire chercher le médecin d'urgence."},
      {role:"doc", text:"« Après la crise, ne pas paniquer. La personne est vivante — elle est en phase post-critique : confuse, épuisée. Laisser dormir. »"},
      {role:"doc", text:"« Ce sont des convulsions liées à une décharge nerveuse dans le cerveau. C'est l'épilepsie. Ce n'est pas une malédiction — c'est une maladie. »"},
      {role:"action", text:"Prescrire bromure de potassium 2g matin et soir. Régime sans alcool, sans excès. Tenir un journal des crises : fréquence, durée, déclencheurs."},
      {role:"doc", text:"« Vous ne devez pas monter à cheval seul, ne pas vous approcher de feux ou d'eau profonde sans accompagnateur. Ce n'est pas de la faiblesse — c'est de la prudence. »"},
    ],
    epoch:"Le bromure de potassium reste le seul traitement efficace de 1857 jusqu'à l'introduction du phénobarbital en 1912." },

  { term:"Somnambulisme", sub:"diag", cat:"ec-diag", label:"Diagnostic",
    def:"État de demi-conscience nocturne pendant lequel le patient se lève, marche et agit sans se souvenir le matin de ce qui s'est passé.",
    symptomes:"Déambulation nocturne les yeux ouverts mais sans conscience, regard fixe, voix monocorde si on lui parle, réveil brutal dangereux.",
    traitement:"Sécuriser l'environnement, verrouiller portes et fenêtres, bromure léger au coucher, éviter la fatigue et l'alcool.",
    steps:[
      {role:"doc", text:"« Qui vous a signalé ces épisodes ? Vous en avez aucun souvenir au matin ? »"},
      {role:"obs", text:"Chercher les facteurs aggravants : fatigue, fièvre, alcool, stress intense. Demander si des événements perturbants ont précédé les premiers épisodes."},
      {role:"doc", text:"« Le somnambulisme est un trouble du sommeil — votre corps bouge pendant que votre esprit est encore endormi. »"},
      {role:"doc", text:"« La chose la plus dangereuse n'est pas de marcher — c'est de tomber. Nous devons sécuriser votre chambre. »"},
      {role:"action", text:"Recommandations : verrou sur la porte de chambre actionnable de l'extérieur, retrait des objets pointus à portée, volets fermés. Bromure 1g au coucher."},
      {role:"doc", text:"« Ne le réveillez jamais brutalement s'il est en crise — guidez-le doucement vers son lit en évitant tout choc. »"},
    ],
    epoch:"Charcot étudie le somnambulisme en lien avec l'hypnose. Considéré parfois comme une forme d'hystérie masculine." },

  { term:"Simulation", sub:"diag", cat:"ec-diag", label:"Diagnostic",
    def:"Feinte volontaire de symptômes physiques ou mentaux dans un but précis : éviter le travail, le service militaire, obtenir des drogues ou de l'argent.",
    symptomes:"Symptômes fluctuants selon la présence du médecin, incohérence entre les plaintes et les observations objectives, amélioration rapide si la motivation disparaît.",
    traitement:"Examen systématique sans complaisance, confrontation indirecte, refus de la prescription demandée.",
    steps:[
      {role:"obs", text:"Observer discrètement le patient avant qu'il réalise que l'examen a commencé. Les vrais malades souffrent en permanence — pas seulement face au médecin."},
      {role:"action", text:"Tester les incohérences : une paralysie hystérique cède sous hypnose — une simulation aussi, mais le simulateur rougit. Une vraie douleur ne disparaît pas sur commande."},
      {role:"obs", text:"Annoncer en fausse confidence qu'un nouveau traitement existe mais qu'il est très pénible — nausées garanties. Observer la réaction."},
      {role:"doc", text:"« Je vais devoir procéder à un examen complémentaire un peu déplaisant pour confirmer votre diagnostic... »"},
      {role:"obs", text:"Si les symptômes s'améliorent spontanément à cette annonce : forte probabilité de simulation. Documenter soigneusement."},
      {role:"doc", text:"« Je ne peux pas vous prescrire ce que vous demandez. Ce n'est pas ce dont vous avez besoin. Si votre situation change, revenez me voir. »"},
    ],
    epoch:"La simulation était un enjeu majeur pour les médecins militaires et les compagnies d'assurance au XIXe siècle." },
],

chir:[
  { term:"Fracture simple — main ou poignet", sub:"wound", cat:"ec-wound", label:"Fracture",
    def:"Rupture osseuse sans déplacement majeur ni plaie cutanée. Os cassé mais en place.",
    symptomes:"Douleur intense à la pression, gonflement rapide, impossibilité de bouger le membre, parfois craquement entendu au moment du choc.",
    traitement:"Réduction manuelle si nécessaire, attelle en bois puis plâtre, immobilisation 6 à 8 semaines, laudanum pour la douleur initiale.",
    steps:[
      {role:"doc", text:"« Je vois que vous avez une fracture. Laissez-moi examiner — ne bougez pas la main, posez-la à plat sur la table. »"},
      {role:"obs", text:"Palper délicatement le long des os. Localiser le point de fracture par la douleur maximale et la déformation éventuelle."},
      {role:"doc", text:"« L'os est cassé au niveau du poignet — mais il est en place. C'est une bonne nouvelle : je n'aurai pas à le remettre. »"},
      {role:"action", text:"Préparer : attelle de bois, bandes de coton, plâtre de Paris délayé. Administrer laudanum 15 gouttes avant la pose."},
      {role:"doc", text:"« Je vais poser une attelle provisoire à l'aide de planches de bois et de bandes de coton, puis envelopper avec du plâtre de Paris. »"},
      {role:"action", text:"Positionner le membre en légère flexion. Appliquer la couche de coton. Enrouler les bandes de plâtre humide en remontant du poignet vers l'avant-bras."},
      {role:"doc", text:"« Le plâtre sèche en une demi-heure. Ne serrez pas le poing pendant ce temps. Si vos doigts bleuissent ou engourdissent, revenez immédiatement. »"},
      {role:"doc", text:"« Vous garderez ce plâtre six semaines. Pas de travail avec cette main. Revenez dans huit jours que je vérifie. »"},
    ],
    epoch:"Le plâtre de Paris est utilisé en chirurgie depuis Mathijsen (1852). Standard en 1904." },

  { term:"Fracture ouverte", sub:"wound", cat:"ec-wound", label:"Fracture",
    def:"L'os brisé perce la peau. Risque majeur d'infection osseuse et d'amputation.",
    symptomes:"Os visible à travers la plaie, hémorragie importante, douleur extrême, choc traumatique possible.",
    traitement:"Nettoyage urgent, réduction et attelle, surveillance de l'infection. Amputation si gangrène.",
    steps:[
      {role:"action", text:"URGENCE. Allonger le patient. Compression immédiate sur la plaie avec un linge propre. Ne pas tenter de remettre l'os en place soi-même."},
      {role:"doc", text:"« L'os est sorti. C'est grave — mais gérable si nous agissons maintenant. Je vais nettoyer et remettre cela en ordre. »"},
      {role:"action", text:"Administrer morphine 10mg en injection sous-cutanée. Préparer eau bouillie, iode, pince, catgut."},
      {role:"doc", text:"« Je nettoie la plaie à l'iode maintenant. Ça brûle — c'est normal, c'est ce qui va éviter la gangrène. »"},
      {role:"action", text:"Irriguer abondamment. Réduire délicatement la fracture. Suturer les tissus mous. Attelle provisoire. Pansement à l'iode."},
      {role:"doc", text:"« Je dois surveiller cela de près. Fièvre, rougeur qui s'étend, odeur suspecte — si vous voyez l'un de ces signes, faites-moi chercher jour ou nuit. »"},
      {role:"obs", text:"Informer la famille : risque d'amputation si infection dans les 48h. Surveiller toutes les 6 heures."},
    ],
    epoch:"La fracture ouverte était souvent synonyme d'amputation. L'antisepsie de Lister changeait la donne progressivement." },

  { term:"Blessure par balle — extraction", sub:"wound", cat:"ec-wound", label:"Blessure balle",
    def:"Projectile logé dans les chairs ou contre un os. Extraction chirurgicale nécessaire pour éviter infection et saturnisme.",
    symptomes:"Douleur profonde persistante, gonflement, fièvre dans les 24h, parfois plomb palpable sous la peau.",
    traitement:"Extraction sous morphine, désinfection à l'iode, drainage si nécessaire, repos strict.",
    steps:[
      {role:"doc", text:"« Je dois localiser le projectile avant d'inciser. Où exactement avez-vous été touché, et de quelle distance ? »"},
      {role:"obs", text:"Palper doucement la zone. Chercher le plomb sous les doigts. Si non palpable, estimer la trajectoire selon l'angle d'entrée."},
      {role:"action", text:"Administrer morphine 15mg. Allonger le patient. Préparer : bistouri, pince à extraction, iode, catgut, pansement."},
      {role:"doc", text:"« Je vais faire une petite incision pour accéder au projectile. La morphine agit — vous sentirez une pression mais pas de douleur vive. »"},
      {role:"action", text:"Inciser proprement au-dessus du projectile. Introduire la pince. Saisir et extraire le plomb d'un geste ferme et continu."},
      {role:"doc", text:"« Voilà. C'est sorti. Regardez — une balle de calibre 45 si je ne me trompe pas. Vous avez eu de la chance qu'elle ne touche pas l'os. »"},
      {role:"action", text:"Irriguer la cavité à l'iode. Suturer en deux plans si profond. Pansement compressif. Repos strict 48h."},
      {role:"doc", text:"« Pas de cheval, pas de travail pendant une semaine. Si la fièvre monte au-dessus de 39, revenez me voir immédiatement. »"},
    ],
    epoch:"" },

  { term:"Plaie par couteau — suture", sub:"wound", cat:"ec-wound", label:"Blessure lame",
    def:"Coupure ou estocade n'ayant pas atteint les organes profonds. Bords nets si lame aiguisée.",
    symptomes:"Saignement abondant mais contrôlable, douleur vive, bords de plaie nets.",
    traitement:"Compression, nettoyage à l'alcool puis iode, suture au catgut et soie, pansement compressif.",
    steps:[
      {role:"action", text:"Compression immédiate avec linge propre. Évaluer la profondeur : demander au patient de bouger les doigts ou le membre pour tester les tendons."},
      {role:"doc", text:"« La plaie est nette — la lame était aiguisée, c'est paradoxalement plus simple à suturer. Ça saigne beaucoup mais ce n'est pas dangereux. »"},
      {role:"action", text:"Nettoyer abondamment à l'eau bouillie puis appliquer l'iode sur et autour de la plaie."},
      {role:"doc", text:"« Ça va piquer — l'iode travaille. C'est ce qui va empêcher l'infection. Serrez la main de quelqu'un et ne regardez pas. »"},
      {role:"action", text:"Si plaie profonde : suturer les plans profonds au catgut résorbable. Fermer la peau à la soie. Points espacés de 1cm environ."},
      {role:"doc", text:"« Je fais les points maintenant. Comptez avec moi si ça vous aide. Un… le fil passe… deux… encore un… »"},
      {role:"action", text:"Pansement compressif. Écharpe si membre supérieur. Consigne : garder propre et sec, revenir dans 8 jours pour retirer les fils."},
    ],
    epoch:"" },

  { term:"Lacération animale", sub:"wound", cat:"ec-wound", label:"Lacération",
    def:"Plaie déchirée par griffes de puma, d'ours ou morsure. Bords irréguliers, risque infectieux majeur.",
    symptomes:"Plaie béante aux bords déchiquetés, saignement important, douleur diffuse, risque de rage si morsure.",
    traitement:"Nettoyage abondant, débridement des tissus nécrosés, suture lâche, surveillance rage.",
    steps:[
      {role:"doc", text:"« Quel animal vous a attaqué, et où étiez-vous ? Ces informations sont importantes pour le traitement. »"},
      {role:"obs", text:"Si morsure de chien errant ou animal sauvage : évaluer le risque de rage. La rage est incurable — cette question est prioritaire."},
      {role:"action", text:"Lavage abondant et prolongé à l'eau et au savon — au moins 15 minutes. Puis iode sur toute la plaie. Pas de compression avant d'avoir nettoyé."},
      {role:"doc", text:"« Je dois débrider — enlever les chairs abîmées et irrécupérables. C'est la seule façon d'éviter la gangrène. »"},
      {role:"action", text:"Ciseau et bistouri : retirer délicatement tous les tissus nécrosés ou souillés. Ne pas suturer hermétiquement — laisser la plaie drainer."},
      {role:"doc", text:"« Je ne referme pas complètement — une plaie comme celle-ci a besoin de drainer. Je mets quelques points pour rapprocher les bords. »"},
      {role:"doc", text:"« Si dans les deux semaines vous avez des spasmes musculaires, une peur de l'eau, de la fièvre — revenez immédiatement. Ce sont les signes de la rage. »"},
    ],
    epoch:"La rage est incurable en 1904. Pasteur avait développé un vaccin en 1885, peu accessible au Texas." },

  { term:"Amputation d'urgence", sub:"proc", cat:"ec-proc", label:"Procédure",
    def:"Ablation chirurgicale d'un membre gangréné ou irrécupérable. Dernier recours mais seule option curative.",
    symptomes:"Gangrène (noircissement, odeur), os fracturé sans vascularisation, infection incontrôlable.",
    traitement:"Amputation sous morphine ou chloroforme, ligature des vaisseaux, fermeture du moignon.",
    steps:[
      {role:"doc", text:"« Je dois vous parler honnêtement, et c'est difficile à entendre. Ce membre est gangréné. »"},
      {role:"doc", text:"« Si je n'ampute pas ce soir, l'infection atteindra votre sang d'ici demain. Et là, je ne pourrai plus rien faire pour vous. »"},
      {role:"doc", text:"« Je vous laisse une minute pour décider. Mais je vous conseille de ne pas attendre. »"},
      {role:"action", text:"Préparer : chloroforme ou éther pour anesthésie, scie à amputation, scalpel, catgut, fil de soie, garrot, fer à cautériser."},
      {role:"action", text:"Pose du garrot en amont. Anesthésie au chloroforme — compter jusqu'à ce que le patient s'endorme. Incision circulaire rapide et nette."},
      {role:"action", text:"Section des muscles. Section de l'os à la scie. Ligature des artères une par une. Cautérisation des petits vaisseaux. Fermeture du lambeau cutané."},
      {role:"doc", text:"[Au réveil] « C'est terminé. Vous vous en êtes sorti. Le membre est parti mais vous êtes vivant. Reposez-vous. »"},
    ],
    epoch:"La morphine et le chloroforme étaient les anesthésiques standard en 1904." },

  { term:"Abcès & drainage", sub:"proc", cat:"ec-proc", label:"Procédure",
    def:"Collection de pus sous la peau ou dans un tissu, résultat d'une infection bactérienne localisée. Le drainage est le seul traitement.",
    symptomes:"Bosse chaude, rouge, douloureuse, tendue, parfois fluctuante au toucher. Fièvre possible si l'infection s'étend.",
    traitement:"Incision franche et drainage complet du pus. Nettoyage à la teinture d'iode. Mèche pour maintenir l'ouverture.",
    steps:[
      {role:"obs", text:"Palper doucement : l'abcès mature est fluctuant (impression de liquide sous la peau). Un abcès non mûr ne doit pas être incisé — laisser mûrir 24-48h."},
      {role:"doc", text:"« Je vais devoir ouvrir ça. Ce n'est pas plaisant mais c'est rapide — et après vous serez soulagé immédiatement. »"},
      {role:"action", text:"Désinfecter largement à la teinture d'iode. Morphine 0.01g ou chloroéthyle local si disponible. Bistouri propre."},
      {role:"action", text:"Incision franche au point de fluctuation maximum. Exprimer tout le pus sans forcer. Nettoyer la cavité à l'eau bouillie et à l'iode."},
      {role:"action", text:"Mettre en place une mèche de gaze iodée pour maintenir l'ouverture et permettre le drainage. Pansement propre."},
      {role:"doc", text:"« Revenez demain — je changerai la mèche et vérifierai que tout le pus s'est écoulé. Si la fièvre monte cette nuit, faites-moi chercher. »"},
    ],
    epoch:"Sans antibiotiques, le drainage chirurgical est la seule option. Un abcès négligé peut évoluer en septicémie fatale." },

  { term:"Brûlure grave", sub:"wound", cat:"ec-wound", label:"Blessure",
    def:"Destruction des couches superficielles ou profondes de la peau par chaleur, flamme, eau bouillante ou produit chimique.",
    symptomes:"Rougeur vive (premier degré) · cloques remplies de liquide (second degré) · plaie blanche ou noire insensible (troisième degré, gravissime).",
    traitement:"Refroidissement immédiat à l'eau froide, protection à l'huile de lin ou au bismuth, pansements gras, morphine pour la douleur.",
    steps:[
      {role:"action", text:"URGENT : eau froide immédiatement sur la brûlure — au moins dix minutes. Ne jamais mettre de beurre, huile ou terre dessus."},
      {role:"obs", text:"Évaluer l'étendue : utiliser la règle des 9 (tête=9%, bras=9%, jambe=18%, tronc=36%). Au-delà de 20% du corps : pronostic vital engagé."},
      {role:"doc", text:"« Ne touchez pas aux cloques — elles protègent la plaie. Si elles éclatent, le risque d'infection devient immédiat. »"},
      {role:"action", text:"Troisième degré : couvrir avec un linge propre humide. Morphine 0.02g pour la douleur. Faire boire beaucoup — la déshydratation est rapide."},
      {role:"action", text:"Pansement gras : bismuth en poudre ou huile de lin. Bandes légères sans compression. Changer tous les deux jours."},
      {role:"doc", text:"« Les brûlures profondes demandent des semaines. Le risque n'est pas la brûlure elle-même — c'est l'infection des jours suivants. »"},
    ],
    epoch:"La gestion des brûlures était rudimentaire. Les grandes brûlures étaient souvent fatales par infection ou choc." },

  { term:"Appendicite — opération", sub:"proc", cat:"ec-proc", label:"Procédure",
    def:"Inflammation aiguë de l'appendice vermiculaire. La chirurgie d'urgence (appendicectomie) devient possible en 1904 avec les progrès de l'antisepsie.",
    symptomes:"Douleur débutant au nombril puis migrant en fosse iliaque droite, fièvre 38–39°C, nausées, douleur à la décompression brutale (signe de Blumberg).",
    traitement:"Opération d'urgence — appendicectomie sous chloroforme. Sans intervention : péritonite mortelle en 24–48h.",
    steps:[
      {role:"obs", text:"Tester le signe de Blumberg : appuyer doucement sur la fosse iliaque droite, relâcher brutalement. Douleur à la décompression = signe positif."},
      {role:"doc", text:"« Cette douleur en bas à droite, cette fièvre, cette nausée — c'est l'appendice. Il est enflammé. »"},
      {role:"doc", text:"« Je dois vous opérer ce soir. Si l'appendice éclate avant l'opération, l'infection se répand dans tout le ventre — c'est mortel. »"},
      {role:"action", text:"Préparer le bloc : chloroforme, bistouri, pinces, fil de soie et catgut, compresses, teinture d'iode, eau bouillie."},
      {role:"action", text:"Incision de McBurney en fosse iliaque droite. Identifier et ligaturer l'appendice à sa base. Section. Fermeture plan par plan."},
      {role:"doc", text:"[Post-op] « L'opération s'est bien passée. L'appendice n'avait pas encore éclaté — vous avez eu raison de venir. Repos absolu dix jours. »"},
    ],
    epoch:"Le Dr William Halsted standardise l'appendicectomie dans les années 1890. En 1904 c'est une opération nouvelle mais reconnue." },

  { term:"Luxation d'épaule", sub:"wound", cat:"ec-wound", label:"Fracture",
    def:"Déboîtement de la tête humérale hors de sa cavité glénoïde. Souvent causée par une chute sur le bras tendu ou un coup violent.",
    symptomes:"Épaule visiblement déformée (creux sous l'acromion), douleur intense, bras maintenu en rotation externe, impossibilité de bouger.",
    traitement:"Réduction manuelle immédiate sous morphine selon la technique de Kocher. Immobilisation 3 semaines en écharpe.",
    steps:[
      {role:"doc", text:"« Restez immobile — je vais examiner cette épaule. Ne résistez pas à mes mains, laissez faire. »"},
      {role:"obs", text:"Comparer les deux épaules : la luxée est plus basse, avec un vide palpable sous la clavicule. Vérifier la sensibilité du bras — risque de lésion nerveuse."},
      {role:"action", text:"Morphine 0.01g ou 15 gouttes de laudanum. Attendre 10 minutes que la douleur diminue et les muscles se relâchent."},
      {role:"action", text:"Manœuvre de Kocher : 1) Coude à 90°, rotation externe lente du bras. 2) Élévation du coude vers l'avant. 3) Adduction. Un clic indique la réduction."},
      {role:"obs", text:"Vérifier la réduction : la déformation a disparu, les deux épaules sont symétriques, le patient peut bouger légèrement le bras."},
      {role:"action", text:"Immobilisation en écharpe Velpeau trois semaines. Pas de mouvements. Réévaluer dans huit jours."},
    ],
    epoch:"La manœuvre de Kocher est décrite en 1870. Avant l'anesthésie, les réductions d'épaule étaient une véritable épreuve de force." },

  { term:"Corps étranger dans l'œil", sub:"wound", cat:"ec-wound", label:"Blessure",
    def:"Poussière, éclat de métal, esquille de bois ou grain de sable logé sur la cornée ou sous la paupière. Urgence ophtalmologique.",
    symptomes:"Douleur vive, larmoiement intense, clignement involontaire, rougeur, sensation de gravier qui persiste malgré les clignements.",
    traitement:"Irrigation à l'eau bouillie tiède, extraction à la pince ou pointe mousse sous loupe. Collyre antiseptique.",
    steps:[
      {role:"doc", text:"« Ne frottez pas l'œil — c'est le pire réflexe. Vous risquez d'enfoncer le corps étranger dans la cornée. »"},
      {role:"action", text:"Bon éclairage. Retourner la paupière supérieure sur un cure-oreille. Irriguer l'œil avec de l'eau bouillie tiède à l'aide d'une seringue sans aiguille."},
      {role:"obs", text:"Chercher le corps étranger sur la conjonctive, sous la paupière, sur la cornée. Un éclat brillant (métal) est visible à la lumière directe."},
      {role:"action", text:"Éclat visible et accessible : retirer avec une pointe mousse humectée ou une pince fine sous bonne lumière. Gestes extrêmement doux."},
      {role:"action", text:"Si profondément incrusté dans la cornée : ne pas insister. Pansement occlusif. Transport vers un ophtalmologiste de ville."},
      {role:"doc", text:"« Collyre d'argent colloïdal deux fois par jour pendant trois jours. Si l'œil rougit davantage ou si la vision baisse : urgence. »"},
    ],
    epoch:"L'ophtalmoscope de Helmholtz (1851) commence à équiper les cabinets. La chirurgie oculaire reste artisanale." },

  { term:"Noyade — réanimation", sub:"proc", cat:"ec-proc", label:"Procédure",
    def:"Arrêt respiratoire par inhalation d'eau. Les premières minutes sont décisives. La réanimation par traction rythmique des bras sauve des vies.",
    symptomes:"Inconscience, absence de respiration, teint bleuté (cyanose), pouls absent ou très faible, eau dans la bouche et les narines.",
    traitement:"Méthode Sylvester de réanimation rythmique. Réchauffement immédiat. Position latérale.",
    steps:[
      {role:"action", text:"IMMÉDIATEMENT : sortir l'eau des poumons — mettre la personne à plat ventre, tête tournée, presser doucement dans le dos entre les omoplates."},
      {role:"action", text:"Retourner sur le dos. Méthode Sylvester : à genoux derrière la tête, saisir les deux poignets. Ramener les bras vers la tête (inspiration) puis les croiser sur la poitrine en appuyant (expiration). Rythme : 16 fois par minute."},
      {role:"obs", text:"Chercher le pouls au cou (carotide). Observer la poitrine : se soulève-t-elle ? Continuer sans s'arrêter au moins 30 minutes avant de déclarer l'échec."},
      {role:"action", text:"Dès que la respiration reprend : position latérale de sécurité. Déshabiller, sécher, couvrir chaudement. Friction vigoureuse des membres."},
      {role:"action", text:"Faire inhaler de l'ammoniaque (sels) ou du cognac pour stimuler — jamais forcer à boire si inconscient."},
      {role:"doc", text:"« Même récupéré, le noyé doit rester alité 24 heures. L'eau dans les poumons peut causer une pneumonie dans les jours suivants. »"},
    ],
    epoch:"La méthode Sylvester (1858) est la technique de réanimation officielle jusqu'en 1960. Le bouche-à-bouche moderne n'existe pas encore." },
],

/* ─── MALADIES CONTAGIEUSES ──────────────────────────── */
mal:[
  { term:"Tuberculose (phtisie)", sub:"disease", cat:"ec-disease", label:"Maladie",
    def:"Maladie bactérienne pulmonaire. Première cause de mort en 1904. Très contagieuse par voie respiratoire.",
    symptomes:"Toux persistante avec crachats sanguinolents, fièvre légère le soir, sueurs nocturnes, amaigrissement, teint cireux.",
    traitement:"Air pur en altitude, repos absolu, alimentation riche. Aucun traitement curatif disponible en 1904.",
    steps:[
      {role:"obs", text:"Examiner à distance si possible. Écouter la toux. Observer la couleur des crachats — sang rouge vif ou noirâtre ?"},
      {role:"doc", text:"« Ces crachats de sang, cette toux qui dure depuis des mois, cet amaigrissement — je dois vous dire la vérité. »"},
      {role:"doc", text:"« C'est la phtisie — ce que certains appellent la tuberculose depuis Koch en 1882. Je ne vais pas vous mentir : il n'existe pas de remède. »"},
      {role:"doc", text:"« Mais l'air sec des hauteurs et le repos peuvent ralentir la maladie de façon significative. Certains vivent des années ainsi. »"},
      {role:"action", text:"Isoler le patient des enfants et personnes fragiles. Lui donner des mouchoirs séparés à brûler après usage."},
      {role:"doc", text:"« Ne crachez pas dans la rue. Couvrez votre bouche quand vous toussez. Cette maladie se transmet par l'air — vous devez protéger votre famille. »"},
    ],
    epoch:"Koch découvre le bacille en 1882. La streptomycine n'existera qu'en 1943." },

  { term:"Typhoïde", sub:"disease", cat:"ec-disease", label:"Maladie",
    def:"Infection bactérienne grave transmise par l'eau et les aliments contaminés. Fréquente dans les villes sans assainissement.",
    symptomes:"Fièvre montant sur une semaine jusqu'à 40°C, maux de tête violents, douleurs abdominales, taches rosées sur le ventre, prostration.",
    traitement:"Repos absolu, réhydratation, bains froids pour la fièvre, alimentation liquide. Durée 3 à 4 semaines.",
    steps:[
      {role:"doc", text:"« Depuis combien de jours cette fièvre ? Elle monte progressivement depuis le début, c'est bien ça ? »"},
      {role:"obs", text:"Chercher les taches rosées sur l'abdomen — signe caractéristique. Palper l'abdomen : douleur en fosse iliaque droite typique."},
      {role:"doc", text:"« Cette fièvre qui monte depuis une semaine, ces douleurs du ventre, ces taches — c'est la typhoïde. Elle vient de l'eau ou de la nourriture contaminée. »"},
      {role:"doc", text:"« Il n'y a pas de médicament pour tuer cette bactérie. Mais avec du repos et des soins, vous passerez le cap en trois semaines. »"},
      {role:"action", text:"Alitement strict. Alimentation uniquement liquide (bouillons). Bains froids si fièvre dépasse 39.5°C. Réhydratation constante."},
      {role:"doc", text:"« Ne buvez plus que de l'eau bouillie — vous et toute votre famille. C'est la source qu'il faut traiter, sinon d'autres tomberont malades. »"},
    ],
    epoch:"Le vaccin Wright existe depuis 1896 mais peu disponible au Texas. Eau bouillie obligatoire." },

  { term:"Syphilis", sub:"disease", cat:"ec-disease", label:"Maladie",
    def:"Infection bactérienne sexuellement transmissible évoluant en trois stades sur des années.",
    symptomes:"Stade 1 : chancre indolore. Stade 2 : éruption cutanée, fièvre, ganglions. Stade 3 : lésions cérébrales, paralysie, démence.",
    traitement:"Frictions au mercure (toxique mais seul traitement). Salvarsan d'Ehrlich disponible dès 1910.",
    steps:[
      {role:"doc", text:"« Ce que je dois vous dire est confidentiel et restera entre nous. Êtes-vous seul ? »"},
      {role:"obs", text:"Examiner discrètement. Chercher le chancre (ulcère indolore), les ganglions inguinaux, l'éruption caractéristique."},
      {role:"doc", text:"« Ce que j'observe indique une syphilis. C'est grave — mais traitable si nous agissons maintenant, avant le troisième stade. »"},
      {role:"doc", text:"« Le traitement est à base de mercure. Ce n'est pas agréable — frictions quotidiennes, salivation excessive — mais c'est ce que nous avons. »"},
      {role:"action", text:"Prescrire frictions mercurielles quotidiennes sur les membres. Éviter exposition au froid pendant le traitement. Suivi mensuel."},
      {role:"doc", text:"« Vous devez informer toute personne avec qui vous avez été intime. C'est une obligation morale — et médicale. »"},
    ],
    epoch:"Le salvarsan d'Ehrlich (1910) révolutionnera le traitement. En 1904 seul le mercure est disponible." },

  { term:"Tétanos", sub:"disease", cat:"ec-disease", label:"Maladie",
    def:"Infection bactérienne déclenchée par une plaie souillée. La toxine attaque le système nerveux et cause des contractures fatales.",
    symptomes:"Raideur de la mâchoire (trismus), contractures douloureuses progressives, arching du dos, spasmes déclenchés par bruit ou lumière.",
    traitement:"Pas de traitement curatif. Sédatifs pour réduire les spasmes, chloral, laudanum. Mortalité très élevée.",
    steps:[
      {role:"doc", text:"« Cette raideur de la mâchoire, cette difficulté à ouvrir la bouche — depuis quand ? Et quelle blessure aviez-vous il y a une semaine ? »"},
      {role:"obs", text:"Tester l'ouverture de la bouche. Vérifier les réflexes. Le moindre bruit déclenche-t-il des spasmes ? Si oui : tétanos confirmé."},
      {role:"doc", text:"« Je dois vous dire la vérité. C'est le tétanos. Il n'existe pas de remède pour tuer cette toxine une fois qu'elle est dans le sang. »"},
      {role:"doc", text:"« Mais nous pouvons combattre les spasmes et vous maintenir en vie le temps que votre corps lutte. »"},
      {role:"action", text:"Chambre obscure et silencieuse ABSOLUMENT. Chloral 2g pour les spasmes. Laudanum 20 gouttes pour la douleur. Alimentation liquide par petites quantités."},
      {role:"doc", text:"« La moindre lumière vive, le moindre bruit fort peut déclencher une crise fatale. Je compte sur vous pour faire respecter le silence absolu dans cette pièce. »"},
    ],
    epoch:"L'anatoxine tétanique ne sera disponible que dans les années 1920." },

  { term:"Choléra", sub:"disease", cat:"ec-disease", label:"Maladie",
    def:"Infection intestinale foudroyante. Peut tuer en quelques heures par déshydratation massive.",
    symptomes:"Diarrhée aqueuse abondante dite en eau de riz, vomissements, crampes musculaires, déshydratation rapide, yeux enfoncés.",
    traitement:"Réhydratation immédiate et massive, teinture d'opium pour les crampes, isolement strict.",
    steps:[
      {role:"doc", text:"« Depuis quand ces diarrhées ? De quelle couleur ? Y a-t-il d'autres personnes malades autour de vous ? »"},
      {role:"obs", text:"Observer : peau qui reste plissée si pincée (signe de déshydratation sévère), yeux creux, voix éteinte, pouls rapide et faible."},
      {role:"doc", text:"« C'est le choléra. Chaque heure compte — il peut mourir de déshydratation avant la fin de la journée si on n'agit pas. »"},
      {role:"action", text:"URGENCE : préparer solution de réhydratation — un litre d'eau bouillie, une cuillère de sel, deux cuillères de sucre. Faire boire en continu."},
      {role:"doc", text:"« De l'eau salée sucrée, sans arrêt — même s'il vomit, même s'il ne veut pas. C'est ce qui va le maintenir en vie. »"},
      {role:"action", text:"Isolement strict. Tout ce qui touche le patient brûle ou bout. Alerter les voisins — chercher la source d'eau contaminée."},
    ],
    epoch:"Grandes épidémies de choléra aux USA jusqu'en 1892. Koch avait identifié le vibrion en 1883." },

  { term:"Pneumonie", sub:"disease", cat:"ec-disease", label:"Maladie",
    def:"Infection aiguë des poumons causant une consolidation du tissu pulmonaire. Très mortelle en 1904 surtout chez les vieux et les jeunes enfants.",
    symptomes:"Fièvre brutale à 40°C, frisson violent inaugural, toux avec expectoration rouillée, douleur thoracique en coup de poignard à l'inspiration.",
    traitement:"Repos absolu, vésicatoires sur le thorax, quinine si fièvre, digitaline si cœur faible. Pas d'antibiotiques — mortalité 30%.",
    steps:[
      {role:"obs", text:"Ausculter soigneusement : souffle tubaire, crépitants à l'inspiration, matité à la percussion du côté atteint."},
      {role:"doc", text:"« La fièvre, la douleur dans le côté, ce crachat couleur rouille — c'est une pneumonie. L'un des poumons est pris. »"},
      {role:"doc", text:"« Je ne vais pas vous mentir : c'est grave. Mais j'en ai soigné de plus mauvais. Votre cœur est solide — c'est ce qui compte. »"},
      {role:"action", text:"Repos strict au lit. Chambre tempérée, aérée mais sans courant d'air. Alimentation liquide. Bouillon de bœuf toutes les heures."},
      {role:"action", text:"Si fièvre > 39.5°C : quinine 1g. Si cœur qui s'emballe (pouls > 120) : digitaline 15 gouttes trois fois par jour."},
      {role:"doc", text:"« La crise se produit entre le 7e et le 9e jour — soit la fièvre casse brutalement et il s'en sort, soit... Je reviendrai chaque jour. »"},
    ],
    epoch:"La pénicilline ne sera disponible qu'en 1945. En 1904 la pneumonie tuait 1 adulte sur 3. Osler l'appelait 'le capitaine des hommes de la mort'." },

  { term:"Rage", sub:"disease", cat:"ec-disease", label:"Maladie",
    def:"Infection virale du système nerveux transmise par morsure d'animal. Invariablement mortelle une fois les symptômes déclarés.",
    symptomes:"Après 1 à 3 mois d'incubation : fièvre, hydrophobie (terreur de l'eau), agitation extrême, convulsions, paralysie, mort.",
    traitement:"AVANT les symptômes : vaccin de Pasteur (série de 14 injections). APRÈS : aucun traitement — soins palliatifs uniquement.",
    steps:[
      {role:"doc", text:"« Quel animal vous a mordu ? Un chien ? Un renard ? Un animal sauvage ? Était-il visiblement malade — agressif, titubant ? »"},
      {role:"action", text:"Nettoyer la plaie IMMÉDIATEMENT et abondamment : savon et eau, puis cautérisation au fer rouge ou acide nitrique. Chaque minute compte."},
      {role:"doc", text:"« Si cet animal était enragé, vous devez commencer le traitement de Pasteur aujourd'hui. C'est 14 injections douloureuses — mais c'est la seule chance. »"},
      {role:"action", text:"Contacter l'Institut Pasteur le plus proche pour obtenir le vaccin antirabique. Commencer la série sans délai."},
      {role:"obs", text:"Si les symptômes sont déjà déclarés (hydrophobie, convulsions) : plus rien à faire. Chambre calme, obscure. Morphine pour la douleur. Informer la famille."},
      {role:"doc", text:"« Faites abattre l'animal et examinez son cerveau. Si ce n'est pas la rage, les injections s'arrêtent. Si c'est la rage — vous avez eu raison de commencer. »"},
    ],
    epoch:"Pasteur développe le premier vaccin antirabique en 1885 sur Joseph Meister. En 1904 le vaccin existe mais reste rare dans l'Ouest américain." },

  { term:"Variole", sub:"disease", cat:"ec-disease", label:"Maladie",
    def:"Maladie virale explosément contagieuse. Laisse des cicatrices profondes (la 'petite vérole') et tue jusqu'à 30% des malades.",
    symptomes:"Fièvre brutale, puis éruption caractéristique : macules qui deviennent vésicules puis pustules toutes au même stade, sur tout le corps y compris les paumes.",
    traitement:"Aucun traitement curatif. Isolement strict, fièvre combattue à la quinine, lésions protégées. Vaccination préventive par le vaccin de Jenner.",
    steps:[
      {role:"obs", text:"Distinguer de la varicelle : dans la variole, toutes les lésions sont au même stade sur un même zone. Dans la varicelle, les stades coexistent."},
      {role:"doc", text:"« Ces pustules — toutes pareilles, toutes au même niveau d'évolution — c'est la variole. Vous devez être isolé immédiatement. »"},
      {role:"action", text:"ISOLEMENT TOTAL. Chambre séparée, linges bouillis, visiteurs interdits sauf vaccinés. Signaler aux autorités sanitaires."},
      {role:"action", text:"Fièvre : quinine 1g. Soif intense : eau bouillie à volonté. Protéger les yeux : rinçage à l'acide borique — la cécité par variole est fréquente."},
      {role:"doc", text:"« Ne grattez pas les pustules — les cicatrices seront moins profondes. Et si vous grattez près des yeux, vous risquez la cécité. »"},
      {role:"doc", text:"« Tous ceux qui ont été en contact avec vous doivent être vaccinés dans les 48h — c'est la seule façon d'arrêter la propagation. »"},
    ],
    epoch:"Jenner introduit la vaccination antivariolique en 1796. En 1904 la vaccination est obligatoire dans plusieurs États mais peu respectée dans l'Ouest." },

  { term:"Diphtérie", sub:"disease", cat:"ec-disease", label:"Maladie",
    def:"Infection bactérienne de la gorge qui forme une membrane grise obstruant les voies respiratoires. Tue par asphyxie ou par la toxine cardiaque.",
    symptomes:"Mal de gorge, fièvre modérée, membrane grisâtre adhérente sur les amygdales (ne saigne pas si on la détache), ganglions gonflés — 'cou de taureau'.",
    traitement:"Sérum antidiphtérique (depuis 1894) en injection urgente. Trachéotomie si asphyxie imminente.",
    steps:[
      {role:"obs", text:"Regarder la gorge à la lumière : une membrane grise-blanche adhérente sur les amygdales qui ne saigne pas à l'ablation = diphtérie probable."},
      {role:"doc", text:"« Ne touchez pas cette membrane — ne tentez pas de la retirer. La toxine absorbée d'un coup peut arrêter le cœur. »"},
      {role:"doc", text:"« C'est la diphtérie. Chaque heure compte. Le sérum antidiphtérique peut sauver l'enfant si on l'injecte dans les premières 24 heures. »"},
      {role:"action", text:"Sérum antidiphtérique : 10 000 à 20 000 unités en injection sous-cutanée immédiate. Surveiller réaction allergique."},
      {role:"obs", text:"Surveiller la respiration toutes les heures : stridor (sifflement inspiratoire) = membrane qui descend vers le larynx. Préparer la trachéotomie."},
      {role:"action", text:"Si asphyxie imminente : trachéotomie d'urgence — incision de la trachée sous le larynx, introduction d'une canule. C'est une procédure qui sauve des vies."},
    ],
    epoch:"Le sérum antidiphtérique de Behring et Roux (1894) révolutionne le traitement. Avant lui, la diphtérie tuait 50% des enfants atteints." },

  { term:"Grippe", sub:"disease", cat:"ec-disease", label:"Maladie",
    def:"Infection virale respiratoire épidémique. La grippe de 1889-1890 avait tué un million de personnes — une prochaine pandémie est redoutée.",
    symptomes:"Début brutal en quelques heures : fièvre 39-40°C, frissons, courbatures intenses, céphalées, toux sèche. Prostration complète.",
    traitement:"Repos absolu, quinine pour la fièvre, alimentation légère. Surveillance pour éviter la pneumonie secondaire.",
    steps:[
      {role:"doc", text:"« Ce début brutal, cette fièvre qui monte en quelques heures, ces courbatures qui vous empêchent de bouger — c'est la grippe. »"},
      {role:"obs", text:"Chercher une pneumonie associée : ausculter les poumons. Crachat purulent ou rouillé = complication bactérienne grave."},
      {role:"action", text:"Repos strict au lit. Chambre aérée. Tisanes chaudes. Quinine 0.5g si fièvre > 39°C. Pas de bain froid — risque de choc."},
      {role:"doc", text:"« La grippe elle-même ne tue pas — c'est la pneumonie qui suit qui tue. Les 5 premiers jours : repos absolu, même si vous vous sentez mieux. »"},
      {role:"action", text:"Alerter : si la fièvre remonte après 3 jours d'amélioration, si crachat coloré, si douleur thoracique — faire chercher le médecin."},
      {role:"doc", text:"« Évitez tout contact avec les enfants et les personnes âgées pendant 8 jours — vous êtes contagieux même si vous vous sentez mieux. »"},
    ],
    epoch:"La grande pandémie de grippe espagnole de 1918 n'est pas encore arrivée. En 1904, la grippe de 1889 reste dans les mémoires." },
],

/* ─── REMÈDES & PHARMACOPÉE ─────────────────────────── */
