<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexique médical — Cabinet du Dr. Abernathy Lucius</title>
<link rel="stylesheet" href="css/style.css">
<style>
.page-band {
  background:var(--ink2); border-bottom:1px solid var(--bdr);
  padding:1.25rem 2rem;
  display:flex; align-items:flex-end; justify-content:space-between; gap:1rem; flex-wrap:wrap;
}
.page-band h2 { margin:0; }
.page-band .eyebrow { margin-bottom:0.3rem; }

.tabs {
  display:flex; gap:0; border-bottom:1px solid var(--bdr);
  background:var(--ink); overflow-x:auto;
}
.tab {
  font-family:'Cormorant Garamond',serif;
  font-size:0.72rem; letter-spacing:0.16em; text-transform:uppercase;
  color:var(--parch4); padding:0.85rem 1.5rem;
  border:none; border-bottom:2px solid transparent;
  background:transparent; cursor:pointer; transition:all .2s; white-space:nowrap;
}
.tab:hover { color:var(--parch2); }
.tab.active { color:var(--gold-l); border-bottom-color:var(--gold); background:var(--gold-dim2); }

.toolbar {
  display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap;
  padding:0.85rem 2rem; border-bottom:1px solid var(--bdr); background:var(--ink);
}
.search-wrap { position:relative; flex:1; min-width:180px; }
.search-wrap input { padding-left:2rem; background:var(--ink3); }
.search-icon { position:absolute; left:0.7rem; top:50%; transform:translateY(-50%); color:var(--parch4); font-style:italic; font-family:'EB Garamond',serif; font-size:1rem; pointer-events:none; }
.sub-filters { display:flex; gap:4px; flex-wrap:wrap; }
.sfpill {
  font-family:'Cormorant Garamond',serif; font-size:0.62rem; letter-spacing:0.1em; text-transform:uppercase;
  padding:0.2rem 0.8rem; border:1px solid var(--bdr); background:transparent; color:var(--parch4); cursor:pointer; transition:all .15s;
}
.sfpill:hover { border-color:var(--bdr2); color:var(--parch2); }
.sfpill.active { border-color:var(--gold-d); color:var(--gold); background:var(--gold-dim); }

.stat-bar { padding:0.5rem 2rem; border-bottom:1px solid var(--bdr); background:var(--ink); }

.entries { padding:1px; background:var(--bdr); }
.entry {
  background:var(--ink2); margin-bottom:1px;
  border-left:2px solid transparent; transition:border-color .2s;
}
.entry:hover { border-left-color:var(--gold-d); }
.entry.open  { border-left-color:var(--gold); background:var(--ink3); }

.entry-head {
  padding:1rem 1.5rem; cursor:pointer;
  display:flex; align-items:center; gap:1rem; user-select:none;
}
.entry-term { font-family:'Playfair Display',serif; font-size:1rem; color:var(--parch); font-style:italic; flex:1; }
.entry-cat {
  font-family:'Cormorant Garamond',serif; font-size:0.62rem;
  letter-spacing:0.1em; text-transform:uppercase;
  padding:1px 9px; border:1px solid transparent;
}
.ec-diag   { color:#6a90c0; border-color:rgba(74,128,184,0.25);  background:rgba(30,60,100,0.12); }
.ec-cond   { color:#c06060; border-color:rgba(154,24,24,0.25);   background:rgba(100,20,20,0.12); }
.ec-treat  { color:#70b070; border-color:rgba(74,154,74,0.25);   background:rgba(30,70,30,0.12); }
.ec-phrase { color:#c09040; border-color:rgba(192,154,74,0.25);  background:rgba(90,60,10,0.12); }
.ec-wound  { color:#c07050; border-color:rgba(180,80,30,0.25);   background:rgba(90,40,10,0.12); }
.ec-proc   { color:#50a0b0; border-color:rgba(50,140,160,0.25);  background:rgba(20,70,80,0.12); }
.ec-disease{ color:#c0a040; border-color:rgba(180,150,30,0.25);  background:rgba(80,60,10,0.12); }
.ec-remedy { color:#80b060; border-color:rgba(100,160,70,0.25);  background:rgba(40,70,20,0.12); }

.entry-chev { color:var(--parch4); font-size:0.65rem; transition:transform .25s; flex-shrink:0; }
.entry.open .entry-chev { transform:rotate(180deg); }

.entry-body { display:none; padding:0 1.5rem 1.5rem; }
.entry.open .entry-body { display:block; }

/* DEF */
.entry-def {
  font-family:'EB Garamond',serif; font-size:0.92rem;
  color:var(--parch2); line-height:1.75; font-style:italic;
  padding:0.5rem 0 0.9rem; border-bottom:1px solid var(--bdr); margin-bottom:1rem;
}

/* FICHE 2 COL */
.fiche { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--bdr); margin-bottom:1rem; }
.fiche-cell { background:var(--ink2); padding:0.75rem 1rem; }
.fiche-cell.full { grid-column:1/-1; }
.fiche-label { font-family:'Cormorant Garamond',serif; font-size:0.6rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold-d); display:block; margin-bottom:0.35rem; }
.fiche-value { font-family:'EB Garamond',serif; font-size:0.9rem; color:var(--parch2); line-height:1.65; }

/* FICHE RP — LA STAR */
.rp-fiche {
  background:var(--ink); border:1px solid var(--bdr2);
  border-left:3px solid var(--gold-d);
  margin-bottom:0.75rem;
  position:relative;
}
.rp-fiche-header {
  padding:0.6rem 1rem;
  background:rgba(192,154,74,0.06);
  border-bottom:1px solid var(--bdr);
  display:flex; align-items:center; justify-content:space-between;
}
.rp-fiche-title {
  font-family:'Cormorant Garamond',serif; font-size:0.65rem;
  letter-spacing:0.18em; text-transform:uppercase; color:var(--gold);
}
.copy-all-btn {
  font-family:'Cormorant Garamond',serif; font-size:0.62rem;
  letter-spacing:0.1em; text-transform:uppercase;
  background:transparent; border:1px solid var(--bdr2); color:var(--parch4);
  padding:2px 10px; cursor:pointer; transition:all .15s;
}
.copy-all-btn:hover { border-color:var(--gold); color:var(--gold); }
.copy-all-btn.ok { color:#70b870; border-color:rgba(74,154,74,0.4); }

.rp-steps { padding:0; margin:0; list-style:none; }
.rp-step {
  display:flex; gap:0; border-bottom:1px solid var(--bdr);
  cursor:pointer; transition:background .15s; position:relative;
}
.rp-step:last-child { border-bottom:none; }
.rp-step:hover { background:rgba(192,154,74,0.04); }
.rp-step-num {
  font-family:'Playfair Display',serif; font-size:1.1rem; font-style:italic;
  color:var(--gold-d); opacity:0.5;
  padding:0.75rem 0.85rem 0.75rem 1rem;
  flex-shrink:0; width:2.5rem; text-align:center;
  border-right:1px solid var(--bdr);
  line-height:1.4;
}
.rp-step-body { padding:0.75rem 1rem; flex:1; }
.rp-step-role {
  font-family:'Cormorant Garamond',serif; font-size:0.6rem;
  letter-spacing:0.14em; text-transform:uppercase;
  color:var(--parch4); display:block; margin-bottom:0.25rem;
}
.rp-step-role.role-doc { color:var(--gold-d); }
.rp-step-role.role-action { color:#50a0b0; }
.rp-step-role.role-obs { color:#70b070; }
.rp-step-text {
  font-family:'EB Garamond',serif; font-size:0.95rem;
  color:var(--parch); line-height:1.6;
}
.rp-step-text em { color:var(--parch3); font-style:italic; }
.rp-step-copy {
  position:absolute; right:0.5rem; top:50%; transform:translateY(-50%);
  font-family:'Cormorant Garamond',serif; font-size:0.55rem; letter-spacing:0.08em; text-transform:uppercase;
  background:transparent; border:1px solid var(--bdr); color:var(--parch4);
  padding:1px 6px; cursor:pointer; transition:all .15s; opacity:0;
}
.rp-step:hover .rp-step-copy { opacity:1; }
.rp-step-copy:hover { border-color:var(--gold); color:var(--gold); }
.rp-step-copy.ok { color:#70b870; border-color:rgba(74,154,74,0.4); opacity:1; }

.epoch { font-family:'Cormorant Garamond',serif; font-size:0.68rem; letter-spacing:0.06em; color:var(--parch4); font-style:italic; padding-top:0.5rem; border-top:1px solid var(--bdr); margin-top:0.25rem; }

.no-result { padding:4rem 2rem; text-align:center; font-family:'Cormorant Garamond',serif; font-size:1rem; color:var(--parch4); font-style:italic; }
.section-divider {
  padding:0.6rem 1.5rem; background:var(--ink);
  font-family:'Cormorant Garamond',serif; font-size:0.65rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold-d);
  border-bottom:1px solid var(--bdr); display:flex; align-items:center; gap:0.75rem;
}
.section-divider::after { content:''; flex:1; height:1px; background:var(--bdr); }

@media(max-width:640px){ .fiche{grid-template-columns:1fr;} .tab{padding:0.7rem 1rem;font-size:0.65rem;} }
</style>
</head>

</nav>

<div class="page-band">
  <div>
    <span class="eyebrow">Référence médicale · Sunset, Texas · 1904</span>
    <h2>Lexique du Dr. Lucius</h2>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="setTab(this,'psy')">Psychiatrie</button>
  <button class="tab" onclick="setTab(this,'chir')">Chirurgie</button>
  <button class="tab" onclick="setTab(this,'mal')">Maladies contagieuses</button>
  <button class="tab" onclick="setTab(this,'rem')">Remèdes & Pharmacopée</button>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">⚲</span>
    <input class="form-control" id="search" placeholder="Rechercher un terme…" oninput="render()">
  </div>
  <div class="sub-filters" id="sub-filters"></div>
</div>
<div class="stat-bar"><span class="label" id="count-label">—</span></div>
<div class="entries" id="entries"></div>

<script src="js/auth.js"></script>
<script>
const session = authRequire(); authInjectUser();
document.getElementById('logout-btn').onclick = authLogout;

/* ══════════════════════════════════════════════════════════
   DONNÉES — chaque entrée a des "steps" pour la fiche RP
   step = { role: 'doc'|'action'|'obs', text: '...' }
   role 'doc'    = parole du docteur  (or)
   role 'action' = geste / action     (bleu)
   role 'obs'    = observation notée  (vert)
══════════════════════════════════════════════════════════ */
const DATA = {

/* ─── PSYCHIATRIE ─────────────────────────────────────── */
psy:[
  { term:"Mélancolie", sub:"diag", cat:"ec-diag", label:"Diagnostic",
    def:"Trouble profond de l'humeur : abattement persistant, pensées sombres, retrait du monde. Excès de bile noire selon la tradition médicale.",
    symptomes:"Tristesse profonde, pleurs inexpliqués, perte d'appétit, insomnie matinale, lenteur des mouvements, sentiment de culpabilité.",
    traitement:"Cure de repos, air frais, laudanum à faible dose le soir, bains tièdes, entretiens réguliers.",
    steps:[
      {role:"doc", text:"« Regardez-moi dans les yeux, s'il vous plaît. Voilà. Depuis combien de temps ressentez-vous cette lourdeur ? »"},
      {role:"obs", text:"Observer : posture affaissée, regard fuyant, réponses courtes et monotones. Vérifier l'appétit et le sommeil."},
      {role:"doc", text:"« Ce que vous traversez a un nom : la mélancolie. Ce n'est pas une faiblesse — c'est une affliction réelle de l'âme et du corps. »"},
      {role:"doc", text:"« Je vais vous prescrire dix gouttes de laudanum dans votre whisky le soir, pour le sommeil. Et surtout : du repos absolu, loin de toute agitation. »"},
      {role:"action", text:"Rédiger l'ordonnance. Prescrire laudanum 10 gouttes/soir, bains tièdes matin, entretien hebdomadaire."},
      {role:"doc", text:"« Revenez me voir dans huit jours. Si les pensées noires deviennent dangereuses, faites-moi chercher immédiatement. »"},
    ],
    epoch:"Terme hérité de l'Antiquité. Hippocrate décrivait déjà la mélancolie comme un excès de bile noire." },

  { term:"Hystérie", sub:"diag", cat:"ec-diag", label:"Diagnostic",
    def:"Réaction émotionnelle excessive et crises convulsives sans cause organique. Diagnostiquée presque exclusivement chez les femmes à l'époque.",
    symptomes:"Crises de larmes ou rires incontrôlés, spasmes, paralysies passagères, perte de sensibilité, sensation d'étouffement.",
    traitement:"Hydrothérapie, hypnose, éloignement du stress, cure de repos selon Mitchell.",
    steps:[
      {role:"obs", text:"En cas de crise : rester calme, éloigner les curieux, ne pas contenir physiquement la personne sauf danger immédiat."},
      {role:"doc", text:"« Respirez avec moi. Inspirez… expirez… Vous êtes en sécurité. Je suis là. »"},
      {role:"action", text:"Desserrer les vêtements, aérer la pièce, faire asseoir ou allonger confortablement."},
      {role:"doc", text:"« Ces spasmes, cette perte de maîtrise — c'est une hystérie nerveuse. Pas une faiblesse de caractère. Vos nerfs ont atteint leur limite. »"},
      {role:"doc", text:"« Je prescris une cure de repos de deux semaines et des séances d'hydrothérapie trois fois par semaine. »"},
      {role:"action", text:"Si récidive : envisager hypnose en cabinet. Préparer la séance dans un environnement calme et silencieux."},
    ],
    epoch:"Charcot à la Salpêtrière avait fait de l'hystérie sa spécialité. Très diagnostiquée chez les femmes." },

  { term:"Manie", sub:"diag", cat:"ec-diag", label:"Diagnostic",
    def:"Excitation pathologique de l'esprit : agitation extrême, idées en cascade, sentiment de toute-puissance, insomnie sans fatigue.",
    symptomes:"Parole rapide et incohérente, dépenses excessives, comportements impulsifs, irritabilité si contredit, grande énergie.",
    traitement:"Bromure de potassium à haute dose, isolement calme, bains froids.",
    steps:[
      {role:"obs", text:"Observer : le patient parle sans s'arrêter, change de sujet, se lève, gesticule. Ne pas chercher à le contredire frontalement."},
      {role:"doc", text:"« Je vous entends. Asseyez-vous une minute avec moi. Juste une minute. »"},
      {role:"doc", text:"« Ce que vous ressentez — cette énergie, cette certitude d'avoir raison sur tout — c'est un accès maniaque. Votre esprit tourne trop vite. »"},
      {role:"action", text:"Préparer bromure de potassium : 2 grammes dans un verre d'eau. Faire boire immédiatement."},
      {role:"doc", text:"« Ce médicament va ralentir votre esprit progressivement. Vous allez vous sentir plus calme dans une heure. C'est voulu. »"},
      {role:"action", text:"Isoler dans une pièce calme, sombre, loin des bruits. Surveillance toutes les deux heures. Contention en dernier recours."},
    ],
    epoch:"" },

  { term:"Délire de persécution", sub:"diag", cat:"ec-diag", label:"Diagnostic",
    def:"Conviction irrationnelle et inébranlable d'être suivi, espionné ou comploté contre.",
    symptomes:"Méfiance extrême, interprétation erronée de tout événement, isolement, parfois violence défensive.",
    traitement:"Entretiens réguliers, bromure, environnement sécurisant. Internement si dangereux.",
    steps:[
      {role:"obs", text:"Ne jamais nier frontalement les croyances du patient — cela renforce la méfiance. Ne pas non plus les valider."},
      {role:"doc", text:"« Je comprends que vous ressentez cette menace comme absolument réelle. Ce n'est pas en doute. »"},
      {role:"doc", text:"« Ce que je peux vous dire, en tant que médecin, c'est que votre esprit interprète certains signes d'une façon qui n'est pas partagée par les autres. »"},
      {role:"doc", text:"« Nous appelons cela un délire de persécution. Ce n'est pas une folie — c'est un trouble traitable. »"},
      {role:"action", text:"Prescrire bromure 1g matin et soir. Entretien hebdomadaire minimum. Informer la famille discrètement."},
      {role:"doc", text:"« Je vous demande de revenir me voir dans cinq jours. Si vous sentez la menace augmenter, venez me chercher avant. »"},
    ],
    epoch:"Lasègue avait décrit ce délire dès 1852." },

  { term:"Traumatisme de guerre", sub:"cond", cat:"ec-cond", label:"Condition",
    def:"Séquelles psychologiques persistantes après une expérience de combat ou de violence extrême.",
    symptomes:"Cauchemars récurrents, reviviscences diurnes, sursauts, hypervigilance, évitement, torpeur émotionnelle.",
    traitement:"Entretiens réguliers, association libre, laudanum pour le sommeil, éloignement des armes.",
    steps:[
      {role:"doc", text:"« Vous n'êtes pas obligé de tout me raconter aujourd'hui. Commencez par ce que vous pouvez. »"},
      {role:"obs", text:"Laisser le silence. Ne pas remplir les blancs. Observer la posture, les mains, les réactions aux bruits."},
      {role:"doc", text:"« Ces images qui reviennent, ces nuits sans sommeil — votre esprit essaie de digérer ce que vos yeux ont vu. C'est une blessure, comme les autres. »"},
      {role:"doc", text:"« Ce n'est pas de la lâcheté. Les hommes les plus courageux que j'ai soignés portaient exactement ce que vous portez. »"},
      {role:"action", text:"Prescrire laudanum 15 gouttes le soir pour le sommeil. Demander à la famille d'éloigner les armes du domicile."},
      {role:"doc", text:"« Nous allons travailler ensemble pour apprivoiser ces images. Revenez dans trois jours. »"},
    ],
    epoch:"Appelé soldier's heart ou nostalgie. Le terme shell shock n'apparaîtra qu'en 1915." },

  { term:"Consultation d'ouverture", sub:"phrase", cat:"ec-phrase", label:"Phrase RP",
    def:"Protocole d'ouverture de toute première consultation psychiatrique.",
    symptomes:"", traitement:"",
    steps:[
      {role:"doc", text:"« Asseyez-vous, je vous en prie. Prenez votre temps. »"},
      {role:"action", text:"Fermer la porte. S'asseoir en face du patient, sans bureau entre les deux si possible."},
      {role:"doc", text:"« Ce que vous me confierez ici reste entre ces quatre murs. Je suis lié par le secret médical — rien de ce que vous dites ne sortira sans votre accord. »"},
      {role:"doc", text:"« Je ne suis pas là pour vous juger. Je suis là pour comprendre. Alors dites-moi — qu'est-ce qui vous amène au cabinet du Dr. Lucius ? »"},
    ],
    epoch:"" },

  { term:"Hypnose", sub:"treat", cat:"ec-treat", label:"Traitement",
    def:"État modifié de conscience induit par suggestion verbale pour accéder aux souvenirs refoulés.",
    symptomes:"", traitement:"Névroses, hystérie, traumatismes, phobies, insomnies rebelles.",
    steps:[
      {role:"action", text:"Préparer la pièce : obscurité partielle, silence absolu, aucune interruption possible. Patient allongé ou dans un fauteuil confortable."},
      {role:"doc", text:"« Je vais vous guider dans un état de demi-sommeil. Vous resterez conscient à tout moment. Vous pouvez sortir de cet état quand vous le souhaitez. »"},
      {role:"doc", text:"« Fixez ce point lumineux. Respirez lentement. Inspirez… retenez… expirez. À chaque expiration, vous vous sentez plus lourd, plus calme. »"},
      {role:"doc", text:"« Vos paupières s'alourdissent. Laissez-les se fermer. Vous êtes en sécurité. Votre corps est là, votre esprit peut voyager librement. »"},
      {role:"obs", text:"Observer la respiration. Quand elle devient lente et régulière : patient en état hypnotique léger. Commencer les suggestions thérapeutiques."},
      {role:"doc", text:"[À la fin] « Je vais compter jusqu'à trois. À trois, vous serez complètement éveillé, reposé, et vous vous souviendrez de ce que vous souhaitez garder. Un… deux… trois. »"},
    ],
    epoch:"Charcot et Bernheim avaient rendu l'hypnose respectable. Freud l'utilisait avant de développer la psychanalyse." },
],

/* ─── CHIRURGIE ──────────────────────────────────────── */
chir:[
  { term:"Fracture simple — main ou poignet", sub:"wound", cat:"ec-wound", label:"Fracture",
    def:"Rupture osseuse sans déplacement majeur ni plaie cutanée. Os cassé mais en place.",
    symptomes:"Douleur intense à la pression, gonflement rapide, impossibilité de bouger le membre, parfois craquement entendu au moment du choc.",
    traitement:"Réduction manuelle si nécessaire, attelle en bois puis plâtre, immobilisation 6 à 8 semaines, laudanum pour la douleur initiale.",
    steps:[
      {role:"doc", text:"« Je vois que vous avez une fracture. Laissez-moi examiner — ne bougez pas la main, posez-la à plat sur la table. »"},
      {role:"obs", text:"Palper délicatement le long des os. Localiser le point de fracture par la douleur maximale et la déformation éventuelle."},
      {role:"doc", text:"« L'os est cassé au niveau du poignet — mais il est en place. C'est une bonne nouvelle : je n'aurai pas à le remettre. »"},
      {role:"action", text:"Préparer : attelle de bois, bandes de coton, plâtre de Paris délayé. Administrer laudanum 15 gouttes avant la pose."},
      {role:"doc", text:"« Je vais poser une attelle provisoire à l'aide de planches de bois et de bandes de coton, puis envelopper avec du plâtre de Paris. »"},
      {role:"action", text:"Positionner le membre en légère flexion. Appliquer la couche de coton. Enrouler les bandes de plâtre humide en remontant du poignet vers l'avant-bras."},
      {role:"doc", text:"« Le plâtre sèche en une demi-heure. Ne serrez pas le poing pendant ce temps. Si vos doigts bleuissent ou engourdissent, revenez immédiatement. »"},
      {role:"doc", text:"« Vous garderez ce plâtre six semaines. Pas de travail avec cette main. Revenez dans huit jours que je vérifie. »"},
    ],
    epoch:"Le plâtre de Paris est utilisé en chirurgie depuis Mathijsen (1852). Standard en 1904." },

  { term:"Fracture ouverte", sub:"wound", cat:"ec-wound", label:"Fracture",
    def:"L'os brisé perce la peau. Risque majeur d'infection osseuse et d'amputation.",
    symptomes:"Os visible à travers la plaie, hémorragie importante, douleur extrême, choc traumatique possible.",
    traitement:"Nettoyage urgent, réduction et attelle, surveillance de l'infection. Amputation si gangrène.",
    steps:[
      {role:"action", text:"URGENCE. Allonger le patient. Compression immédiate sur la plaie avec un linge propre. Ne pas tenter de remettre l'os en place soi-même."},
      {role:"doc", text:"« L'os est sorti. C'est grave — mais gérable si nous agissons maintenant. Je vais nettoyer et remettre cela en ordre. »"},

const SUB_LABELS = {
  diag:'Diagnostic', cond:'Condition', treat:'Traitement', phrase:'Phrase RP',
  wound:'Blessure', proc:'Procédure', disease:'Maladie', remedy:'Remède'
};
const SUB_BY_TAB = {
  psy:  ['diag','cond','treat','phrase'],
  chir: ['wound','proc'],
  mal:  ['disease'],
  rem:  ['remedy']
};

let activeTab='psy', activeSub='all';

function setTab(el,tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); activeTab=tab; activeSub='all';
  buildSubFilters(); document.getElementById('search').value=''; render();
}
function buildSubFilters(){
  const subs=SUB_BY_TAB[activeTab]||[];
  const wrap=document.getElementById('sub-filters');
  if(subs.length<=1){wrap.innerHTML='';return;}
  wrap.innerHTML=`<button class="sfpill active" onclick="setSub(this,'all')">Tout</button>`
    +subs.map(s=>`<button class="sfpill" onclick="setSub(this,'${s}')">${SUB_LABELS[s]||s}</button>`).join('');
}
function setSub(el,sub){
  document.querySelectorAll('.sfpill').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); activeSub=sub; render();
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  let list=DATA[activeTab]||[];
  if(activeSub!=='all') list=list.filter(e=>e.sub===activeSub);
  if(q) list=list.filter(e=>(e.term+e.def+(e.symptomes||'')+(e.traitement||'')+(e.steps||[]).map(s=>s.text).join(' ')).toLowerCase().includes(q));
  document.getElementById('count-label').textContent=`${list.length} entrée${list.length!==1?'s':''}`;
  const wrap=document.getElementById('entries');
  if(!list.length){wrap.innerHTML='<div class="no-result">Aucun terme pour cette recherche.</div>';return;}

  const groups={};
  list.forEach(e=>{(groups[e.sub]=groups[e.sub]||[]).push(e);});

  let html='';
  Object.entries(groups).forEach(([sub,items])=>{
    if(Object.keys(groups).length>1)
      html+=`<div class="section-divider">${SUB_LABELS[sub]||sub}</div>`;
    items.forEach(e=>{
      const defHtml=e.def?`<div class="entry-def">${e.def}</div>`:'';
      const ficheHtml=(e.symptomes||e.traitement)?`<div class="fiche">
        ${e.symptomes?`<div class="fiche-cell"><span class="fiche-label">Symptômes observés</span><div class="fiche-value">${e.symptomes}</div></div>`:''}
        ${e.traitement?`<div class="fiche-cell"><span class="fiche-label">Traitement prescrit</span><div class="fiche-value">${e.traitement}</div></div>`:''}
      </div>`:'';

      const ROLE_LABEL={doc:'Docteur — parole',action:'Action / Geste',obs:'Observation clinique',phrase:'Phrase RP'};
      const ROLE_CLASS={doc:'role-doc',action:'role-action',obs:'role-obs'};

      const allText=(e.steps||[]).map(s=>s.text).join('\n');
      const allSafe=allText.replace(/'/g,"&#39;").replace(/"/g,'&quot;').replace(/\n/g,'\\n');

      const stepsHtml=(e.steps||[]).map((s,i)=>{
        const safe=s.text.replace(/'/g,"&#39;").replace(/"/g,'&quot;');
        return `<li class="rp-step">
          <div class="rp-step-num">${i+1}</div>
          <div class="rp-step-body">
            <span class="rp-step-role ${ROLE_CLASS[s.role]||''}">${ROLE_LABEL[s.role]||s.role}</span>
            <div class="rp-step-text">${s.text}</div>
          </div>
          <button class="rp-step-copy" onclick="cp(this,'${safe}')">Copier</button>
        </li>`;
      }).join('');

      const rpHtml=e.steps&&e.steps.length?`<div class="rp-fiche">
        <div class="rp-fiche-header">
          <span class="rp-fiche-title">Fiche de jeu — protocole RP</span>
          <button class="copy-all-btn" onclick="cpAll(this,'${allSafe}')">Copier tout</button>
        </div>
        <ol class="rp-steps">${stepsHtml}</ol>
      </div>`:'';

      const epochHtml=e.epoch?`<div class="epoch">Note historique · ${e.epoch}</div>`:'';

      html+=`<div class="entry fade-up">
        <div class="entry-head" onclick="this.parentElement.classList.toggle('open')">
          <span class="entry-term">${e.term}</span>
          <span class="entry-cat ${e.cat}">${e.label}</span>
          <span class="entry-chev">▼</span>
        </div>
        <div class="entry-body">${defHtml}${ficheHtml}${rpHtml}${epochHtml}</div>
      </div>`;
    });
  });
  wrap.innerHTML=html;
}

function cp(btn,text){
  const t=text.replace(/&#39;/g,"'").replace(/&quot;/g,'"');
  navigator.clipboard.writeText(t).then(()=>{
    btn.textContent='✓'; btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='Copier';btn.classList.remove('ok');},2000);
  });
}
function cpAll(btn,text){
  const t=text.replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/\\n/g,'\n');
  navigator.clipboard.writeText(t).then(()=>{
    btn.textContent='✓ Copié'; btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='Copier tout';btn.classList.remove('ok');},2000);
  });
}

buildSubFilters(); render();
</script>
</body>
</html>
