      {role:"doc", text:"« Je vais poser une attelle provisoire à l'aide de planches de bois et de bandes de coton, puis envelopper avec du plâtre de Paris. »"},
      {role:"action", text:"Positionner le membre en légère flexion. Appliquer la couche de coton. Enrouler les bandes de plâtre humide en remontant du poignet vers l'avant-bras."},
      {role:"doc", text:"« Le plâtre sèche en une demi-heure. Ne serrez pas le poing pendant ce temps. Si vos doigts bleuissent ou engourdissent, revenez immédiatement. »"},
      {role:"doc", text:"« Vous garderez ce plâtre six semaines. Pas de travail avec cette main. Revenez dans huit jours que je vérifie. »"},
    ],
    epoch:"Le plâtre de Paris est utilisé en chirurgie depuis Mathijsen (1852). Standard en 1904." },

  { term:"Fracture ouverte", sub:"wound", cat:"ec-wound", label:"Fracture",
    def:"L'os brisé perce la peau. Risque majeur d'infection osseuse et d'amputation.",
    symptomes:"Os visible à travers la plaie, hémorragie importante, douleur extrême, choc traumatique possible.",
    traitement:"Nettoyage urgent, réduction et attelle, surveillance de l'infection. Amputation si gangrène.",
    steps:[
      {role:"action", text:"URGENCE. Allonger le patient. Compression immédiate sur la plaie avec un linge propre. Ne pas tenter de remettre l'os en place soi-même."},
      {role:"doc", text:"« L'os est sorti. C'est grave — mais gérable si nous agissons maintenant. Je vais nettoyer et remettre cela en ordre. »"},
      {role:"action", text:"Administrer morphine 10mg en injection sous-cutanée. Préparer eau bouillie, iode, pince, catgut."},
      {role:"doc", text:"« Je nettoie la plaie à l'iode maintenant. Ça brûle — c'est normal, c'est ce qui va éviter la gangrène. »"},
      {role:"action", text:"Irriguer abondamment. Réduire délicatement la fracture. Suturer les tissus mous. Attelle provisoire. Pansement à l'iode."},
      {role:"doc", text:"« Je dois surveiller cela de près. Fièvre, rougeur qui s'étend, odeur suspecte — si vous voyez l'un de ces signes, faites-moi chercher jour ou nuit. »"},
      {role:"obs", text:"Informer la famille : risque d'amputation si infection dans les 48h. Surveiller toutes les 6 heures."},
    ],
    epoch:"La fracture ouverte était souvent synonyme d'amputation. L'antisepsie de Lister changeait la donne progressivement." },

  { term:"Blessure par balle — extraction", sub:"wound", cat:"ec-wound", label:"Blessure balle",
    def:"Projectile logé dans les chairs ou contre un os. Extraction chirurgicale nécessaire pour éviter infection et saturnisme.",
    symptomes:"Douleur profonde persistante, gonflement, fièvre dans les 24h, parfois plomb palpable sous la peau.",
    traitement:"Extraction sous morphine, désinfection à l'iode, drainage si nécessaire, repos strict.",
    steps:[
      {role:"doc", text:"« Je dois localiser le projectile avant d'inciser. Où exactement avez-vous été touché, et de quelle distance ? »"},
      {role:"obs", text:"Palper doucement la zone. Chercher le plomb sous les doigts. Si non palpable, estimer la trajectoire selon l'angle d'entrée."},
      {role:"action", text:"Administrer morphine 15mg. Allonger le patient. Préparer : bistouri, pince à extraction, iode, catgut, pansement."},
      {role:"doc", text:"« Je vais faire une petite incision pour accéder au projectile. La morphine agit — vous sentirez une pression mais pas de douleur vive. »"},
      {role:"action", text:"Inciser proprement au-dessus du projectile. Introduire la pince. Saisir et extraire le plomb d'un geste ferme et continu."},
      {role:"doc", text:"« Voilà. C'est sorti. Regardez — une balle de calibre 45 si je ne me trompe pas. Vous avez eu de la chance qu'elle ne touche pas l'os. »"},
      {role:"action", text:"Irriguer la cavité à l'iode. Suturer en deux plans si profond. Pansement compressif. Repos strict 48h."},
      {role:"doc", text:"« Pas de cheval, pas de travail pendant une semaine. Si la fièvre monte au-dessus de 39, revenez me voir immédiatement. »"},
    ],
    epoch:"" },

  { term:"Plaie par couteau — suture", sub:"wound", cat:"ec-wound", label:"Blessure lame",
    def:"Coupure ou estocade n'ayant pas atteint les organes profonds. Bords nets si lame aiguisée.",
    symptomes:"Saignement abondant mais contrôlable, douleur vive, bords de plaie nets.",
    traitement:"Compression, nettoyage à l'alcool puis iode, suture au catgut et soie, pansement compressif.",
    steps:[
      {role:"action", text:"Compression immédiate avec linge propre. Évaluer la profondeur : demander au patient de bouger les doigts ou le membre pour tester les tendons."},
      {role:"doc", text:"« La plaie est nette — la lame était aiguisée, c'est paradoxalement plus simple à suturer. Ça saigne beaucoup mais ce n'est pas dangereux. »"},
      {role:"action", text:"Nettoyer abondamment à l'eau bouillie puis appliquer l'iode sur et autour de la plaie."},
      {role:"doc", text:"« Ça va piquer — l'iode travaille. C'est ce qui va empêcher l'infection. Serrez la main de quelqu'un et ne regardez pas. »"},
      {role:"action", text:"Si plaie profonde : suturer les plans profonds au catgut résorbable. Fermer la peau à la soie. Points espacés de 1cm environ."},
      {role:"doc", text:"« Je fais les points maintenant. Comptez avec moi si ça vous aide. Un… le fil passe… deux… encore un… »"},
      {role:"action", text:"Pansement compressif. Écharpe si membre supérieur. Consigne : garder propre et sec, revenir dans 8 jours pour retirer les fils."},
    ],
    epoch:"" },

  { term:"Lacération animale", sub:"wound", cat:"ec-wound", label:"Lacération",
    def:"Plaie déchirée par griffes de puma, d'ours ou morsure. Bords irréguliers, risque infectieux majeur.",
    symptomes:"Plaie béante aux bords déchiquetés, saignement important, douleur diffuse, risque de rage si morsure.",
    traitement:"Nettoyage abondant, débridement des tissus nécrosés, suture lâche, surveillance rage.",
    steps:[
      {role:"doc", text:"« Quel animal vous a attaqué, et où étiez-vous ? Ces informations sont importantes pour le traitement. »"},
      {role:"obs", text:"Si morsure de chien errant ou animal sauvage : évaluer le risque de rage. La rage est incurable — cette question est prioritaire."},
      {role:"action", text:"Lavage abondant et prolongé à l'eau et au savon — au moins 15 minutes. Puis iode sur toute la plaie. Pas de compression avant d'avoir nettoyé."},
      {role:"doc", text:"« Je dois débrider — enlever les chairs abîmées et irrécupérables. C'est la seule façon d'éviter la gangrène. »"},
      {role:"action", text:"Ciseau et bistouri : retirer délicatement tous les tissus nécrosés ou souillés. Ne pas suturer hermétiquement — laisser la plaie drainer."},
      {role:"doc", text:"« Je ne referme pas complètement — une plaie comme celle-ci a besoin de drainer. Je mets quelques points pour rapprocher les bords. »"},
      {role:"doc", text:"« Si dans les deux semaines vous avez des spasmes musculaires, une peur de l'eau, de la fièvre — revenez immédiatement. Ce sont les signes de la rage. »"},
    ],
    epoch:"La rage est incurable en 1904. Pasteur avait développé un vaccin en 1885, peu accessible au Texas." },

  { term:"Amputation d'urgence", sub:"proc", cat:"ec-proc", label:"Procédure",
    def:"Ablation chirurgicale d'un membre gangréné ou irrécupérable. Dernier recours mais seule option curative.",
    symptomes:"Gangrène (noircissement, odeur), os fracturé sans vascularisation, infection incontrôlable.",
    traitement:"Amputation sous morphine ou chloroforme, ligature des vaisseaux, fermeture du moignon.",
    steps:[
      {role:"doc", text:"« Je dois vous parler honnêtement, et c'est difficile à entendre. Ce membre est gangréné. »"},
      {role:"doc", text:"« Si je n'ampute pas ce soir, l'infection atteindra votre sang d'ici demain. Et là, je ne pourrai plus rien faire pour vous. »"},
      {role:"doc", text:"« Je vous laisse une minute pour décider. Mais je vous conseille de ne pas attendre. »"},
      {role:"action", text:"Préparer : chloroforme ou éther pour anesthésie, scie à amputation, scalpel, catgut, fil de soie, garrot, fer à cautériser."},
      {role:"action", text:"Pose du garrot en amont. Anesthésie au chloroforme — compter jusqu'à ce que le patient s'endorme. Incision circulaire rapide et nette."},
      {role:"action", text:"Section des muscles. Section de l'os à la scie. Ligature des artères une par une. Cautérisation des petits vaisseaux. Fermeture du lambeau cutané."},
      {role:"doc", text:"[Au réveil] « C'est terminé. Vous vous en êtes sorti. Le membre est parti mais vous êtes vivant. Reposez-vous. »"},
    ],
    epoch:"La morphine et le chloroforme étaient les anesthésiques standard en 1904." },
],

/* ─── MALADIES CONTAGIEUSES ──────────────────────────── */
mal:[
  { term:"Tuberculose (phtisie)", sub:"disease", cat:"ec-disease", label:"Maladie",
    def:"Maladie bactérienne pulmonaire. Première cause de mort en 1904. Très contagieuse par voie respiratoire.",
    symptomes:"Toux persistante avec crachats sanguinolents, fièvre légère le soir, sueurs nocturnes, amaigrissement, teint cireux.",
    traitement:"Air pur en altitude, repos absolu, alimentation riche. Aucun traitement curatif disponible en 1904.",
    steps:[
      {role:"obs", text:"Examiner à distance si possible. Écouter la toux. Observer la couleur des crachats — sang rouge vif ou noirâtre ?"},
      {role:"doc", text:"« Ces crachats de sang, cette toux qui dure depuis des mois, cet amaigrissement — je dois vous dire la vérité. »"},
      {role:"doc", text:"« C'est la phtisie — ce que certains appellent la tuberculose depuis Koch en 1882. Je ne vais pas vous mentir : il n'existe pas de remède. »"},
      {role:"doc", text:"« Mais l'air sec des hauteurs et le repos peuvent ralentir la maladie de façon significative. Certains vivent des années ainsi. »"},
      {role:"action", text:"Isoler le patient des enfants et personnes fragiles. Lui donner des mouchoirs séparés à brûler après usage."},
      {role:"doc", text:"« Ne crachez pas dans la rue. Couvrez votre bouche quand vous toussez. Cette maladie se transmet par l'air — vous devez protéger votre famille. »"},
    ],
    epoch:"Koch découvre le bacille en 1882. La streptomycine n'existera qu'en 1943." },

  { term:"Typhoïde", sub:"disease", cat:"ec-disease", label:"Maladie",
    def:"Infection bactérienne grave transmise par l'eau et les aliments contaminés. Fréquente dans les villes sans assainissement.",
    symptomes:"Fièvre montant sur une semaine jusqu'à 40°C, maux de tête violents, douleurs abdominales, taches rosées sur le ventre, prostration.",
    traitement:"Repos absolu, réhydratation, bains froids pour la fièvre, alimentation liquide. Durée 3 à 4 semaines.",
    steps:[
      {role:"doc", text:"« Depuis combien de jours cette fièvre ? Elle monte progressivement depuis le début, c'est bien ça ? »"},
      {role:"obs", text:"Chercher les taches rosées sur l'abdomen — signe caractéristique. Palper l'abdomen : douleur en fosse iliaque droite typique."},
      {role:"doc", text:"« Cette fièvre qui monte depuis une semaine, ces douleurs du ventre, ces taches — c'est la typhoïde. Elle vient de l'eau ou de la nourriture contaminée. »"},
      {role:"doc", text:"« Il n'y a pas de médicament pour tuer cette bactérie. Mais avec du repos et des soins, vous passerez le cap en trois semaines. »"},
      {role:"action", text:"Alitement strict. Alimentation uniquement liquide (bouillons). Bains froids si fièvre dépasse 39.5°C. Réhydratation constante."},
      {role:"doc", text:"« Ne buvez plus que de l'eau bouillie — vous et toute votre famille. C'est la source qu'il faut traiter, sinon d'autres tomberont malades. »"},
    ],
    epoch:"Le vaccin Wright existe depuis 1896 mais peu disponible au Texas. Eau bouillie obligatoire." },

  { term:"Syphilis", sub:"disease", cat:"ec-disease", label:"Maladie",
    def:"Infection bactérienne sexuellement transmissible évoluant en trois stades sur des années.",
    symptomes:"Stade 1 : chancre indolore. Stade 2 : éruption cutanée, fièvre, ganglions. Stade 3 : lésions cérébrales, paralysie, démence.",
    traitement:"Frictions au mercure (toxique mais seul traitement). Salvarsan d'Ehrlich disponible dès 1910.",
    steps:[
      {role:"doc", text:"« Ce que je dois vous dire est confidentiel et restera entre nous. Êtes-vous seul ? »"},
      {role:"obs", text:"Examiner discrètement. Chercher le chancre (ulcère indolore), les ganglions inguinaux, l'éruption caractéristique."},
      {role:"doc", text:"« Ce que j'observe indique une syphilis. C'est grave — mais traitable si nous agissons maintenant, avant le troisième stade. »"},
      {role:"doc", text:"« Le traitement est à base de mercure. Ce n'est pas agréable — frictions quotidiennes, salivation excessive — mais c'est ce que nous avons. »"},
      {role:"action", text:"Prescrire frictions mercurielles quotidiennes sur les membres. Éviter exposition au froid pendant le traitement. Suivi mensuel."},
      {role:"doc", text:"« Vous devez informer toute personne avec qui vous avez été intime. C'est une obligation morale — et médicale. »"},
    ],
    epoch:"Le salvarsan d'Ehrlich (1910) révolutionnera le traitement. En 1904 seul le mercure est disponible." },

  { term:"Tétanos", sub:"disease", cat:"ec-disease", label:"Maladie",
    def:"Infection bactérienne déclenchée par une plaie souillée. La toxine attaque le système nerveux et cause des contractures fatales.",
    symptomes:"Raideur de la mâchoire (trismus), contractures douloureuses progressives, arching du dos, spasmes déclenchés par bruit ou lumière.",
    traitement:"Pas de traitement curatif. Sédatifs pour réduire les spasmes, chloral, laudanum. Mortalité très élevée.",
    steps:[
      {role:"doc", text:"« Cette raideur de la mâchoire, cette difficulté à ouvrir la bouche — depuis quand ? Et quelle blessure aviez-vous il y a une semaine ? »"},
      {role:"obs", text:"Tester l'ouverture de la bouche. Vérifier les réflexes. Le moindre bruit déclenche-t-il des spasmes ? Si oui : tétanos confirmé."},
      {role:"doc", text:"« Je dois vous dire la vérité. C'est le tétanos. Il n'existe pas de remède pour tuer cette toxine une fois qu'elle est dans le sang. »"},
      {role:"doc", text:"« Mais nous pouvons combattre les spasmes et vous maintenir en vie le temps que votre corps lutte. »"},
      {role:"action", text:"Chambre obscure et silencieuse ABSOLUMENT. Chloral 2g pour les spasmes. Laudanum 20 gouttes pour la douleur. Alimentation liquide par petites quantités."},
      {role:"doc", text:"« La moindre lumière vive, le moindre bruit fort peut déclencher une crise fatale. Je compte sur vous pour faire respecter le silence absolu dans cette pièce. »"},
    ],
    epoch:"L'anatoxine tétanique ne sera disponible que dans les années 1920." },

  { term:"Choléra", sub:"disease", cat:"ec-disease", label:"Maladie",
    def:"Infection intestinale foudroyante. Peut tuer en quelques heures par déshydratation massive.",
    symptomes:"Diarrhée aqueuse abondante dite en eau de riz, vomissements, crampes musculaires, déshydratation rapide, yeux enfoncés.",
    traitement:"Réhydratation immédiate et massive, teinture d'opium pour les crampes, isolement strict.",
    steps:[
      {role:"doc", text:"« Depuis quand ces diarrhées ? De quelle couleur ? Y a-t-il d'autres personnes malades autour de vous ? »"},
      {role:"obs", text:"Observer : peau qui reste plissée si pincée (signe de déshydratation sévère), yeux creux, voix éteinte, pouls rapide et faible."},
      {role:"doc", text:"« C'est le choléra. Chaque heure compte — il peut mourir de déshydratation avant la fin de la journée si on n'agit pas. »"},
      {role:"action", text:"URGENCE : préparer solution de réhydratation — un litre d'eau bouillie, une cuillère de sel, deux cuillères de sucre. Faire boire en continu."},
      {role:"doc", text:"« De l'eau salée sucrée, sans arrêt — même s'il vomit, même s'il ne veut pas. C'est ce qui va le maintenir en vie. »"},
      {role:"action", text:"Isolement strict. Tout ce qui touche le patient brûle ou bout. Alerter les voisins — chercher la source d'eau contaminée."},
    ],
    epoch:"Grandes épidémies de choléra aux USA jusqu'en 1892. Koch avait identifié le vibrion en 1883." },
],

/* ─── REMÈDES & PHARMACOPÉE ─────────────────────────── */
rem:[
  { term:"Laudanum", sub:"remedy", cat:"ec-remedy", label:"Médicament",
    def:"Teinture d'opium à 10% dans de l'alcool. Analgésique, sédatif, antidiarrhéique universel du XIXe siècle.",
    symptomes:"", traitement:"Douleurs, insomnies, angoisses, diarrhées, toux. 10 à 20 gouttes dans de l'eau ou du whisky.",
    steps:[
      {role:"doc", text:"« Je vous prescris du laudanum. Dix gouttes le soir dans un verre d'eau — pas dans du whisky, vous en prendrez trop. »"},
      {role:"action", text:"Compter les gouttes devant le patient. Montrer la quantité. Écrire la posologie sur l'ordonnance."},
      {role:"doc", text:"« Dix gouttes — pas onze. Pas douze. Cette substance est efficace à la bonne dose et dangereuse si on dépasse. »"},
      {role:"doc", text:"« Gardez le flacon sous clé, loin des enfants et des personnes fragiles. »"},
      {role:"doc", text:"« Si vous en avez besoin le matin pour fonctionner, revenez me voir — cela signifie que votre corps devient dépendant. »"},
    ],
    epoch:"Vendu sans ordonnance en pharmacie en 1904. La dépendance à l'opium était un problème connu mais banalisé." },

  { term:"Morphine — injection", sub:"remedy", cat:"ec-remedy", label:"Médicament",
    def:"Alcaloïde de l'opium, beaucoup plus puissant que le laudanum. Injecté à la seringue hypodermique pour douleurs sévères.",
    symptomes:"", traitement:"Douleurs post-opératoires, fractures graves, blessures sévères. 5 à 15mg en injection sous-cutanée.",
    steps:[
      {role:"doc", text:"« La douleur est trop intense pour le laudanum. Je vais faire une injection de morphine — ça va agir en quelques minutes. »"},
      {role:"action", text:"Préparer la seringue hypodermique. Diluer la morphine si nécessaire. Désinfecter la zone d'injection à l'alcool."},
      {role:"doc", text:"« Petite piqûre. Restez allongé et ne vous levez pas — vous allez vous sentir partir, c'est normal et voulu. »"},
      {role:"action", text:"Injection lente en sous-cutané. Observer le patient 10 minutes. Vérifier la respiration reste régulière."},
      {role:"doc", text:"« Comment vous sentez-vous ? La douleur diminue ? Bien. Je reviens dans une heure vérifier. »"},
      {role:"obs", text:"Si respiration lente ou patient difficile à réveiller : danger de surdose. Stimuler, ne pas laisser dormir, appeler de l'aide."},
    ],
    epoch:"La seringue hypodermique est utilisée depuis 1850. Le morphinisme était un fléau à l'époque." },

  { term:"Bromure de potassium", sub:"remedy", cat:"ec-remedy", label:"Médicament",
    def:"Sel minéral sédatif du système nerveux. Principal anticonvulsivant et calmant nerveux de l'époque.",
    symptomes:"", traitement:"Épilepsie, agitation, insomnies, manie, nervosité excessive. 1 à 2g dans un verre d'eau, 2 fois par jour.",
    steps:[
      {role:"doc", text:"« Je vous prescris du bromure de potassium — une cuillère à café rase dans un grand verre d'eau, matin et soir après les repas. »"},
      {role:"doc", text:"« Ce médicament va ralentir votre esprit progressivement. Vous sentirez l'effet au bout de deux à trois jours. »"},
      {role:"doc", text:"« Ne conduisez pas de voiture, ne montez pas à cheval seul les premiers jours. Vos réflexes seront légèrement ralentis. »"},
      {role:"action", text:"Remettre le flacon avec l'ordonnance écrite. Traitement sur 3 semaines minimum avant réévaluation."},
      {role:"doc", text:"« Si vous voyez des boutons sur la peau ou une confusion mentale inhabituelle, arrêtez et revenez me voir. »"},
    ],
    epoch:"Introduit en médecine en 1857. Remplacé progressivement par les barbituriques après 1912." },

  { term:"Teinture d'iode — désinfection", sub:"remedy", cat:"ec-remedy", label:"Antiseptique",
    def:"Solution d'iode dans l'alcool. Antiseptique de référence pour toute plaie. Suit les principes de Lister.",
    symptomes:"", traitement:"Toute plaie ouverte avant suture ou pansement. Application directe.",
    steps:[
      {role:"doc", text:"« Je vais nettoyer la plaie à l'iode. Ça va brûler — vraiment brûler. Mais c'est ce qui va tuer les bactéries et éviter la gangrène. »"},
      {role:"action", text:"Verser l'iode sur un linge propre ou directement sur la plaie. Nettoyer du centre vers l'extérieur, jamais l'inverse."},
      {role:"doc", text:"« La coloration brune, c'est normal — ça partira en quelques jours. Si la peau autour devient rouge et chaude, revenez immédiatement. »"},
      {role:"action", text:"Laisser sécher 30 secondes avant de poser le pansement. Ne pas rincer l'iode."},
      {role:"doc", text:"« Changez le pansement tous les deux jours, nettoyez à l'iode à chaque fois. »"},
    ],
    epoch:"L'antisepsie de Lister (1867) avait révolutionné la chirurgie. L'iode remplaçait l'alcool pur." },

  { term:"Quinine", sub:"remedy", cat:"ec-remedy", label:"Médicament",
    def:"Alcaloïde du quinquina. Seul traitement efficace contre le paludisme (malaria) en 1904.",
    symptomes:"", traitement:"Paludisme, fièvres récurrentes. 1 gramme par jour en poudre ou pilule pendant 3 semaines.",
    steps:[
      {role:"doc", text:"« Ces fièvres qui reviennent exactement tous les deux ou trois jours, avec des frissons violents — c'est la malaria. »"},
      {role:"doc", text:"« La quinine est le seul remède que nous ayons contre cette maladie, et heureusement il est efficace. »"},
      {role:"action", text:"Prescrire quinine sulfate 1g/jour, à prendre le matin. Traitement sur 21 jours sans interruption."},
      {role:"doc", text:"« Vous allez avoir des bourdonnements d'oreilles et peut-être des vertiges — c'est un effet secondaire normal de la quinine, pas dangereux. »"},
      {role:"doc", text:"« Ne ratez aucune dose même si vous vous sentez mieux après une semaine. Arrêter trop tôt et la fièvre reviendra. »"},
    ],
    epoch:"Le quinquina contre la malaria est utilisé depuis le XVIIe siècle. Très efficace." },
],

/* ─── EXAMENS MÉDICAUX ───────────────────────────────────── */
exam:[
  { term:"Examen général complet", sub:"exam", cat:"ec-proc", label:"Bilan complet",
    def:"Bilan systématique de l'état général du patient. Toujours commencer par là avant tout examen spécialisé.",
    symptomes:"", traitement:"",
    steps:[
      {role:"doc", text:"« Je vais vous examiner de façon complète. Ôtez votre veste et votre chemise, et asseyez-vous sur cette chaise. »"},
      {role:"action", text:"INSPECTION GÉNÉRALE : observer la posture, le teint (pâleur, jaunisse, rougeur), l'état de la peau, la corpulence, l'expression du visage."},
      {role:"obs", text:"Noter : sueurs, tremblements, odeur (alcool, acétone, putréfaction), état des vêtements et de l'hygiène générale."},
      {role:"action", text:"TEMPÉRATURE : placer le thermomètre sous l'aisselle pendant 5 minutes. Normale : 37°C. Fièvre si > 38°C. Hypothermie si < 36°C."},
      {role:"doc", text:"« Je vais prendre votre pouls. Donnez-moi votre poignet. »"},
      {role:"action", text:"POULS : poser 3 doigts sur l'artère radiale au poignet. Compter 30 secondes × 2. Normal : 60-90 bpm. Noter le rythme et la force."},
      {role:"action", text:"RESPIRATION : observer le thorax pendant 30 secondes sans prévenir. Normal : 12-18 respirations/minute. Sifflante ? Laborieuse ?"},
      {role:"action", text:"YEUX : examiner les conjonctives (relevez la paupière) — roses = normal, pâles = anémie, jaunes = jaunisse."},

const SUB_LABELS = {
  diag:'Diagnostic', cond:'Condition', treat:'Traitement', phrase:'Phrase RP',
  wound:'Blessure', proc:'Procédure', disease:'Maladie', remedy:'Remède'
};
const SUB_BY_TAB = {
  psy:  ['diag','cond','treat','phrase'],
  chir: ['wound','proc'],
  mal:  ['disease'],
  rem:  ['remedy'],
  exam: ['exam']
};

let activeTab='psy', activeSub='all';

function setTab(el,tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); activeTab=tab; activeSub='all';
  buildSubFilters(); document.getElementById('search').value=''; render();
}
function buildSubFilters(){
  const subs=SUB_BY_TAB[activeTab]||[];
  const wrap=document.getElementById('sub-filters');
  if(subs.length<=1){wrap.innerHTML='';return;}
  wrap.innerHTML=`<button class="sfpill active" onclick="setSub(this,'all')">Tout</button>`
    +subs.map(s=>`<button class="sfpill" onclick="setSub(this,'${s}')">${SUB_LABELS[s]||s}</button>`).join('');
}
function setSub(el,sub){
  document.querySelectorAll('.sfpill').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); activeSub=sub; render();
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  let list=DATA[activeTab]||[];
  if(activeSub!=='all') list=list.filter(e=>e.sub===activeSub);
  if(q) list=list.filter(e=>(e.term+e.def+(e.symptomes||'')+(e.traitement||'')+(e.steps||[]).map(s=>s.text).join(' ')).toLowerCase().includes(q));
  document.getElementById('count-label').textContent=`${list.length} entrée${list.length!==1?'s':''}`;
  const wrap=document.getElementById('entries');
  if(!list.length){wrap.innerHTML='<div class="no-result">Aucun terme pour cette recherche.</div>';return;}

  const groups={};
  list.forEach(e=>{(groups[e.sub]=groups[e.sub]||[]).push(e);});

  let html='';
  Object.entries(groups).forEach(([sub,items])=>{
    if(Object.keys(groups).length>1)
      html+=`<div class="section-divider">${SUB_LABELS[sub]||sub}</div>`;
    items.forEach(e=>{
      /* ── ILLUSTRATION ── */
      const imgData=IMGS[e.term];
      const asideHtml=imgData?`<div class="dict-aside">
        <div class="dict-illus">
          <img src="${imgData.src}" alt="${imgData.cap}" loading="lazy"
               onerror="var a=this.closest('.dict-aside');a.style.display='none';a.closest('.dict-layout').classList.add('no-img')">
        </div>
        <div class="dict-illus-cap">${imgData.cap}</div>
      </div>`:'';

      /* ── CORPS DICTIONNAIRE ── */
      const defHtml=e.def?`<p class="dict-def">${e.def}</p>`:'';
      const sympHtml=e.symptomes?`<div class="dict-section"><div class="dict-section-label">Symptômes observés</div><div class="dict-section-text">${e.symptomes}</div></div>`:'';
      const traitHtml=e.traitement?`<div class="dict-section"><div class="dict-section-label">Traitement prescrit</div><div class="dict-section-text">${e.traitement}</div></div>`:'';
      const epochHtml=e.epoch?`<div class="dict-note">✦ ${e.epoch}</div>`:'';

      /* ── AIDE RP ── */
      const ROLE_LABEL={doc:'Docteur — parole',action:'Action / Geste',obs:'Observation clinique',phrase:'Phrase RP'};
      const ROLE_CLASS={doc:'role-doc',action:'role-action',obs:'role-obs'};
      const allText=(e.steps||[]).map(s=>s.text).join('\n');
      const allSafe=allText.replace(/'/g,"&#39;").replace(/"/g,'&quot;').replace(/\n/g,'\\n');
      const stepsHtml=(e.steps||[]).map((s,i)=>{
        const safe=s.text.replace(/'/g,"&#39;").replace(/"/g,'&quot;');
        return `<li class="rp-step">
          <div class="rp-step-num">${i+1}</div>
          <div class="rp-step-body">
            <span class="rp-step-role ${ROLE_CLASS[s.role]||''}">${ROLE_LABEL[s.role]||s.role}</span>
            <div class="rp-step-text">${s.text}</div>
          </div>
          <button class="rp-step-copy" onclick="cp(this,'${safe}')">Copier</button>
        </li>`;
      }).join('');
      const rpId='rp-'+Math.random().toString(36).slice(2);
      const rpHtml=e.steps&&e.steps.length?`
        <div class="rp-toggle" onclick="toggleRp('${rpId}',this)">
          <span>🎭 Fiche aide RP — protocole de jeu</span>
          <span class="rp-chev">▼</span>
        </div>
        <div class="rp-fiche" id="${rpId}" style="display:none">
          <div class="rp-fiche-header">
            <span class="rp-fiche-title">Protocole RP — étapes en jeu</span>
            <button class="copy-all-btn" onclick="cpAll(this,'${allSafe}')">Copier tout</button>
          </div>
          <ol class="rp-steps">${stepsHtml}</ol>
        </div>`:'';

      html+=`<div class="entry fade-up">
        <div class="entry-head" onclick="this.parentElement.classList.toggle('open')">
          <span class="entry-term">${e.term}</span>
          <span class="entry-cat ${e.cat}">${e.label}</span>
          <span class="entry-chev">▼</span>
        </div>
        <div class="entry-body">
          <div class="dict-layout${imgData?'':' no-img'}">
            <div class="dict-main">${defHtml}${sympHtml}${traitHtml}${epochHtml}</div>
            ${asideHtml}
          </div>
          ${rpHtml}
        </div>
      </div>`;
    });
  });
  wrap.innerHTML=html;
}

function toggleRp(id, btn){
  var el = document.getElementById(id);
  var open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  btn.querySelector('.rp-chev').textContent = open ? '▼' : '▲';
}

function cp(btn,text){
  const t=text.replace(/&#39;/g,"'").replace(/&quot;/g,'"');
  navigator.clipboard.writeText(t).then(()=>{
    btn.textContent='✓'; btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='Copier';btn.classList.remove('ok');},2000);
  });
}
function cpAll(btn,text){
  const t=text.replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/\\n/g,'\n');
  navigator.clipboard.writeText(t).then(()=>{
    btn.textContent='✓ Copié'; btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='Copier tout';btn.classList.remove('ok');},2000);
  });
}

// init appelé par guardPage onReady
</script>
