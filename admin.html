<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Administration — Cabinet du Texas</title>
<script>(function(){ var t=localStorage.getItem("psy_theme")||"dark"; document.documentElement.setAttribute("data-theme",t); })();</script>
<link rel="stylesheet" href="css/style.css">
<style>
.admin-wrap{ max-width:1200px; margin:0 auto; padding:1.5rem 1rem 3rem; }
.admin-title{ font-family:'Playfair Display',serif; font-size:1.4rem; color:var(--parch); margin-bottom:.25rem; }
.admin-sub{ font-family:'EB Garamond',serif; font-size:.88rem; color:var(--parch3); margin-bottom:1.5rem; }
.pending-banner{ background:rgba(200,48,48,.08); border:1px solid rgba(200,48,48,.3); border-left:3px solid #c83030; padding:.85rem 1.25rem; margin-bottom:1.25rem; display:flex; align-items:center; gap:1rem; font-family:'EB Garamond',serif; font-size:.9rem; color:var(--parch3); border-radius:0 6px 6px 0; }
.pending-banner-count{ background:#c83030; color:#fff; font-family:'Courier Prime',monospace; font-size:.95rem; font-weight:700; min-width:2rem; height:2rem; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.med-table{ width:100%; border-collapse:collapse; font-size:.82rem; }
.med-table th{ font-family:'Cormorant Garamond',serif; font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--parch4); border-bottom:1px solid var(--border); padding:.5rem .6rem; text-align:left; white-space:nowrap; }
.med-table td{ padding:.45rem .6rem; border-bottom:1px solid rgba(255,255,255,.04); vertical-align:middle; }
.med-table tr:hover td{ background:rgba(255,255,255,.02); }
.name-cell{ font-family:'Cormorant Garamond',serif; font-size:.88rem; color:var(--parch); min-width:140px; }
.grade-select{ background:var(--ink); border:1px solid var(--border); color:var(--parch3); font-family:'Cormorant Garamond',serif; font-size:.8rem; padding:.25rem .4rem; border-radius:4px; cursor:pointer; }
.grade-select:disabled{ opacity:.4; cursor:default; }
.acces-toggle{ width:18px; height:18px; cursor:pointer; accent-color:#4a9a4a; }
.acces-toggle:disabled{ cursor:default; opacity:.4; }
.btn-action{ font-family:'Cormorant Garamond',serif; font-size:.75rem; padding:.22rem .6rem; border:none; border-radius:4px; cursor:pointer; letter-spacing:.04em; }
.btn-red{ background:rgba(200,48,48,.15); color:#e07070; border:1px solid rgba(200,48,48,.3); }
.btn-red:hover{ background:rgba(200,48,48,.28); }
.tab-bar{ display:flex; gap:.5rem; margin-bottom:1.25rem; }
.tab-btn{ font-family:'Cormorant Garamond',serif; font-size:.82rem; padding:.35rem .9rem; border:1px solid var(--border); background:transparent; color:var(--parch3); border-radius:4px; cursor:pointer; display:flex; align-items:center; gap:.35rem; }
.tab-btn.active{ background:var(--gold); color:#1c1409; border-color:var(--gold); font-weight:700; }
.tab-btn .badge{ background:#c83030; color:#fff; font-size:.55rem; padding:1px 5px; border-radius:10px; font-family:'Courier Prime',monospace; }
</style>
</head>
<body>
<script src="js/header.js"></script>

<div class="admin-wrap">
  <div class="admin-title">⚙️ Panel Administration</div>
  <div class="admin-sub" id="admin-sub">Chargement…</div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-meds" onclick="showTab('meds')">👥 Médecins <span id="pending-badge" class="badge" style="display:none">0</span></button>
    <button class="tab-btn" id="tab-patients" onclick="showTab('patients')">🗂️ Patients</button>
  </div>

  <div id="pending-banner-wrap"></div>

  <!-- TABLE MÉDECINS -->
  <div id="tab-content-meds">
    <table class="med-table">
      <thead id="meds-thead">
        <tr>
          <th>Médecin</th>
          <th>Accès dossiers</th>
          <th>Cabinet</th>
          <th>Rôle</th>
          <th>Grade</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="meds-tbody">
        <tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--parch4)">Chargement…</td></tr>
      </tbody>
    </table>
  </div>

  <!-- PATIENTS -->
  <div id="tab-content-patients" style="display:none">
    <div id="patients-list"><p style="font-family:'EB Garamond',serif;color:var(--parch3)">Chargement…</p></div>
  </div>
</div>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, query, where }
  from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDTi50ETxwfp55UN7YN-m0sQ_k26kwpQmY",
  authDomain:"psy-redm.firebaseapp.com",
  projectId:"psy-redm",
  storageBucket:"psy-redm.firebasestorage.app",
  messagingSenderId:"968947741685",
  appId:"1:968947741685:web:22cc44471187e6024ca6bc"
});
const auth = getAuth(app);
const db   = getFirestore(app);

var ME = null;
var ALL_MEDS = [];

const ROLE_COLORS = {
  stagiaire:'#4a9a4a', apprenti:'#c89820', medecin:'#4a80b8',
  specialiste:'#9a3ab8', chief:'#b84a7a', chief_texas:'#b54a1e', chief_louisiane:'#1a7a8a', admin:'#c83030'
};
const ROLE_LABELS = {
  stagiaire:'Stagiaire', apprenti:'Apprenti', medecin:'Médecin', specialiste:'Spécialiste',
  chief:'Chef dispensaire', chief_texas:'Chief Texas', chief_louisiane:'Chief Louisiane', admin:'Admin'
};
const CHIEF_ROLES = ['chief','chief_texas','chief_louisiane','admin'];
const ALL_DISPENSAIRES = ['Blackwater','Strawberry','Sunset','Armadillo','Tumbleweed','Saint-Denis','Van Horn','Rhodes'];
const DISPENSAIRES = {
  texas:     ['Blackwater','Strawberry','Sunset','Armadillo','Tumbleweed'],
  louisiane: ['Saint-Denis','Van Horn','Rhodes']
};
function myRegion(role){
  if(role==='chief_texas') return 'texas';
  if(role==='chief_louisiane') return 'louisiane';
  return null;
}
function roleKey(m){
  if(CHIEF_ROLES.includes(m.role)) return m.role;
  return m.grade||'stagiaire';
}
function rColor(m){ return ROLE_COLORS[roleKey(m)]||'#c89820'; }
function rLabel(m){ return ROLE_LABELS[roleKey(m)]||roleKey(m); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── AUTH ──────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if(!user){ window.location.href='login.html'; return; }
  const snap = await getDocs(query(collection(db,'medecins'), where('email','==',user.email)));
  if(snap.empty){ window.location.href='login.html'; return; }
  ME = { id:snap.docs[0].id, ...snap.docs[0].data() };
  if(!ME.profilOk){ window.location.href='setup-profil.html'; return; }
  const allowed = ['admin','chief','chief_texas','chief_louisiane'];
  if(!allowed.includes(ME.role)){
    document.querySelector('.admin-wrap').innerHTML =
      '<div style="padding:3rem;text-align:center;font-family:\'EB Garamond\',serif;color:var(--parch3)">Accès réservé aux Administrateurs et Chefs de cabinet.</div>';
    return;
  }
  document.getElementById('admin-sub').textContent =
    `Connecté en tant que ${ROLE_LABELS[ME.role]||ME.role} — Dr. ${ME.prenom||''} ${ME.nom||''}`;
  await loadAll();
  renderMeds();
  renderPatients();
});

// ── CHARGEMENT ────────────────────────────────
async function loadAll(){
  const snap = await getDocs(collection(db,'medecins'));
  let meds = snap.docs.map(d=>({id:d.id,...d.data()}));
  const region = myRegion(ME.role);
  if(region){
    meds = meds.filter(m => DISPENSAIRES[region].includes(m.cabinet));
  }
  ALL_MEDS = meds.sort((a,b)=>{
    if(!a.profilOk && b.profilOk) return -1;
    if(a.profilOk && !b.profilOk) return 1;
    return 0;
  });
  updatePendingBadge();
}

// ── TABLE MÉDECINS ────────────────────────────
function renderMeds(){
  const isAdmin  = ME.role === 'admin';
  const isRegChief = ['chief_texas','chief_louisiane'].includes(ME.role);
  const isChief  = ME.role === 'chief';

  // Colonnes Rôle : admin seulement
  document.getElementById('meds-thead').innerHTML = `<tr>
    <th>Médecin</th>
    <th style="text-align:center">Accès dossiers</th>
    <th>Cabinet</th>
    ${isAdmin ? '<th>Rôle</th>' : ''}
    <th>Grade</th>
    ${isAdmin ? '<th></th>' : ''}
  </tr>`;

  const pending = ALL_MEDS.filter(m => m.profilOk && !m.accesPatients && !CHIEF_ROLES.includes(m.role));
  const banner = document.getElementById('pending-banner-wrap');
  if(pending.length > 0){
    banner.innerHTML = `<div class="pending-banner">
      <div class="pending-banner-count">${pending.length}</div>
      <div><strong style="color:var(--parch)">${pending.length} médecin${pending.length>1?'s':''} en attente d'accès aux dossiers.</strong></div>
    </div>`;
  } else {
    banner.innerHTML = '';
  }

  const gradeOpts = isAdmin
    ? ['stagiaire','apprenti','medecin','specialiste']
    : ['stagiaire','apprenti','medecin'];

  const roleOpts = ['medecin','chief','chief_texas','chief_louisiane'];

  const cabOpts = isAdmin ? ALL_DISPENSAIRES
    : isRegChief ? DISPENSAIRES[myRegion(ME.role)]
    : null;

  document.getElementById('meds-tbody').innerHTML = ALL_MEDS.map(m => {
    const isSelf = m.id === ME.id;
    const isTarget_chief = CHIEF_ROLES.includes(m.role);
    const canEdit = !isSelf;

    // Accès checkbox
    const autoAcces = CHIEF_ROLES.includes(m.role);
    let accesHtml;
    if(!m.profilOk){
      accesHtml = '<span style="font-size:.72rem;color:#ffcca0;font-style:italic">⚠ Incomplet</span>';
    } else if(autoAcces){
      accesHtml = '<input type="checkbox" checked disabled class="acces-toggle" title="Automatique">';
    } else {
      accesHtml = `<input type="checkbox" class="acces-toggle" ${m.accesPatients?'checked':''} ${!canEdit?'disabled':''}
        onchange="setAcces('${m.id}',this.checked)">`;
    }

    // Cabinet dropdown
    let cabHtml;
    if(cabOpts && canEdit){
      cabHtml = `<select class="grade-select" onchange="setCabinet('${m.id}',this.value)">
        ${cabOpts.map(c=>`<option value="${c}" ${(m.cabinet||'')=== c?'selected':''}>${c}</option>`).join('')}
      </select>`;
    } else {
      cabHtml = `<span style="font-family:'Cormorant Garamond',serif;font-size:.82rem;color:var(--parch3)">${esc(m.cabinet||'—')}</span>`;
    }

    // Rôle dropdown (admin seulement)
    let roleHtml = '';
    if(isAdmin){
      if(isSelf){
        roleHtml = `<span style="color:${rColor(m)};font-family:'Cormorant Garamond',serif;font-size:.78rem;font-weight:700">${rLabel(m)}</span>`;
      } else if(m.role === 'admin'){
        roleHtml = `<span style="color:${ROLE_COLORS.admin};font-family:'Cormorant Garamond',serif;font-size:.78rem;font-weight:700">Admin</span>`;
      } else {
        roleHtml = `<select class="grade-select" onchange="setRole('${m.id}',this.value)" style="color:${ROLE_COLORS[m.role]||'inherit'}">
          ${roleOpts.map(r=>`<option value="${r}" style="color:${ROLE_COLORS[r]}" ${m.role===r?'selected':''}>${ROLE_LABELS[r]}</option>`).join('')}
        </select>`;
      }
    }

    // Grade dropdown
    const gradeDisabled = isTarget_chief || isSelf;
    const gradeHtml = `<select class="grade-select" onchange="setGrade('${m.id}',this.value)" ${gradeDisabled?'disabled':''}
      style="color:${gradeDisabled?'inherit':ROLE_COLORS[m.grade||'stagiaire']}">
      ${gradeOpts.map(g=>`<option value="${g}" style="color:${ROLE_COLORS[g]}" ${(m.grade||'stagiaire')===g?'selected':''}>${ROLE_LABELS[g]}</option>`).join('')}
    </select>`;

    // Delete
    let delHtml = '';
    if(isAdmin && !isSelf && m.role !== 'admin'){
      delHtml = `<button class="btn-action btn-red" onclick="deleteMed('${m.id}')">✕</button>`;
    }

    const nameHtml = m.profilOk
      ? `<span style="color:${rColor(m)}">Dr. ${esc(m.prenom||'')} ${esc(m.nom||'')}</span>`
      : `<span style="color:var(--parch4);font-style:italic">Anonyme ⚠</span>`;

    const hist = (m.historique||[]).slice().sort((a,b)=>b.ts-a.ts);
    const examNoms = {e1:'Niv.1',e2:'Niv.2',e3:'Niv.3',e4:'Niv.4',s1:'Chirurgien',s2:'Aliéniste',s3:'Légiste',s4:'Pharmacologue',s5:'Accoucheur',s6:'Dentiste',s7:'Ophtalmo',s8:'ORL',s9:'Dermato',s10:'Pédiatre',s11:'Radiologue',s12:'Chir.cardiaque'};
    const histHtml = hist.length ? hist.map(h=>
      `<span style="font-size:.72rem;font-family:'Courier Prime',monospace;color:${h.passed?'#6abf6a':'#c07070'}">${examNoms[h.examId]||h.examId} ${h.pct}%</span> <span style="font-size:.65rem;color:var(--parch4)">${h.date}</span>`
    ).join('<br>') : '<span style="font-size:.72rem;color:var(--parch4);font-style:italic">Aucune tentative</span>';

    const histRow = `<tr id="hist-${m.id}" style="display:none;background:rgba(0,0,0,.15)">
      <td colspan="${isAdmin?6:4}" style="padding:.6rem 1rem .6rem 2rem;font-family:'EB Garamond',serif;font-size:.82rem">
        <strong style="color:var(--parch3);font-family:'Cormorant Garamond',serif;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase">Historique examens</strong><br>
        <div style="margin-top:.4rem;line-height:1.8">${histHtml}</div>
      </td>
    </tr>`;

    return `<tr style="${!m.profilOk?'opacity:.6':''}" onclick="toggleHist('${m.id}')" style="cursor:pointer">
      <td class="name-cell">${nameHtml} <span style="font-size:.6rem;color:var(--parch4)">${hist.length?'📋'+hist.length:''}</span></td>
      <td style="text-align:center">${accesHtml}</td>
      <td>${cabHtml}</td>
      ${isAdmin ? `<td>${roleHtml}</td>` : ''}
      <td>${gradeHtml}</td>
      ${isAdmin ? `<td>${delHtml}</td>` : ''}
    </tr>${histRow}`;
  }).join('');
}

// ── ACTIONS ───────────────────────────────────
window.setAcces = async function(uid, value){
  await updateDoc(doc(db,'medecins',uid), { accesPatients: value });
  const m = ALL_MEDS.find(m=>m.id===uid);
  if(m) m.accesPatients = value;
  updatePendingBadge();
  // Juste mettre à jour la bannière sans re-render complet
  const pending = ALL_MEDS.filter(m => m.profilOk && !m.accesPatients && !CHIEF_ROLES.includes(m.role)).length;
  const banner = document.getElementById('pending-banner-wrap');
  if(pending > 0){
    banner.innerHTML = `<div class="pending-banner">
      <div class="pending-banner-count">${pending}</div>
      <div><strong style="color:var(--parch)">${pending} médecin${pending>1?'s':''} en attente d'accès aux dossiers.</strong></div>
    </div>`;
  } else {
    banner.innerHTML = '';
  }
};

window.setCabinet = async function(uid, cabinet){
  await updateDoc(doc(db,'medecins',uid), { cabinet });
  const m = ALL_MEDS.find(m=>m.id===uid);
  if(m) m.cabinet = cabinet;
};

window.setRole = async function(uid, role){
  await updateDoc(doc(db,'medecins',uid), { role });
  const m = ALL_MEDS.find(m=>m.id===uid);
  if(m){ m.role = role; }
  // Mettre à jour la couleur du nom
  renderMeds();
};

window.setGrade = async function(uid, grade){
  await updateDoc(doc(db,'medecins',uid), { grade });
  const m = ALL_MEDS.find(m=>m.id===uid);
  if(m) m.grade = grade;
};

window.deleteMed = async function(uid){
  if(!confirm('Supprimer définitivement ce médecin ?')) return;
  await deleteDoc(doc(db,'medecins',uid));
  ALL_MEDS = ALL_MEDS.filter(m=>m.id!==uid);
  renderMeds();
};

// ── PATIENTS ──────────────────────────────────
async function renderPatients(){
  const snap = await getDocs(collection(db,'patients'));
  const list = document.getElementById('patients-list');
  if(snap.empty){ list.innerHTML='<p style="font-family:\'EB Garamond\',serif;color:var(--parch3)">Aucun patient.</p>'; return; }
  list.innerHTML = '<table class="med-table"><thead><tr><th>Patient</th><th>Médecin</th><th>Date</th><th></th></tr></thead><tbody>'
    + snap.docs.map(d=>{
        const p = d.data();
        return `<tr>
          <td class="name-cell">${esc(p.prenom||'')} ${esc(p.nom||'')}</td>
          <td style="font-family:'Cormorant Garamond',serif;font-size:.78rem;color:var(--parch3)">${esc(p.medecinNom||'—')}</td>
          <td style="font-family:'Cormorant Garamond',serif;font-size:.72rem;color:var(--parch4)">${p.createdAt?new Date(p.createdAt.seconds*1000).toLocaleDateString('fr-FR'):'—'}</td>
          <td><button class="btn-action btn-red" onclick="deletePatient('${d.id}')">✕ Supprimer</button></td>
        </tr>`;
      }).join('')
    + '</tbody></table>';
}

window.toggleHist = function(uid){
  const row = document.getElementById('hist-'+uid);
  if(row) row.style.display = row.style.display === 'none' ? '' : 'none';
};

window.deletePatient = async function(id){
  if(!confirm('Supprimer ce dossier patient ?')) return;
  await deleteDoc(doc(db,'patients',id));
  renderPatients();
};

// ── BADGE ─────────────────────────────────────
function updatePendingBadge(){
  const count = ALL_MEDS.filter(m => m.profilOk && !m.accesPatients && !CHIEF_ROLES.includes(m.role)).length;
  const b = document.getElementById('pending-badge');
  if(b){ b.textContent = count; b.style.display = count > 0 ? 'inline' : 'none'; }
}
</script>

<script>
function showTab(name){
  ['meds','patients'].forEach(function(t){
    document.getElementById('tab-content-'+t).style.display = t===name ? '' : 'none';
    document.getElementById('tab-'+t).classList.toggle('active', t===name);
  });
}
</script>
<script src="js/guard.js" defer></script>
<script>
document.addEventListener('DOMContentLoaded', function(){
  var wait = setInterval(function(){
    if(!window.guardPage) return;
    clearInterval(wait);
    guardPage({ minGrade:'stagiaire', onReady: function(p){} });
  }, 80);
});
</script>
</body>
</html>
