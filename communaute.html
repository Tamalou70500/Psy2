<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Communauté — Cabinet Médical du Texas</title>
<script>(function(){ var t=localStorage.getItem("psy_theme")||"dark"; document.documentElement.setAttribute("data-theme",t); })();</script>
<link rel="stylesheet" href="css/style.css">
<style>
/* ═══════ LAYOUT ═══════ */
.comm-layout {
  display: grid;
  grid-template-columns: 1fr 280px;
  height: calc(100vh - 54px);
  overflow: hidden;
  background: var(--bdr);
  gap: 1px;
}
@media(max-width:860px){ .comm-layout { grid-template-columns:1fr; } .comm-sidebar { display:none; } }

/* ═══════ ONGLETS ═══════ */
.comm-tabs { display:flex; border-bottom:1px solid var(--bdr); background:var(--ink2); flex-shrink:0; }
.comm-tab {
  padding:.75rem 1.5rem; cursor:pointer;
  font-family:'Cormorant Garamond',serif; font-size:.7rem; letter-spacing:.14em; text-transform:uppercase;
  color:var(--parch3); border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .2s;
}
.comm-tab:hover { color:var(--parch2); }
.comm-tab.active { color:var(--gold-l); border-bottom-color:var(--gold); }

/* ═══════ COLONNE GAUCHE ═══════ */
.comm-left { display:flex; flex-direction:column; overflow:hidden; background:var(--ink); }

/* ═══════ MUR ═══════ */
.mur-wrap { display:flex; flex-direction:column; flex:1; overflow:hidden; }
.mur-messages {
  flex:1; overflow-y:auto; padding:1rem 1.25rem;
  display:flex; flex-direction:column; gap:.5rem;
}
.mur-empty { text-align:center; padding:3rem 1rem; font-family:'EB Garamond',serif; font-size:.92rem; color:var(--parch4); font-style:italic; }

/* Messages */
@keyframes fadeUp { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.msg { display:flex; gap:.75rem; padding:.65rem 1rem; background:var(--ink2); border:1px solid var(--bdr); animation:fadeUp .2s ease; }
.msg.own { border-left:2px solid var(--gold-d); }
.msg-avatar { width:36px; height:36px; border-radius:50%; object-fit:cover; object-position:top; flex-shrink:0; border:1px solid var(--bdr2); }
.msg-avatar-ph {
  width:36px; height:36px; border-radius:50%; background:var(--ink3); border:1px solid var(--bdr);
  display:flex; align-items:center; justify-content:center;
  font-family:'Playfair Display',serif; font-size:.85rem; color:var(--parch3); flex-shrink:0;
}
.msg-body { flex:1; min-width:0; }
.msg-header { display:flex; align-items:baseline; gap:.5rem; margin-bottom:.2rem; flex-wrap:wrap; }
.msg-name { font-family:'Playfair Display',serif; font-size:.85rem; color:var(--parch); font-style:italic; }
.msg-grade { font-family:'Cormorant Garamond',serif; font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; }
.msg-time { font-family:'Cormorant Garamond',serif; font-size:.58rem; color:var(--parch4); margin-left:auto; white-space:nowrap; }
.msg-text { font-family:'EB Garamond',serif; font-size:.9rem; color:var(--parch2); line-height:1.55; word-break:break-word; }
.msg-text h1 { font-family:'Playfair Display',serif; font-size:1rem; font-weight:400; margin:.2rem 0; color:var(--parch); }
.msg-text h2 { font-family:'Playfair Display',serif; font-size:.88rem; font-weight:400; font-style:italic; margin:.15rem 0; color:var(--parch); }
.msg-del { background:transparent; border:none; color:var(--parch4); cursor:pointer; font-size:.7rem; opacity:0; transition:opacity .15s; padding:0 4px; }
.msg:hover .msg-del { opacity:1; }
.msg-del:hover { color:#c07070; }

/* Zone de saisie */
.mur-input-wrap { padding:.75rem 1.25rem; border-top:1px solid var(--bdr); background:var(--ink2); flex-shrink:0; }
.mur-toolbar {
  display:flex; align-items:center; gap:2px; padding:.4rem .6rem;
  background:var(--ink3); border:1px solid var(--bdr); border-bottom:none; flex-wrap:wrap;
}
.tb-btn {
  background:transparent; border:1px solid transparent; color:var(--parch3);
  cursor:pointer; padding:.15rem .45rem; font-size:.78rem; border-radius:2px;
  transition:all .15s; font-family:inherit; min-width:26px;
}
.tb-btn:hover { background:var(--ink); border-color:var(--bdr); color:var(--parch); }
.tb-sep { width:1px; height:14px; background:var(--bdr); margin:0 3px; }
.emoji-btn { font-size:.9rem; }
.emoji-picker {
  background:var(--ink2); border:1px solid var(--bdr); border-top:none;
  padding:.6rem; max-height:160px; overflow-y:auto; display:none;
}
.emoji-picker.show { display:block; }
.emoji-grid { display:flex; flex-wrap:wrap; gap:2px; }
.emoji-btn-pick { background:transparent; border:none; font-size:1.1rem; cursor:pointer; padding:3px; border-radius:3px; }
.emoji-btn-pick:hover { background:var(--ink3); }
.mur-input-row { display:flex; gap:.5rem; align-items:flex-end; margin-top:4px; }
.mur-editable {
  flex:1; background:var(--ink3); border:1px solid var(--bdr); color:var(--parch);
  font-family:'EB Garamond',serif; font-size:.92rem;
  padding:.55rem .85rem; min-height:40px; max-height:120px; overflow-y:auto;
  line-height:1.55; outline:none; border-radius:0;
}
.mur-editable:focus { border-color:var(--bdr2); }
.mur-editable:empty:before { content:attr(data-placeholder); color:var(--parch4); pointer-events:none; font-style:italic; }
.mur-send {
  background:var(--gold-dim); border:1px solid var(--gold); color:var(--gold-l);
  font-family:'Cormorant Garamond',serif; font-size:.63rem; letter-spacing:.14em; text-transform:uppercase;
  padding:.55rem .9rem; cursor:pointer; transition:all .2s; white-space:nowrap; height:40px;
}
.mur-send:hover { background:rgba(192,154,74,.25); color:var(--parch); }
.mur-send:disabled { opacity:.4; cursor:not-allowed; }
.char-count { font-family:'Cormorant Garamond',serif; font-size:.58rem; color:var(--parch4); text-align:right; margin-top:.2rem; }
.char-count.warn { color:#c07070; }

/* ═══════ ANNUAIRE ═══════ */
.annuaire-wrap { padding:1.25rem; overflow-y:auto; flex:1; }
.ann-filters { display:flex; gap:4px; margin-bottom:1rem; flex-wrap:wrap; }
.ann-filter { font-family:'Cormorant Garamond',serif; font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; padding:.22rem .7rem; border:1px solid var(--bdr); background:transparent; color:var(--parch3); cursor:pointer; transition:all .15s; }
.ann-filter.active { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }
.annuaire-grid { display:flex; flex-direction:column; gap:1px; background:var(--bdr); }
.med-card { background:var(--ink2); padding:.85rem 1.1rem; display:flex; align-items:center; gap:.8rem; transition:background .15s; }
.med-card:hover { background:var(--ink3); }
.med-avatar { width:42px; height:42px; border-radius:50%; object-fit:cover; object-position:top; flex-shrink:0; border:1px solid var(--bdr2); }
.med-avatar-ph { width:42px; height:42px; border-radius:50%; background:var(--ink3); border:1px solid var(--bdr); display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-size:.95rem; color:var(--parch3); flex-shrink:0; }
.med-info { flex:1; min-width:0; }
.med-name { font-family:'Playfair Display',serif; font-size:.92rem; color:var(--parch); font-style:italic; margin-bottom:.12rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.med-grade { font-family:'Cormorant Garamond',serif; font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; margin-bottom:.15rem; }
.med-meta { font-family:'EB Garamond',serif; font-size:.76rem; color:var(--parch4); }
.med-badges { display:flex; gap:3px; flex-wrap:wrap; margin-top:.25rem; }

/* ═══════ SIDEBAR DROITE ═══════ */
.comm-sidebar {
  background:var(--ink2);
  border-left:1px solid var(--bdr);
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}
.sidebar-section {
  padding:.9rem 1rem;
  border-bottom:1px solid var(--bdr);
  flex-shrink:0;
}
.sidebar-title {
  font-family:'Cormorant Garamond',serif;
  font-size:.58rem; letter-spacing:.18em; text-transform:uppercase;
  color:var(--gold-d); margin-bottom:.6rem;
  display:flex; align-items:center; gap:.4rem;
}
.sidebar-title::after { content:''; flex:1; height:1px; background:var(--bdr); }

/* En ligne */
.online-item { display:flex; align-items:center; gap:.5rem; padding:.28rem 0; }
.online-dot { width:6px; height:6px; border-radius:50%; background:#4a9a4a; flex-shrink:0; box-shadow:0 0 4px rgba(74,154,74,.6); }
.online-name { font-family:'EB Garamond',serif; font-size:.84rem; color:var(--parch2); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.online-grade { font-family:'Cormorant Garamond',serif; font-size:.56rem; letter-spacing:.06em; text-transform:uppercase; color:var(--parch4); flex-shrink:0; }

/* Stats */
.stat-row { display:flex; justify-content:space-between; align-items:baseline; padding:.3rem 0; border-bottom:1px solid rgba(192,154,74,.06); }
.stat-row:last-child { border-bottom:none; }
.stat-label-sm { font-family:'Cormorant Garamond',serif; font-size:.62rem; letter-spacing:.06em; text-transform:uppercase; color:var(--parch3); }
.stat-val-sm { font-family:'Playfair Display',serif; font-size:.95rem; color:var(--gold-l); font-style:italic; }

/* Classement */
.rank-item { display:flex; align-items:center; gap:.5rem; padding:.35rem 0; border-bottom:1px solid rgba(192,154,74,.05); }
.rank-item:last-child { border-bottom:none; }
.rank-num { font-family:'Playfair Display',serif; font-size:.9rem; color:var(--gold-d); opacity:.5; width:1rem; text-align:center; flex-shrink:0; font-style:italic; }
.rank-av { width:28px; height:28px; border-radius:50%; object-fit:cover; flex-shrink:0; border:1px solid var(--bdr); }
.rank-av-ph { width:28px; height:28px; border-radius:50%; background:var(--ink3); border:1px solid var(--bdr); display:flex; align-items:center; justify-content:center; font-size:.65rem; color:var(--parch3); flex-shrink:0; }
.rank-info { flex:1; min-width:0; }
.rank-name { font-family:'EB Garamond',serif; font-size:.82rem; color:var(--parch); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rank-detail { font-family:'Cormorant Garamond',serif; font-size:.58rem; letter-spacing:.06em; text-transform:uppercase; color:var(--parch4); }

.empty-state { text-align:center; padding:1rem .5rem; font-family:'EB Garamond',serif; font-size:.85rem; color:var(--parch4); font-style:italic; }
</style>
</head>
<body>
<script src="js/header.js"></script>

<div class="comm-layout">

  <!-- COLONNE PRINCIPALE -->
  <div class="comm-left">
    <div class="comm-tabs" id="comm-tabs">
      <div class="comm-tab active" onclick="setTab(this,'mur')">🗨️ Mur du cabinet</div>
      <div class="comm-tab" onclick="setTab(this,'annuaire')">👥 Annuaire</div>
    </div>

    <!-- MUR -->
    <div id="tab-mur" class="mur-wrap">
      <div class="mur-messages" id="mur-messages">
        <div class="mur-empty">Chargement des messages…</div>
      </div>
      <div class="mur-input-wrap">
        <!-- Toolbar formatage -->
        <div class="mur-toolbar">
          <button class="tb-btn" onclick="applyFormat('bold')" title="Gras"><b>G</b></button>
          <button class="tb-btn" onclick="applyFormat('italic')" title="Italique"><i>I</i></button>
          <button class="tb-btn" onclick="applyFormat('underline')" title="Souligné"><u>S</u></button>
          <div class="tb-sep"></div>
          <button class="tb-btn" onclick="applyFormat('h1')" title="Titre">H1</button>
          <button class="tb-btn" onclick="applyFormat('h2')" title="Sous-titre">H2</button>
          <div class="tb-sep"></div>
          <button class="tb-btn emoji-btn" onclick="toggleEmoji()" title="Emojis">😊</button>
        </div>
        <!-- Picker emojis -->
        <div class="emoji-picker hidden" id="emoji-picker">
          <div class="emoji-grid" id="emoji-grid"></div>
        </div>
        <div class="mur-input-row">
          <div class="mur-editable" id="mur-input" contenteditable="true" data-placeholder="Écrire un message au cabinet… (Entrée pour envoyer, Maj+Entrée pour saut de ligne)" onkeydown="handleKey(event)" oninput="updateCharEditor()"></div>
          <button class="mur-send" id="mur-send" onclick="sendMessage()">Envoyer</button>
        </div>
        <div class="char-count" id="char-count">0 / 1000</div>
      </div>
    </div>

    <!-- ANNUAIRE -->
    <div id="tab-annuaire" class="hidden annuaire-wrap">
      <div class="ann-filters" id="ann-filters">
        <button class="ann-filter active" onclick="setAnnFilter(this,'all')">Tous</button>
        <button class="ann-filter" onclick="setAnnFilter(this,'stagiaire')">🎓 Stagiaires</button>
        <button class="ann-filter" onclick="setAnnFilter(this,'apprenti')">🩺 Apprentis</button>
        <button class="ann-filter" onclick="setAnnFilter(this,'medecin')">👨‍⚕️ Médecins</button>
        <button class="ann-filter" onclick="setAnnFilter(this,'specialiste')">⭐ Spécialistes</button>
      </div>
      <div class="annuaire-grid" id="annuaire-grid">
        <div class="empty-state">Chargement…</div>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <aside class="comm-sidebar">

    <!-- En ligne -->
    <div class="sidebar-section">
      <div class="sidebar-title">En ligne maintenant</div>
      <div id="online-list"><div class="empty-state" style="padding:.5rem">—</div></div>
    </div>

    <!-- Stats cabinet -->
    <div class="sidebar-section">
      <div class="sidebar-title">Le cabinet en chiffres</div>
      <div id="cabinet-stats">
        <div class="stat-row"><span class="stat-label-sm">Médecins inscrits</span><span class="stat-val-sm" id="stat-total">—</span></div>
        <div class="stat-row"><span class="stat-label-sm">Spécialistes</span><span class="stat-val-sm" id="stat-spe">—</span></div>
        <div class="stat-row"><span class="stat-label-sm">Messages today</span><span class="stat-val-sm" id="stat-msgs">—</span></div>
        <div class="stat-row"><span class="stat-label-sm">Badges distribués</span><span class="stat-val-sm" id="stat-badges">—</span></div>
      </div>
    </div>

    <!-- Classement -->
    <div class="sidebar-section">
      <div class="sidebar-title">Classement</div>
      <div id="classement-list"><div class="empty-state" style="padding:.5rem">Chargement…</div></div>
    </div>

    <!-- Dernière certification -->
    <div class="sidebar-section">
      <div class="sidebar-title">Dernière certification</div>
      <div id="last-certif"><div class="empty-state" style="padding:.5rem">—</div></div>
    </div>

  </aside>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot,
  query, orderBy, limit, getDocs, serverTimestamp, where,
  setDoc, updateDoc, getDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDTi50ETxwfp55UN7YN-m0sQ_k26kwpQmY",
  authDomain:"psy-redm.firebaseapp.com",
  projectId:"psy-redm",
  storageBucket:"psy-redm.firebasestorage.app",
  messagingSenderId:"968947741685",
  appId:"1:968947741685:web:22cc44471187e6024ca6bc"
});
const auth = getAuth(app);
const db   = getFirestore(app);

var ME = null;
var ALL_MEDECINS = [];
var annFilter = 'all';
var msgUnsub = null;

/* ── GRADES ── */
const GRADE_COLORS = {
  stagiaire:'#4a9a4a', apprenti:'#c89820', medecin:'#4a80b8',
  specialiste:'#9a3ab8', admin:'#c83030'
};
const GRADE_LABELS = {
  stagiaire:'Stagiaire', apprenti:'Apprenti médecin',
  medecin:'Médecin', specialiste:'Spécialiste', admin:'Admin'
};

/* ── AUTH ── */
onAuthStateChanged(auth, async user => {
  if(!user){ window.location.href='login.html'; return; }
  const snap = await getDoc(doc(db,'medecins',user.uid));
  if(!snap.exists()){ window.location.href='setup-profil.html'; return; }
  ME = { uid:user.uid, ...snap.data() };
  if(!ME.profilOk){ window.location.href='setup-profil.html'; return; }
  document.getElementById('logout-btn').onclick = () => { auth.signOut().then(()=>window.location.href='login.html'); };
  init();
});

async function init(){
  // Marquer en ligne
  await setDoc(doc(db,'presence',ME.uid), {
    uid:ME.uid, nom:ME.nom, prenom:ME.prenom, photo:ME.photo||'',
    grade:ME.grade||'stagiaire', cabinet:ME.cabinet||'',
    lastSeen:serverTimestamp()
  }, {merge:true});

  loadMessages();
  loadMedecins();
  listenPresence();
}

/* ── MESSAGES (temps réel) ── */
function loadMessages(){
  const q = query(collection(db,'mur_messages'), orderBy('createdAt','desc'), limit(60));
  msgUnsub = onSnapshot(q, snap => {
    const msgs = [];
    snap.forEach(d => msgs.push({id:d.id,...d.data()}));
    renderMessages(msgs.reverse());
    // Compter aujourd'hui
    const today = new Date().toDateString();
    const todayCount = msgs.filter(m => m.createdAt && new Date(m.createdAt.seconds*1000).toDateString()===today).length;
    document.getElementById('stat-msgs').textContent = todayCount;
  });
}

function renderMessages(msgs){
  const wrap = document.getElementById('mur-messages');
  const wasAtBottom = wrap.scrollHeight - wrap.scrollTop <= wrap.clientHeight + 50;
  if(!msgs.length){
    wrap.innerHTML='<div class="mur-empty">Aucun message pour l\'instant.<br>Soyez le premier à écrire !</div>';
    return;
  }
  wrap.innerHTML = msgs.map(m => {
    const isOwn = ME && m.uid === ME.uid;
    const isAdmin = ME && ME.role === 'admin';
    const canDel = isOwn || isAdmin;
    const time = m.createdAt ? fmtTime(m.createdAt.seconds*1000) : '';
    const grade = m.grade || 'stagiaire';
    const col = GRADE_COLORS[grade] || '#c89820';
    const gradeLabel = GRADE_LABELS[grade] || grade;
    const av = m.photo
      ? `<img class="msg-avatar" src="${m.photo}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
        +`<div class="msg-avatar-ph" style="display:none">${(m.prenom?.[0]||'')+(m.nom?.[0]||'')}</div>`
      : `<div class="msg-avatar-ph">${(m.prenom?.[0]||'?')+(m.nom?.[0]||'')}</div>`;
    return `<div class="msg${isOwn?' own':''}" id="msg-${m.id}">
      ${av}
      <div class="msg-body">
        <div class="msg-header">
          <span class="msg-name">${esc(m.prenom||'')} ${esc(m.nom||'')}</span>
          <span class="msg-grade" style="color:${col}">${gradeLabel}${m.titreSpec?' · '+esc(m.titreSpec):''}</span>
          <span class="msg-time">${time}</span>
          ${canDel?`<button class="msg-del" onclick="delMsg('${m.id}')" title="Supprimer">✕</button>`:''}
        </div>
        <div class="msg-text">${(m.text||'').replace(/\n/g,'<br>')}</div>
      </div>
    </div>`;
  }).join('');
  if(wasAtBottom) wrap.scrollTop = wrap.scrollHeight;
}

window.delMsg = async function(id){
  if(!confirm('Supprimer ce message ?')) return;
  await deleteDoc(doc(db,'mur_messages',id));
};

window.sendMessage = async function(){
  const input = document.getElementById('mur-input');
  const html = input.innerHTML.trim();
  const text = (input.innerText || '').trim();
  if(!text || text.length > 1000) return;
  const btn = document.getElementById('mur-send');
  btn.disabled = true;
  try {
    await addDoc(collection(db,'mur_messages'), {
      uid:   ME.uid,
      prenom:ME.prenom||'',
      nom:   ME.nom||'',
      photo: ME.photo||'',
      grade: ME.grade||'stagiaire',
      cabinet:ME.cabinet||'',
      titreSpec: ME.titreSpec||'',
      text:  html,
      createdAt: serverTimestamp()
    });
    input.innerHTML = '';
    document.getElementById('char-count').textContent = '0 / 1000';
    document.getElementById('char-count').classList.remove('warn');
    // Scroll to bottom
    const wrap = document.getElementById('mur-messages');
    wrap.scrollTop = wrap.scrollHeight;
  } catch(e){
    console.error(e);
  }
  btn.disabled = false;
};

/* ── MÉDECINS ── */
async function loadMedecins(){
  const snap = await getDocs(collection(db,'medecins'));
  ALL_MEDECINS = snap.docs.map(d=>({id:d.id,...d.data()}))
    .filter(m=>m.profilOk)
    .sort((a,b)=>{
      const order={admin:0,specialiste:1,medecin:2,apprenti:3,stagiaire:4};
      return (order[a.grade]??5)-(order[b.grade]??5);
    });
  renderAnnuaire();
  renderClassement();
  updateStats();
}

function renderAnnuaire(){
  const filtered = annFilter==='all' ? ALL_MEDECINS : ALL_MEDECINS.filter(m=>(m.grade||'stagiaire')===annFilter);
  const grid = document.getElementById('annuaire-grid');
  if(!filtered.length){ grid.innerHTML='<div class="empty-state">Aucun médecin dans cette catégorie.</div>'; return; }
  grid.innerHTML = filtered.map(m => {
    const grade = m.grade||'stagiaire';
    const col = GRADE_COLORS[grade]||'#c89820';
    const badges = (m.badges||[]).slice(0,5).map(b=>`<span class="med-badge-icon" title="${b.label}">${b.icon}</span>`).join('');
    const av = m.photo
      ? `<img class="med-avatar" src="${m.photo}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
        +`<div class="med-avatar-ph" style="display:none">${(m.prenom?.[0]||'')+(m.nom?.[0]||'')}</div>`
      : `<div class="med-avatar-ph">${(m.prenom?.[0]||'?')+(m.nom?.[0]||'')}</div>`;
    return `<div class="med-card">
      ${av}
      <div class="med-info">
        <div class="med-name">Dr. ${esc(m.prenom||'')} ${esc(m.nom||'')}</div>
        <div class="med-grade" style="color:${col}">${GRADE_LABELS[grade]||grade}${m.titreSpec?' · '+esc(m.titreSpec):''}</div>
        <div class="med-meta">Cabinet de ${esc(m.cabinet||'—')}${m.age?' · '+m.age+' ans':''}</div>
        ${badges?'<div class="med-badges">'+badges+'</div>':''}
      </div>
    </div>`;
  }).join('');
}

function renderClassement(){
  const sorted = ALL_MEDECINS.slice().sort((a,b)=>((b.badges||[]).length)-((a.badges||[]).length)).slice(0,8);
  const el = document.getElementById('classement-list');
  if(!sorted.length){ el.innerHTML='<div class="empty-state" style="padding:.5rem">—</div>'; return; }
  el.innerHTML = sorted.map((m,i) => {
    const medals = ['🥇','🥈','🥉'];
    const av = m.photo
      ? `<img class="rank-av" src="${m.photo}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
        +`<div class="rank-av-ph" style="display:none">${(m.prenom?.[0]||'')+(m.nom?.[0]||'')}</div>`
      : `<div class="rank-av-ph">${(m.prenom?.[0]||'?')+(m.nom?.[0]||'')}</div>`;
    return `<div class="rank-item">
      <div class="rank-num">${medals[i]||i+1}</div>
      ${av}
      <div class="rank-info">
        <div class="rank-name">Dr. ${esc(m.prenom||'')} ${esc(m.nom||'')}</div>
        <div class="rank-detail">${(m.badges||[]).length} badge${(m.badges||[]).length>1?'s':''}</div>
      </div>
    </div>`;
  }).join('');

  // Dernière certification
  const withBadges = ALL_MEDECINS.filter(m=>(m.badges||[]).length>0);
  if(withBadges.length){
    let lastBadge = null, lastMed = null;
    withBadges.forEach(m=>{
      (m.badges||[]).forEach(b=>{
        if(!lastBadge || b.date > lastBadge.date){ lastBadge=b; lastMed=m; }
      });
    });
    if(lastMed && lastBadge){
      document.getElementById('last-certif').innerHTML =
        `<div style="font-family:'EB Garamond',serif;font-size:.9rem;color:var(--parch2)">`
        +`<span style="font-size:1.2rem">${lastBadge.icon}</span> `
        +`<strong>Dr. ${esc(lastMed.prenom||'')} ${esc(lastMed.nom||'')}</strong><br>`
        +`<span style="font-family:'Cormorant Garamond',serif;font-size:.72rem;color:var(--parch3)">${lastBadge.label}</span></div>`;
    }
  }
}

function updateStats(){
  const total = ALL_MEDECINS.length;
  const spe = ALL_MEDECINS.filter(m=>['specialiste','admin'].includes(m.grade||'')).length;
  const badges = ALL_MEDECINS.reduce((acc,m)=>acc+(m.badges||[]).length,0);
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-spe').textContent = spe;
  document.getElementById('stat-badges').textContent = badges;
}

/* ── PRÉSENCE ── */
function listenPresence(){
  const fiveMin = new Date(Date.now()-5*60*1000);
  onSnapshot(collection(db,'presence'), snap => {
    const online = [];
    snap.forEach(d=>{
      const data = d.data();
      if(data.lastSeen && data.lastSeen.seconds*1000 > fiveMin.getTime()){
        online.push(data);
      }
    });
    const el = document.getElementById('online-list');
    if(!online.length){ el.innerHTML='<div class="empty-state" style="padding:.5rem">Aucun médecin en ligne</div>'; return; }
    el.innerHTML = online.map(m=>{
      const grade = m.grade||'stagiaire';
      const col = GRADE_COLORS[grade]||'#c89820';
      return `<div class="online-item">
        <div class="online-dot"></div>
        <span class="online-name">Dr. ${esc(m.prenom||'')} ${esc(m.nom||'')}</span>
        <span class="online-grade" style="color:${col}">${GRADE_LABELS[grade]||grade}</span>
      </div>`;
    }).join('');
  });
}

/* ── UTILS ── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtTime(ms){
  const d=new Date(ms), now=new Date();
  const diff=Math.floor((now-d)/1000);
  if(diff<60) return 'À l\'instant';
  if(diff<3600) return Math.floor(diff/60)+'min';
  if(diff<86400) return Math.floor(diff/3600)+'h';
  const isToday = d.toDateString()===now.toDateString();
  if(isToday) return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
}
</script>

<script>
/* ── NAVIGATION ── */
function setTab(el, tab){
  document.querySelectorAll('.comm-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-mur').classList.toggle('hidden', tab!=='mur');
  document.getElementById('tab-annuaire').classList.toggle('hidden', tab!=='annuaire');
}

function setAnnFilter(btn, filter){
  annFilter = filter;
  document.querySelectorAll('.ann-filter').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(window.renderAnnuaire) renderAnnuaire();
}

/* ── ÉDITEUR ENRICHI ── */
var EMOJIS = [
  '😊','😄','😂','🤣','❤️','👍','🙏','😍','🎉','🔥',
  '💪','👋','🫡','😎','🤔','😅','🥹','🫶','⭐','✅',
  '⚕️','🏥','💊','🔪','🧠','⚖️','🦷','👁️','👂','❤️',
  '🩺','💉','🩹','🩻','⏱️','📋','📝','🗂️','📖','🎓',
  '🤠','🐎','🌵','🤙','☀️','🌙','🌧️','💀','🍺','🥃',
];

function renderEmojiPicker(){
  var grid = document.getElementById('emoji-grid');
  if(!grid) return;
  grid.innerHTML = EMOJIS.map(function(e){
    return '<button class="emoji-btn-pick" onclick="insertEmoji(\''+e+'\')">'+e+'</button>';
  }).join('');
}

function toggleEmoji(){
  var p = document.getElementById('emoji-picker');
  p.classList.toggle('hidden');
  if(!p.classList.contains('hidden')) renderEmojiPicker();
}

function insertEmoji(emoji){
  var el = document.getElementById('mur-input');
  el.focus();
  document.execCommand('insertText', false, emoji);
  document.getElementById('emoji-picker').classList.add('hidden');
  updateCharEditor();
}

function applyFormat(fmt){
  var el = document.getElementById('mur-input');
  el.focus();
  if(fmt === 'bold') document.execCommand('bold', false, null);
  else if(fmt === 'italic') document.execCommand('italic', false, null);
  else if(fmt === 'underline') document.execCommand('underline', false, null);
  else if(fmt === 'h1'){
    var sel = window.getSelection();
    if(sel.rangeCount){
      var range = sel.getRangeAt(0);
      var h = document.createElement('h1');
      try { range.surroundContents(h); } catch(e){ document.execCommand('formatBlock', false, 'H1'); }
    } else { document.execCommand('formatBlock', false, 'H1'); }
  }
  else if(fmt === 'h2') document.execCommand('formatBlock', false, 'H2');
  updateCharEditor();
}

function updateCharEditor(){
  var el = document.getElementById('mur-input');
  var text = el.innerText || '';
  var len = text.length;
  var cc = document.getElementById('char-count');
  cc.textContent = len + ' / 1000';
  cc.classList.toggle('warn', len > 900);
}

function handleKey(e){
  if(e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    if(window.sendMessage) window.sendMessage();
  }
  // Fermer picker emojis si Escape
  if(e.key==='Escape'){
    var p = document.getElementById('emoji-picker');
    if(p) p.classList.add('hidden');
  }
  // Fermer picker emojis si clic ailleurs
  document.addEventListener('click', function(ev){
    var picker = document.getElementById('emoji-picker');
    if(picker && !picker.contains(ev.target) && !ev.target.classList.contains('emoji-btn')){
      picker.classList.add('hidden');
    }
  }, {once:true});
}
</script>
